<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>NINJA RUN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #06060a;
    color: #e8e6e3;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    background:
      radial-gradient(circle at 50% -10%, rgba(157, 77, 255, 0.20), transparent 60%),
      radial-gradient(ellipse at center, #14141a, #06060a 75%);
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: manipulation;
  }
  canvas { display: block; background: transparent; cursor: pointer; }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    background: rgba(6, 6, 10, 0.65);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .overlay.is-hidden { display: none; }
  h1 {
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: clamp(36px, 8vw, 64px);
    font-weight: 700;
    letter-spacing: 0.04em;
    margin: 0 0 16px;
    color: #9d4dff;
    text-shadow: 0 0 28px rgba(157, 77, 255, 0.55);
  }
  p {
    color: rgba(232, 230, 227, 0.72);
    font-size: 15px;
    margin: 0 0 28px;
    max-width: 34ch;
    line-height: 1.55;
  }
  button {
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #0a0a0e;
    background: #9d4dff;
    border: none;
    border-radius: 999px;
    padding: 13px 26px;
    cursor: pointer;
    box-shadow: 0 8px 22px rgba(157, 77, 255, 0.45);
    transition: transform 200ms, box-shadow 200ms;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(157, 77, 255, 0.7); }
  .hud {
    position: absolute;
    top: 18px;
    left: 0; right: 0;
    text-align: center;
    pointer-events: none;
    font-family: "Space Grotesk", system-ui, sans-serif;
    z-index: 5;
  }
  .hud .score {
    font-size: 38px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: rgba(232, 230, 227, 0.92);
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
    font-variant-numeric: tabular-nums;
  }
  .hud .best {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(232, 230, 227, 0.42);
    margin-top: 4px;
  }
  .back {
    position: absolute;
    top: 16px;
    left: 16px;
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(232, 230, 227, 0.5);
    text-decoration: none;
    z-index: 10;
  }
  .back:hover { color: rgba(232, 230, 227, 0.95); }
  .hint {
    color: rgba(232, 230, 227, 0.4);
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-top: 18px;
  }
  .hint b { color: rgba(232, 230, 227, 0.7); font-weight: 700; }
  .controls {
    position: absolute;
    bottom: 14px;
    left: 14px;
    right: 14px;
    display: flex;
    justify-content: space-between;
    gap: 10px;
    z-index: 5;
    pointer-events: none;
  }
  .key {
    pointer-events: auto;
    flex: 1;
    max-width: 180px;
    padding: 14px 0;
    text-align: center;
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(232, 230, 227, 0.8);
    background: rgba(157, 77, 255, 0.10);
    border: 1px solid rgba(157, 77, 255, 0.35);
    border-radius: 14px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: background 100ms, transform 100ms;
  }
  .key:active { background: rgba(157, 77, 255, 0.28); transform: translateY(2px); }
  @media (hover: hover) and (pointer: fine) {
    .controls { display: none; }
  }
  .mute {
    position: fixed;
    top: 16px;
    right: 16px;
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: 14px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(232, 230, 227, 0.6);
    background: rgba(6, 6, 10, 0.4);
    border: 1px solid rgba(232, 230, 227, 0.18);
    border-radius: 50%;
    cursor: pointer;
    z-index: 11;
    padding: 0;
    box-shadow: none;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .mute:hover { color: rgba(232, 230, 227, 0.95); border-color: rgba(232, 230, 227, 0.45); }
  .mute.is-muted { opacity: 0.4; }
</style>
<script src="../music.js" defer></script>
</head>
<body>
<a href="../index.html" class="back">&larr; back</a>
<button class="mute" id="mute" type="button" aria-label="Toggle music">♪</button>
<canvas id="c"></canvas>
<div class="hud">
  <div class="score" id="score">0</div>
  <div class="best" id="best">best 0</div>
</div>
<div class="controls" aria-hidden="true">
  <div class="key" id="key-jump">Jump</div>
  <div class="key" id="key-duck">Slide</div>
</div>
<div class="overlay" id="start">
  <h1>NINJA RUN</h1>
  <p>Run forever. Jump over crates, slide under hanging blades. Speed ramps with distance &mdash; how far can you make it?</p>
  <button id="start-btn">Start</button>
  <div class="hint"><b>Space / &uarr;</b> jump &middot; <b>&darr;</b> slide</div>
</div>
<div class="overlay is-hidden" id="over">
  <h1>Down</h1>
  <p id="over-score">Distance: 0m &middot; Best: 0m</p>
  <button id="retry-btn">Retry</button>
</div>
<script>
(function () {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const startOverlay = document.getElementById('start');
  const overOverlay = document.getElementById('over');
  const overScoreEl = document.getElementById('over-score');
  const startBtn = document.getElementById('start-btn');
  const retryBtn = document.getElementById('retry-btn');
  const keyJump = document.getElementById('key-jump');
  const keyDuck = document.getElementById('key-duck');

  const ACCENT = '#9d4dff';
  const DPR = Math.min(window.devicePixelRatio || 1, 2);

  let W = 0, H = 0;
  let groundY = 0;
  let state = 'idle';
  let distance = 0;
  let best = 0;
  let speed = 6;
  let scrollX = 0;
  let spawnX = 0;
  let obstacles = [];
  let stars = [];
  let dust = [];
  let shakeT = 0;
  let runFrame = 0;

  // ninja
  const NINJA_X = 0; // will be computed in resize
  const ninja = {
    x: 0, y: 0,
    w: 36, h: 60,
    vy: 0,
    duck: false,
    onGround: true,
  };

  try { best = parseInt(localStorage.getItem('ninja-run-best') || '0', 10) || 0; } catch (_) {}
  bestEl.textContent = 'best ' + best + 'm';

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    groundY = Math.min(H - 110, H * 0.78);
    ninja.x = Math.max(80, W * 0.18);
  }
  window.addEventListener('resize', resize);
  resize();

  // stars background — initialized once and parallax-scrolled
  function initStars() {
    stars = [];
    for (let i = 0; i < 60; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * groundY * 0.85,
        r: Math.random() < 0.85 ? 1 : 2,
        depth: 0.2 + Math.random() * 0.5,
        twinkle: Math.random() * Math.PI * 2,
      });
    }
  }
  initStars();
  window.addEventListener('resize', initStars);

  let audio = null;
  function ensureAudio() {
    if (!audio) {
      try { audio = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
  }
  function sound(freq, dur, type, vol) {
    if (!audio) return;
    const t = audio.currentTime;
    const o = audio.createOscillator();
    const g = audio.createGain();
    o.frequency.value = freq;
    o.type = type || 'sine';
    g.gain.setValueAtTime(vol || 0.22, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g).connect(audio.destination);
    o.start(t);
    o.stop(t + dur + 0.02);
  }
  function noise(dur, vol) {
    if (!audio) return;
    const t = audio.currentTime;
    const bufSize = Math.floor(audio.sampleRate * dur);
    const buf = audio.createBuffer(1, bufSize, audio.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 2);
    const src = audio.createBufferSource();
    src.buffer = buf;
    const g = audio.createGain();
    g.gain.setValueAtTime(vol || 0.2, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    src.connect(g).connect(audio.destination);
    src.start(t);
    src.stop(t + dur);
  }

  function reset() {
    obstacles = [];
    dust = [];
    distance = 0;
    speed = 6;
    scrollX = 0;
    spawnX = W + 200;
    shakeT = 0;
    runFrame = 0;
    ninja.y = groundY - ninja.h;
    ninja.vy = 0;
    ninja.duck = false;
    ninja.onGround = true;
    scoreEl.textContent = '0';
  }

  function start() {
    ensureAudio();
    if (window.Music) Music.start('ninja-run');
    reset();
    state = 'play';
    startOverlay.classList.add('is-hidden');
    overOverlay.classList.add('is-hidden');
  }

  function gameOver() {
    state = 'over';
    const d = Math.floor(distance);
    if (d > best) {
      best = d;
      try { localStorage.setItem('ninja-run-best', String(best)); } catch (_) {}
      bestEl.textContent = 'best ' + best + 'm';
    }
    overScoreEl.textContent = 'Distance: ' + d + 'm · Best: ' + best + 'm';
    overOverlay.classList.remove('is-hidden');
    sound(160, 0.18, 'square', 0.22);
    sound(110, 0.4, 'sawtooth', 0.22);
    shakeT = 14;
  }

  function jump() {
    if (state !== 'play') return;
    if (ninja.onGround) {
      ninja.vy = -16;
      ninja.onGround = false;
      ninja.duck = false;
      sound(620, 0.1, 'sine', 0.22);
    }
  }
  function setDuck(on) {
    if (state !== 'play') return;
    ninja.duck = !!on;
    if (on && ninja.onGround) {
      // small whoosh when starting slide
    }
  }

  startBtn.addEventListener('click', start);
  retryBtn.addEventListener('click', start);
  canvas.addEventListener('pointerdown', (e) => {
    if (state === 'idle' || state === 'over') return;
    e.preventDefault();
    jump();
  });

  keyJump.addEventListener('pointerdown', (e) => { e.preventDefault(); jump(); });
  keyDuck.addEventListener('pointerdown', (e) => { e.preventDefault(); setDuck(true); });
  keyDuck.addEventListener('pointerup', () => setDuck(false));
  keyDuck.addEventListener('pointercancel', () => setDuck(false));

  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
      e.preventDefault();
      if (state === 'idle' || state === 'over') start();
      else jump();
    } else if (e.code === 'ArrowDown' || e.code === 'KeyS') {
      e.preventDefault();
      setDuck(true);
    } else if (e.code === 'Enter') {
      e.preventDefault();
      if (state === 'idle' || state === 'over') start();
    }
  });
  window.addEventListener('keyup', (e) => {
    if (e.code === 'ArrowDown' || e.code === 'KeyS') setDuck(false);
  });

  function spawnObstacle() {
    // Pick a type. As speed grows we mix in more variety.
    const types = ['low', 'low', 'tall', 'overhang'];
    if (speed > 9) types.push('double');
    const t = types[Math.floor(Math.random() * types.length)];
    if (t === 'low') {
      obstacles.push({ type: 'box', x: spawnX, w: 32 + Math.random() * 18, h: 32 });
    } else if (t === 'tall') {
      obstacles.push({ type: 'box', x: spawnX, w: 28, h: 48 });
    } else if (t === 'double') {
      obstacles.push({ type: 'box', x: spawnX, w: 32, h: 32 });
      obstacles.push({ type: 'box', x: spawnX + 70, w: 32, h: 32 });
    } else if (t === 'overhang') {
      const h = 36;
      obstacles.push({ type: 'overhang', x: spawnX, w: 70, h, gap: 40 });
    }
  }

  function update() {
    if (state === 'play') {
      // distance + difficulty
      distance += speed * 0.06;
      scoreEl.textContent = Math.floor(distance);
      speed = 6 + Math.min(distance * 0.012, 8);
      scrollX += speed;

      // ninja physics
      const gravity = 0.95;
      ninja.vy += gravity;
      ninja.y += ninja.vy;
      const effH = ninja.duck && ninja.onGround ? ninja.h * 0.55 : ninja.h;
      const targetY = groundY - effH;
      if (ninja.y >= targetY) {
        ninja.y = targetY;
        ninja.vy = 0;
        ninja.onGround = true;
      }
      runFrame += speed * 0.5;

      // spawn obstacles with a gap based on speed
      const minGap = 220 + Math.max(0, 380 - speed * 18);
      const maxGap = minGap + 180;
      // The most recently spawned obstacle determines next spawn distance
      const last = obstacles.length ? obstacles[obstacles.length - 1] : null;
      const lastX = last ? last.x + (last.w || 0) : -Infinity;
      if (lastX < W - 10 - minGap) {
        const gap = minGap + Math.random() * (maxGap - minGap);
        spawnX = W + 40 + gap * 0.5;
        spawnObstacle();
      }

      // move obstacles
      for (const o of obstacles) o.x -= speed;
      obstacles = obstacles.filter(o => o.x + (o.w || 0) > -40);

      // dust
      if (ninja.onGround && state === 'play' && Math.random() < 0.5) {
        dust.push({
          x: ninja.x - 6, y: groundY - 2,
          vx: -speed * 0.7 - Math.random() * 1.5,
          vy: -Math.random() * 1.2,
          life: 14 + Math.random() * 10,
          r: 1 + Math.random() * 1.6,
        });
      }
      for (let i = dust.length - 1; i >= 0; i--) {
        const d = dust[i];
        d.x += d.vx; d.y += d.vy;
        d.vy += 0.05;
        d.life--;
        if (d.life <= 0) dust.splice(i, 1);
      }

      // collision
      const nb = ninjaBox();
      for (const o of obstacles) {
        const boxes = obstacleBoxes(o);
        for (const b of boxes) {
          if (nb.x < b.x + b.w && nb.x + nb.w > b.x &&
              nb.y < b.y + b.h && nb.y + nb.h > b.y) {
            gameOver();
            noise(0.25, 0.28);
            return;
          }
        }
      }
    }

    if (shakeT > 0) shakeT--;

    for (const s of stars) {
      s.twinkle += 0.04;
    }
  }

  function ninjaBox() {
    const ducking = ninja.duck && ninja.onGround;
    const h = ducking ? ninja.h * 0.55 : ninja.h;
    const y = ninja.y;
    return { x: ninja.x - 4, y: y + 6, w: ninja.w + 8, h: h - 10 };
  }
  function obstacleBoxes(o) {
    if (o.type === 'box') {
      return [{ x: o.x, y: groundY - o.h, w: o.w, h: o.h }];
    } else if (o.type === 'overhang') {
      return [{ x: o.x, y: groundY - o.gap - o.h, w: o.w, h: o.h }];
    }
    return [];
  }

  function render() {
    ctx.save();
    if (shakeT > 0) {
      ctx.translate((Math.random() - 0.5) * shakeT, (Math.random() - 0.5) * shakeT);
    }
    ctx.clearRect(-20, -20, W + 40, H + 40);

    // Sky gradient — twilight purple at the horizon, deeper at the top
    const sky = ctx.createLinearGradient(0, 0, 0, groundY);
    sky.addColorStop(0,    '#0c0815');
    sky.addColorStop(0.55, '#1b0f2c');
    sky.addColorStop(0.85, '#3a154a');
    sky.addColorStop(1,    '#591b48');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, groundY);

    // A soft, drifting moon
    const moonX = ((W * 0.8 - scrollX * 0.02) % (W + 200) + W + 200) % (W + 200) - 100;
    const moonY = groundY * 0.28;
    const moonGrad = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, 60);
    moonGrad.addColorStop(0, 'rgba(255, 220, 230, 0.95)');
    moonGrad.addColorStop(0.45, 'rgba(255, 180, 210, 0.4)');
    moonGrad.addColorStop(1, 'rgba(255, 180, 210, 0)');
    ctx.fillStyle = moonGrad;
    ctx.beginPath();
    ctx.arc(moonX, moonY, 60, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff6f2';
    ctx.beginPath();
    ctx.arc(moonX, moonY, 22, 0, Math.PI * 2);
    ctx.fill();

    // Stars (parallax)
    for (const s of stars) {
      const x = ((s.x - scrollX * s.depth * 0.18) % W + W) % W;
      const a = 0.4 + Math.sin(s.twinkle) * 0.25;
      ctx.fillStyle = `rgba(220, 200, 255, ${a})`;
      ctx.fillRect(x, s.y, s.r, s.r);
    }

    // Three layers of parallax mountains — farther ones get snow caps + atmospheric haze
    drawMountains(0.18, '#2b1840', 0.20, 60, '#5a3b6e');
    drawMountains(0.42, '#1f0f30', 0.22, 95, null);
    drawMountains(0.7,  '#11071a', 0.18, 135, null);

    // Ground — neon horizon line + dark earth + scrolling lane dashes
    ctx.fillStyle = ACCENT;
    ctx.shadowColor = ACCENT;
    ctx.shadowBlur = 14;
    ctx.fillRect(0, groundY, W, 2);
    ctx.shadowBlur = 0;
    const earth = ctx.createLinearGradient(0, groundY, 0, H);
    earth.addColorStop(0, 'rgba(20, 8, 26, 0.95)');
    earth.addColorStop(1, 'rgba(4, 2, 8, 1)');
    ctx.fillStyle = earth;
    ctx.fillRect(0, groundY + 2, W, H - groundY - 2);

    ctx.fillStyle = 'rgba(157, 77, 255, 0.55)';
    for (let i = -1; i < Math.ceil(W / 90) + 1; i++) {
      const x = ((i * 90 - (scrollX * 0.8) % 90));
      ctx.fillRect(x, groundY + 14, 30, 2);
    }
    // Faint grid-like depth lines on the ground
    ctx.strokeStyle = 'rgba(157, 77, 255, 0.10)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 4; i++) {
      const y = groundY + 22 + i * 18;
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }

    // Speed lines — show up when running fast and on the ground
    if (state === 'play' && speed > 8 && ninja.onGround) {
      const lines = Math.floor((speed - 8) * 3);
      ctx.strokeStyle = 'rgba(220, 200, 255, 0.4)';
      ctx.lineWidth = 2;
      for (let i = 0; i < lines; i++) {
        const yL = groundY - 30 - (i * 7 + ((scrollX * 0.5 + i * 31) % 28));
        const x1 = W - ((scrollX * 0.7 + i * 73) % (W + 160));
        ctx.beginPath();
        ctx.moveTo(x1, yL);
        ctx.lineTo(x1 - 50, yL);
        ctx.stroke();
      }
    }

    // Dust
    for (const d of dust) {
      const a = Math.min(1, d.life / 20);
      ctx.fillStyle = `rgba(200, 180, 255, ${a * 0.85})`;
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      ctx.fill();
    }

    // Obstacles
    for (const o of obstacles) {
      if (o.type === 'box') {
        drawCrate(o.x, groundY - o.h, o.w, o.h);
      } else if (o.type === 'overhang') {
        drawOverhang(o.x, groundY - o.gap - o.h, o.w, o.h, o.gap);
      }
    }

    // Ninja
    drawNinja();

    ctx.restore();
  }

  function drawMountains(depth, color, height, peak, snowColor) {
    const speed2 = scrollX * depth * 0.08;
    // Build a smooth peak silhouette
    const step = 80;
    const points = [];
    for (let i = -1; i < Math.ceil(W / step) + 2; i++) {
      const x = i * step - (speed2 % step);
      const h = peak * (0.6 + 0.4 * Math.sin(i * 1.7 + depth * 7));
      points.push({ x: x + step / 2, y: groundY - h });
    }
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(0, groundY);
    for (const p of points) ctx.lineTo(p.x, p.y);
    ctx.lineTo(W + step, groundY);
    ctx.closePath();
    ctx.fill();
    // Atmospheric haze near base of distant mountains
    const haze = ctx.createLinearGradient(0, groundY - peak * 0.4, 0, groundY);
    haze.addColorStop(0, 'rgba(89, 27, 72, 0)');
    haze.addColorStop(1, 'rgba(89, 27, 72, 0.55)');
    ctx.fillStyle = haze;
    ctx.fillRect(0, groundY - peak * 0.4, W, peak * 0.4);
    // Snow caps on the tallest peaks
    if (snowColor) {
      ctx.fillStyle = snowColor;
      ctx.beginPath();
      for (const p of points) {
        // Only cap peaks that rise above 70% of the slice height
        if (groundY - p.y > peak * 0.55) {
          ctx.moveTo(p.x - 9, p.y + 6);
          ctx.lineTo(p.x, p.y);
          ctx.lineTo(p.x + 9, p.y + 6);
          ctx.closePath();
        }
      }
      ctx.fill();
    }
  }

  function drawCrate(x, y, w, h) {
    // Wooden side gradient
    const g = ctx.createLinearGradient(x, y, x, y + h);
    g.addColorStop(0, '#3a2a55');
    g.addColorStop(1, '#1c1130');
    ctx.fillStyle = g;
    ctx.fillRect(x, y, w, h);
    // Top + bottom accent stripes
    ctx.fillStyle = ACCENT;
    ctx.fillRect(x, y, w, 3);
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(x, y + h - 3, w, 3);
    // Plank lines (vertical) and a single horizontal seam
    ctx.strokeStyle = 'rgba(0, 0, 0, 0.35)';
    ctx.lineWidth = 1;
    const planks = Math.max(2, Math.floor(w / 16));
    for (let p = 1; p < planks; p++) {
      const px = x + (w * p / planks);
      ctx.beginPath();
      ctx.moveTo(px + 0.5, y + 3);
      ctx.lineTo(px + 0.5, y + h - 3);
      ctx.stroke();
    }
    ctx.beginPath();
    ctx.moveTo(x, y + h / 2);
    ctx.lineTo(x + w, y + h / 2);
    ctx.stroke();
    // Glowing rim — neon outline
    ctx.strokeStyle = 'rgba(180, 130, 255, 0.55)';
    ctx.lineWidth = 1.2;
    ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
    // Corner studs
    ctx.fillStyle = ACCENT;
    ctx.fillRect(x + 2, y + 2, 3, 3);
    ctx.fillRect(x + w - 5, y + 2, 3, 3);
    ctx.fillRect(x + 2, y + h - 5, 3, 3);
    ctx.fillRect(x + w - 5, y + h - 5, 3, 3);
  }

  function drawOverhang(x, y, w, h, gap) {
    // Hanging beam with rivet pattern
    const g = ctx.createLinearGradient(x, y, x, y + h);
    g.addColorStop(0, '#3a2a55');
    g.addColorStop(1, '#1c1130');
    ctx.fillStyle = g;
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = ACCENT;
    ctx.fillRect(x, y, w, 2);
    ctx.fillRect(x, y + h - 4, w, 2);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
    for (let i = 0; i < 4; i++) {
      ctx.fillRect(x + 8 + i * ((w - 16) / 3), y + 6, 3, 3);
    }
    // Blades with gleaming reflection
    const swing = Math.sin(scrollX * 0.04) * 2;
    for (let i = 0; i < 3; i++) {
      const bx = x + 12 + i * (w - 24) / 2 + swing;
      const by = y + h;
      // Steel triangle
      const bladeGrad = ctx.createLinearGradient(bx - 6, by, bx + 6, by + 14);
      bladeGrad.addColorStop(0, '#f8f3ff');
      bladeGrad.addColorStop(0.5, '#c8b8d8');
      bladeGrad.addColorStop(1, '#5a486a');
      ctx.fillStyle = bladeGrad;
      ctx.beginPath();
      ctx.moveTo(bx, by);
      ctx.lineTo(bx - 7, by + 14);
      ctx.lineTo(bx + 7, by + 14);
      ctx.closePath();
      ctx.fill();
      // Gleam line
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.85)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(bx - 2, by + 2);
      ctx.lineTo(bx - 4, by + 8);
      ctx.stroke();
      // Drip
      ctx.fillStyle = 'rgba(255, 80, 100, 0.6)';
      ctx.fillRect(bx - 1, by + 14, 2, 3);
    }
  }

  function drawNinja() {
    const ducking = ninja.duck && ninja.onGround;
    const h = ducking ? ninja.h * 0.55 : ninja.h;
    const y = ninja.y;
    const x = ninja.x;
    const w = ninja.w;

    // Soft drop shadow under the runner (shrinks as they get higher)
    ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
    const shadowScale = Math.max(0.35, 1 - (groundY - (y + h)) * 0.005);
    ctx.beginPath();
    ctx.ellipse(x + w / 2, groundY + 2, w * 0.55 * shadowScale, 5 * shadowScale, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body gradient — accent purple → darker purple for depth
    const bodyGrad = ctx.createLinearGradient(x, y, x + w, y + h);
    bodyGrad.addColorStop(0, '#c789ff');
    bodyGrad.addColorStop(0.5, ACCENT);
    bodyGrad.addColorStop(1, '#5a2299');

    if (ducking) {
      // Sliding pose — body
      ctx.fillStyle = bodyGrad;
      ctx.beginPath();
      ctx.moveTo(x + 4, y + h);
      ctx.lineTo(x + w + 8, y + h);
      ctx.quadraticCurveTo(x + w + 14, y + h * 0.5, x + w - 2, y + 2);
      ctx.lineTo(x + 6, y + 6);
      ctx.quadraticCurveTo(x - 10, y + h * 0.65, x + 4, y + h);
      ctx.closePath();
      ctx.fill();
      // Speed lines off the back
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.55)';
      ctx.lineWidth = 2;
      for (let i = 0; i < 4; i++) {
        const lx = x - 6 - i * 7;
        ctx.beginPath();
        ctx.moveTo(lx, y + 4 + i * 4);
        ctx.lineTo(lx - 14, y + 4 + i * 4);
        ctx.stroke();
      }
      // Trailing headband
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.85)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(x + w - 10, y + 6);
      ctx.lineTo(x - 18, y + 12);
      ctx.stroke();
      // Eye band
      ctx.fillStyle = '#06060a';
      ctx.fillRect(x + w - 18, y + 8, 14, 3);
    } else {
      const legPhase = (runFrame * 0.18) % (Math.PI * 2);

      // Katana sheath on the back
      ctx.save();
      ctx.translate(x + w / 2, y + 28);
      ctx.rotate(-0.35);
      const sheathGrad = ctx.createLinearGradient(-12, -2, 12, 2);
      sheathGrad.addColorStop(0, '#2a1640');
      sheathGrad.addColorStop(1, '#0c0518');
      ctx.fillStyle = sheathGrad;
      ctx.fillRect(-3, -22, 6, 38);
      ctx.fillStyle = '#a45cf5';
      ctx.fillRect(-3, -22, 6, 3);
      // Hilt wrap
      ctx.fillStyle = '#1a0a30';
      ctx.fillRect(-4, 16, 8, 4);
      ctx.restore();

      // Head
      ctx.fillStyle = bodyGrad;
      ctx.beginPath();
      ctx.arc(x + w / 2, y + 13, 13, 0, Math.PI * 2);
      ctx.fill();

      // Torso (rounded rect via path)
      ctx.beginPath();
      const tx = x + 5, tw = w - 10, ty = y + 22, th = h - 38;
      const r = 4;
      ctx.moveTo(tx + r, ty);
      ctx.arcTo(tx + tw, ty, tx + tw, ty + th, r);
      ctx.arcTo(tx + tw, ty + th, tx, ty + th, r);
      ctx.arcTo(tx, ty + th, tx, ty, r);
      ctx.arcTo(tx, ty, tx + tw, ty, r);
      ctx.closePath();
      ctx.fill();

      // Belt / chest strap
      ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
      ctx.fillRect(tx, ty + th * 0.55, tw, 3);
      ctx.fillStyle = '#fff';
      ctx.fillRect(tx + 2, ty + th * 0.55 + 1, 2, 1);

      if (ninja.onGround) {
        const offA = Math.sin(legPhase) * 8;
        const offB = Math.sin(legPhase + Math.PI) * 8;
        // Legs with tapered look (use path)
        ctx.fillStyle = bodyGrad;
        ctx.fillRect(x + 9, y + h - 18, 7, 18 + offA);
        ctx.fillRect(x + w - 16, y + h - 18, 7, 18 + offB);
        // Shoes (dark caps)
        ctx.fillStyle = '#1a0a30';
        ctx.fillRect(x + 8, y + h - 18 + 18 + offA - 3, 9, 3);
        ctx.fillRect(x + w - 17, y + h - 18 + 18 + offB - 3, 9, 3);
        // Arms swinging
        ctx.fillStyle = bodyGrad;
        ctx.fillRect(x - 2, y + 26 + Math.sin(legPhase) * 6, 7, 18);
        ctx.fillRect(x + w - 5, y + 26 + Math.sin(legPhase + Math.PI) * 6, 7, 18);
      } else {
        ctx.fillStyle = bodyGrad;
        // Tucked legs
        ctx.fillRect(x + 8, y + h - 18, 8, 18);
        ctx.fillRect(x + w - 16, y + h - 22, 8, 14);
        // Arms up — reaching
        ctx.fillRect(x - 4, y + 24, 8, 16);
        ctx.fillRect(x + w - 4, y + 28, 8, 16);
        // Shoes
        ctx.fillStyle = '#1a0a30';
        ctx.fillRect(x + 7, y + h - 3, 10, 3);
        ctx.fillRect(x + w - 17, y + h - 11, 10, 3);
      }

      // Headband strip (white)
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(x + 3, y + 11, w - 6, 4);
      // Trailing headband — wave with run frame
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.85)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      const tail = ninja.onGround ? Math.sin(runFrame * 0.18) * 4 : 0;
      ctx.moveTo(x + 4, y + 13);
      ctx.quadraticCurveTo(x - 8, y + 12 + tail, x - 22, y + 16 + tail);
      ctx.stroke();
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x + 4, y + 17);
      ctx.quadraticCurveTo(x - 10, y + 17 + tail * 0.7, x - 24, y + 20 + tail);
      ctx.stroke();

      // Eye band + glowing eyes
      ctx.fillStyle = '#06060a';
      ctx.fillRect(x + 4, y + 16, w - 8, 4);
      ctx.fillStyle = '#ffd6ff';
      ctx.fillRect(x + 9,     y + 17, 3, 2);
      ctx.fillRect(x + w - 12, y + 17, 3, 2);
    }
  }

  function loop() {
    update();
    render();
    requestAnimationFrame(loop);
  }
  loop();
  // Music + mute toggle
  var muteBtn = document.getElementById('mute');
  if (muteBtn && window.Music) {
    if (Music.isMuted()) muteBtn.classList.add('is-muted');
    muteBtn.addEventListener('click', function () {
      Music.toggle();
      muteBtn.classList.toggle('is-muted');
    });
  }
})();
</script>
</body>
</html>
