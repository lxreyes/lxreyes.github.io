<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>DODGEBALL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #06060a;
    color: #e8e6e3;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    background:
      radial-gradient(circle at 50% -10%, rgba(255, 122, 69, 0.20), transparent 60%),
      radial-gradient(circle at 50% 110%, rgba(255, 122, 69, 0.10), transparent 55%),
      radial-gradient(ellipse at center, #14141a, #06060a 75%);
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
  }
  canvas { display: block; background: transparent; cursor: none; touch-action: none; }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    background: rgba(6, 6, 10, 0.65);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .overlay.is-hidden { display: none; }
  h1 {
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: clamp(36px, 8vw, 64px);
    font-weight: 700;
    letter-spacing: 0.04em;
    margin: 0 0 16px;
    color: #ff7a45;
    text-shadow: 0 0 28px rgba(255, 122, 69, 0.55);
  }
  p {
    color: rgba(232, 230, 227, 0.72);
    font-size: 15px;
    margin: 0 0 28px;
    max-width: 34ch;
    line-height: 1.55;
  }
  button {
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #0a0a0e;
    background: #ff7a45;
    border: none;
    border-radius: 999px;
    padding: 13px 26px;
    cursor: pointer;
    box-shadow: 0 8px 22px rgba(255, 122, 69, 0.45);
    transition: transform 200ms, box-shadow 200ms;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(255, 122, 69, 0.7); }
  .hud {
    position: absolute;
    top: 18px;
    left: 0; right: 0;
    text-align: center;
    pointer-events: none;
    font-family: "Space Grotesk", system-ui, sans-serif;
    z-index: 5;
  }
  .hud .score {
    font-size: 38px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: rgba(232, 230, 227, 0.92);
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
    font-variant-numeric: tabular-nums;
  }
  .hud .best {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(232, 230, 227, 0.42);
    margin-top: 4px;
  }
  .back {
    position: absolute;
    top: 16px;
    left: 16px;
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(232, 230, 227, 0.5);
    text-decoration: none;
    z-index: 10;
  }
  .back:hover { color: rgba(232, 230, 227, 0.95); }
  .hint {
    color: rgba(232, 230, 227, 0.4);
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-top: 18px;
  }
  .hint b { color: rgba(232, 230, 227, 0.7); font-weight: 700; }
  .mute {
    position: fixed;
    top: 16px;
    right: 16px;
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: 14px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(232, 230, 227, 0.6);
    background: rgba(6, 6, 10, 0.4);
    border: 1px solid rgba(232, 230, 227, 0.18);
    border-radius: 50%;
    cursor: pointer;
    z-index: 11;
    padding: 0;
    box-shadow: none;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .mute:hover { color: rgba(232, 230, 227, 0.95); border-color: rgba(232, 230, 227, 0.45); }
  .mute.is-muted { opacity: 0.4; }
</style>
<script src="../music.js" defer></script>
</head>
<body>
<a href="../index.html" class="back">&larr; back</a>
<button class="mute" id="mute" type="button" aria-label="Toggle music">♪</button>
<canvas id="c"></canvas>
<div class="hud">
  <div class="score" id="score">0</div>
  <div class="best" id="best">best 0</div>
</div>
<div class="overlay" id="start">
  <h1>DODGEBALL</h1>
  <p>Move side to side. Survive the rain of incoming balls. Spawn rate ramps up the longer you last.</p>
  <button id="start-btn">Start</button>
  <div class="hint"><b>&larr; &rarr;</b> or move the mouse / drag</div>
</div>
<div class="overlay is-hidden" id="over">
  <h1>Hit</h1>
  <p id="over-score">Time: 0.0s &middot; Best: 0.0s</p>
  <button id="retry-btn">Retry</button>
</div>
<script>
(function () {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const startOverlay = document.getElementById('start');
  const overOverlay = document.getElementById('over');
  const overScoreEl = document.getElementById('over-score');
  const startBtn = document.getElementById('start-btn');
  const retryBtn = document.getElementById('retry-btn');

  const ACCENT = '#ff7a45';
  const DPR = Math.min(window.devicePixelRatio || 1, 2);

  let W = 0, H = 0;
  let groundY = 0;
  let state = 'idle';
  let elapsed = 0;
  let best = 0;
  let balls = [];
  let stars = [];
  let trail = [];
  let particles = [];
  let spawnTimer = 0;
  let shakeT = 0;

  const player = { x: 0, y: 0, r: 18, targetX: 0 };
  let keyL = false, keyR = false;

  try { best = parseFloat(localStorage.getItem('dodgeball-best') || '0') || 0; } catch (_) {}
  bestEl.textContent = 'best ' + best.toFixed(1) + 's';

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    groundY = H - 70;
    player.y = groundY - player.r - 10;
    if (!player.x) {
      player.x = W / 2;
      player.targetX = W / 2;
    }
  }
  window.addEventListener('resize', resize);
  resize();

  function initStars() {
    stars = [];
    for (let i = 0; i < 50; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H * 0.85,
        r: Math.random() < 0.85 ? 1 : 2,
        twinkle: Math.random() * Math.PI * 2,
      });
    }
  }
  initStars();
  window.addEventListener('resize', initStars);

  let audio = null;
  function ensureAudio() {
    if (!audio) {
      try { audio = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
  }
  function sound(freq, dur, type, vol) {
    if (!audio) return;
    const t = audio.currentTime;
    const o = audio.createOscillator();
    const g = audio.createGain();
    o.frequency.setValueAtTime(freq, t);
    o.type = type || 'sine';
    g.gain.setValueAtTime(vol || 0.22, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g).connect(audio.destination);
    o.start(t);
    o.stop(t + dur + 0.02);
  }
  function whoosh() {
    if (!audio) return;
    sound(720, 0.05, 'sine', 0.05);
  }

  function reset() {
    balls = [];
    trail = [];
    particles = [];
    elapsed = 0;
    spawnTimer = 0;
    shakeT = 0;
    player.x = W / 2;
    player.targetX = W / 2;
    scoreEl.textContent = '0.0';
  }

  function start() {
    ensureAudio();
    if (window.Music) Music.start('dodgeball');
    reset();
    state = 'play';
    startOverlay.classList.add('is-hidden');
    overOverlay.classList.add('is-hidden');
  }

  function gameOver() {
    state = 'over';
    const secs = elapsed / 60;
    if (secs > best) {
      best = secs;
      try { localStorage.setItem('dodgeball-best', String(best)); } catch (_) {}
      bestEl.textContent = 'best ' + best.toFixed(1) + 's';
    }
    overScoreEl.textContent = 'Time: ' + secs.toFixed(1) + 's · Best: ' + best.toFixed(1) + 's';
    overOverlay.classList.remove('is-hidden');
    shakeT = 16;
    sound(220, 0.18, 'square', 0.24);
    sound(110, 0.4, 'sawtooth', 0.22);
  }

  function spawnBall() {
    // Difficulty ramps with elapsed time
    const t = elapsed / 60; // seconds
    const baseSpeed = 3.4 + Math.min(t * 0.18, 6.5);
    const r = 10 + Math.random() * 18;
    const x = r + Math.random() * (W - 2 * r);
    const angleSpread = 0.6;
    const baseAngle = Math.PI / 2; // straight down
    const angle = baseAngle + (Math.random() - 0.5) * angleSpread;
    const sp = baseSpeed + Math.random() * 1.5;
    balls.push({
      x, y: -r - 10,
      vx: Math.cos(angle) * sp,
      vy: Math.sin(angle) * sp,
      r,
      hue: 14 + Math.random() * 30, // warm reds/oranges
      bounced: false,
    });
  }

  startBtn.addEventListener('click', start);
  retryBtn.addEventListener('click', start);

  canvas.addEventListener('pointermove', (e) => {
    if (state !== 'play') return;
    const r = canvas.getBoundingClientRect();
    player.targetX = e.clientX - r.left;
  });
  canvas.addEventListener('pointerdown', (e) => {
    if (state !== 'play') return;
    e.preventDefault();
    const r = canvas.getBoundingClientRect();
    player.targetX = e.clientX - r.left;
  });

  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      if (state === 'idle' || state === 'over') start();
    }
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') { keyL = true; e.preventDefault(); }
    if (e.code === 'ArrowRight' || e.code === 'KeyD') { keyR = true; e.preventDefault(); }
  });
  window.addEventListener('keyup', (e) => {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') keyL = false;
    if (e.code === 'ArrowRight' || e.code === 'KeyD') keyR = false;
  });

  function update() {
    if (state === 'play') {
      elapsed++;
      const secs = elapsed / 60;
      scoreEl.textContent = secs.toFixed(1);

      // Spawn cadence ramps up
      const interval = Math.max(8, 38 - secs * 0.9);
      spawnTimer++;
      if (spawnTimer >= interval) {
        spawnTimer = 0;
        spawnBall();
        if (secs > 8 && Math.random() < 0.35) spawnBall();
      }

      // Player movement: keyboard drives, else mouse target
      if (keyL || keyR) {
        const dx = (keyR ? 1 : 0) - (keyL ? 1 : 0);
        player.x += dx * 9;
        player.targetX = player.x;
      } else {
        // ease toward targetX
        player.x += (player.targetX - player.x) * 0.32;
      }
      player.x = Math.max(player.r, Math.min(W - player.r, player.x));

      // Movement trail
      trail.push({ x: player.x, y: player.y, life: 14 });
      if (trail.length > 16) trail.shift();
      for (let i = trail.length - 1; i >= 0; i--) {
        trail[i].life--;
        if (trail[i].life <= 0) trail.splice(i, 1);
      }

      // Ball physics
      for (let i = balls.length - 1; i >= 0; i--) {
        const b = balls[i];
        b.x += b.vx;
        b.y += b.vy;
        b.vy += 0.04;
        // bounce off walls a couple of times
        if (!b.bounced) {
          if (b.x < b.r) { b.x = b.r; b.vx = Math.abs(b.vx) * 0.9; b.bounced = true; whoosh(); }
          else if (b.x > W - b.r) { b.x = W - b.r; b.vx = -Math.abs(b.vx) * 0.9; b.bounced = true; whoosh(); }
        }
        // remove offscreen
        if (b.y - b.r > H + 20 || b.x < -60 || b.x > W + 60) {
          balls.splice(i, 1);
          continue;
        }
        // collision with player
        const dx = b.x - player.x;
        const dy = b.y - player.y;
        const d2 = dx * dx + dy * dy;
        const r = b.r + player.r - 3;
        if (d2 < r * r) {
          burst(player.x, player.y);
          gameOver();
          return;
        }
      }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.18;
      p.vx *= 0.96;
      p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    if (shakeT > 0) shakeT--;

    for (const s of stars) s.twinkle += 0.03;
  }

  function burst(x, y) {
    for (let i = 0; i < 20; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 1 + Math.random() * 4.5;
      particles.push({
        x, y,
        vx: Math.cos(a) * s, vy: Math.sin(a) * s,
        life: 28 + Math.random() * 14,
        r: 2 + Math.random() * 2.5,
        hue: 14 + Math.random() * 30,
      });
    }
  }

  function render() {
    ctx.save();
    if (shakeT > 0) {
      ctx.translate((Math.random() - 0.5) * shakeT, (Math.random() - 0.5) * shakeT);
    }
    ctx.clearRect(-20, -20, W + 40, H + 40);

    // stars background
    for (const s of stars) {
      const a = 0.35 + Math.sin(s.twinkle) * 0.22;
      ctx.fillStyle = `rgba(255, 200, 180, ${a})`;
      ctx.fillRect(s.x, s.y, s.r, s.r);
    }

    // floor
    ctx.fillStyle = 'rgba(255, 122, 69, 0.18)';
    ctx.fillRect(0, groundY, W, 2);
    ctx.fillStyle = 'rgba(8, 8, 14, 0.85)';
    ctx.fillRect(0, groundY + 2, W, H - groundY - 2);
    // floor dashes
    ctx.fillStyle = 'rgba(255, 122, 69, 0.32)';
    const off = (elapsed * 1.6) % 60;
    for (let i = -1; i < Math.ceil(W / 60) + 1; i++) {
      ctx.fillRect(i * 60 - off, groundY + 14, 22, 2);
    }

    // trail
    for (let i = 0; i < trail.length; i++) {
      const t = trail[i];
      const a = (i / trail.length) * 0.4;
      ctx.fillStyle = `rgba(255, 122, 69, ${a})`;
      ctx.beginPath();
      ctx.arc(t.x, t.y, player.r * (i / trail.length), 0, Math.PI * 2);
      ctx.fill();
    }

    // balls — drop shadows under each ball as they fall
    for (const b of balls) {
      const shadowY = groundY - 2;
      const shadowAlpha = Math.max(0, Math.min(0.45, 0.5 - (shadowY - b.y) * 0.003));
      ctx.fillStyle = `rgba(0, 0, 0, ${shadowAlpha})`;
      ctx.beginPath();
      ctx.ellipse(b.x, shadowY, b.r * 0.7, 4, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    for (const b of balls) {
      const grad = ctx.createRadialGradient(b.x - b.r * 0.35, b.y - b.r * 0.35, 0, b.x, b.y, b.r);
      grad.addColorStop(0, `hsl(${b.hue}, 95%, 75%)`);
      grad.addColorStop(0.6, `hsl(${b.hue}, 80%, 55%)`);
      grad.addColorStop(1, `hsl(${b.hue}, 70%, 35%)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
      // highlight
      ctx.fillStyle = 'rgba(255, 255, 255, 0.55)';
      ctx.beginPath();
      ctx.ellipse(b.x - b.r * 0.35, b.y - b.r * 0.45, b.r * 0.22, b.r * 0.14, -0.4, 0, Math.PI * 2);
      ctx.fill();
    }

    // particles
    for (const p of particles) {
      const a = Math.min(1, p.life / 40);
      ctx.fillStyle = `hsla(${p.hue}, 95%, 70%, ${a})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }

    // player (only render when alive)
    if (state === 'play') {
      // shadow
      ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
      ctx.beginPath();
      ctx.ellipse(player.x, groundY - 2, player.r * 0.8, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      // body
      const g = ctx.createRadialGradient(player.x - player.r * 0.3, player.y - player.r * 0.3, 0, player.x, player.y, player.r);
      g.addColorStop(0, '#fff');
      g.addColorStop(1, ACCENT);
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
      ctx.fill();
      // ring
      ctx.strokeStyle = ACCENT;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.r + 3, 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.restore();
  }

  function loop() {
    update();
    render();
    requestAnimationFrame(loop);
  }
  loop();
  // Music + mute toggle
  var muteBtn = document.getElementById('mute');
  if (muteBtn && window.Music) {
    if (Music.isMuted()) muteBtn.classList.add('is-muted');
    muteBtn.addEventListener('click', function () {
      Music.toggle();
      muteBtn.classList.toggle('is-muted');
    });
  }
})();
</script>
</body>
</html>
