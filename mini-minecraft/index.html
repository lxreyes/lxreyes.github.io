<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Mini Minecraft</title>
<style>
  html, body { margin: 0; height: 100%; background: #87ceeb; overflow: hidden; font-family: monospace; color: #fff; }
  canvas { display: block; }

  #crosshair {
    position: fixed; left: 50%; top: 50%; width: 18px; height: 18px;
    transform: translate(-50%, -50%); pointer-events: none;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: #fff; box-shadow: 0 0 2px #000;
  }
  #crosshair::before { left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%); }
  #crosshair::after  { top: 50%; left: 0; height: 2px; width: 100%; transform: translateY(-50%); }

  #hotbar {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px; padding: 6px; background: rgba(0,0,0,0.4);
    border-radius: 6px;
  }
  .slot {
    width: 48px; height: 48px; border: 2px solid #222; background: #555;
    display: flex; align-items: flex-end; justify-content: center;
    font-size: 12px; padding-bottom: 2px; text-shadow: 1px 1px 1px #000;
    image-rendering: pixelated;
  }
  .slot.active { border-color: #fff; }

  #hint {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    padding: 16px 24px; background: rgba(0,0,0,0.6); border-radius: 8px;
    text-align: center; line-height: 1.5; max-width: 480px;
  }
  #hint b { color: #ffd95a; }
  #hint.hidden { display: none; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="crosshair"></div>

<div id="hotbar"></div>

<div id="hint">
  <b>Click to play</b><br>
  WASD move &middot; SPACE jump &middot; MOUSE look<br>
  LEFT CLICK break &middot; RIGHT CLICK place<br>
  1-5 select block &middot; ESC release mouse
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

// ---------- scene / renderer ----------
const canvas = document.getElementById('game');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 40, 120);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const sun = new THREE.DirectionalLight(0xffffff, 0.8);
sun.position.set(40, 80, 20);
scene.add(sun);

addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---------- block materials (procedural pixel textures) ----------
function makeTexture(draw) {
  const c = document.createElement('canvas');
  c.width = c.height = 16;
  const ctx = c.getContext('2d');
  draw(ctx);
  const tex = new THREE.CanvasTexture(c);
  tex.magFilter = THREE.NearestFilter;
  tex.minFilter = THREE.NearestFilter;
  return tex;
}

function noise(ctx, base, jitter) {
  for (let y = 0; y < 16; y++) for (let x = 0; x < 16; x++) {
    const n = (Math.random() - 0.5) * jitter;
    const r = Math.max(0, Math.min(255, base[0] + n));
    const g = Math.max(0, Math.min(255, base[1] + n));
    const b = Math.max(0, Math.min(255, base[2] + n));
    ctx.fillStyle = `rgb(${r|0}, ${g|0}, ${b|0})`;
    ctx.fillRect(x, y, 1, 1);
  }
}

const TYPES = {
  grass: { name: 'Grass', color: 0x4caf50, tex: makeTexture(c => noise(c, [76, 175, 80], 40)) },
  dirt:  { name: 'Dirt',  color: 0x8d6e63, tex: makeTexture(c => noise(c, [141, 110, 99], 30)) },
  stone: { name: 'Stone', color: 0x9e9e9e, tex: makeTexture(c => noise(c, [158, 158, 158], 35)) },
  wood:  { name: 'Wood',  color: 0xa1683a, tex: makeTexture(c => { noise(c, [161, 104, 58], 20); ctx_lines(c); }) },
  brick: { name: 'Brick', color: 0xc1502e, tex: makeTexture(c => brickTex(c)) },
};
function ctx_lines(ctx) {
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  for (let y = 2; y < 16; y += 4) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(16, y); ctx.stroke(); }
}
function brickTex(ctx) {
  noise(ctx, [193, 80, 46], 18);
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(0, 7, 16, 1); ctx.fillRect(0, 15, 16, 1);
  ctx.fillRect(7, 0, 1, 8); ctx.fillRect(0, 8, 1, 8); ctx.fillRect(15, 8, 1, 8);
}

const MATS = {};
for (const [k, t] of Object.entries(TYPES)) {
  MATS[k] = new THREE.MeshLambertMaterial({ map: t.tex });
}
const TYPE_KEYS = Object.keys(TYPES);
const cubeGeom = new THREE.BoxGeometry(1, 1, 1);

// ---------- world (block storage) ----------
const blocks = new Map();       // "x|y|z" -> mesh
const meshList = [];            // for raycasting
const key = (x, y, z) => `${x}|${y}|${z}`;

function addBlock(x, y, z, type) {
  const k = key(x, y, z);
  if (blocks.has(k)) return;
  const mesh = new THREE.Mesh(cubeGeom, MATS[type]);
  mesh.position.set(x + 0.5, y + 0.5, z + 0.5);
  mesh.userData = { x, y, z, type };
  scene.add(mesh);
  blocks.set(k, mesh);
  meshList.push(mesh);
}

function removeBlock(x, y, z) {
  const k = key(x, y, z);
  const mesh = blocks.get(k);
  if (!mesh) return;
  scene.remove(mesh);
  blocks.delete(k);
  const i = meshList.indexOf(mesh);
  if (i >= 0) meshList.splice(i, 1);
}

function hasBlock(x, y, z) { return blocks.has(key(x, y, z)); }

// flat starter world: 24x24 grass with dirt+stone underneath
const WORLD_R = 12;
for (let x = -WORLD_R; x < WORLD_R; x++) {
  for (let z = -WORLD_R; z < WORLD_R; z++) {
    addBlock(x, 0, z, 'grass');
    addBlock(x, -1, z, 'dirt');
    addBlock(x, -2, z, 'stone');
  }
}
// a couple of starter shapes so it doesn't feel empty
for (let y = 1; y <= 3; y++) addBlock(3, y, -4, 'wood');
addBlock(3, 4, -4, 'grass');
for (let x = -4; x <= -2; x++) for (let z = 2; z <= 4; z++) addBlock(x, 1, z, 'brick');

// ---------- player ----------
const player = {
  pos: new THREE.Vector3(0.5, 3, 0.5),
  vel: new THREE.Vector3(),
  yaw: 0, pitch: 0,
  onGround: false,
  radius: 0.3,
  height: 1.7,
  eye: 1.5, // eye height above feet
};

function eyePosition(out) {
  return out.set(player.pos.x, player.pos.y + player.eye, player.pos.z);
}

// ---------- input ----------
const keys = new Set();
addEventListener('keydown', e => {
  keys.add(e.code);
  // hotbar 1-5
  if (e.code.startsWith('Digit')) {
    const i = parseInt(e.code.slice(5), 10) - 1;
    if (i >= 0 && i < TYPE_KEYS.length) selectSlot(i);
  }
});
addEventListener('keyup', e => keys.delete(e.code));

const hint = document.getElementById('hint');
canvas.addEventListener('click', () => canvas.requestPointerLock());
document.addEventListener('pointerlockchange', () => {
  if (document.pointerLockElement === canvas) hint.classList.add('hidden');
  else hint.classList.remove('hidden');
});
addEventListener('mousemove', e => {
  if (document.pointerLockElement !== canvas) return;
  player.yaw   -= e.movementX * 0.0025;
  player.pitch -= e.movementY * 0.0025;
  const lim = Math.PI / 2 - 0.01;
  if (player.pitch >  lim) player.pitch =  lim;
  if (player.pitch < -lim) player.pitch = -lim;
});

// suppress browser right-click menu so right-click places blocks
addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('mousedown', e => {
  if (document.pointerLockElement !== canvas) return;
  if (e.button === 0) breakLooked();
  else if (e.button === 2) placeLooked();
});

// ---------- hotbar ui ----------
const hotbar = document.getElementById('hotbar');
let activeSlot = 0;
TYPE_KEYS.forEach((k, i) => {
  const el = document.createElement('div');
  el.className = 'slot' + (i === 0 ? ' active' : '');
  el.style.background = '#' + TYPES[k].color.toString(16).padStart(6, '0');
  el.textContent = (i + 1) + ' ' + TYPES[k].name;
  el.addEventListener('click', () => selectSlot(i));
  hotbar.appendChild(el);
});
function selectSlot(i) {
  activeSlot = i;
  hotbar.querySelectorAll('.slot').forEach((el, j) => el.classList.toggle('active', i === j));
}

// ---------- raycasting (break/place) ----------
const raycaster = new THREE.Raycaster();
raycaster.far = 6;
const _origin = new THREE.Vector3();
const _dir = new THREE.Vector3();

function lookedBlock() {
  eyePosition(_origin);
  camera.getWorldDirection(_dir);
  raycaster.set(_origin, _dir);
  const hits = raycaster.intersectObjects(meshList, false);
  return hits[0] || null;
}

function breakLooked() {
  const hit = lookedBlock();
  if (!hit) return;
  const { x, y, z } = hit.object.userData;
  removeBlock(x, y, z);
}

function placeLooked() {
  const hit = lookedBlock();
  if (!hit) return;
  const n = hit.face.normal;
  const { x, y, z } = hit.object.userData;
  const nx = x + n.x, ny = y + n.y, nz = z + n.z;
  if (hasBlock(nx, ny, nz)) return;
  // don't place inside the player
  if (blockIntersectsPlayer(nx, ny, nz)) return;
  addBlock(nx, ny, nz, TYPE_KEYS[activeSlot]);
}

// ---------- physics / collision ----------
function playerAABB(pos) {
  return {
    minX: pos.x - player.radius, maxX: pos.x + player.radius,
    minY: pos.y,                 maxY: pos.y + player.height,
    minZ: pos.z - player.radius, maxZ: pos.z + player.radius,
  };
}
function blockIntersectsPlayer(bx, by, bz) {
  const a = playerAABB(player.pos);
  return a.maxX > bx && a.minX < bx + 1
      && a.maxY > by && a.minY < by + 1
      && a.maxZ > bz && a.minZ < bz + 1;
}
function collides(pos) {
  const a = playerAABB(pos);
  const x0 = Math.floor(a.minX), x1 = Math.floor(a.maxX);
  const y0 = Math.floor(a.minY), y1 = Math.floor(a.maxY);
  const z0 = Math.floor(a.minZ), z1 = Math.floor(a.maxZ);
  for (let x = x0; x <= x1; x++)
    for (let y = y0; y <= y1; y++)
      for (let z = z0; z <= z1; z++)
        if (hasBlock(x, y, z)) return true;
  return false;
}

const GRAVITY = 28;
const MOVE_SPEED = 5;
const JUMP_VEL = 9;

function step(dt) {
  // desired horizontal direction in world space, based on yaw
  const forward = (keys.has('KeyW') || keys.has('ArrowUp'))    ? 1 : 0;
  const back    = (keys.has('KeyS') || keys.has('ArrowDown'))  ? 1 : 0;
  const left    = (keys.has('KeyA') || keys.has('ArrowLeft'))  ? 1 : 0;
  const right   = (keys.has('KeyD') || keys.has('ArrowRight')) ? 1 : 0;

  const fz = forward - back;
  const sx = right - left;
  let dx = 0, dz = 0;
  if (fz || sx) {
    const cos = Math.cos(player.yaw), sin = Math.sin(player.yaw);
    // camera forward is -Z in local space → world dir is (-sin, 0, -cos)
    const wfx = -sin, wfz = -cos;
    const wrx =  cos, wrz = -sin;
    dx = wfx * fz + wrx * sx;
    dz = wfz * fz + wrz * sx;
    const len = Math.hypot(dx, dz);
    if (len > 0) { dx /= len; dz /= len; }
  }
  player.vel.x = dx * MOVE_SPEED;
  player.vel.z = dz * MOVE_SPEED;

  // jump
  if (player.onGround && (keys.has('Space'))) {
    player.vel.y = JUMP_VEL;
    player.onGround = false;
  }

  // gravity
  player.vel.y -= GRAVITY * dt;
  if (player.vel.y < -50) player.vel.y = -50;

  // axis-by-axis movement with collision
  const trial = player.pos.clone();
  // X
  trial.x = player.pos.x + player.vel.x * dt;
  if (!collides(trial)) player.pos.x = trial.x; else { trial.x = player.pos.x; player.vel.x = 0; }
  // Z
  trial.z = player.pos.z + player.vel.z * dt;
  if (!collides(trial)) player.pos.z = trial.z; else { trial.z = player.pos.z; player.vel.z = 0; }
  // Y
  trial.y = player.pos.y + player.vel.y * dt;
  if (!collides(trial)) {
    player.pos.y = trial.y;
    player.onGround = false;
  } else {
    if (player.vel.y < 0) player.onGround = true;
    player.vel.y = 0;
  }

  // floor safety net so you can't fall out of the world
  if (player.pos.y < -20) {
    player.pos.set(0.5, 5, 0.5);
    player.vel.set(0, 0, 0);
  }
}

// ---------- main loop ----------
let last = performance.now();
function tick(now) {
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;

  step(dt);

  // apply camera from player pose
  eyePosition(camera.position);
  camera.rotation.order = 'YXZ';
  camera.rotation.y = player.yaw;
  camera.rotation.x = player.pitch;

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
</body>
</html>
