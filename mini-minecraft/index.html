<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Mini Minecraft</title>
<style>
  html, body { margin: 0; height: 100%; background: #87ceeb; overflow: hidden; font-family: monospace; color: #fff; }
  canvas { display: block; }

  /* ----- start menu ----- */
  #menu {
    position: fixed; inset: 0; z-index: 10;
    background: linear-gradient(180deg, #a8e1ff 0%, #ffe5b9 65%, #ffd2c2 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Trebuchet MS', system-ui, sans-serif;
    color: #2d3a4d;
    overflow: hidden;
    transition: opacity 220ms ease;
  }
  #menu.hidden { opacity: 0; pointer-events: none; }

  /* drifting clouds */
  .cloud {
    position: absolute; background: #fff; border-radius: 999px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    opacity: 0.92;
  }
  .cloud::before, .cloud::after {
    content: ''; position: absolute; background: #fff; border-radius: 999px;
  }
  .c1 { width: 140px; height: 38px; top: 18%; left: -160px; animation: drift 38s linear infinite; }
  .c1::before { width: 70px; height: 70px; top: -28px; left: 22px; }
  .c1::after  { width: 50px; height: 50px; top: -18px; left: 78px; }
  .c2 { width: 100px; height: 28px; top: 42%; left: -120px; animation: drift 52s linear infinite; animation-delay: -18s; opacity: 0.85; }
  .c2::before { width: 50px; height: 50px; top: -22px; left: 12px; }
  .c2::after  { width: 38px; height: 38px; top: -14px; left: 56px; }
  .c3 { width: 180px; height: 44px; top: 70%; left: -200px; animation: drift 64s linear infinite; animation-delay: -30s; opacity: 0.78; }
  .c3::before { width: 80px; height: 80px; top: -32px; left: 28px; }
  .c3::after  { width: 60px; height: 60px; top: -22px; left: 100px; }
  @keyframes drift {
    from { transform: translateX(0); }
    to   { transform: translateX(calc(100vw + 220px)); }
  }

  .menu-card {
    position: relative; z-index: 1;
    background: #fffaf0; padding: 36px 44px 32px;
    border-radius: 22px;
    box-shadow: 0 18px 40px rgba(60, 40, 20, 0.18), 0 2px 0 rgba(0,0,0,0.04);
    width: min(560px, calc(100vw - 32px));
    text-align: center;
    animation: cardIn 480ms cubic-bezier(.2,.9,.3,1.2) both;
  }
  @keyframes cardIn {
    from { transform: translateY(14px) scale(.96); opacity: 0; }
    to   { transform: none; opacity: 1; }
  }

  .title-row { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 6px; }
  .block-icon {
    width: 36px; height: 36px; border-radius: 6px;
    background:
      linear-gradient(180deg, #6dc66b 0%, #6dc66b 38%, #a37354 38%, #a37354 100%);
    box-shadow: inset -4px -4px 0 rgba(0,0,0,0.12), inset 4px 4px 0 rgba(255,255,255,0.18), 0 4px 0 #b06a3a;
    animation: bob 2.4s ease-in-out infinite;
    transform-origin: center;
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50%      { transform: translateY(-8px) rotate(4deg); }
  }
  h1.menu-title {
    margin: 0; font-size: 38px; letter-spacing: 1px;
    color: #2d3a4d; text-shadow: 0 2px 0 rgba(255,255,255,0.6);
  }
  .menu-tagline { margin: 0 0 22px; color: #7a8b9a; font-size: 15px; }

  .play-btn {
    appearance: none; border: 0; cursor: pointer;
    background: linear-gradient(180deg, #ff9a6c 0%, #ff7a4d 100%);
    color: #fff; font-weight: 700; font-size: 20px; letter-spacing: 1px;
    padding: 14px 44px; border-radius: 999px;
    box-shadow: 0 6px 0 #d65a30, 0 12px 22px rgba(214, 90, 48, 0.35);
    transition: transform 90ms ease, box-shadow 90ms ease;
    font-family: inherit;
  }
  .play-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #d65a30, 0 14px 24px rgba(214, 90, 48, 0.4); }
  .play-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #d65a30, 0 6px 12px rgba(214, 90, 48, 0.3); }

  .controls-grid {
    margin-top: 26px;
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px 14px;
    font-size: 13px; color: #485866;
  }
  .controls-grid > div { display: flex; align-items: center; gap: 6px; justify-content: flex-start; }
  kbd {
    background: #fff5db; border: 1px solid #e8c878;
    border-bottom-width: 2px; border-radius: 5px;
    padding: 1px 6px; font-family: 'Trebuchet MS', system-ui, sans-serif;
    font-size: 11px; color: #6b4a18; font-weight: 700;
    box-shadow: 0 1px 0 rgba(0,0,0,0.04);
  }
  .menu-foot { margin-top: 18px; font-size: 11px; color: #99a7b4; }
  .menu-foot b { color: #ff7a4d; }

  #crosshair {
    position: fixed; left: 50%; top: 50%; width: 18px; height: 18px;
    transform: translate(-50%, -50%); pointer-events: none;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: #fff; box-shadow: 0 0 2px #000;
  }
  #crosshair::before { left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%); }
  #crosshair::after  { top: 50%; left: 0; height: 2px; width: 100%; transform: translateY(-50%); }

  #hotbar {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px; padding: 6px; background: rgba(0,0,0,0.4);
    border-radius: 6px;
  }
  .slot {
    width: 44px; height: 44px; border: 2px solid #222; background: #555;
    display: flex; flex-direction: column; align-items: center; justify-content: space-between;
    font-size: 10px; padding: 2px; text-shadow: 1px 1px 1px #000;
    image-rendering: pixelated; line-height: 1;
  }
  .slot .num { align-self: flex-start; }
  .slot .name { align-self: center; font-size: 9px; }
  .slot.active { border-color: #fff; box-shadow: 0 0 0 1px #fff inset; }

  #status {
    position: fixed; top: 12px; left: 12px; padding: 6px 10px;
    background: rgba(0,0,0,0.45); border-radius: 4px; font-size: 12px;
  }

  #music-toggle {
    position: fixed; top: 12px; right: 12px; z-index: 5;
    background: rgba(255, 250, 240, 0.92); color: #2d3a4d;
    border: 0; border-radius: 999px; padding: 6px 12px;
    font-family: 'Trebuchet MS', system-ui, sans-serif; font-size: 12px;
    cursor: pointer; box-shadow: 0 3px 10px rgba(0,0,0,0.18);
  }
  #music-toggle:hover { background: #fffaf0; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="crosshair"></div>
<div id="status">walking</div>
<div id="hotbar"></div>
<button id="music-toggle" title="Toggle music (M)">&#9834; music: on</button>

<div id="menu">
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>

  <div class="menu-card">
    <div class="title-row">
      <span class="block-icon" aria-hidden="true"></span>
      <h1 class="menu-title">Mini Minecraft</h1>
      <span class="block-icon" aria-hidden="true" style="animation-delay: -1.2s"></span>
    </div>
    <p class="menu-tagline">A tiny voxel sandbox &mdash; build, dig, explore.</p>

    <button class="play-btn" id="play-btn">PLAY</button>

    <div class="controls-grid" aria-label="Controls">
      <div><kbd>WASD</kbd> move</div>
      <div><kbd>Space</kbd> jump</div>
      <div><kbd>Mouse</kbd> look</div>
      <div><kbd>LMB</kbd> break</div>
      <div><kbd>RMB</kbd> place</div>
      <div><kbd>Scroll</kbd>/<kbd>1-9</kbd> block</div>
      <div><kbd>Ctrl</kbd> sprint</div>
      <div><kbd>Shift</kbd> crouch</div>
      <div><kbd>Space</kbd>x2 fly</div>
    </div>

    <div class="menu-foot"><b>Esc</b> brings you back here</div>
  </div>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

// ---------- scene / renderer ----------
const canvas = document.getElementById('game');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 60, 160);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const sun = new THREE.DirectionalLight(0xffffff, 0.85);
sun.position.set(60, 100, 30);
scene.add(sun);

addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---------- procedural pixel textures ----------
function makeTexture(draw) {
  const c = document.createElement('canvas');
  c.width = c.height = 16;
  const ctx = c.getContext('2d');
  draw(ctx);
  const tex = new THREE.CanvasTexture(c);
  tex.magFilter = THREE.NearestFilter;
  tex.minFilter = THREE.NearestFilter;
  return tex;
}
function noise(ctx, base, jitter) {
  for (let y = 0; y < 16; y++) for (let x = 0; x < 16; x++) {
    const n = (Math.random() - 0.5) * jitter;
    const r = Math.max(0, Math.min(255, base[0] + n));
    const g = Math.max(0, Math.min(255, base[1] + n));
    const b = Math.max(0, Math.min(255, base[2] + n));
    ctx.fillStyle = `rgb(${r|0}, ${g|0}, ${b|0})`;
    ctx.fillRect(x, y, 1, 1);
  }
}
function plankLines(ctx) {
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  for (let y = 3; y < 16; y += 4) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(16, y); ctx.stroke(); }
}
function brickTex(ctx) {
  noise(ctx, [193, 80, 46], 18);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 7, 16, 1); ctx.fillRect(0, 15, 16, 1);
  ctx.fillRect(7, 0, 1, 8); ctx.fillRect(0, 8, 1, 8); ctx.fillRect(15, 8, 1, 8);
}
function cobbleTex(ctx) {
  noise(ctx, [115, 115, 115], 50);
  ctx.strokeStyle = 'rgba(0,0,0,0.45)';
  ctx.lineWidth = 1;
  // a few irregular cobble outlines
  const cells = [[0,0,7,6],[8,0,7,8],[0,7,5,8],[6,7,9,8]];
  for (const [x,y,w,h] of cells) ctx.strokeRect(x+0.5, y+0.5, w, h);
}
function leavesTex(ctx) {
  noise(ctx, [56, 142, 60], 60);
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  for (let i = 0; i < 12; i++) ctx.fillRect((Math.random()*16)|0, (Math.random()*16)|0, 1, 1);
}
function logTex(ctx) {
  noise(ctx, [110, 75, 45], 22);
  ctx.strokeStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.moveTo(0, 4); ctx.lineTo(16, 4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, 11); ctx.lineTo(16, 11); ctx.stroke();
}
function planksTex(ctx) { noise(ctx, [200, 145, 90], 22); plankLines(ctx); }
function sandTex(ctx) { noise(ctx, [231, 208, 144], 22); }

// ---------- block types ----------
const TYPES = {
  grass:   { name: 'Grass',  color: 0x4caf50, tex: makeTexture(c => noise(c, [76, 175, 80], 40)) },
  dirt:    { name: 'Dirt',   color: 0x8d6e63, tex: makeTexture(c => noise(c, [141, 110, 99], 30)) },
  stone:   { name: 'Stone',  color: 0x9e9e9e, tex: makeTexture(c => noise(c, [158, 158, 158], 35)) },
  cobble:  { name: 'Cobble', color: 0x7a7a7a, tex: makeTexture(cobbleTex) },
  sand:    { name: 'Sand',   color: 0xe7d090, tex: makeTexture(sandTex) },
  log:     { name: 'Log',    color: 0x6e4b2d, tex: makeTexture(logTex) },
  planks:  { name: 'Plank',  color: 0xc89060, tex: makeTexture(planksTex) },
  brick:   { name: 'Brick',  color: 0xc1502e, tex: makeTexture(brickTex) },
  leaves:  { name: 'Leaf',   color: 0x388e3c, tex: makeTexture(leavesTex) },
  glass:   { name: 'Glass',  color: 0xb0d8ff, transparent: true },
};
const TYPE_KEYS = Object.keys(TYPES);

const MATS = {};
for (const [k, t] of Object.entries(TYPES)) {
  if (t.transparent) {
    MATS[k] = new THREE.MeshLambertMaterial({ color: t.color, transparent: true, opacity: 0.4 });
  } else {
    MATS[k] = new THREE.MeshLambertMaterial({ map: t.tex });
  }
}
const cubeGeom = new THREE.BoxGeometry(1, 1, 1);

// ---------- world (block storage) ----------
const blocks = new Map();   // "x|y|z" -> mesh
const meshList = [];        // for raycasting
const key = (x, y, z) => `${x}|${y}|${z}`;

function addBlock(x, y, z, type) {
  const k = key(x, y, z);
  if (blocks.has(k)) return;
  const mesh = new THREE.Mesh(cubeGeom, MATS[type]);
  mesh.position.set(x + 0.5, y + 0.5, z + 0.5);
  mesh.userData = { x, y, z, type };
  scene.add(mesh);
  blocks.set(k, mesh);
  meshList.push(mesh);
}
function removeBlock(x, y, z) {
  const k = key(x, y, z);
  const mesh = blocks.get(k);
  if (!mesh) return;
  scene.remove(mesh);
  blocks.delete(k);
  const i = meshList.indexOf(mesh);
  if (i >= 0) meshList.splice(i, 1);
}
function hasBlock(x, y, z) { return blocks.has(key(x, y, z)); }

// ---------- world generation ----------
// gentle rolling hills via sine, with sand patches and a handful of trees
const WORLD_R = 24;  // 48x48 surface
function heightAt(x, z) {
  return Math.round(Math.sin(x * 0.18) * 1.4 + Math.cos(z * 0.22) * 1.2);
}
function plantTree(x, z) {
  const base = heightAt(x, z) + 1;
  for (let i = 0; i < 4; i++) addBlock(x, base + i, z, 'log');
  // 3x3x2 leaf canopy + a single top leaf
  for (let dy = 3; dy <= 4; dy++) {
    for (let dx = -1; dx <= 1; dx++) for (let dz = -1; dz <= 1; dz++) {
      if (dx === 0 && dz === 0 && dy === 3) continue; // log sits there
      addBlock(x + dx, base + dy, z + dz, 'leaves');
    }
  }
  addBlock(x, base + 5, z, 'leaves');
}

for (let x = -WORLD_R; x < WORLD_R; x++) {
  for (let z = -WORLD_R; z < WORLD_R; z++) {
    const h = heightAt(x, z);
    // surface type: sand near origin patch, grass elsewhere
    const isSand = (Math.abs(x - 8) < 4 && Math.abs(z - 8) < 4);
    addBlock(x, h, z, isSand ? 'sand' : 'grass');
    addBlock(x, h - 1, z, 'dirt');
    addBlock(x, h - 2, z, 'stone');
  }
}
// a few starter trees, kept clear of spawn
[[5, -6], [-7, 4], [10, 10], [-10, -8], [3, 12]].forEach(([x, z]) => plantTree(x, z));

// ---------- player ----------
const player = {
  pos: new THREE.Vector3(0.5, 8, 0.5),
  vel: new THREE.Vector3(),
  yaw: 0, pitch: 0,
  onGround: false,
  flying: false,
  radius: 0.3,
  standHeight: 1.7,
  crouchHeight: 1.3,
  height: 1.7,
  eye: 1.5,       // smoothed for camera
  targetEye: 1.5, // set from input each frame
};

function eyePosition(out) {
  return out.set(player.pos.x, player.pos.y + player.eye, player.pos.z);
}

// ---------- input ----------
const keys = new Set();
let lastSpaceTap = 0;

addEventListener('keydown', e => {
  if (e.repeat) return;
  keys.add(e.code);
  if (e.code.startsWith('Digit')) {
    const i = parseInt(e.code.slice(5), 10) - 1;
    if (i >= 0 && i < TYPE_KEYS.length) selectSlot(i);
  }
  if (e.code === 'Space') {
    const now = performance.now();
    if (now - lastSpaceTap < 280) {
      player.flying = !player.flying;
      player.vel.y = 0;
    }
    lastSpaceTap = now;
  }
});
addEventListener('keyup', e => keys.delete(e.code));

const menu = document.getElementById('menu');
const playBtn = document.getElementById('play-btn');
const statusEl = document.getElementById('status');

function startGame() {
  menu.classList.add('hidden');
  canvas.requestPointerLock();
  startMusic();
}
playBtn.addEventListener('click', startGame);
canvas.addEventListener('click', () => {
  if (menu.classList.contains('hidden')) canvas.requestPointerLock();
});
document.addEventListener('pointerlockchange', () => {
  if (document.pointerLockElement !== canvas) menu.classList.remove('hidden');
});
addEventListener('mousemove', e => {
  if (document.pointerLockElement !== canvas) return;
  player.yaw   -= e.movementX * 0.0025;
  player.pitch -= e.movementY * 0.0025;
  const lim = Math.PI / 2 - 0.01;
  if (player.pitch >  lim) player.pitch =  lim;
  if (player.pitch < -lim) player.pitch = -lim;
});

addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('mousedown', e => {
  if (document.pointerLockElement !== canvas) return;
  if (e.button === 0) breakLooked();
  else if (e.button === 2) placeLooked();
});

// scroll wheel cycles hotbar
addEventListener('wheel', e => {
  if (document.pointerLockElement !== canvas) return;
  e.preventDefault();
  const dir = e.deltaY > 0 ? 1 : -1;
  selectSlot((activeSlot + dir + TYPE_KEYS.length) % TYPE_KEYS.length);
}, { passive: false });

// ---------- hotbar ui ----------
const hotbar = document.getElementById('hotbar');
let activeSlot = 0;
TYPE_KEYS.forEach((k, i) => {
  const el = document.createElement('div');
  el.className = 'slot' + (i === 0 ? ' active' : '');
  el.style.background = '#' + TYPES[k].color.toString(16).padStart(6, '0');
  el.innerHTML = `<span class="num">${i + 1}</span><span class="name">${TYPES[k].name}</span>`;
  el.title = TYPES[k].name;
  el.addEventListener('click', () => selectSlot(i));
  hotbar.appendChild(el);
});
function selectSlot(i) {
  activeSlot = i;
  hotbar.querySelectorAll('.slot').forEach((el, j) => el.classList.toggle('active', i === j));
}

// ---------- raycasting (break/place) ----------
const raycaster = new THREE.Raycaster();
raycaster.far = 6;
const _origin = new THREE.Vector3();
const _dir = new THREE.Vector3();

function lookedBlock() {
  eyePosition(_origin);
  camera.getWorldDirection(_dir);
  raycaster.set(_origin, _dir);
  const hits = raycaster.intersectObjects(meshList, false);
  return hits[0] || null;
}
function breakLooked() {
  const hit = lookedBlock();
  if (!hit) return;
  const { x, y, z } = hit.object.userData;
  removeBlock(x, y, z);
}
function placeLooked() {
  const hit = lookedBlock();
  if (!hit) return;
  const n = hit.face.normal;
  const { x, y, z } = hit.object.userData;
  const nx = x + n.x, ny = y + n.y, nz = z + n.z;
  if (hasBlock(nx, ny, nz)) return;
  if (blockIntersectsPlayer(nx, ny, nz)) return;
  addBlock(nx, ny, nz, TYPE_KEYS[activeSlot]);
}

// ---------- physics / collision ----------
function playerAABB(pos, height) {
  return {
    minX: pos.x - player.radius, maxX: pos.x + player.radius,
    minY: pos.y,                 maxY: pos.y + height,
    minZ: pos.z - player.radius, maxZ: pos.z + player.radius,
  };
}
function blockIntersectsPlayer(bx, by, bz) {
  const a = playerAABB(player.pos, player.height);
  return a.maxX > bx && a.minX < bx + 1
      && a.maxY > by && a.minY < by + 1
      && a.maxZ > bz && a.minZ < bz + 1;
}
function collides(pos, height) {
  const a = playerAABB(pos, height);
  const x0 = Math.floor(a.minX), x1 = Math.floor(a.maxX - 1e-4);
  const y0 = Math.floor(a.minY), y1 = Math.floor(a.maxY - 1e-4);
  const z0 = Math.floor(a.minZ), z1 = Math.floor(a.maxZ - 1e-4);
  for (let x = x0; x <= x1; x++)
    for (let y = y0; y <= y1; y++)
      for (let z = z0; z <= z1; z++)
        if (hasBlock(x, y, z)) return true;
  return false;
}

const GRAVITY = 28;
const SPEED_WALK = 5;
const SPEED_SPRINT = 8;
const SPEED_CROUCH = 2.5;
const SPEED_FLY = 9;
const SPEED_FLY_SPRINT = 16;
const JUMP_VEL = 9;

function step(dt) {
  const fwd  = (keys.has('KeyW') || keys.has('ArrowUp'))    ? 1 : 0;
  const back = (keys.has('KeyS') || keys.has('ArrowDown'))  ? 1 : 0;
  const lft  = (keys.has('KeyA') || keys.has('ArrowLeft'))  ? 1 : 0;
  const rgt  = (keys.has('KeyD') || keys.has('ArrowRight')) ? 1 : 0;
  const fz = fwd - back, sx = rgt - lft;

  const sprintHeld = keys.has('ControlLeft') || keys.has('ControlRight');
  const shiftHeld  = keys.has('ShiftLeft')  || keys.has('ShiftRight');

  // crouch only while grounded and not flying
  const crouching = shiftHeld && !player.flying && player.onGround;
  const sprinting = sprintHeld && (fz > 0 || sx !== 0) && !crouching;

  // pick horizontal speed
  let speed;
  if (player.flying) speed = sprintHeld ? SPEED_FLY_SPRINT : SPEED_FLY;
  else if (crouching) speed = SPEED_CROUCH;
  else if (sprinting) speed = SPEED_SPRINT;
  else speed = SPEED_WALK;

  // height / eye target (smooth crouch transition)
  player.height = crouching ? player.crouchHeight : player.standHeight;
  player.targetEye = crouching ? 1.15 : 1.5;
  player.eye += (player.targetEye - player.eye) * Math.min(1, dt * 14);

  // horizontal direction in world space from yaw
  let dx = 0, dz = 0;
  if (fz || sx) {
    const cos = Math.cos(player.yaw), sin = Math.sin(player.yaw);
    const wfx = -sin, wfz = -cos;   // camera forward (-Z local)
    const wrx =  cos, wrz = -sin;   // camera right
    dx = wfx * fz + wrx * sx;
    dz = wfz * fz + wrz * sx;
    const len = Math.hypot(dx, dz);
    if (len > 0) { dx /= len; dz /= len; }
  }
  player.vel.x = dx * speed;
  player.vel.z = dz * speed;

  if (player.flying) {
    // free vertical movement
    let vy = 0;
    if (keys.has('Space')) vy += speed;
    if (shiftHeld)         vy -= speed;
    player.vel.y = vy;
    player.onGround = false;
  } else {
    // jump from ground
    if (player.onGround && keys.has('Space')) {
      player.vel.y = JUMP_VEL;
      player.onGround = false;
    }
    // gravity
    player.vel.y -= GRAVITY * dt;
    if (player.vel.y < -50) player.vel.y = -50;
  }

  // axis-by-axis movement with collision
  const trial = player.pos.clone();
  trial.x = player.pos.x + player.vel.x * dt;
  if (!collides(trial, player.height)) player.pos.x = trial.x; else { trial.x = player.pos.x; player.vel.x = 0; }
  trial.z = player.pos.z + player.vel.z * dt;
  if (!collides(trial, player.height)) player.pos.z = trial.z; else { trial.z = player.pos.z; player.vel.z = 0; }
  trial.y = player.pos.y + player.vel.y * dt;
  if (!collides(trial, player.height)) {
    player.pos.y = trial.y;
    if (!player.flying) player.onGround = false;
  } else {
    if (player.vel.y < 0) player.onGround = true;
    player.vel.y = 0;
  }

  // status text
  let mode = player.flying ? (sprintHeld ? 'flying (fast)' : 'flying')
           : crouching     ? 'crouching'
           : sprinting     ? 'sprinting'
           :                 'walking';
  statusEl.textContent = mode;

  // safety net
  if (player.pos.y < -30) {
    player.pos.set(0.5, 10, 0.5);
    player.vel.set(0, 0, 0);
  }
}

// ---------- calm ambient music (Web Audio, procedural) ----------
// Soft sine pads cycling through a gentle I-vi-IV-V progression in C,
// with sparse pentatonic melody notes and a long delay for ambience.
const music = {
  ctx: null, master: null, on: true, started: false,
  voices: [],
};
const MUSIC_VOL = 0.16;

function midiHz(n) { return 440 * Math.pow(2, (n - 69) / 12); }
const CHORDS = [
  [60, 64, 67],  // C major
  [57, 60, 64],  // A minor
  [53, 57, 60],  // F major
  [55, 59, 62],  // G major
];
const PENTA = [60, 62, 64, 67, 69, 72, 74, 76];

function startMusic() {
  if (music.started) {
    if (music.ctx.state === 'suspended') music.ctx.resume();
    return;
  }
  music.started = true;

  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  music.ctx = ctx;

  const master = ctx.createGain();
  master.gain.value = music.on ? MUSIC_VOL : 0;
  master.connect(ctx.destination);
  music.master = master;

  // long, soft feedback delay for ambience
  const delay = ctx.createDelay(1.2);
  delay.delayTime.value = 0.55;
  const fb = ctx.createGain(); fb.gain.value = 0.32;
  const wet = ctx.createGain(); wet.gain.value = 0.4;
  delay.connect(fb).connect(delay);
  delay.connect(wet).connect(master);

  // dedicated bus for the pads (so the delay sends just from pads)
  const padBus = ctx.createGain(); padBus.gain.value = 1;
  padBus.connect(master);
  padBus.connect(delay);

  function playChord(notes, when, dur) {
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, when);
    g.gain.linearRampToValueAtTime(0.28, when + 1.5);   // gentle attack
    g.gain.linearRampToValueAtTime(0.28, when + dur - 2.0);
    g.gain.linearRampToValueAtTime(0, when + dur);      // gentle release
    g.connect(padBus);
    notes.forEach((n, i) => {
      const o = ctx.createOscillator();
      o.type = 'sine';
      o.frequency.value = midiHz(n);
      // tiny detune so it breathes
      o.detune.value = (i - 1) * 4 + (Math.random() - 0.5) * 6;
      o.connect(g);
      o.start(when);
      o.stop(when + dur + 0.05);
    });
    // soft sub bass for warmth
    const bo = ctx.createOscillator();
    const bg = ctx.createGain();
    bo.type = 'sine';
    bo.frequency.value = midiHz(notes[0] - 24);
    bg.gain.setValueAtTime(0, when);
    bg.gain.linearRampToValueAtTime(0.15, when + 2);
    bg.gain.linearRampToValueAtTime(0, when + dur);
    bo.connect(bg).connect(master);
    bo.start(when); bo.stop(when + dur + 0.05);
  }

  function playBlip(note, when) {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'triangle';
    o.frequency.value = midiHz(note);
    g.gain.setValueAtTime(0, when);
    g.gain.linearRampToValueAtTime(0.12, when + 0.04);
    g.gain.exponentialRampToValueAtTime(0.0001, when + 1.4);
    o.connect(g);
    g.connect(master);
    g.connect(delay);   // melody sends to delay too
    o.start(when);
    o.stop(when + 1.5);
  }

  // scheduler: queue chord every CHORD_LEN seconds, sprinkle blips
  const CHORD_LEN = 7.0;
  let chordIdx = 0;
  let next = ctx.currentTime + 0.1;

  function schedule() {
    while (next < ctx.currentTime + 4) {
      const chord = CHORDS[chordIdx % CHORDS.length];
      playChord(chord, next, CHORD_LEN);
      // 2-3 sparse melody notes per chord, random offsets within
      const melodyCount = 2 + ((Math.random() * 2) | 0);
      for (let i = 0; i < melodyCount; i++) {
        const note = PENTA[(Math.random() * PENTA.length) | 0];
        const offset = 1 + Math.random() * (CHORD_LEN - 2);
        playBlip(note, next + offset);
      }
      next += CHORD_LEN;
      chordIdx++;
    }
  }
  schedule();
  setInterval(schedule, 2000);
}

function setMusicOn(on) {
  music.on = on;
  if (music.master) music.master.gain.setTargetAtTime(on ? MUSIC_VOL : 0, music.ctx.currentTime, 0.1);
  musicBtn.innerHTML = on ? '&#9834; music: on' : '&#9834; music: off';
}
const musicBtn = document.getElementById('music-toggle');
musicBtn.addEventListener('click', () => setMusicOn(!music.on));
addEventListener('keydown', e => { if (e.code === 'KeyM' && !e.repeat) setMusicOn(!music.on); });

// ---------- main loop ----------
let last = performance.now();
function tick(now) {
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;

  step(dt);

  eyePosition(camera.position);
  camera.rotation.order = 'YXZ';
  camera.rotation.y = player.yaw;
  camera.rotation.x = player.pitch;

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
