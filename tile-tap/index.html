<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>TILE TAP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #06060a;
    color: #e8e6e3;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    background:
      radial-gradient(circle at 50% -10%, rgba(255, 107, 157, 0.18), transparent 60%),
      radial-gradient(ellipse at center, #14141a, #06060a 75%);
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: manipulation;
  }
  canvas {
    display: block;
    background: transparent;
    cursor: pointer;
  }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    background: rgba(6, 6, 10, 0.65);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .overlay.is-hidden { display: none; }
  h1 {
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: clamp(36px, 8vw, 64px);
    font-weight: 700;
    letter-spacing: 0.04em;
    margin: 0 0 16px;
    color: #ff6b9d;
    text-shadow: 0 0 28px rgba(255, 107, 157, 0.5);
  }
  p {
    color: rgba(232, 230, 227, 0.7);
    font-size: 15px;
    margin: 0 0 28px;
    max-width: 32ch;
    line-height: 1.5;
  }
  button {
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #0a0a0e;
    background: #ff6b9d;
    border: none;
    border-radius: 999px;
    padding: 13px 26px;
    cursor: pointer;
    box-shadow: 0 8px 22px rgba(255, 107, 157, 0.45);
    transition: transform 200ms, box-shadow 200ms;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(255, 107, 157, 0.7); }
  .hud {
    position: absolute;
    top: 20px;
    left: 0; right: 0;
    text-align: center;
    pointer-events: none;
    font-family: "Space Grotesk", system-ui, sans-serif;
    z-index: 5;
  }
  .hud .score {
    font-size: 38px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: rgba(232, 230, 227, 0.92);
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
  }
  .hud .best {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(232, 230, 227, 0.42);
    margin-top: 4px;
  }
  .back {
    position: absolute;
    top: 16px;
    left: 16px;
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(232, 230, 227, 0.5);
    text-decoration: none;
    z-index: 10;
  }
  .back:hover { color: rgba(232, 230, 227, 0.95); }
  .hint {
    color: rgba(232, 230, 227, 0.35);
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-top: 18px;
  }
  .mute {
    position: fixed;
    top: 16px;
    right: 16px;
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: 14px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(232, 230, 227, 0.6);
    background: rgba(6, 6, 10, 0.4);
    border: 1px solid rgba(232, 230, 227, 0.18);
    border-radius: 50%;
    cursor: pointer;
    z-index: 11;
    padding: 0;
    box-shadow: none;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .mute:hover { color: rgba(232, 230, 227, 0.95); border-color: rgba(232, 230, 227, 0.45); }
  .mute.is-muted { opacity: 0.4; }
</style>
<script src="../music.js" defer></script>
</head>
<body>
<a href="../index.html" class="back">&larr; back</a>
<button class="mute" id="mute" type="button" aria-label="Toggle music">♪</button>
<canvas id="c"></canvas>
<div class="hud">
  <div class="score" id="score">0</div>
  <div class="best" id="best">best 0</div>
</div>
<div class="overlay" id="start">
  <h1>TILE TAP</h1>
  <p>Tap the pink tiles before they scroll off the bottom. Miss one or hit empty space and it&rsquo;s over.</p>
  <button id="start-btn">Start</button>
  <div class="hint">tap / click&nbsp;&middot;&nbsp;1&nbsp;2&nbsp;3&nbsp;4 on keyboard</div>
</div>
<div class="overlay is-hidden" id="over">
  <h1 id="over-title">Missed</h1>
  <p id="over-score">Score: 0</p>
  <button id="retry-btn">Retry</button>
</div>
<script>
(function () {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const startOverlay = document.getElementById('start');
  const overOverlay = document.getElementById('over');
  const overScoreEl = document.getElementById('over-score');
  const overTitleEl = document.getElementById('over-title');
  const startBtn = document.getElementById('start-btn');
  const retryBtn = document.getElementById('retry-btn');

  const COLS = 4;
  const ACCENT = '#ff6b9d';
  const ACCENT_DARK = '#c94474';

  let W = 0, H = 0;
  const DPR = Math.min(window.devicePixelRatio || 1, 2);
  let tiles = []; // {col, y, hit, missed}
  let particles = []; // {x, y, vx, vy, life, color}
  let state = 'idle';
  let score = 0;
  let best = 0;
  let speed = 4.5;
  let spawnTimer = 0;
  let spawnInterval = 38;
  let nextCol = -1;
  let shakeT = 0;

  try { best = parseInt(localStorage.getItem('tile-tap-best') || '0', 10) || 0; } catch (_) {}
  bestEl.textContent = 'best ' + best;

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  let audio = null;
  function sound(freq, dur, type, vol) {
    if (!audio) return;
    const t = audio.currentTime;
    const o = audio.createOscillator();
    const g = audio.createGain();
    o.frequency.value = freq;
    o.type = type || 'sine';
    g.gain.setValueAtTime(vol || 0.3, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g).connect(audio.destination);
    o.start(t);
    o.stop(t + dur + 0.02);
  }
  function ensureAudio() {
    if (!audio) {
      try { audio = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
  }

  function reset() {
    tiles = [];
    particles = [];
    score = 0;
    speed = 4.5;
    spawnTimer = 0;
    spawnInterval = 38;
    nextCol = -1;
    shakeT = 0;
    scoreEl.textContent = '0';
  }

  function start() {
    ensureAudio();
    if (window.Music) Music.start('tile-tap');
    reset();
    state = 'play';
    startOverlay.classList.add('is-hidden');
    overOverlay.classList.add('is-hidden');
  }

  function gameOver(reason) {
    state = 'over';
    if (score > best) {
      best = score;
      try { localStorage.setItem('tile-tap-best', String(best)); } catch (_) {}
      bestEl.textContent = 'best ' + best;
    }
    overTitleEl.textContent = reason === 'wrong' ? 'Empty tap' : 'Missed';
    overScoreEl.textContent = 'Score: ' + score;
    overOverlay.classList.remove('is-hidden');
    sound(120, 0.4, 'sawtooth', 0.25);
    sound(80, 0.5, 'sawtooth', 0.2);
  }

  function spawnTile() {
    // Avoid immediate repeat to keep tiles spread
    let col;
    do { col = Math.floor(Math.random() * COLS); } while (col === nextCol);
    nextCol = col;
    tiles.push({ col, y: -tileHeight(), hit: false, missed: false, anim: 0 });
  }

  function tileHeight() { return Math.min(H * 0.22, 180); }
  function colWidth() { return W / COLS; }

  function tapAt(x, y) {
    if (state !== 'play') return;
    const col = Math.floor(x / colWidth());
    // Find the lowest unhit tile in this column whose body covers y
    let target = null;
    for (let i = tiles.length - 1; i >= 0; i--) {
      const t = tiles[i];
      if (t.col !== col || t.hit) continue;
      if (y >= t.y && y <= t.y + tileHeight()) { target = t; break; }
    }
    if (target) {
      target.hit = true;
      target.anim = 14;
      score++;
      scoreEl.textContent = score;
      // Speed up gradually
      speed = 4.5 + Math.min(score * 0.07, 6);
      spawnInterval = Math.max(14, 38 - score * 0.4);
      sound(440 + score * 10, 0.08, 'triangle', 0.25);
      burst(col * colWidth() + colWidth() / 2, target.y + tileHeight() / 2);
    } else {
      // Empty tap
      shakeT = 10;
      sound(200, 0.18, 'square', 0.18);
      gameOver('wrong');
    }
  }

  function burst(x, y) {
    for (let i = 0; i < 12; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 2 + Math.random() * 4;
      particles.push({
        x, y,
        vx: Math.cos(a) * s, vy: Math.sin(a) * s,
        life: 28 + Math.random() * 12,
        color: ACCENT,
      });
    }
  }

  startBtn.addEventListener('click', start);
  retryBtn.addEventListener('click', start);
  canvas.addEventListener('pointerdown', (e) => {
    const r = canvas.getBoundingClientRect();
    tapAt(e.clientX - r.left, e.clientY - r.top);
  });
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      if (state === 'idle' || state === 'over') start();
      return;
    }
    if (state !== 'play') return;
    const idx = ['Digit1','Digit2','Digit3','Digit4'].indexOf(e.code);
    if (idx >= 0) {
      // Find the lowest tile in that column and synthesize a tap at its center
      let lowest = null;
      for (const t of tiles) {
        if (t.col === idx && !t.hit && (!lowest || t.y > lowest.y)) lowest = t;
      }
      if (lowest) tapAt(idx * colWidth() + colWidth() / 2, lowest.y + tileHeight() / 2);
      else tapAt(idx * colWidth() + colWidth() / 2, H - 10);
    }
  });

  function update() {
    if (state === 'play') {
      spawnTimer++;
      if (spawnTimer >= spawnInterval) {
        spawnTimer = 0;
        spawnTile();
      }
      const th = tileHeight();
      for (const t of tiles) {
        if (!t.hit) t.y += speed;
        if (t.anim > 0) t.anim--;
      }
      // Check misses
      for (const t of tiles) {
        if (!t.hit && t.y > H) {
          shakeT = 12;
          gameOver('miss');
          break;
        }
      }
      // Cleanup
      tiles = tiles.filter(t => t.y < H + th + 10);
    }
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.18;
      p.vx *= 0.98;
      p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
    if (shakeT > 0) shakeT--;
  }

  function render() {
    ctx.save();
    if (shakeT > 0) {
      const s = shakeT;
      ctx.translate((Math.random() - 0.5) * s, (Math.random() - 0.5) * s);
    }
    ctx.clearRect(-20, -20, W + 40, H + 40);

    // Column guides
    const cw = colWidth();
    ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
    for (let i = 1; i < COLS; i++) {
      ctx.fillRect(i * cw - 0.5, 0, 1, H);
    }

    // Bottom danger line
    ctx.fillStyle = 'rgba(255, 107, 157, 0.18)';
    ctx.fillRect(0, H - 4, W, 4);

    // Tiles
    const th = tileHeight();
    for (const t of tiles) {
      const x = t.col * cw + 8;
      const w = cw - 16;
      const y = t.y;
      const r = 14;
      const animScale = t.hit ? (1 + (1 - t.anim / 14) * 0.05) : 1;
      const opacity = t.hit ? Math.max(0, t.anim / 14) : 1;
      ctx.globalAlpha = opacity;
      const cx = x + w / 2;
      const cy = y + th / 2;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(animScale, animScale);
      ctx.translate(-cx, -cy);
      const grad = ctx.createLinearGradient(0, y, 0, y + th);
      grad.addColorStop(0, ACCENT);
      grad.addColorStop(1, ACCENT_DARK);
      ctx.fillStyle = grad;
      roundRect(x, y, w, th, r);
      ctx.fill();
      ctx.fillStyle = 'rgba(255, 255, 255, 0.18)';
      roundRect(x, y, w, 6, r);
      ctx.fill();
      ctx.restore();
      ctx.globalAlpha = 1;
    }

    // Particles
    for (const p of particles) {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.min(1, p.life / 40);
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    ctx.restore();
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function loop() {
    update();
    render();
    requestAnimationFrame(loop);
  }
  loop();
  // Music + mute toggle
  var muteBtn = document.getElementById('mute');
  if (muteBtn && window.Music) {
    if (Music.isMuted()) muteBtn.classList.add('is-muted');
    muteBtn.addEventListener('click', function () {
      Music.toggle();
      muteBtn.classList.toggle('is-muted');
    });
  }
})();
</script>
</body>
</html>
