<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>TILE TAP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #06060a;
    color: #e8e6e3;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    background:
      radial-gradient(circle at 50% -10%, rgba(255, 107, 157, 0.18), transparent 60%),
      radial-gradient(ellipse at center, #14141a, #06060a 75%);
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: manipulation;
  }
  canvas {
    display: block;
    background: transparent;
    cursor: pointer;
  }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    background: rgba(6, 6, 10, 0.65);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .overlay.is-hidden { display: none; }
  h1 {
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: clamp(36px, 8vw, 64px);
    font-weight: 700;
    letter-spacing: 0.04em;
    margin: 0 0 16px;
    color: #ff6b9d;
    text-shadow: 0 0 28px rgba(255, 107, 157, 0.5);
  }
  p {
    color: rgba(232, 230, 227, 0.7);
    font-size: 15px;
    margin: 0 0 28px;
    max-width: 32ch;
    line-height: 1.5;
  }
  button {
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #0a0a0e;
    background: #ff6b9d;
    border: none;
    border-radius: 999px;
    padding: 13px 26px;
    cursor: pointer;
    box-shadow: 0 8px 22px rgba(255, 107, 157, 0.45);
    transition: transform 200ms, box-shadow 200ms;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(255, 107, 157, 0.7); }
  .hud {
    position: absolute;
    top: 20px;
    left: 0; right: 0;
    text-align: center;
    pointer-events: none;
    font-family: "Space Grotesk", system-ui, sans-serif;
    z-index: 5;
  }
  .hud .score {
    font-size: 38px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: rgba(232, 230, 227, 0.92);
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
  }
  .hud .best {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(232, 230, 227, 0.42);
    margin-top: 4px;
  }
  .back {
    position: absolute;
    top: 16px;
    left: 16px;
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(232, 230, 227, 0.5);
    text-decoration: none;
    z-index: 10;
  }
  .back:hover { color: rgba(232, 230, 227, 0.95); }
  .hint {
    color: rgba(232, 230, 227, 0.35);
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-top: 18px;
  }
  .mute {
    position: fixed;
    top: 16px;
    right: 16px;
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: 14px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(232, 230, 227, 0.6);
    background: rgba(6, 6, 10, 0.4);
    border: 1px solid rgba(232, 230, 227, 0.18);
    border-radius: 50%;
    cursor: pointer;
    z-index: 11;
    padding: 0;
    box-shadow: none;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .mute:hover { color: rgba(232, 230, 227, 0.95); border-color: rgba(232, 230, 227, 0.45); }
  .mute.is-muted { opacity: 0.4; }
  /* Music picker — sits under the Plus toggle so it doesn't overlap */
  .music-pick {
    position: fixed;
    top: 96px;
    right: 16px;
    padding: 6px 32px 6px 14px;
    background: rgba(6, 6, 10, 0.55);
    border: 1px solid rgba(255, 107, 157, 0.32);
    border-radius: 999px;
    color: rgba(232, 230, 227, 0.9);
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    outline: none;
    cursor: pointer;
    z-index: 12;
    -webkit-appearance: none; appearance: none;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    background-image:
      linear-gradient(45deg, transparent 50%, rgba(255, 107, 157, 0.75) 50%),
      linear-gradient(-45deg, transparent 50%, rgba(255, 107, 157, 0.75) 50%);
    background-position: right 14px center, right 9px center;
    background-size: 5px 5px, 5px 5px;
    background-repeat: no-repeat;
    background-color: rgba(6, 6, 10, 0.55);
  }
  .music-pick:hover { border-color: rgba(255, 107, 157, 0.55); color: #fff; }
  @media (max-width: 500px) {
    .music-pick { top: 96px; right: 16px; }
  }
</style>
<script src="../music.js" defer></script>
</head>
<body>
<a href="../index.html" class="back">&larr; back</a>
<button class="mute" id="mute" type="button" aria-label="Toggle music">♪</button>
<button class="plus-toggle" id="plus-toggle" aria-pressed="false" type="button">
  <span class="plus-dot"></span>Plus
</button>
<select class="music-pick" id="music-pick" aria-label="Track"></select>
<canvas id="c"></canvas>
<div class="hud">
  <div class="score" id="score">0</div>
  <div class="best" id="best">best 0</div>
</div>
<div class="overlay" id="start">
  <h1>TILE TAP</h1>
  <p>Tap the pink tiles before they scroll off the bottom. Miss one or hit empty space and it&rsquo;s over.</p>
  <button id="start-btn">Start</button>
  <div class="hint">tap / click&nbsp;&middot;&nbsp;1&nbsp;2&nbsp;3&nbsp;4 on keyboard</div>
</div>
<div class="overlay is-hidden" id="over">
  <h1 id="over-title">Missed</h1>
  <p id="over-score">Score: 0</p>
  <button id="retry-btn">Retry</button>
</div>
<script>
(function () {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const startOverlay = document.getElementById('start');
  const overOverlay = document.getElementById('over');
  const overScoreEl = document.getElementById('over-score');
  const overTitleEl = document.getElementById('over-title');
  const startBtn = document.getElementById('start-btn');
  const retryBtn = document.getElementById('retry-btn');

  const ACCENT = '#ff6b9d';
  const ACCENT_DARK = '#c94474';
  const GOLD = '#ffd86a';

  let W = 0, H = 0;
  const DPR = Math.min(window.devicePixelRatio || 1, 2);
  let tiles = []; // {col, y, hit, missed, gold}
  let particles = []; // {x, y, vx, vy, life, color}
  let state = 'idle';
  let score = 0;
  let best = 0;
  let speed = 4.5;
  let spawnTimer = 0;
  let spawnInterval = 38;
  let nextCol = -1;
  let shakeT = 0;

  // Plus mode — 5 columns + occasional gold tile worth +5.
  let plusMode = false;
  try { plusMode = localStorage.getItem('tile-tap-plus') === '1'; } catch (_) {}
  let COLS = plusMode ? 5 : 4;

  function plusKey() { return plusMode ? 'tile-tap-best-plus' : 'tile-tap-best'; }
  function loadBest() {
    try { best = parseInt(localStorage.getItem(plusKey()) || '0', 10) || 0; } catch (_) {}
    bestEl.textContent = 'best ' + best;
  }
  loadBest();

  const plusToggle = document.getElementById('plus-toggle');
  if (plusMode && plusToggle) plusToggle.setAttribute('aria-pressed', 'true');
  if (plusMode) document.body.classList.add('is-plus');
  if (plusToggle) {
    plusToggle.addEventListener('click', function () {
      plusMode = !plusMode;
      try { localStorage.setItem('tile-tap-plus', plusMode ? '1' : '0'); } catch (_) {}
      plusToggle.setAttribute('aria-pressed', plusMode ? 'true' : 'false');
      document.body.classList.toggle('is-plus', plusMode);
      COLS = plusMode ? 5 : 4;
      loadBest();
      if (state === 'play' || state === 'over') start();
    });
  }

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  let audio = null;
  function sound(freq, dur, type, vol) {
    if (!audio) return;
    const t = audio.currentTime;
    const o = audio.createOscillator();
    const g = audio.createGain();
    o.frequency.value = freq;
    o.type = type || 'sine';
    g.gain.setValueAtTime(vol || 0.3, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g).connect(audio.destination);
    o.start(t);
    o.stop(t + dur + 0.02);
  }
  function ensureAudio() {
    if (!audio) {
      try { audio = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
  }

  function reset() {
    tiles = [];
    particles = [];
    score = 0;
    speed = 4.5;
    spawnTimer = 0;
    spawnInterval = 38;
    nextCol = -1;
    shakeT = 0;
    scoreEl.textContent = '0';
  }

  // Which soundtrack is loaded — user picks from the dropdown; classic mode
  // uses whichever is selected, defaults to 'tile-tap'.
  let currentTrack = 'tile-tap';
  try {
    var t = localStorage.getItem('tile-tap-track');
    if (t) currentTrack = t;
  } catch (_) {}

  function start() {
    ensureAudio();
    if (window.Music) Music.start(currentTrack, { intense: plusMode });
    reset();
    state = 'play';
    startOverlay.classList.add('is-hidden');
    overOverlay.classList.add('is-hidden');
  }

  function gameOver(reason) {
    state = 'over';
    if (score > best) {
      best = score;
      try { localStorage.setItem('tile-tap-best', String(best)); } catch (_) {}
      bestEl.textContent = 'best ' + best;
    }
    overTitleEl.textContent = reason === 'wrong' ? 'Empty tap' : 'Missed';
    overScoreEl.textContent = 'Score: ' + score;
    overOverlay.classList.remove('is-hidden');
    sound(120, 0.4, 'sawtooth', 0.25);
    sound(80, 0.5, 'sawtooth', 0.2);
  }

  function spawnTile() {
    // Avoid immediate repeat to keep tiles spread
    let col;
    do { col = Math.floor(Math.random() * COLS); } while (col === nextCol);
    nextCol = col;
    var gold = plusMode && Math.random() < 0.10;
    tiles.push({ col, y: -tileHeight(), hit: false, missed: false, anim: 0, gold: gold });
  }

  function tileHeight() { return Math.min(H * 0.22, 180); }
  function colWidth() { return W / COLS; }

  function tapAt(x, y) {
    if (state !== 'play') return;
    const col = Math.floor(x / colWidth());
    // Find the lowest unhit tile in this column whose body covers y
    let target = null;
    for (let i = tiles.length - 1; i >= 0; i--) {
      const t = tiles[i];
      if (t.col !== col || t.hit) continue;
      if (y >= t.y && y <= t.y + tileHeight()) { target = t; break; }
    }
    if (target) {
      target.hit = true;
      target.anim = 14;
      const gained = target.gold ? 5 : 1;
      score += gained;
      scoreEl.textContent = score;
      // Speed up gradually
      speed = 4.5 + Math.min(score * 0.07, 6);
      spawnInterval = Math.max(14, 38 - score * 0.4);
      if (target.gold) {
        sound(880, 0.1, 'triangle', 0.25);
        sound(1320, 0.12, 'sine', 0.18);
      } else {
        sound(440 + score * 10, 0.08, 'triangle', 0.25);
      }
      burst(col * colWidth() + colWidth() / 2, target.y + tileHeight() / 2);
    } else {
      // Empty tap
      shakeT = 10;
      sound(200, 0.18, 'square', 0.18);
      gameOver('wrong');
    }
  }

  function burst(x, y) {
    // Central glow ring (one particle representing the ripple)
    particles.push({
      x, y, vx: 0, vy: 0,
      life: 22, r0: 8, ring: true, color: ACCENT
    });
    // Star burst
    for (let i = 0; i < 18; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 2 + Math.random() * 5;
      particles.push({
        x, y,
        vx: Math.cos(a) * s, vy: Math.sin(a) * s,
        life: 28 + Math.random() * 14,
        size: 2 + Math.random() * 2,
        color: Math.random() < 0.3 ? '#fff' : ACCENT,
      });
    }
  }

  startBtn.addEventListener('click', start);
  retryBtn.addEventListener('click', start);
  canvas.addEventListener('pointerdown', (e) => {
    const r = canvas.getBoundingClientRect();
    tapAt(e.clientX - r.left, e.clientY - r.top);
  });
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      if (state === 'idle' || state === 'over') start();
      return;
    }
    if (state !== 'play') return;
    const idx = ['Digit1','Digit2','Digit3','Digit4'].indexOf(e.code);
    if (idx >= 0) {
      // Find the lowest tile in that column and synthesize a tap at its center
      let lowest = null;
      for (const t of tiles) {
        if (t.col === idx && !t.hit && (!lowest || t.y > lowest.y)) lowest = t;
      }
      if (lowest) tapAt(idx * colWidth() + colWidth() / 2, lowest.y + tileHeight() / 2);
      else tapAt(idx * colWidth() + colWidth() / 2, H - 10);
    }
  });

  // Beat-driven spawn: watch Music.beatPhase() and fire a tile on the leading
  // edge of every beat (phase wraps 1→0). Falls back to the timer if the music
  // engine isn't playing yet (e.g. muted).
  let prevBeatPhase = 0.5;
  function beatSpawn() {
    if (!window.Music || !window.Music.beatPhase) return false;
    var p = window.Music.beatPhase();
    if (p < 0) return false;
    // Wrap: previous was late in beat (near 1), now near 0 → we crossed a beat
    var crossed = p < prevBeatPhase && prevBeatPhase > 0.6;
    prevBeatPhase = p;
    if (crossed) { spawnTile(); return true; }
    return false;
  }

  function update() {
    if (state === 'play') {
      // Try beat-driven spawn first; fall back to the timer if the music
      // engine hasn't produced a beat this frame.
      var spawned = beatSpawn();
      if (!spawned) {
        spawnTimer++;
        if (spawnTimer >= spawnInterval) {
          spawnTimer = 0;
          spawnTile();
        }
      } else {
        spawnTimer = 0;
      }
      const th = tileHeight();
      for (const t of tiles) {
        if (!t.hit) t.y += speed;
        if (t.anim > 0) t.anim--;
      }
      // Check misses
      for (const t of tiles) {
        if (!t.hit && t.y > H) {
          shakeT = 12;
          gameOver('miss');
          break;
        }
      }
      // Cleanup — drop tiles that fell off the bottom OR that have finished
      // their hit fade-out. Hit tiles park at their tap position, so without
      // this they'd accumulate forever.
      tiles = tiles.filter(t => {
        if (t.hit && t.anim <= 0) return false;
        return t.y < H + th + 10;
      });
    }
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.18;
      p.vx *= 0.98;
      p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
    if (shakeT > 0) shakeT--;
  }

  function render() {
    ctx.save();
    if (shakeT > 0) {
      const s = shakeT;
      ctx.translate((Math.random() - 0.5) * s, (Math.random() - 0.5) * s);
    }
    // Full-canvas background — soft vertical gradient that pulses faintly with score
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, '#1a0a18');
    bgGrad.addColorStop(0.5, '#0c050a');
    bgGrad.addColorStop(1, '#08020a');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(-20, -20, W + 40, H + 40);

    const cw = colWidth();

    // Column guide lines — neon, brighter at the bottom edge
    for (let i = 1; i < COLS; i++) {
      const gx = i * cw;
      const lineGrad = ctx.createLinearGradient(0, 0, 0, H);
      lineGrad.addColorStop(0, 'rgba(255, 107, 157, 0.04)');
      lineGrad.addColorStop(1, 'rgba(255, 107, 157, 0.18)');
      ctx.fillStyle = lineGrad;
      ctx.fillRect(gx - 0.5, 0, 1, H);
    }

    // Bottom danger zone — pulsing red gradient
    const danger = ctx.createLinearGradient(0, H - 50, 0, H);
    danger.addColorStop(0, 'rgba(255, 80, 100, 0)');
    danger.addColorStop(1, 'rgba(255, 80, 100, ' + (0.18 + 0.1 * Math.sin(Date.now() * 0.005)) + ')');
    ctx.fillStyle = danger;
    ctx.fillRect(0, H - 50, W, 50);
    ctx.fillStyle = ACCENT;
    ctx.shadowColor = ACCENT;
    ctx.shadowBlur = 10;
    ctx.fillRect(0, H - 2, W, 2);
    ctx.shadowBlur = 0;

    // Tiles
    const th = tileHeight();
    for (const t of tiles) {
      // Skip fully-faded hit tiles — they're queued for removal next update.
      if (t.hit && t.anim <= 0) continue;

      const x = t.col * cw + 10;
      const w = cw - 20;
      const y = t.y;
      const r = 16;
      const animScale = t.hit ? (1 + (1 - t.anim / 14) * 0.08) : 1;
      const opacity = t.hit ? Math.max(0, t.anim / 14) : 1;
      const cx = x + w / 2;
      const cy = y + th / 2;

      // Motion trail above the tile — quick fade-out streak suggesting downward motion
      if (!t.hit) {
        const trailGrad = ctx.createLinearGradient(0, y - 60, 0, y);
        trailGrad.addColorStop(0, 'rgba(255, 107, 157, 0)');
        trailGrad.addColorStop(1, 'rgba(255, 107, 157, 0.18)');
        ctx.fillStyle = trailGrad;
        roundRect(x + 6, y - 60, w - 12, 60, 8);
        ctx.fill();
      }

      ctx.globalAlpha = opacity;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(animScale, animScale);
      ctx.translate(-cx, -cy);

      // Outer glow
      ctx.shadowColor = ACCENT;
      ctx.shadowBlur = 18;
      // Tile gradient body
      const grad = ctx.createLinearGradient(0, y, 0, y + th);
      grad.addColorStop(0, '#ff85b3');
      grad.addColorStop(0.5, ACCENT);
      grad.addColorStop(1, ACCENT_DARK);
      ctx.fillStyle = grad;
      roundRect(x, y, w, th, r);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Top highlight (glassy)
      const sheen = ctx.createLinearGradient(0, y, 0, y + th * 0.5);
      sheen.addColorStop(0, 'rgba(255, 255, 255, 0.35)');
      sheen.addColorStop(1, 'rgba(255, 255, 255, 0)');
      ctx.fillStyle = sheen;
      roundRect(x + 3, y + 3, w - 6, th * 0.45, r - 4);
      ctx.fill();

      // Inner border
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.32)';
      ctx.lineWidth = 1.5;
      roundRect(x + 0.75, y + 0.75, w - 1.5, th - 1.5, r);
      ctx.stroke();

      // Bottom shadow line
      ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
      ctx.fillRect(x + r, y + th - 4, w - 2 * r, 3);

      ctx.restore();
      ctx.globalAlpha = 1;
    }

    // Particles
    for (const p of particles) {
      if (p.ring) {
        const t = 1 - p.life / 22;
        const radius = p.r0 + t * 70;
        ctx.strokeStyle = 'rgba(255, 107, 157, ' + (0.7 * p.life / 22) + ')';
        ctx.lineWidth = 3 - t * 2.5;
        ctx.beginPath();
        ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
        ctx.stroke();
      } else {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = Math.min(1, p.life / 40);
        const r = p.size || 3;
        ctx.beginPath();
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;

    ctx.restore();
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function loop() {
    update();
    render();
    requestAnimationFrame(loop);
  }
  loop();
  // Music + mute toggle
  var muteBtn = document.getElementById('mute');
  if (muteBtn && window.Music) {
    if (Music.isMuted()) muteBtn.classList.add('is-muted');
    muteBtn.addEventListener('click', function () {
      Music.toggle();
      muteBtn.classList.toggle('is-muted');
    });
  }

  // Music picker — swap between soundtracks from other games. Highlights come
  // from the music.js presets so they're actually different genres/tempos.
  var TRACKS = [
    { key: 'tile-tap',    name: 'Tile Tap · 124 BPM (default)' },
    { key: 'snake',       name: 'Snake · 122 BPM' },
    { key: 'kart-loops',  name: 'Kart Loops · 138 BPM' },
    { key: 'space-zoom',  name: 'Space Zoom · 128 BPM' },
    { key: 'ninja-run',   name: 'Ninja Run · 130 BPM' },
    { key: 'dodgeball',   name: 'Dodgeball · 128 BPM' },
    { key: 'block-drop',  name: 'Block Drop · 118 BPM' },
    { key: 'color-match', name: 'Color Match · 108 BPM' },
    { key: 'word-rush',   name: 'Word Rush · 115 BPM' },
    { key: 'tower-stack', name: 'Tower Stack · 92 BPM' },
    { key: 'bubble-pop',  name: 'Bubble Pop · 96 BPM' },
    { key: 'connect-four',name: 'Connect Four · 90 BPM' },
    { key: 'twenty-48',   name: '2048 · 108 BPM' },
    { key: 'pong',        name: 'Pong · 100 BPM' },
    { key: 'blackjack',   name: 'Blackjack · 80 BPM' },
    { key: 'memory',      name: 'Memory · 76 BPM' },
    { key: 'chess-lite',  name: 'Chess Lite · 72 BPM' },
    { key: 'sudoku-mini', name: 'Sudoku · 68 BPM' },
    { key: 'cozy-cabin',  name: 'Cozy Cabin · 62 BPM (slow)' }
  ];
  var musicPick = document.getElementById('music-pick');
  if (musicPick) {
    TRACKS.forEach(function (t) {
      var o = document.createElement('option');
      o.value = t.key; o.textContent = t.name;
      musicPick.appendChild(o);
    });
    musicPick.value = currentTrack;
    musicPick.addEventListener('change', function () {
      currentTrack = musicPick.value;
      try { localStorage.setItem('tile-tap-track', currentTrack); } catch (_) {}
      // Swap the music immediately if we're mid-game (or on the start screen
      // with music already going).
      if (window.Music) window.Music.start(currentTrack, { intense: plusMode });
      // Reset the beat-phase tracker so the next spawn lines up cleanly with
      // the new track's downbeat.
      prevBeatPhase = 0.5;
    });
  }
})();
</script>
</body>
</html>
