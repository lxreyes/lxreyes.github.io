<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AIM TRAINER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #06060a; color: #e8e6e3;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
    overflow: hidden; user-select: none; -webkit-user-select: none;
  }
  body {
    background:
      radial-gradient(circle at 50% -10%, rgba(75, 180, 255, 0.18), transparent 60%),
      radial-gradient(circle at 50% 110%, rgba(75, 180, 255, 0.08), transparent 55%),
      radial-gradient(ellipse at center, #0e1218, #06060a 75%);
    cursor: none;
    touch-action: none;
  }
  canvas {
    display: block;
    position: fixed; inset: 0;
    width: 100%; height: 100%;
  }
  .overlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 24px;
    background: rgba(6, 6, 10, 0.66);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 20;
  }
  .overlay.is-hidden { display: none; }
  h1 {
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: clamp(36px, 8vw, 64px);
    font-weight: 700; letter-spacing: 0.04em;
    margin: 0 0 16px; color: #4bb4ff;
    text-shadow: 0 0 28px rgba(75, 180, 255, 0.5);
  }
  p { color: rgba(232, 230, 227, 0.72); font-size: 15px; margin: 0 0 28px; max-width: 38ch; line-height: 1.55; }
  button {
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-weight: 700; font-size: 13px;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: #06060a; background: #4bb4ff;
    border: none; border-radius: 999px;
    padding: 13px 26px; cursor: pointer;
    box-shadow: 0 8px 22px rgba(75, 180, 255, 0.45);
  }
  button:hover { background: #6fc5ff; }
  .modes {
    display: flex; gap: 8px; margin: 0 0 20px;
  }
  .modes button {
    background: transparent;
    color: rgba(232, 230, 227, 0.65);
    border: 1px solid rgba(75, 180, 255, 0.4);
    box-shadow: none;
    padding: 9px 16px;
    font-size: 11px;
  }
  .modes button.is-active {
    background: rgba(75, 180, 255, 0.18);
    color: #fff;
    border-color: rgba(75, 180, 255, 0.85);
  }
  .hud {
    position: fixed; top: 18px; left: 0; right: 0;
    display: flex; justify-content: center; gap: clamp(20px, 5vw, 48px);
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(232, 230, 227, 0.55);
    pointer-events: none; z-index: 5;
  }
  .hud b {
    display: block; margin-top: 4px;
    font-size: 22px; color: rgba(232, 230, 227, 0.95);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }
  .hud .hit b { color: #4cc466; }
  .hud .miss b { color: #ff6f7a; }
  .back {
    position: fixed; top: 16px; left: 16px;
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(232, 230, 227, 0.6); text-decoration: none;
    z-index: 30; background: rgba(6, 6, 10, 0.45);
    padding: 8px 12px; border-radius: 999px;
    border: 1px solid rgba(232, 230, 227, 0.18);
    cursor: pointer;
  }
  .back:hover { color: rgba(232, 230, 227, 0.95); border-color: rgba(232, 230, 227, 0.45); }
  .hint {
    color: rgba(232, 230, 227, 0.45);
    font-size: 12px; letter-spacing: 0.16em;
    text-transform: uppercase; margin-top: 18px;
  }
  .hint b { color: rgba(232, 230, 227, 0.7); font-weight: 700; }
</style>
</head>
<body>
<a href="../../index.html" class="back">&larr; back</a>
<canvas id="c"></canvas>

<div class="hud" id="hud">
  <div class="hit">Hits<b id="hits">0</b></div>
  <div class="miss">Miss<b id="misses">0</b></div>
  <div class="acc">Acc<b id="acc">—</b></div>
  <div class="time">Time<b id="time">30</b></div>
</div>

<div class="overlay" id="start">
  <h1>AIM TRAINER</h1>
  <p>Targets pop up at random spots. Click them as fast and accurately as you can. Each round runs 30&nbsp;seconds. Misses count too.</p>
  <div class="modes" role="tablist">
    <button data-mode="normal" class="is-active">Normal</button>
    <button data-mode="small">Small</button>
    <button data-mode="rush">Rush</button>
  </div>
  <button id="start-btn">Start</button>
  <div class="hint"><b>click</b> the targets &middot; <b>R</b> restart &middot; <b>Esc</b> menu</div>
</div>

<div class="overlay is-hidden" id="over">
  <h1 id="over-title">Time</h1>
  <p id="over-score">Hits 0 · Acc — · Best 0</p>
  <button id="retry-btn">Try again</button>
</div>

<script>
(function () {
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var hitsEl = document.getElementById('hits');
  var missesEl = document.getElementById('misses');
  var accEl = document.getElementById('acc');
  var timeEl = document.getElementById('time');
  var startOverlay = document.getElementById('start');
  var overOverlay = document.getElementById('over');
  var overScoreEl = document.getElementById('over-score');
  var startBtn = document.getElementById('start-btn');
  var retryBtn = document.getElementById('retry-btn');
  var modeBtns = document.querySelectorAll('.modes button');

  var W = 0, H = 0;
  var DPR = Math.min(window.devicePixelRatio || 1, 2);
  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize); resize();

  var MODES = {
    normal: { radius: 32, lifetime: 1800, spawnEvery: 750, label: 'normal' },
    small:  { radius: 20, lifetime: 1500, spawnEvery: 700, label: 'small' },
    rush:   { radius: 28, lifetime: 1000, spawnEvery: 420, label: 'rush' }
  };
  var mode = 'normal';
  modeBtns.forEach(function (b) {
    b.addEventListener('click', function () {
      mode = b.dataset.mode;
      modeBtns.forEach(function (x) { x.classList.toggle('is-active', x === b); });
    });
  });

  var DURATION = 30000; // 30s
  var state = 'idle';
  var targets = []; // {x, y, r, born, life, ring}
  var hits = 0;
  var misses = 0;
  var startedAt = 0;
  var nextSpawn = 0;
  var cursorX = 0, cursorY = 0;
  var ripples = []; // click feedback
  var best = 0;
  var bestKey = function () { return 'aim-best-' + mode; };
  try { best = parseInt(localStorage.getItem(bestKey()) || '0', 10) || 0; } catch (_) {}

  function reset() {
    targets = []; ripples = [];
    hits = 0; misses = 0;
    hitsEl.textContent = '0'; missesEl.textContent = '0'; accEl.textContent = '—';
    timeEl.textContent = '30';
  }

  function start() {
    reset();
    startOverlay.classList.add('is-hidden');
    overOverlay.classList.add('is-hidden');
    state = 'play';
    startedAt = performance.now();
    nextSpawn = startedAt + 250;
    try { best = parseInt(localStorage.getItem(bestKey()) || '0', 10) || 0; } catch (_) { best = 0; }
  }

  function gameOver() {
    state = 'over';
    if (hits > best) {
      best = hits;
      try { localStorage.setItem(bestKey(), String(best)); } catch (_) {}
    }
    var total = hits + misses;
    var acc = total > 0 ? Math.round(100 * hits / total) : 0;
    overScoreEl.textContent = 'Hits ' + hits + ' · Acc ' + acc + '% · Best ' + best;
    overOverlay.classList.remove('is-hidden');
  }

  function spawn() {
    var cfg = MODES[mode];
    var pad = cfg.radius + 30;
    var x = pad + Math.random() * (W - 2 * pad);
    var y = pad + Math.random() * (H - 2 * pad);
    targets.push({ x: x, y: y, r: cfg.radius, born: performance.now(), life: cfg.lifetime });
  }

  // Sound (lightweight, optional)
  var audio = null;
  function ensureAudio() { if (!audio) { try { audio = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} } }
  function ping(freq, dur, type, vol) {
    if (!audio) return;
    var t = audio.currentTime;
    var o = audio.createOscillator();
    var g = audio.createGain();
    o.type = type || 'triangle'; o.frequency.value = freq;
    g.gain.setValueAtTime(vol || 0.2, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g).connect(audio.destination);
    o.start(t); o.stop(t + dur + 0.02);
  }

  function tryHit(x, y) {
    // Latest (top) target wins.
    for (var i = targets.length - 1; i >= 0; i--) {
      var t = targets[i];
      var dx = x - t.x, dy = y - t.y;
      if (dx * dx + dy * dy <= t.r * t.r) {
        targets.splice(i, 1);
        hits++;
        ping(720 + Math.min(hits * 8, 220), 0.07, 'triangle', 0.22);
        return true;
      }
    }
    return false;
  }

  canvas.addEventListener('pointermove', function (e) {
    cursorX = e.clientX; cursorY = e.clientY;
  });
  canvas.addEventListener('pointerdown', function (e) {
    cursorX = e.clientX; cursorY = e.clientY;
    if (state !== 'play') return;
    ensureAudio();
    ripples.push({ x: cursorX, y: cursorY, r: 6, life: 18, hit: false });
    if (tryHit(cursorX, cursorY)) {
      ripples[ripples.length - 1].hit = true;
    } else {
      misses++;
      ping(180, 0.08, 'sawtooth', 0.16);
    }
    hitsEl.textContent = String(hits);
    missesEl.textContent = String(misses);
    var total = hits + misses;
    accEl.textContent = total ? Math.round(100 * hits / total) + '%' : '—';
  });

  // R restart / Esc menu
  window.addEventListener('keydown', function (e) {
    if (e.code === 'KeyR') { e.preventDefault(); if (state !== 'idle') start(); }
    if (e.code === 'Escape') {
      state = 'idle';
      startOverlay.classList.remove('is-hidden');
      overOverlay.classList.add('is-hidden');
    }
  });

  startBtn.addEventListener('click', start);
  retryBtn.addEventListener('click', start);

  function loop() {
    var now = performance.now();
    if (state === 'play') {
      // Spawn pacing
      var cfg = MODES[mode];
      if (now >= nextSpawn) {
        spawn();
        nextSpawn = now + cfg.spawnEvery;
      }
      // Expire missed targets
      for (var i = targets.length - 1; i >= 0; i--) {
        if (now - targets[i].born >= targets[i].life) {
          targets.splice(i, 1);
          misses++;
          missesEl.textContent = String(misses);
          var total2 = hits + misses;
          accEl.textContent = total2 ? Math.round(100 * hits / total2) + '%' : '—';
        }
      }
      // Time HUD
      var remain = Math.max(0, DURATION - (now - startedAt));
      timeEl.textContent = (remain / 1000).toFixed(1);
      if (remain <= 0) gameOver();
    }
    render(now);
    requestAnimationFrame(loop);
  }

  function render(now) {
    ctx.clearRect(0, 0, W, H);
    // Targets
    for (var i = 0; i < targets.length; i++) {
      var t = targets[i];
      var age = (now - t.born) / t.life; // 0..1
      var pulse = 0.85 + 0.15 * Math.sin(now * 0.012 + i);
      // Outer ring
      ctx.beginPath();
      ctx.arc(t.x, t.y, t.r * pulse, 0, Math.PI * 2);
      ctx.lineWidth = 3;
      ctx.strokeStyle = 'rgba(75, 180, 255, ' + (0.85 - age * 0.5) + ')';
      ctx.shadowColor = '#4bb4ff'; ctx.shadowBlur = 16;
      ctx.stroke();
      ctx.shadowBlur = 0;
      // Inner bullseye
      ctx.beginPath();
      ctx.arc(t.x, t.y, t.r * 0.45, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(75, 180, 255, ' + (0.65 - age * 0.4) + ')';
      ctx.fill();
      // Center dot
      ctx.beginPath();
      ctx.arc(t.x, t.y, t.r * 0.15, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      // Decay ring (time remaining)
      ctx.beginPath();
      ctx.arc(t.x, t.y, t.r + 6, -Math.PI / 2, -Math.PI / 2 + (1 - age) * Math.PI * 2);
      ctx.strokeStyle = 'rgba(255, 255, 255, ' + (0.25 + (1 - age) * 0.35) + ')';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
    // Ripples (click feedback)
    for (var i = ripples.length - 1; i >= 0; i--) {
      var rp = ripples[i];
      rp.r += 3; rp.life -= 1;
      var alpha = rp.life / 18;
      ctx.beginPath();
      ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2);
      ctx.strokeStyle = rp.hit
        ? 'rgba(76, 196, 102, ' + alpha + ')'
        : 'rgba(255, 111, 122, ' + alpha + ')';
      ctx.lineWidth = 2;
      ctx.stroke();
      if (rp.life <= 0) ripples.splice(i, 1);
    }
    // Crosshair (only while playing)
    if (state === 'play') {
      ctx.strokeStyle = 'rgba(232, 230, 227, 0.85)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(cursorX - 10, cursorY); ctx.lineTo(cursorX - 3, cursorY);
      ctx.moveTo(cursorX + 3, cursorY); ctx.lineTo(cursorX + 10, cursorY);
      ctx.moveTo(cursorX, cursorY - 10); ctx.lineTo(cursorX, cursorY - 3);
      ctx.moveTo(cursorX, cursorY + 3); ctx.lineTo(cursorX, cursorY + 10);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(cursorX, cursorY, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
    }
  }
  loop();
})();
</script>
</body>
</html>
