<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>METRONOME</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #06060a; color: #e8e6e3;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
    overflow: hidden; user-select: none; -webkit-user-select: none;
  }
  body {
    background:
      radial-gradient(circle at 50% -10%, rgba(255, 216, 106, 0.18), transparent 60%),
      radial-gradient(ellipse at center, #14141a, #06060a 75%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px; text-align: center;
  }
  .back {
    position: fixed; top: 16px; left: 16px;
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(232, 230, 227, 0.55); text-decoration: none;
    padding: 8px 12px; border-radius: 999px;
    border: 1px solid rgba(232, 230, 227, 0.18);
    background: rgba(6, 6, 10, 0.5);
  }
  .back:hover { color: rgba(232, 230, 227, 0.95); border-color: rgba(232, 230, 227, 0.45); }
  h1 {
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: 12px; letter-spacing: 0.28em; text-transform: uppercase;
    color: rgba(232, 230, 227, 0.5); margin: 0 0 12px; font-weight: 500;
  }
  .bpm-display {
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-weight: 700;
    font-size: clamp(90px, 22vw, 180px);
    line-height: 1;
    letter-spacing: -0.02em;
    color: #ffd86a;
    text-shadow: 0 0 40px rgba(255, 216, 106, 0.3);
    margin: 0;
    font-variant-numeric: tabular-nums;
  }
  .bpm-label { font-size: 12px; letter-spacing: 0.24em; text-transform: uppercase; color: rgba(232, 230, 227, 0.45); margin-top: 6px; }
  .beats {
    display: flex; gap: 10px; margin: 32px 0 24px;
  }
  .beat {
    width: 14px; height: 14px; border-radius: 50%;
    background: rgba(255, 255, 255, 0.14);
    transition: background 100ms, transform 100ms, box-shadow 100ms;
  }
  .beat.is-active {
    background: #ffd86a;
    transform: scale(1.5);
    box-shadow: 0 0 20px rgba(255, 216, 106, 0.7);
  }
  .beat.is-downbeat { background: rgba(255, 255, 255, 0.24); }
  .beat.is-downbeat.is-active { background: #ff8a3d; box-shadow: 0 0 20px rgba(255, 138, 61, 0.7); }
  .slider-row {
    display: flex; align-items: center; gap: 20px; margin-bottom: 20px;
  }
  input[type="range"] {
    -webkit-appearance: none; appearance: none;
    width: min(320px, 78vw); height: 4px;
    background: rgba(255, 255, 255, 0.12); border-radius: 2px; outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 22px; height: 22px; border-radius: 50%;
    background: #ffd86a; cursor: pointer;
    box-shadow: 0 0 16px rgba(255, 216, 106, 0.55);
  }
  input[type="range"]::-moz-range-thumb {
    width: 22px; height: 22px; border-radius: 50%; border: none;
    background: #ffd86a; cursor: pointer;
    box-shadow: 0 0 16px rgba(255, 216, 106, 0.55);
  }
  .nudge {
    display: flex; gap: 8px; margin-bottom: 22px;
  }
  .nudge button {
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-weight: 700; font-size: 12px;
    letter-spacing: 0.16em; text-transform: uppercase;
    padding: 8px 14px; border-radius: 999px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.14);
    color: rgba(232, 230, 227, 0.8); cursor: pointer;
    font-variant-numeric: tabular-nums;
  }
  .nudge button:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }
  .controls { display: flex; gap: 12px; margin-bottom: 22px; flex-wrap: wrap; justify-content: center; }
  .controls button {
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-weight: 700; font-size: 13px;
    letter-spacing: 0.2em; text-transform: uppercase;
    padding: 13px 26px; border-radius: 999px; cursor: pointer;
    border: 1px solid rgba(232, 230, 227, 0.2);
    background: rgba(255, 255, 255, 0.03);
    color: rgba(232, 230, 227, 0.85);
  }
  .controls button:hover { background: rgba(255, 255, 255, 0.08); color: #fff; }
  .controls button.primary {
    background: #ffd86a; color: #06060a; border-color: transparent;
    box-shadow: 0 8px 22px rgba(255, 216, 106, 0.4);
  }
  .signature {
    display: flex; gap: 12px; align-items: center;
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(232, 230, 227, 0.5);
  }
  .signature select {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.14);
    color: rgba(232, 230, 227, 0.9);
    padding: 8px 14px; border-radius: 999px;
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: 12px; letter-spacing: 0.14em;
    outline: none; cursor: pointer;
  }
  .hint {
    position: fixed; bottom: 18px; left: 0; right: 0;
    text-align: center;
    font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase;
    color: rgba(232, 230, 227, 0.3);
    pointer-events: none;
  }
  .hint b { color: rgba(232, 230, 227, 0.55); font-weight: 700; }
</style>
</head>
<body>
<a href="../../index.html" class="back">&larr; back</a>

<h1>Metronome</h1>
<div class="bpm-display" id="bpm">100</div>
<div class="bpm-label">BPM</div>

<div class="beats" id="beats"></div>

<div class="slider-row">
  <input type="range" id="bpm-slider" min="40" max="240" value="100">
</div>

<div class="nudge">
  <button data-nudge="-10">-10</button>
  <button data-nudge="-1">-1</button>
  <button data-nudge="1">+1</button>
  <button data-nudge="10">+10</button>
</div>

<div class="controls">
  <button id="tap" type="button">Tap tempo</button>
  <button id="start" class="primary" type="button">Start</button>
</div>

<div class="signature">
  <span>Time signature</span>
  <select id="sig">
    <option value="4">4/4</option>
    <option value="3">3/4</option>
    <option value="6">6/8</option>
    <option value="5">5/4</option>
    <option value="7">7/8</option>
    <option value="2">2/4</option>
  </select>
</div>

<div class="hint"><b>Space</b> start/stop &middot; <b>T</b> tap tempo &middot; <b>&larr; &rarr;</b> nudge BPM</div>

<script>
(function () {
  var bpmEl = document.getElementById('bpm');
  var bpmSlider = document.getElementById('bpm-slider');
  var beatsEl = document.getElementById('beats');
  var startBtn = document.getElementById('start');
  var tapBtn = document.getElementById('tap');
  var sigSelect = document.getElementById('sig');

  var bpm = 100;
  var beatsPerBar = 4;
  var running = false;
  var audio = null;
  var nextTickTime = 0;
  var currentBeat = 0;
  var lookaheadTimer = null;
  var displayTimer = null;
  var displayBeat = -1;

  try {
    var s = JSON.parse(localStorage.getItem('metronome') || '{}');
    if (s.bpm) bpm = s.bpm;
    if (s.sig) beatsPerBar = s.sig;
  } catch (_) {}
  bpmSlider.value = bpm;
  sigSelect.value = String(beatsPerBar);
  updateDisplay();

  function saveState() {
    try { localStorage.setItem('metronome', JSON.stringify({ bpm: bpm, sig: beatsPerBar })); } catch (_) {}
  }

  function updateDisplay() {
    bpmEl.textContent = String(bpm);
    // Rebuild beat dots
    beatsEl.innerHTML = '';
    for (var i = 0; i < beatsPerBar; i++) {
      var d = document.createElement('div');
      d.className = 'beat' + (i === 0 ? ' is-downbeat' : '');
      beatsEl.appendChild(d);
    }
  }

  function setBpm(v) {
    bpm = Math.max(40, Math.min(240, Math.round(v)));
    bpmSlider.value = bpm;
    bpmEl.textContent = String(bpm);
    saveState();
  }
  bpmSlider.addEventListener('input', function () { setBpm(bpmSlider.value); });
  document.querySelectorAll('.nudge button').forEach(function (b) {
    b.addEventListener('click', function () { setBpm(bpm + parseInt(b.dataset.nudge, 10)); });
  });
  sigSelect.addEventListener('change', function () {
    beatsPerBar = parseInt(sigSelect.value, 10);
    currentBeat = 0;
    updateDisplay();
    saveState();
  });

  function ensureAudio() {
    if (!audio) { try { audio = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
    if (audio && audio.state === 'suspended') audio.resume();
  }
  function scheduleClick(time, isDownbeat) {
    if (!audio) return;
    var o = audio.createOscillator();
    var g = audio.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(isDownbeat ? 1400 : 900, time);
    g.gain.setValueAtTime(0.001, time);
    g.gain.exponentialRampToValueAtTime(isDownbeat ? 0.32 : 0.20, time + 0.001);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.06);
    o.connect(g).connect(audio.destination);
    o.start(time);
    o.stop(time + 0.08);
  }
  // Beats visual lookahead — track (beat, time) so animation lines up with audio
  var beatQueue = [];
  function scheduler() {
    if (!audio || !running) return;
    while (nextTickTime < audio.currentTime + 0.12) {
      scheduleClick(nextTickTime, currentBeat === 0);
      beatQueue.push({ beat: currentBeat, at: nextTickTime });
      nextTickTime += 60 / bpm;
      currentBeat = (currentBeat + 1) % beatsPerBar;
    }
  }
  function tickDisplay() {
    if (!audio) return;
    while (beatQueue.length && beatQueue[0].at <= audio.currentTime + 0.01) {
      var b = beatQueue.shift();
      displayBeat = b.beat;
      var dots = beatsEl.querySelectorAll('.beat');
      dots.forEach(function (d, i) { d.classList.toggle('is-active', i === displayBeat); });
    }
  }

  function start() {
    ensureAudio();
    if (!audio) return;
    running = true;
    currentBeat = 0;
    nextTickTime = audio.currentTime + 0.05;
    beatQueue = [];
    startBtn.textContent = 'Stop';
    if (lookaheadTimer) clearInterval(lookaheadTimer);
    if (displayTimer) clearInterval(displayTimer);
    lookaheadTimer = setInterval(scheduler, 25);
    displayTimer = setInterval(tickDisplay, 16);
    scheduler();
  }
  function stop() {
    running = false;
    startBtn.textContent = 'Start';
    if (lookaheadTimer) clearInterval(lookaheadTimer);
    if (displayTimer) clearInterval(displayTimer);
    lookaheadTimer = null; displayTimer = null;
    beatsEl.querySelectorAll('.beat').forEach(function (d) { d.classList.remove('is-active'); });
  }
  startBtn.addEventListener('click', function () { running ? stop() : start(); });

  // Tap tempo — measure gaps between the last 4 taps
  var tapTimes = [];
  tapBtn.addEventListener('click', tapTempo);
  function tapTempo() {
    var t = performance.now();
    tapTimes.push(t);
    if (tapTimes.length > 4) tapTimes.shift();
    if (tapTimes.length >= 2) {
      var diffs = [];
      for (var i = 1; i < tapTimes.length; i++) diffs.push(tapTimes[i] - tapTimes[i - 1]);
      var avgMs = diffs.reduce(function (a, b) { return a + b; }, 0) / diffs.length;
      var newBpm = Math.round(60000 / avgMs);
      if (newBpm >= 40 && newBpm <= 240) setBpm(newBpm);
    }
    // Reset if the user pauses > 2s between taps
    setTimeout(function () {
      if (performance.now() - t > 2000) tapTimes = [];
    }, 2100);
  }

  window.addEventListener('keydown', function (e) {
    if (e.target.tagName === 'SELECT') return;
    if (e.code === 'Space') { e.preventDefault(); running ? stop() : start(); }
    if (e.code === 'KeyT') { e.preventDefault(); tapTempo(); }
    if (e.code === 'ArrowLeft') { e.preventDefault(); setBpm(bpm - (e.shiftKey ? 10 : 1)); }
    if (e.code === 'ArrowRight') { e.preventDefault(); setBpm(bpm + (e.shiftKey ? 10 : 1)); }
  });
})();
</script>
</body>
</html>
