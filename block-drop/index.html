<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>BLOCK DROP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #06060a;
    color: #e8e6e3;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    background:
      radial-gradient(circle at 50% -10%, rgba(91, 141, 239, 0.20), transparent 60%),
      radial-gradient(ellipse at center, #14141a, #06060a 75%);
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: manipulation;
  }
  canvas { display: block; background: transparent; }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    background: rgba(6, 6, 10, 0.65);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 20;
  }
  .overlay.is-hidden { display: none; }
  h1 {
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: clamp(36px, 8vw, 64px);
    font-weight: 700;
    letter-spacing: 0.04em;
    margin: 0 0 16px;
    color: #5b8def;
    text-shadow: 0 0 28px rgba(91, 141, 239, 0.5);
  }
  p {
    color: rgba(232, 230, 227, 0.72);
    font-size: 15px;
    margin: 0 0 28px;
    max-width: 34ch;
    line-height: 1.55;
  }
  button {
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #0a0a0e;
    background: #5b8def;
    border: none;
    border-radius: 999px;
    padding: 13px 26px;
    cursor: pointer;
    box-shadow: 0 8px 22px rgba(91, 141, 239, 0.45);
    transition: transform 200ms, box-shadow 200ms;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(91, 141, 239, 0.7); }
  .hud {
    position: absolute;
    top: 18px;
    left: 0; right: 0;
    text-align: center;
    pointer-events: none;
    font-family: "Space Grotesk", system-ui, sans-serif;
    z-index: 5;
  }
  .hud .score {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: rgba(232, 230, 227, 0.92);
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
    font-variant-numeric: tabular-nums;
  }
  .hud .meta {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(232, 230, 227, 0.42);
    margin-top: 4px;
  }
  .back {
    position: absolute;
    top: 16px;
    left: 16px;
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(232, 230, 227, 0.5);
    text-decoration: none;
    z-index: 10;
  }
  .back:hover { color: rgba(232, 230, 227, 0.95); }
  .hint {
    color: rgba(232, 230, 227, 0.42);
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-top: 18px;
    line-height: 1.8;
  }
  .hint b { color: rgba(232, 230, 227, 0.72); font-weight: 700; }
  .controls {
    position: absolute;
    bottom: 14px;
    left: 14px;
    right: 14px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    z-index: 5;
    pointer-events: none;
  }
  .key {
    pointer-events: auto;
    padding: 16px 0;
    text-align: center;
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(232, 230, 227, 0.85);
    background: rgba(91, 141, 239, 0.10);
    border: 1px solid rgba(91, 141, 239, 0.35);
    border-radius: 12px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: background 80ms, transform 80ms;
  }
  .key:active { background: rgba(91, 141, 239, 0.28); transform: translateY(2px); }
  @media (hover: hover) and (pointer: fine) {
    .controls { display: none; }
  }
</style>
</head>
<body>
<a href="../index.html" class="back">&larr; back</a>
<canvas id="c"></canvas>
<div class="hud">
  <div class="score" id="score">0</div>
  <div class="meta" id="meta">lines 0 &middot; best 0</div>
</div>
<div class="controls" aria-hidden="true">
  <div class="key" id="key-left">&larr;</div>
  <div class="key" id="key-rot">Rotate</div>
  <div class="key" id="key-down">&darr;</div>
  <div class="key" id="key-right">&rarr;</div>
</div>
<div class="overlay" id="start">
  <h1>BLOCK DROP</h1>
  <p>Stack falling tetrominoes. Complete rows to clear them. Speed climbs with every line. Tower over the top and it&rsquo;s done.</p>
  <button id="start-btn">Start</button>
  <div class="hint">
    <b>&larr; &rarr;</b> move &middot; <b>&uarr;</b> rotate<br>
    <b>&darr;</b> soft drop &middot; <b>Space</b> hard drop
  </div>
</div>
<div class="overlay is-hidden" id="over">
  <h1>Game Over</h1>
  <p id="over-score">Score: 0 &middot; Lines: 0</p>
  <button id="retry-btn">Retry</button>
</div>
<script>
(function () {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const metaEl = document.getElementById('meta');
  const startOverlay = document.getElementById('start');
  const overOverlay = document.getElementById('over');
  const overScoreEl = document.getElementById('over-score');
  const startBtn = document.getElementById('start-btn');
  const retryBtn = document.getElementById('retry-btn');
  const keyLeft = document.getElementById('key-left');
  const keyRight = document.getElementById('key-right');
  const keyRot = document.getElementById('key-rot');
  const keyDown = document.getElementById('key-down');

  const ACCENT = '#5b8def';
  const COLS = 10, ROWS = 20;
  const DPR = Math.min(window.devicePixelRatio || 1, 2);

  let W = 0, H = 0;
  let cell = 28;
  let board = null;
  let grid = null;
  let piece = null;
  let nextPiece = null;
  let state = 'idle';
  let score = 0;
  let lines = 0;
  let best = 0;
  let dropTimer = 0;
  let dropInterval = 48;
  let softDrop = false;
  let flashRows = [];
  let flashT = 0;
  let particles = [];
  let shakeT = 0;

  const PIECES = [
    { shape: [[1,1,1,1]],            color: '#41d6ff' }, // I
    { shape: [[1,1],[1,1]],          color: '#ffd95e' }, // O
    { shape: [[0,1,0],[1,1,1]],      color: '#b86fff' }, // T
    { shape: [[1,0,0],[1,1,1]],      color: '#5b8def' }, // J
    { shape: [[0,0,1],[1,1,1]],      color: '#ff9a40' }, // L
    { shape: [[0,1,1],[1,1,0]],      color: '#54e08a' }, // S
    { shape: [[1,1,0],[0,1,1]],      color: '#ff5566' }, // Z
  ];

  try { best = parseInt(localStorage.getItem('block-drop-best') || '0', 10) || 0; } catch (_) {}
  updateMeta();

  function updateMeta() {
    metaEl.textContent = 'lines ' + lines + ' · best ' + best;
  }

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    // pick cell size to fit
    const maxBoardH = H - 240;
    const maxBoardW = W - 40;
    const cellH = Math.floor(maxBoardH / ROWS);
    const cellW = Math.floor(maxBoardW / COLS);
    cell = Math.max(14, Math.min(40, Math.min(cellH, cellW)));
    const boardW = cell * COLS;
    const boardH = cell * ROWS;
    board = {
      x: Math.floor((W - boardW) / 2),
      y: Math.floor((H - boardH) / 2) + 10,
      w: boardW,
      h: boardH,
    };
  }
  window.addEventListener('resize', resize);
  resize();

  let audio = null;
  function ensureAudio() {
    if (!audio) {
      try { audio = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
  }
  function sound(freq, dur, type, vol) {
    if (!audio) return;
    const t = audio.currentTime;
    const o = audio.createOscillator();
    const g = audio.createGain();
    o.frequency.value = freq;
    o.type = type || 'sine';
    g.gain.setValueAtTime(vol || 0.22, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g).connect(audio.destination);
    o.start(t);
    o.stop(t + dur + 0.02);
  }
  function chord(freqs, dur, vol) {
    for (const f of freqs) sound(f, dur, 'triangle', vol || 0.18);
  }

  function randomPiece() {
    const p = PIECES[Math.floor(Math.random() * PIECES.length)];
    return { shape: p.shape.map(r => r.slice()), color: p.color, x: 0, y: 0 };
  }

  function rotateShape(shape) {
    const rows = shape.length;
    const cols = shape[0].length;
    const out = Array.from({ length: cols }, () => Array(rows).fill(0));
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        out[c][rows - 1 - r] = shape[r][c];
      }
    }
    return out;
  }

  function collision(p) {
    for (let r = 0; r < p.shape.length; r++) {
      for (let c = 0; c < p.shape[r].length; c++) {
        if (!p.shape[r][c]) continue;
        const x = p.x + c, y = p.y + r;
        if (x < 0 || x >= COLS || y >= ROWS) return true;
        if (y >= 0 && grid[y][x]) return true;
      }
    }
    return false;
  }

  function spawn() {
    if (!nextPiece) nextPiece = randomPiece();
    piece = nextPiece;
    piece.x = Math.floor(COLS / 2 - piece.shape[0].length / 2);
    piece.y = -1;
    nextPiece = randomPiece();
    if (collision(piece)) {
      gameOver();
    }
  }

  function lockPiece() {
    for (let r = 0; r < piece.shape.length; r++) {
      for (let c = 0; c < piece.shape[r].length; c++) {
        if (piece.shape[r][c]) {
          const gy = piece.y + r;
          const gx = piece.x + c;
          if (gy >= 0) grid[gy][gx] = piece.color;
        }
      }
    }
    sound(180, 0.07, 'square', 0.18);
    const cleared = clearLines();
    if (!cleared) spawn();
  }

  function clearLines() {
    flashRows = [];
    for (let r = 0; r < ROWS; r++) {
      if (grid[r].every(c => c)) flashRows.push(r);
    }
    if (!flashRows.length) return 0;
    flashT = 14;
    state = 'clearing';
    // Particle burst from each cleared row
    for (const r of flashRows) {
      for (let c = 0; c < COLS; c++) {
        const colour = grid[r][c];
        const cx = board.x + c * cell + cell / 2;
        const cy = board.y + r * cell + cell / 2;
        for (let i = 0; i < 3; i++) {
          particles.push({
            x: cx, y: cy,
            vx: (Math.random() - 0.5) * 4,
            vy: (Math.random() - 0.8) * 4,
            life: 22 + Math.random() * 14,
            r: 2 + Math.random() * 2,
            colour,
          });
        }
      }
    }
    const n = flashRows.length;
    chord([440, 660, 880, 1100].slice(0, n), 0.18, 0.16);
    if (n === 4) shakeT = 12;
    return n;
  }

  function finalizeClear() {
    for (const r of flashRows.slice().sort((a, b) => a - b)) {
      grid.splice(r, 1);
      grid.unshift(Array(COLS).fill(0));
    }
    const n = flashRows.length;
    score += [0, 100, 300, 500, 800][n] || 0;
    lines += n;
    dropInterval = Math.max(8, 48 - Math.floor(lines / 8) * 4);
    scoreEl.textContent = score;
    updateMeta();
    flashRows = [];
    state = 'play';
    spawn();
  }

  function move(dx) {
    if (state !== 'play' || !piece) return;
    piece.x += dx;
    if (collision(piece)) piece.x -= dx;
    else sound(360 + dx * 10, 0.04, 'sine', 0.08);
  }

  function rotate() {
    if (state !== 'play' || !piece) return;
    const old = piece.shape;
    piece.shape = rotateShape(old);
    // wall-kick: try shifting +/-1
    if (collision(piece)) { piece.x -= 1; if (collision(piece)) { piece.x += 2; if (collision(piece)) { piece.x -= 1; piece.shape = old; return; } } }
    sound(520, 0.05, 'sine', 0.12);
  }

  function hardDrop() {
    if (state !== 'play' || !piece) return;
    while (!collision(piece)) piece.y++;
    piece.y--;
    sound(120, 0.08, 'square', 0.2);
    shakeT = Math.max(shakeT, 4);
    lockPiece();
  }

  function softDropStep() {
    if (state !== 'play' || !piece) return;
    piece.y++;
    if (collision(piece)) {
      piece.y--;
      lockPiece();
    }
  }

  function reset() {
    grid = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    piece = null;
    nextPiece = randomPiece();
    score = 0;
    lines = 0;
    dropTimer = 0;
    dropInterval = 48;
    flashRows = [];
    flashT = 0;
    particles = [];
    shakeT = 0;
    softDrop = false;
    scoreEl.textContent = '0';
    updateMeta();
  }

  function start() {
    ensureAudio();
    reset();
    state = 'play';
    startOverlay.classList.add('is-hidden');
    overOverlay.classList.add('is-hidden');
    spawn();
  }

  function gameOver() {
    state = 'over';
    if (score > best) {
      best = score;
      try { localStorage.setItem('block-drop-best', String(best)); } catch (_) {}
      updateMeta();
    }
    overScoreEl.textContent = 'Score: ' + score + ' · Lines: ' + lines;
    overOverlay.classList.remove('is-hidden');
    sound(180, 0.18, 'sawtooth', 0.22);
    sound(120, 0.4, 'sawtooth', 0.2);
    shakeT = 16;
  }

  // Input
  startBtn.addEventListener('click', start);
  retryBtn.addEventListener('click', start);

  // Touch buttons (autorepeat for left/right/down)
  function bindHold(el, fn, repeatRate) {
    let interval = null;
    let timeout = null;
    function press(e) {
      if (e) e.preventDefault();
      fn();
      timeout = setTimeout(() => {
        interval = setInterval(fn, repeatRate || 90);
      }, 180);
    }
    function release() {
      if (timeout) clearTimeout(timeout);
      if (interval) clearInterval(interval);
      timeout = null;
      interval = null;
    }
    el.addEventListener('pointerdown', press);
    el.addEventListener('pointerup', release);
    el.addEventListener('pointercancel', release);
    el.addEventListener('pointerleave', release);
  }
  bindHold(keyLeft, () => move(-1), 90);
  bindHold(keyRight, () => move(1), 90);
  bindHold(keyDown, () => softDropStep(), 50);
  keyRot.addEventListener('pointerdown', (e) => { e.preventDefault(); rotate(); });

  window.addEventListener('keydown', (e) => {
    if (e.code === 'Enter') {
      e.preventDefault();
      if (state === 'idle' || state === 'over') start();
      return;
    }
    if (state !== 'play' && state !== 'clearing') return;
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') { e.preventDefault(); move(-1); }
    else if (e.code === 'ArrowRight' || e.code === 'KeyD') { e.preventDefault(); move(1); }
    else if (e.code === 'ArrowUp' || e.code === 'KeyW') { e.preventDefault(); rotate(); }
    else if (e.code === 'ArrowDown' || e.code === 'KeyS') { e.preventDefault(); softDrop = true; }
    else if (e.code === 'Space') { e.preventDefault(); hardDrop(); }
  });
  window.addEventListener('keyup', (e) => {
    if (e.code === 'ArrowDown' || e.code === 'KeyS') softDrop = false;
  });

  function update() {
    if (state === 'play' && piece) {
      dropTimer++;
      const interval = softDrop ? Math.min(6, dropInterval) : dropInterval;
      if (dropTimer >= interval) {
        dropTimer = 0;
        piece.y++;
        if (collision(piece)) {
          piece.y--;
          lockPiece();
        }
      }
    }
    if (state === 'clearing') {
      flashT--;
      if (flashT <= 0) finalizeClear();
    }
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.22;
      p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
    if (shakeT > 0) shakeT--;
  }

  function drawCell(x, y, colour, alpha) {
    const a = alpha == null ? 1 : alpha;
    const grad = ctx.createLinearGradient(x, y, x, y + cell);
    grad.addColorStop(0, colour);
    grad.addColorStop(1, mixColor(colour, '#000000', 0.5));
    ctx.fillStyle = grad;
    ctx.globalAlpha = a;
    ctx.fillRect(x + 1, y + 1, cell - 2, cell - 2);
    // top highlight
    ctx.fillStyle = 'rgba(255, 255, 255, ' + (0.22 * a) + ')';
    ctx.fillRect(x + 1, y + 1, cell - 2, 3);
    // bottom shadow
    ctx.fillStyle = 'rgba(0, 0, 0, ' + (0.3 * a) + ')';
    ctx.fillRect(x + 1, y + cell - 4, cell - 2, 3);
    ctx.globalAlpha = 1;
  }

  function mixColor(a, b, t) {
    const ah = parseInt(a.slice(1), 16);
    const bh = parseInt(b.slice(1), 16);
    const ar = (ah >> 16) & 255, ag = (ah >> 8) & 255, ab = ah & 255;
    const br = (bh >> 16) & 255, bg = (bh >> 8) & 255, bb = bh & 255;
    const r = Math.round(ar + (br - ar) * t);
    const g = Math.round(ag + (bg - ag) * t);
    const bch = Math.round(ab + (bb - ab) * t);
    return 'rgb(' + r + ',' + g + ',' + bch + ')';
  }

  function render() {
    ctx.save();
    if (shakeT > 0) {
      ctx.translate((Math.random() - 0.5) * shakeT, (Math.random() - 0.5) * shakeT);
    }
    ctx.clearRect(-30, -30, W + 60, H + 60);

    // board frame
    ctx.fillStyle = 'rgba(10, 10, 18, 0.6)';
    ctx.fillRect(board.x - 4, board.y - 4, board.w + 8, board.h + 8);
    ctx.strokeStyle = 'rgba(91, 141, 239, 0.4)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(board.x - 4 + 0.75, board.y - 4 + 0.75, board.w + 8 - 1.5, board.h + 8 - 1.5);

    // grid lines
    ctx.strokeStyle = 'rgba(91, 141, 239, 0.07)';
    ctx.lineWidth = 1;
    for (let c = 1; c < COLS; c++) {
      const x = board.x + c * cell + 0.5;
      ctx.beginPath();
      ctx.moveTo(x, board.y);
      ctx.lineTo(x, board.y + board.h);
      ctx.stroke();
    }
    for (let r = 1; r < ROWS; r++) {
      const y = board.y + r * cell + 0.5;
      ctx.beginPath();
      ctx.moveTo(board.x, y);
      ctx.lineTo(board.x + board.w, y);
      ctx.stroke();
    }

    // locked cells
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (grid[r][c]) {
          let alpha = 1;
          if (state === 'clearing' && flashRows.includes(r)) {
            alpha = (flashT % 4 < 2) ? 1 : 0.35;
          }
          drawCell(board.x + c * cell, board.y + r * cell, grid[r][c], alpha);
        }
      }
    }

    // ghost piece preview
    if (state === 'play' && piece) {
      const ghost = { shape: piece.shape, color: piece.color, x: piece.x, y: piece.y };
      while (!collision(ghost)) ghost.y++;
      ghost.y--;
      for (let r = 0; r < ghost.shape.length; r++) {
        for (let c = 0; c < ghost.shape[r].length; c++) {
          if (!ghost.shape[r][c]) continue;
          const x = board.x + (ghost.x + c) * cell;
          const y = board.y + (ghost.y + r) * cell;
          if (y < board.y) continue;
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.18)';
          ctx.lineWidth = 1.5;
          ctx.strokeRect(x + 2, y + 2, cell - 4, cell - 4);
        }
      }
    }

    // active piece
    if (state === 'play' && piece) {
      for (let r = 0; r < piece.shape.length; r++) {
        for (let c = 0; c < piece.shape[r].length; c++) {
          if (!piece.shape[r][c]) continue;
          const x = board.x + (piece.x + c) * cell;
          const y = board.y + (piece.y + r) * cell;
          if (y >= board.y - cell) drawCell(x, y, piece.color);
        }
      }
    }

    // particles
    for (const p of particles) {
      const a = Math.min(1, p.life / 30);
      ctx.fillStyle = p.colour || ACCENT;
      ctx.globalAlpha = a;
      ctx.fillRect(p.x - p.r / 2, p.y - p.r / 2, p.r, p.r);
      ctx.globalAlpha = 1;
    }

    // next piece preview top-right
    if (nextPiece) {
      const previewSize = Math.min(cell, 22);
      const pad = 18;
      const w = nextPiece.shape[0].length;
      const h = nextPiece.shape.length;
      const px = W - pad - w * previewSize;
      const py = 18;
      ctx.fillStyle = 'rgba(232, 230, 227, 0.4)';
      ctx.font = '700 10px "Space Grotesk", system-ui, sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText('NEXT', W - pad, py - 4);
      for (let r = 0; r < h; r++) {
        for (let c = 0; c < w; c++) {
          if (!nextPiece.shape[r][c]) continue;
          const x = px + c * previewSize;
          const y = py + r * previewSize;
          ctx.fillStyle = nextPiece.color;
          ctx.fillRect(x + 1, y + 1, previewSize - 2, previewSize - 2);
        }
      }
    }

    ctx.restore();
  }

  function loop() {
    update();
    render();
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
