  ctx.fillStyle = '#1d1f26';
  ctx.fillRect(14, 14, hpW, hpH);
  const frac = Math.max(0, player.hp / player.maxHp);
  ctx.fillStyle = frac > 0.5 ? '#5cb85c' : frac > 0.25 ? '#e0a233' : '#d33';
  ctx.fillRect(14, 14, hpW * frac, hpH);
  ctx.strokeStyle = '#33363f';
  ctx.strokeRect(14, 14, hpW, hpH);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px system-ui';
  ctx.textAlign = 'left';
  ctx.fillText(`${Math.ceil(Math.max(0, player.hp))} / ${player.maxHp}`, 20, 25);

  // Money
  ctx.fillStyle = '#ffce44';
  ctx.font = 'bold 20px system-ui';
  ctx.fillText(`$${player.money}`, 14, 56);
  // EXP — sits next to money, used in the upgrade tree (T key)
  ctx.fillStyle = '#7ec8ff';
  ctx.font = 'bold 14px system-ui';
  ctx.fillText(`${player.exp} EXP  ·  [T]`, 110, 54);

  // Wave line
  ctx.fillStyle = isBossWave ? '#ff7070' : '#7ec8ff';
  ctx.font = 'bold 15px system-ui';
  const waveLabel = wave === 0
    ? 'Get ready'
    : (isBossWave ? `Wave ${wave} — BOSS` : `Wave ${wave}`);
  ctx.fillText(waveLabel, 14, 78);
  ctx.fillStyle = '#9aa0ab';
  ctx.font = '11px system-ui';
  let sub;
  if (trainingMode)                  sub = `Training · use cheats to spawn`;
  else if (intermission > 0)         sub = `Press SPACE to start`;
  else if (waveZombiesToSpawn > 0)   sub = `${waveZombiesToSpawn + zombies.length} left`;
  else                               sub = `${zombies.length} left`;
  ctx.fillText(sub, 14, 94);

  // Stats line
  ctx.fillStyle = '#9aa0ab';
  ctx.font = '11px system-ui';
  ctx.fillText(
    `Kills ${kills}  ·  Deaths ${deaths}  ·  Best wave ${Math.max(bestWave, wave)}`,
    14, 112);

  // Active buffs
  let by = 132;
  const buffLabels = { triple: 'Triple', rapid: 'Rapid', fast: 'Speed', shield: 'Shield' };
  for (const k of Object.keys(player.buffs)) {
    const v = player.buffs[k];
    if (v > 0) {
      ctx.fillStyle = '#7ec8ff';
      ctx.font = 'bold 11px system-ui';
      const txt = k === 'shield' ? buffLabels[k] : `${buffLabels[k]} ${v.toFixed(1)}s`;
      ctx.fillText(txt, 14, by);
      by += 14;
    }
  }
  // Abilities are now rendered inside the stats panel; the bottom-left pill
  // bar that used to live here has been removed.
  // Picked perks (tomes)
  const perkKeys = Object.keys(player.specialLevels).filter(k => player.specialLevels[k] > 0);
  if (perkKeys.length) {
    by += 4;
    ctx.fillStyle = '#c47eff';
    ctx.font = 'bold 10px system-ui';
    ctx.fillText('PERKS', 14, by);
    by += 12;
    for (const k of perkKeys) {
      const def = SPECIAL_UPGRADES[k];
      const lv = player.specialLevels[k];
      ctx.fillStyle = def.color;
      ctx.fillRect(14, by - 8, 8, 8);
      ctx.fillStyle = '#dfe2e8';
      ctx.font = 'bold 11px system-ui';
      ctx.fillText(`${def.name}${lv > 1 ? ' ×' + lv : ''}`, 26, by);
      by += 13;
    }
  }
}

function drawCardPicker() {
  if (!pendingCards) return;

  // dim the world behind the tomes
  ctx.fillStyle = 'rgba(0, 0, 0, 0.62)';
  ctx.fillRect(0, 0, W, H);

  // title (serif, like an arcane proclamation)
  ctx.fillStyle = '#f4e4b5';
  ctx.font = 'bold 28px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText('A T O M E   B E C K O N S', W / 2, 104);
  ctx.fillStyle = '#9aa0ab';
  ctx.font = '13px Georgia, serif';
  ctx.fillText('claim one  ·  click  or  press 1 / 2 / 3', W / 2, 130);

  const cw = 220, ch = 296, gap = 30;
  const totalW = 3 * cw + 2 * gap;
  const startX = (W - totalW) / 2;
  const yBase = (H - ch) / 2 + 30;

  for (let i = 0; i < 3; i++) {
    const key = pendingCards[i];
    const def = SPECIAL_UPGRADES[key];
    const lvl = player.specialLevels[key] || 0;
    const baseX = startX + i * (cw + gap);
    const hoverRect = { x: baseX, y: yBase, w: cw, h: ch };
    cardRects[i] = hoverRect;
    const hover = pointInRect(mouse, hoverRect);
    // hover lift + idle bobble
    const float = Math.sin(gameTime * 2.2 + i * 1.3) * 2 + (hover ? -6 : 0);

    ctx.save();
    ctx.translate(baseX, yBase + float);

    // magical aura behind the tome — stronger when hovered
    const auraR = hover ? 170 : 120;
    const aura = ctx.createRadialGradient(cw/2, ch/2, 24, cw/2, ch/2, auraR);
    aura.addColorStop(0, def.color + (hover ? '66' : '33'));
    aura.addColorStop(1, def.color + '00');
    ctx.fillStyle = aura;
    ctx.fillRect(-40, -40, cw + 80, ch + 80);

    // ----- TOME -----
    // back cover shadow
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(4, 6, cw, ch);

    // leather cover (dark, slight gradient)
    const cover = ctx.createLinearGradient(0, 0, 0, ch);
    cover.addColorStop(0, '#3a2410');
    cover.addColorStop(0.5, '#5a3818');
    cover.addColorStop(1, '#2a1808');
    ctx.fillStyle = cover;
    ctx.fillRect(0, 0, cw, ch);
    // outer stroke
    ctx.strokeStyle = '#1a0e04';
    ctx.lineWidth = 2;
    ctx.strokeRect(0, 0, cw, ch);
    // inner inset (cover frame)
    ctx.strokeStyle = '#8a6620';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(8, 8, cw - 16, ch - 16);
    ctx.strokeStyle = '#5a4014';
    ctx.lineWidth = 1;
    ctx.strokeRect(12, 12, cw - 24, ch - 24);

    // spine accents at top & bottom (gold bands)
    ctx.fillStyle = '#a88828';
    ctx.fillRect(0, 18, cw, 3);
    ctx.fillRect(0, ch - 21, cw, 3);

    // ribbon bookmark hanging out the top, in the perk's color
    ctx.fillStyle = def.color;
    ctx.fillRect(cw - 42, -10, 9, 38);
    // forked V end
    ctx.beginPath();
    ctx.moveTo(cw - 42, 28);
    ctx.lineTo(cw - 37, 36);
    ctx.lineTo(cw - 33, 28);
    ctx.closePath();
    ctx.fill();
    // ribbon shadow line
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(cw - 36, -10, 3, 38);

    // PARCHMENT PAGE inset in the middle
    const px = 22, py = 32, pw = cw - 44, ph = ch - 64;
    const page = ctx.createLinearGradient(0, py, 0, py + ph);
    page.addColorStop(0, '#f4e4b5');
    page.addColorStop(0.5, '#e8d294');
    page.addColorStop(1, '#c4a578');
    ctx.fillStyle = page;
    ctx.fillRect(px, py, pw, ph);
    // page edge shadow
    ctx.strokeStyle = '#7a5a20';
    ctx.lineWidth = 1;
    ctx.strokeRect(px, py, pw, ph);
    // age staining (faint dark splotches)
    ctx.globalAlpha = 0.08;
    ctx.fillStyle = '#5a3010';
    ctx.beginPath(); ctx.arc(px + 18, py + 22, 8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(px + pw - 30, py + ph - 38, 12, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    // gold corner flourishes on the parchment
    ctx.strokeStyle = '#a88828';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(px + 8, py); ctx.lineTo(px, py); ctx.lineTo(px, py + 8);
    ctx.moveTo(px + pw - 8, py); ctx.lineTo(px + pw, py); ctx.lineTo(px + pw, py + 8);
    ctx.moveTo(px, py + ph - 8); ctx.lineTo(px, py + ph); ctx.lineTo(px + 8, py + ph);
    ctx.moveTo(px + pw, py + ph - 8); ctx.lineTo(px + pw, py + ph); ctx.lineTo(px + pw - 8, py + ph);
    ctx.stroke();

    // TITLE on the page
    ctx.fillStyle = '#2a1808';
    ctx.font = 'bold 17px Georgia, serif';
    ctx.textAlign = 'center';
    ctx.fillText(def.name, cw / 2, py + 28);
    // decorative rule
    ctx.strokeStyle = '#a88828';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(px + 18, py + 38); ctx.lineTo(px + pw - 18, py + 38);
    ctx.stroke();
    // tiny diamond on the rule
    ctx.fillStyle = '#a88828';
    ctx.beginPath();
    ctx.moveTo(cw / 2, py + 35); ctx.lineTo(cw / 2 + 3, py + 38);
    ctx.lineTo(cw / 2, py + 41); ctx.lineTo(cw / 2 - 3, py + 38);
    ctx.closePath(); ctx.fill();

    // RUNE CIRCLE in the page middle, glowing in the perk's color
    const rcx = cw / 2, rcy = py + 92;
    // outer rings
    ctx.strokeStyle = '#a88828';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(rcx, rcy, 30, 0, Math.PI*2); ctx.stroke();
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(rcx, rcy, 35, 0, Math.PI*2); ctx.stroke();
    // tick marks around the outer ring (cardinal points)
    for (let t = 0; t < 4; t++) {
      const a = t * Math.PI / 2;
      const x1 = rcx + Math.cos(a) * 30, y1 = rcy + Math.sin(a) * 30;
      const x2 = rcx + Math.cos(a) * 35, y2 = rcy + Math.sin(a) * 35;
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    }
    // inner glow
    const runeGlow = ctx.createRadialGradient(rcx, rcy, 1, rcx, rcy, 28);
    runeGlow.addColorStop(0, def.color);
    runeGlow.addColorStop(0.7, def.color + '55');
    runeGlow.addColorStop(1, def.color + '00');
    ctx.fillStyle = runeGlow;
    ctx.beginPath(); ctx.arc(rcx, rcy, 28, 0, Math.PI*2); ctx.fill();
    // 8-pointed star sigil (rotating slowly)
    const rot = gameTime * 0.6 + i;
    ctx.save();
    ctx.translate(rcx, rcy);
    ctx.rotate(rot);
    ctx.fillStyle = def.color;
    ctx.strokeStyle = '#3a2010';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    for (let k = 0; k < 8; k++) {
      const a = (k / 8) * Math.PI * 2;
      const r = (k % 2 === 0) ? 13 : 5;
      const sx = Math.cos(a) * r, sy = Math.sin(a) * r;
      if (k === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
    }
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // central pip
    ctx.fillStyle = '#fff5b8';
    ctx.beginPath(); ctx.arc(0, 0, 1.8, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // DESCRIPTION text on the lower half of the page
    ctx.fillStyle = '#2a1808';
    ctx.font = 'italic 13px Georgia, serif';
    ctx.textAlign = 'center';
    wrapText(def.desc, cw / 2, py + 156, pw - 16, 17);

    // PICK NUMBER medallion (top-left of cover)
    ctx.fillStyle = '#1a0e04';
    ctx.beginPath(); ctx.arc(20, 22, 13, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#a88828';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#f4e4b5';
    ctx.font = 'bold 14px Georgia, serif';
    ctx.fillText(`${i + 1}`, 20, 27);

    // LEVEL plaque if already owned (top-right of cover)
    if (lvl > 0) {
      ctx.fillStyle = '#1a0e04';
      ctx.fillRect(cw - 70, 8, 50, 18);
      ctx.strokeStyle = '#a88828';
      ctx.lineWidth = 1.2;
      ctx.strokeRect(cw - 70, 8, 50, 18);
      ctx.fillStyle = '#ffd166';
      ctx.font = 'bold 10px Georgia, serif';
      ctx.fillText(`Lv ${lvl} → ${lvl + 1}`, cw - 45, 21);
    }

    // hover ring
    if (hover) {
      ctx.strokeStyle = def.color;
      ctx.lineWidth = 3;
      ctx.strokeRect(-2, -2, cw + 4, ch + 4);
      ctx.fillStyle = '#f4e4b5';
      ctx.font = 'italic bold 11px Georgia, serif';
      ctx.fillText('— claim this tome —', cw / 2, ch - 12);
    } else {
      ctx.fillStyle = '#a88828';
      ctx.font = 'italic 11px Georgia, serif';
      ctx.fillText(`press [${i + 1}]`, cw / 2, ch - 12);
    }

    ctx.restore();
  }
  ctx.textAlign = 'left';
}

// Minimal word-wrapper used by the card picker. Centers each line at x.
function wrapText(text, x, y, maxWidth, lineHeight) {
  const words = text.split(' ');
  let line = '';
  let cy = y;
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxWidth && line) {
      ctx.fillText(line, x, cy);
      line = w;
      cy += lineHeight;
    } else {
      line = test;
    }
  }
  if (line) ctx.fillText(line, x, cy);
}

// ---- Shop / Storage icon renderers ----
// Reuses the in-game drawGun() for primaries (which already has a unique
// silhouette per weapon) — just sets up a translate so the gun is centered in
// the icon cell rather than extending off the right of the player hand.
function drawShopWeaponIcon(weapon, cx, cy, size) {
  const r = size * 0.4;
  ctx.save();
  ctx.translate(cx - r * 0.75, cy);
  drawGun(weapon, r);
  ctx.restore();
}

// Hand-drawn tiny icon per secondary. Each branch is intentionally a few
// rects/arcs — just enough to be visually distinct from the other secondaries.
// `size` is the diameter of the cell; shapes are drawn relative to a 0,0 center.
function drawShopSecondaryIcon(id, cx, cy, size) {
  const def = SECONDARIES[id] || {};
  const color = def.color || '#fff';
  ctx.save();
  ctx.translate(cx, cy);
  ctx.strokeStyle = '#15151a';
  ctx.lineWidth = 1;
  const s = size * 0.5; // half-extent the icon should fit inside
  switch (id) {
    case 'katana': {
      // long thin blade with cross-guard + dark grip behind
      ctx.fillStyle = '#5a3a1f';
      ctx.fillRect(-s, -1.5, s * 0.45, 3); // grip
      ctx.fillStyle = '#222';
      ctx.fillRect(-s * 0.55, -3, 3, 6);   // guard
      ctx.fillStyle = color;
      ctx.fillRect(-s * 0.5, -1, s * 1.4, 2); // blade
      ctx.fillStyle = '#fff';
      ctx.fillRect(s * 0.85, -1, 4, 2);    // tip highlight
      break;
    }
    case 'warhammer': {
      ctx.fillStyle = '#5a3a1f';
      ctx.fillRect(-s * 0.4, -1.5, s * 1.1, 3); // handle
      ctx.fillStyle = color;                     // boxy head
      ctx.fillRect(-s, -s * 0.5, s * 0.55, s);
      ctx.strokeRect(-s, -s * 0.5, s * 0.55, s);
      ctx.fillStyle = '#fff';
      ctx.fillRect(-s + 2, -s * 0.5 + 2, s * 0.55 - 4, 2);
      break;
    }
    case 'kunai': {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(s, 0); ctx.lineTo(-s * 0.3, -s * 0.4);
      ctx.lineTo(-s * 0.3, s * 0.4); ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(-s * 0.7, 0, s * 0.25, 0, Math.PI * 2); ctx.stroke();
      break;
    }
    case 'chakram': {
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, 0, s * 0.85, 0, Math.PI * 2); ctx.stroke();
      // serrated teeth
      ctx.fillStyle = color;
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        ctx.beginPath();
        ctx.arc(Math.cos(a) * s * 0.85, Math.sin(a) * s * 0.85, 1.6, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    }
    case 'bow': {
      // Vertical bow arc with bent string + horizontal nocked arrow.
      // Limbs (wood)
      ctx.strokeStyle = '#5a3a1f';
      ctx.lineWidth = 2.2;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-s * 0.2, -s * 0.9);
      ctx.quadraticCurveTo(s * 0.5, -s * 0.3, s * 0.5, 0);
      ctx.quadraticCurveTo(s * 0.5,  s * 0.3, -s * 0.2,  s * 0.9);
      ctx.stroke();
      // grip wrap
      ctx.strokeStyle = '#2a1810';
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.moveTo(-s * 0.1, -s * 0.22);
      ctx.lineTo(-s * 0.1,  s * 0.22);
      ctx.stroke();
      ctx.lineCap = 'butt';
      // String pulled into a V (icon implies the bow is mid-draw)
      ctx.strokeStyle = '#dfe2e8';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-s * 0.2, -s * 0.9);
      ctx.lineTo(-s * 0.7, 0);
      ctx.lineTo(-s * 0.2,  s * 0.9);
      ctx.stroke();
      // Nocked arrow
      ctx.strokeStyle = '#c8b896';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-s * 0.65, 0);
      ctx.lineTo(s * 0.75, 0);
      ctx.stroke();
      // Arrowhead
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath();
      ctx.moveTo(s * 0.95, 0);
      ctx.lineTo(s * 0.7, -2.2);
      ctx.lineTo(s * 0.7,  2.2);
      ctx.closePath(); ctx.fill();
      // Fletching at the nock
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(-s * 0.7, -2.2);
      ctx.lineTo(-s * 0.55, 0);
      ctx.lineTo(-s * 0.7,  2.2);
      ctx.closePath(); ctx.fill();
      break;
    }
    case 'medkit': {
      ctx.fillStyle = '#fff';
      ctx.fillRect(-s * 0.75, -s * 0.6, s * 1.5, s * 1.2);
      ctx.strokeRect(-s * 0.75, -s * 0.6, s * 1.5, s * 1.2);
      ctx.fillStyle = color;
      ctx.fillRect(-1.5, -s * 0.4, 3, s * 0.8);
      ctx.fillRect(-s * 0.45, -1.5, s * 0.9, 3);
      break;
    }
    case 'decoy': {
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(0, -s * 0.45, s * 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(-s * 0.35, -s * 0.15, s * 0.7, s * 0.8);
      ctx.strokeRect(-s * 0.35, -s * 0.15, s * 0.7, s * 0.8);
      // antennae
      ctx.strokeStyle = '#222';
      ctx.beginPath(); ctx.moveTo(-s * 0.2, -s * 0.7); ctx.lineTo(-s * 0.4, -s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(s * 0.2, -s * 0.7); ctx.lineTo(s * 0.4, -s); ctx.stroke();
      break;
    }
    case 'emp': {
      // Ice Bomb — 6-arm snowflake with a small icy core
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.4;
      ctx.lineCap = 'round';
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        const ex = Math.cos(a) * s * 0.9;
        const ey = Math.sin(a) * s * 0.9;
        ctx.beginPath();
        ctx.moveTo(0, 0); ctx.lineTo(ex, ey); ctx.stroke();
        // little branching crystals on each arm
        const bx = Math.cos(a) * s * 0.55, by = Math.sin(a) * s * 0.55;
        const px = -Math.sin(a) * s * 0.18, py = Math.cos(a) * s * 0.18;
        ctx.beginPath();
        ctx.moveTo(bx, by); ctx.lineTo(bx + px, by + py);
        ctx.moveTo(bx, by); ctx.lineTo(bx - px, by - py);
        ctx.stroke();
      }
      ctx.lineCap = 'butt';
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(0, 0, s * 0.22, 0, Math.PI * 2); ctx.fill();
      break;
    }
    case 'bomb': {
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(0, s * 0.1, s * 0.7, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      // fuse
      ctx.strokeStyle = '#a06a2a';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(s * 0.3, -s * 0.5); ctx.lineTo(s * 0.55, -s * 0.95); ctx.stroke();
      // spark
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(s * 0.55, -s * 0.95, 2, 0, Math.PI * 2); ctx.fill();
      break;
    }
    case 'potion': {
      // Round flask body with neck + cork + liquid highlight + bubbles
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.ellipse(0, s * 0.2, s * 0.6, s * 0.65, 0, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // neck
      ctx.fillStyle = '#1a1a22';
      ctx.fillRect(-s * 0.16, -s * 0.6, s * 0.32, s * 0.45);
      // cork
      ctx.fillStyle = '#a06a3a';
      ctx.fillRect(-s * 0.22, -s * 0.85, s * 0.44, s * 0.22);
      // liquid highlight
      ctx.fillStyle = 'rgba(255, 255, 255, 0.55)';
      ctx.beginPath();
      ctx.ellipse(-s * 0.2, s * 0.0, s * 0.15, s * 0.28, 0, 0, Math.PI * 2);
      ctx.fill();
      // floating bubbles inside the potion
      ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
      ctx.beginPath(); ctx.arc(s * 0.15, s * 0.3, s * 0.07, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(s * 0.0, s * 0.55, s * 0.05, 0, Math.PI * 2); ctx.fill();
      break;
    }
    case 'healingField': {
      ctx.fillStyle = 'rgba(92, 216, 107, 0.25)';
      ctx.beginPath(); ctx.arc(0, 0, s * 0.85, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(0, 0, s * 0.85, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = color;
      ctx.fillRect(-2, -s * 0.5, 4, s);
      ctx.fillRect(-s * 0.5, -2, s, 4);
      break;
    }
    case 'slowtime': {
      // hourglass
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-s * 0.6, -s * 0.7); ctx.lineTo(s * 0.6, -s * 0.7);
      ctx.lineTo(-s * 0.6, s * 0.7); ctx.lineTo(s * 0.6, s * 0.7); ctx.closePath();
      ctx.stroke();
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(-s * 0.4, -s * 0.5); ctx.lineTo(s * 0.4, -s * 0.5);
      ctx.lineTo(0, 0); ctx.closePath(); ctx.fill();
      break;
    }
    case 'chickenTome':
    case 'batTome':
    case 'wolfTome':
    case 'spiderTome':
    case 'spiritTome': {
      // book base — same shape for every tome, just recolor
      ctx.fillStyle = color;
      ctx.fillRect(-s * 0.7, -s * 0.85, s * 1.4, s * 1.7);
      ctx.strokeRect(-s * 0.7, -s * 0.85, s * 1.4, s * 1.7);
      // spine highlight
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect(-s * 0.7, -s * 0.85, 3, s * 1.7);
      // creature glyph in the center
      ctx.fillStyle = '#fff';
      if (id === 'chickenTome') {
        ctx.beginPath(); ctx.arc(0, -s * 0.05, s * 0.25, 0, Math.PI * 2); ctx.fill(); // head
        ctx.fillStyle = '#ff9d3a';
        ctx.beginPath();
        ctx.moveTo(s * 0.18, -s * 0.05); ctx.lineTo(s * 0.4, 0); ctx.lineTo(s * 0.18, s * 0.07);
        ctx.closePath(); ctx.fill(); // beak
      } else if (id === 'batTome') {
        // wings
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(-s * 0.5, -s * 0.2);
        ctx.lineTo(-s * 0.25, s * 0.15);
        ctx.lineTo(0, 0);
        ctx.lineTo(s * 0.25, s * 0.15);
        ctx.lineTo(s * 0.5, -s * 0.2);
        ctx.closePath(); ctx.fill();
      } else if (id === 'wolfTome') {
        // paw print
        ctx.beginPath(); ctx.arc(0, s * 0.1, s * 0.22, 0, Math.PI * 2); ctx.fill();
        for (let i = 0; i < 4; i++) {
          const ax = -s * 0.3 + i * s * 0.2;
          ctx.beginPath(); ctx.arc(ax, -s * 0.2, s * 0.08, 0, Math.PI * 2); ctx.fill();
        }
      } else if (id === 'spiderTome') {
        ctx.beginPath(); ctx.arc(0, 0, s * 0.18, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        for (let i = 0; i < 4; i++) {
          const a = (i / 4) * Math.PI * 2 + 0.4;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(Math.cos(a) * s * 0.4, Math.sin(a) * s * 0.4);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(Math.cos(a + Math.PI) * s * 0.4, Math.sin(a + Math.PI) * s * 0.4);
          ctx.stroke();
        }
      } else if (id === 'spiritTome') {
        // ghost — bell with two dots
        ctx.beginPath();
        ctx.arc(0, 0, s * 0.25, Math.PI, Math.PI * 2);
        ctx.lineTo(s * 0.25, s * 0.25);
        ctx.lineTo(s * 0.1, s * 0.15);
        ctx.lineTo(-s * 0.1, s * 0.25);
        ctx.lineTo(-s * 0.25, s * 0.15);
        ctx.closePath(); ctx.fill();
      }
      break;
    }
    default: {
      // fallback — tag letter
      ctx.fillStyle = color;
      ctx.font = 'bold 14px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText(def.tag || '?', 0, 5);
      break;
    }
  }
  ctx.restore();
}

function drawShop() {
  const w = 360, h = 540;
  const x = 18, y = H - h - 18;
  const accent = shopTab === 'arsenal' ? '#d63030'
              : shopTab === 'storage' ? '#ffd166'
              : shopTab === 'pets'    ? '#80ffe0'
              : shopTab === 'trader'  ? '#c47eff'
              : shopTab === 'foodtrader' ? '#ff9bd1'
              : '#5a87c4';
  ctx.fillStyle = 'rgba(8, 10, 16, 0.94)';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = accent;
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, w, h);
  ctx.textAlign = 'left';
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px system-ui';
  ctx.fillText('SHOP', x + 14, y + 26);
  ctx.fillStyle = '#888c95';
  ctx.font = '11px system-ui';
  ctx.fillText(`$${player.money} on hand`, x + 14, y + 42);

  // ---- tabs ----
  const tabs = [
    { id: 'upgrades', label: 'Upgrades', color: '#5a87c4' },
    { id: 'arsenal',  label: 'Arsenal',  color: '#d63030' },
    { id: 'pets',     label: 'Pets',     color: '#80ffe0' },
  ];
  // Trader tab appears only while the trader is in town. Shows the waves
  // remaining as a soft countdown right in the label.
  if (trader) tabs.push({ id: 'trader', label: `Trader · ${trader.wavesLeft}w`, color: '#c47eff' });
  if (foodTrader) tabs.push({ id: 'foodtrader', label: `Food · ${foodTrader.wavesLeft}w`, color: '#ff9bd1' });
  tabs.push({ id: 'storage', label: `Storage${storage.length ? ' · ' + storage.length : ''}`, color: '#ffd166' });
  // If the active tab became invalid (e.g., trader left), fall back to upgrades.
  if (shopTab === 'trader' && !trader) shopTab = 'upgrades';
  if (shopTab === 'foodtrader' && !foodTrader) shopTab = 'upgrades';
  const tabY = y + 56;
  const tabH = 26;
  const tabW = (w - 28 - (tabs.length - 1) * 6) / tabs.length;
  shopTabRects = [];
  for (let i = 0; i < tabs.length; i++) {
    const t = tabs[i];
    const tx = x + 14 + i * (tabW + 6);
    const active = shopTab === t.id;
    const rect = { x: tx, y: tabY, w: tabW, h: tabH, id: t.id };
    ctx.fillStyle = active ? t.color : '#1c1f28';
    ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
    ctx.strokeStyle = active ? '#fff' : '#33363f';
    ctx.lineWidth = 1;
    ctx.strokeRect(rect.x + 0.5, rect.y + 0.5, rect.w - 1, rect.h - 1);
    ctx.fillStyle = active ? '#fff' : '#dfe2e8';
    ctx.font = 'bold 11px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(t.label, rect.x + rect.w / 2, rect.y + 17);
    shopTabRects.push(rect);
  }
  ctx.textAlign = 'left';

  shopBuyRects = [];
  const bodyX = x + 14;
  const bodyY = tabY + tabH + 12;
  const bodyW = w - 28;
  // Body clip region — used for both the scroll viewport and visibility checks.
  const clipY = bodyY - 6;
  const clipH = (y + h) - clipY - 10;
  shopBodyRect = { x, y: clipY, w, h: clipH };

  // Save the index at which this frame's body rects start so we can shift
  // them into screen-space after the scroll translate is undone.
  const buyStart = shopBuyRects.length;
  const sy = shopScroll[shopTab] || 0;

  ctx.save();
  ctx.beginPath();
  ctx.rect(x + 1, clipY, w - 2, clipH);
  ctx.clip();
  ctx.translate(0, -sy);

  let contentBottom = bodyY; // tracked so we know the scroll range

  if (shopTab === 'upgrades') {
    ctx.fillStyle = '#888c95';
    ctx.font = '10px system-ui';
    ctx.fillText('press 1–9 or click to buy', bodyX, bodyY);
    let ly = bodyY + 18;
    for (let i = 0; i < upgrades.length; i++) {
      const u = upgrades[i];
      const can = player.money >= u.cost;
      const rowH = 32;
      const rowRect = { x: bodyX, y: ly - 14, w: bodyW, h: rowH };
      // hover-check against screen-space cursor — apply sy in reverse
      const screenRect = { x: rowRect.x, y: rowRect.y - sy, w: rowRect.w, h: rowRect.h };
      const hover = can && pointInRect(mouse, screenRect)
        && screenRect.y + screenRect.h > clipY && screenRect.y < clipY + clipH;
      if (hover) {
        ctx.fillStyle = 'rgba(126, 200, 255, 0.10)';
        ctx.fillRect(rowRect.x, rowRect.y, rowRect.w, rowRect.h);
      }
      ctx.fillStyle = can ? '#fff' : '#5a5d66';
      ctx.font = 'bold 13px system-ui';
      ctx.fillText(`${i + 1}.  ${u.name}`, bodyX, ly);
      ctx.fillStyle = u.type === 'perm' ? '#7ec8ff' : '#ffb070';
      ctx.font = '9px system-ui';
      ctx.fillText(u.type.toUpperCase(), bodyX, ly + 14);
      ctx.textAlign = 'right';
      ctx.fillStyle = can ? '#ffce44' : '#666';
      ctx.font = 'bold 13px system-ui';
      ctx.fillText(`$${u.cost}`, bodyX + bodyW, ly);
      ctx.textAlign = 'left';
      shopBuyRects.push({ rect: rowRect, action: () => tryBuy(i) });
      ly += rowH;
    }
    contentBottom = ly;
  } else if (shopTab === 'arsenal') {
    ctx.fillStyle = '#9aa0ab';
    ctx.font = '10px system-ui';
    ctx.fillText('click to buy · drops your old weapon', bodyX, bodyY);
    let ly = bodyY + 16;
    // Primaries — one subheader per group, only listing items whose cost
    // entry exists (so a group with no Arsenal stock would be silently skipped).
    for (const group of PRIMARY_GROUPS) {
      const entries = ARSENAL_PRIMARIES.filter(e => group.ids.includes(e.id));
      if (!entries.length) continue;
      ctx.fillStyle = '#d63030';
      ctx.font = 'bold 11px system-ui';
      ctx.fillText(`PRIMARIES · ${group.name.toUpperCase()}`, bodyX, ly);
      ly += 12;
      ly = drawArsenalList(bodyX, ly, bodyW, entries, 'weapon', sy, clipY, clipH);
      ly += 10;
    }
    // Secondaries — same layout
    for (const group of SECONDARY_GROUPS) {
      const entries = ARSENAL_SECONDARIES.filter(e => group.ids.includes(e.id));
      if (!entries.length) continue;
      ctx.fillStyle = '#d63030';
      ctx.font = 'bold 11px system-ui';
      ctx.fillText(`SECONDARIES · ${group.name.toUpperCase()}`, bodyX, ly);
      ly += 12;
      ly = drawArsenalList(bodyX, ly, bodyW, entries, 'secondary', sy, clipY, clipH);
      ly += 10;
    }
    contentBottom = ly;
  } else if (shopTab === 'pets') {
    ctx.fillStyle = '#9aa0ab';
    ctx.font = '10px system-ui';
    ctx.fillText('one of each · immortal · joins you for the run', bodyX, bodyY);
    const rowH = 60;
    let ly = bodyY + 16;
    for (const id of PET_KEYS) {
      const def = PETS[id];
      const owned = ownedPets.has(id);
      const can = !owned && player.money >= def.cost;
      const rowRect = { x: bodyX, y: ly, w: bodyW, h: rowH };
      const screenY = ly - sy;
      const visible = screenY + rowH > clipY && screenY < clipY + clipH;
      const hover = can && visible && pointInRect(mouse, { x: bodyX, y: screenY, w: bodyW, h: rowH });
      ctx.fillStyle = hover ? 'rgba(128, 255, 224, 0.10)' : 'rgba(20, 22, 30, 0.5)';
      ctx.fillRect(rowRect.x, rowRect.y, rowRect.w, rowRect.h);
      // teal left stripe
      ctx.fillStyle = '#80ffe0';
      ctx.fillRect(rowRect.x, rowRect.y, 2, rowRect.h);
      // Portrait cell with the pet drawn at idle facing
      const portraitW = 54;
      ctx.fillStyle = '#0d0f16';
      ctx.fillRect(rowRect.x + 4, rowRect.y + 4, portraitW, rowH - 8);
      ctx.strokeStyle = def.color;
      ctx.lineWidth = 1;
      ctx.strokeRect(rowRect.x + 4.5, rowRect.y + 4.5, portraitW - 1, rowH - 9);
      drawPet(id, rowRect.x + 4 + portraitW / 2, rowRect.y + rowH / 2, 36, 0);
      // Name + desc
      const textX = rowRect.x + portraitW + 12;
      const textW = bodyW - portraitW - 80;
      ctx.fillStyle = owned ? '#666' : can ? '#fff' : '#5a5d66';
      fitFont(def.name, textW, 'bold 14px system-ui', 11);
      ctx.textAlign = 'left';
      ctx.fillText(def.name, textX, rowRect.y + 22);
      ctx.fillStyle = '#888c95';
      fitFont(def.desc, textW, '11px system-ui', 8);
      ctx.fillText(def.desc, textX, rowRect.y + 40);
      // kind/stat line
      ctx.fillStyle = def.color;
      ctx.font = 'bold 9px system-ui';
      const tag = def.kind === 'orbit' ? 'ORBITAL · AUTO-FIRE'
                : def.kind === 'ranged' ? 'RANGED'
                : def.kind === 'beam'   ? 'BREATH BEAM'
                : 'MELEE';
      ctx.fillText(tag, textX, rowRect.y + 53);
      // Price / OWNED tag
      ctx.textAlign = 'right';
      if (owned) {
        ctx.fillStyle = '#8be08b';
        ctx.font = 'bold 11px system-ui';
        ctx.fillText('OWNED', rowRect.x + bodyW - 6, rowRect.y + 34);
      } else {
        ctx.fillStyle = can ? '#ffce44' : '#666';
        ctx.font = 'bold 14px system-ui';
        ctx.fillText(`$${def.cost}`, rowRect.x + bodyW - 6, rowRect.y + 34);
      }
      ctx.textAlign = 'left';
      if (can) {
        const petId = id;
        shopBuyRects.push({ rect: rowRect, action: () => buyPet(petId) });
      }
      ly += rowH + 6;
    }
    contentBottom = ly;
  } else if (shopTab === 'trader' && trader) {
    // Trader's exclusive stock — visually mirrors the Arsenal layout but
    // colored purple to reinforce that it's a special temporary tab.
    ctx.fillStyle = '#9aa0ab';
    ctx.font = '10px system-ui';
    ctx.fillText(`leaves in ${trader.wavesLeft} wave${trader.wavesLeft === 1 ? '' : 's'} · only sold here`, bodyX, bodyY);
    let ly = bodyY + 16;
    ctx.fillStyle = '#c47eff';
    ctx.font = 'bold 11px system-ui';
    ctx.fillText('EXCLUSIVE GAGS', bodyX, ly);
    ly += 12;
    // Reuse drawArsenalList's row layout, but route through the trader's
    // stock list (with the trader's accent color rather than red).
    ly = drawTraderList(bodyX, ly, bodyW, sy, clipY, clipH);
    contentBottom = ly;
  } else if (shopTab === 'foodtrader' && foodTrader) {
    ctx.fillStyle = '#9aa0ab';
    ctx.font = '10px system-ui';
    ctx.fillText(`leaves in ${foodTrader.wavesLeft} wave${foodTrader.wavesLeft === 1 ? '' : 's'} · cheaper food-themed gags`, bodyX, bodyY);
    let ly = bodyY + 16;
    ctx.fillStyle = '#ff9bd1';
    ctx.font = 'bold 11px system-ui';
    ctx.fillText('FOOD WEAPONS', bodyX, ly);
    ly += 12;
    ly = drawFoodTraderList(bodyX, ly, bodyW, sy, clipY, clipH);
    contentBottom = ly;
  } else if (shopTab === 'storage') {
    ctx.fillStyle = '#9aa0ab';
    ctx.font = '10px system-ui';
    ctx.fillText('lost items + uncollected money bank here', bodyX, bodyY);

    // Banked-money row (always shown — gives the player feedback even when 0)
    let storageRowY = bodyY + 16;
    const moneyRect = { x: bodyX, y: storageRowY, w: bodyW, h: 36 };
    const claimable = storedMoney > 0;
    const moneyHover = claimable && pointInRect(mouse, moneyRect);
    ctx.fillStyle = moneyHover ? 'rgba(255, 209, 102, 0.18)' : 'rgba(255, 209, 102, 0.10)';
    ctx.fillRect(moneyRect.x, moneyRect.y, moneyRect.w, moneyRect.h);
    ctx.fillStyle = '#ffd166';
    ctx.fillRect(moneyRect.x, moneyRect.y, 3, moneyRect.h);
    ctx.fillStyle = claimable ? '#ffe89a' : '#5a5d66';
    ctx.font = 'bold 13px system-ui';
    ctx.textAlign = 'left';
    ctx.fillText('Banked Money', moneyRect.x + 12, moneyRect.y + 16);
    ctx.fillStyle = '#888c95';
    ctx.font = '10px system-ui';
    ctx.fillText('uncollected coins bank here for later', moneyRect.x + 12, moneyRect.y + 30);
    ctx.textAlign = 'right';
    ctx.fillStyle = claimable ? '#ffd166' : '#5a5d66';
    ctx.font = 'bold 14px system-ui';
    ctx.fillText(claimable ? `$${storedMoney}  ▸  Claim` : '$0', moneyRect.x + bodyW - 10, moneyRect.y + 23);
    ctx.textAlign = 'left';
    if (claimable) {
      shopBuyRects.push({
        rect: moneyRect,
        action: () => {
          player.money += storedMoney;
          storedMoney = 0;
          SFX.coin && SFX.coin();
        },
      });
    }
    const itemsTop = storageRowY + 44;

    if (storage.length === 0) {
      ctx.fillStyle = '#5a5d66';
      ctx.font = '12px system-ui';
      ctx.fillText('(no items stored)', bodyX, itemsTop + 14);
      contentBottom = itemsTop + 28;
    } else {
      const cellW = 64, cellH = 64, gap = 6;
      const cols = Math.floor((bodyW + gap) / (cellW + gap));
      let lastBottom = itemsTop;
      for (let i = 0; i < storage.length; i++) {
        const item = storage[i];
        const cx = bodyX + (i % cols) * (cellW + gap);
        const cy = itemsTop + Math.floor(i / cols) * (cellH + gap);
        const rect = { x: cx, y: cy, w: cellW, h: cellH };
        const screenRect = { x: cx, y: cy - sy, w: cellW, h: cellH };
        const hover = pointInRect(mouse, screenRect)
          && screenRect.y + screenRect.h > clipY && screenRect.y < clipY + clipH;
        ctx.fillStyle = hover ? '#1f2230' : '#13151c';
        ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
        ctx.strokeStyle = item.color;
        ctx.lineWidth = hover ? 2 : 1;
        ctx.strokeRect(rect.x + 0.5, rect.y + 0.5, rect.w - 1, rect.h - 1);
        // Unique mini-model for the item
        const icx = rect.x + rect.w / 2;
        const icy = rect.y + 26;
        if (item.kind === 'weapon') drawShopWeaponIcon(item.id, icx, icy, 32);
        else                        drawShopSecondaryIcon(item.id, icx, icy, 32);
        ctx.fillStyle = '#dfe2e8';
        fitFont(item.name, rect.w - 4, 'bold 9px system-ui', 7);
        ctx.textAlign = 'center';
        ctx.fillText(item.name, rect.x + rect.w / 2, rect.y + 48);
        ctx.fillStyle = item.kind === 'weapon' ? '#7ec8ff' : '#c47eff';
        ctx.font = 'bold 7px system-ui';
        ctx.fillText(item.kind === 'weapon' ? 'PRIMARY' : 'UTILITY', rect.x + rect.w / 2, rect.y + 60);
        ctx.textAlign = 'left';
        // Closure captures the current index — clone idx into a const so each
        // row keeps its own value rather than aliasing the loop variable.
        const idx = i;
        shopBuyRects.push({ rect, action: () => retrieveFromStorage(idx) });
        lastBottom = cy + cellH;
      }
      contentBottom = lastBottom;
    }
  }

  ctx.restore();

  // Shift the rects we just pushed into screen space (clip translate is gone now)
  // and drop any that fall entirely outside the visible viewport so clicks on
  // off-screen rows don't register.
  for (let i = shopBuyRects.length - 1; i >= buyStart; i--) {
    const r = shopBuyRects[i].rect;
    r.y -= sy;
    if (r.y + r.h <= clipY || r.y >= clipY + clipH) {
      shopBuyRects.splice(i, 1);
    }
  }

  // Compute max scroll and clamp. Stored on a module-level for the wheel.
  const contentH = contentBottom - bodyY;
  shopMaxScroll = Math.max(0, contentH - clipH + 14);
  if (shopScroll[shopTab] > shopMaxScroll) shopScroll[shopTab] = shopMaxScroll;
  if (shopScroll[shopTab] < 0) shopScroll[shopTab] = 0;

  // Scrollbar — only when there's something to scroll
  if (shopMaxScroll > 0) {
    const trackX = x + w - 6, trackY = clipY + 2, trackH = clipH - 4;
    ctx.fillStyle = 'rgba(80, 90, 110, 0.18)';
    ctx.fillRect(trackX, trackY, 3, trackH);
    const thumbH = Math.max(30, trackH * (clipH / contentH));
    const thumbY = trackY + (trackH - thumbH) * (shopScroll[shopTab] / shopMaxScroll);
    ctx.fillStyle = accent;
    ctx.fillRect(trackX, thumbY, 3, thumbH);
  }
}

function drawArsenalList(x, y, w, entries, kind, sy, clipY, clipH) {
  const rowH = 44;
  const iconCol = 40; // pixels reserved on the left for the unique-model icon
  let ly = y;
  for (const entry of entries) {
    const def = kind === 'weapon' ? WEAPONS[entry.id] : SECONDARIES[entry.id];
    if (!def) continue;
    const equipped = kind === 'weapon' ? player.weapon === entry.id : player.secondary === entry.id;
    const can = player.money >= entry.cost && !equipped;
    const rowRect = { x, y: ly, w, h: rowH };
    const screenY = ly - sy;
    const visible = screenY + rowH > clipY && screenY < clipY + clipH;
    const hover = can && visible && pointInRect(mouse, { x, y: screenY, w, h: rowH });
    // Background — subtle hover wash, faint cell tint otherwise
    ctx.fillStyle = hover ? 'rgba(214, 48, 48, 0.14)' : 'rgba(20, 22, 30, 0.5)';
    ctx.fillRect(rowRect.x, rowRect.y, rowRect.w, rowRect.h);
    // Red left accent stripe
    ctx.fillStyle = '#d63030';
    ctx.fillRect(rowRect.x, rowRect.y, 2, rowRect.h);
    // Icon cell — dark backdrop + unique weapon/secondary model
    const iconX = rowRect.x + 4;
    const iconY = rowRect.y + 2;
    ctx.fillStyle = '#0d0f16';
    ctx.fillRect(iconX, iconY, iconCol - 6, rowH - 4);
    ctx.strokeStyle = def.color;
    ctx.lineWidth = 1;
    ctx.strokeRect(iconX + 0.5, iconY + 0.5, iconCol - 7, rowH - 5);
    const cx = iconX + (iconCol - 6) / 2;
    const cy = iconY + (rowH - 4) / 2;
    if (kind === 'weapon') drawShopWeaponIcon(entry.id, cx, cy, rowH - 12);
    else                   drawShopSecondaryIcon(entry.id, cx, cy, rowH - 12);
    // Name + description column
    const textX = rowRect.x + iconCol + 4;
    const textRight = rowRect.x + w - 70;
    const textW = textRight - textX;
    ctx.fillStyle = equipped ? '#666' : can ? '#fff' : '#5a5d66';
    fitFont(def.name, textW, 'bold 13px system-ui', 10);
    ctx.textAlign = 'left';
    ctx.fillText(def.name, textX, rowRect.y + 19);
    if (def.desc) {
      ctx.fillStyle = '#888c95';
      fitFont(def.desc, textW, '10px system-ui', 8);
      ctx.fillText(def.desc, textX, rowRect.y + 33);
    }
    // Price column
    ctx.textAlign = 'right';
    if (equipped) {
      ctx.fillStyle = '#8be08b';
      ctx.font = 'bold 10px system-ui';
      ctx.fillText('EQUIPPED', rowRect.x + w - 4, rowRect.y + 26);
    } else {
      ctx.fillStyle = can ? '#ffce44' : '#666';
      ctx.font = 'bold 13px system-ui';
      ctx.fillText(`$${entry.cost}`, rowRect.x + w - 4, rowRect.y + 26);
    }
    ctx.textAlign = 'left';
    if (can) {
      const id = entry.id;
      shopBuyRects.push({
        rect: rowRect,
        action: () => (kind === 'weapon' ? buyArsenalPrimary(id) : buyArsenalSecondary(id)),
      });
    }
    ly += rowH;
  }
  return ly;
}

// Trader-stock list — same row layout as the Arsenal but accented purple
// to flag the temporary, exclusive nature of the inventory.
function drawTraderList(x, y, w, sy, clipY, clipH) {
  return drawStockList(x, y, w, sy, clipY, clipH, TRADER_STOCK, '#c47eff', 'rgba(196, 126, 255, 0.14)', buyTraderWeapon);
}
function drawFoodTraderList(x, y, w, sy, clipY, clipH) {
  return drawStockList(x, y, w, sy, clipY, clipH, FOOD_TRADER_STOCK, '#ff9bd1', 'rgba(255, 155, 209, 0.14)', buyFoodTraderWeapon);
}

function drawStockList(x, y, w, sy, clipY, clipH, stock, accent, hoverBg, buyFn) {
  const rowH = 44;
  const iconCol = 40;
  let ly = y;
  for (const entry of stock) {
    const def = WEAPONS[entry.id];
    if (!def) continue;
    const equipped = player.weapon === entry.id;
    const can = player.money >= entry.cost && !equipped;
    const rowRect = { x, y: ly, w, h: rowH };
    const screenY = ly - sy;
    const visible = screenY + rowH > clipY && screenY < clipY + clipH;
    const hover = can && visible && pointInRect(mouse, { x, y: screenY, w, h: rowH });
    ctx.fillStyle = hover ? hoverBg : 'rgba(20, 22, 30, 0.5)';
    ctx.fillRect(rowRect.x, rowRect.y, rowRect.w, rowRect.h);
    ctx.fillStyle = accent;
    ctx.fillRect(rowRect.x, rowRect.y, 2, rowRect.h);
    const iconX = rowRect.x + 4;
    const iconY = rowRect.y + 2;
    ctx.fillStyle = '#0d0f16';
    ctx.fillRect(iconX, iconY, iconCol - 6, rowH - 4);
    ctx.strokeStyle = def.color;
    ctx.lineWidth = 1;
    ctx.strokeRect(iconX + 0.5, iconY + 0.5, iconCol - 7, rowH - 5);
    const cx = iconX + (iconCol - 6) / 2;
    const cy = iconY + (rowH - 4) / 2;
    drawShopWeaponIcon(entry.id, cx, cy, rowH - 12);
    const textX = rowRect.x + iconCol + 4;
    const textW = w - iconCol - 4 - 70;
    ctx.fillStyle = equipped ? '#666' : can ? '#fff' : '#5a5d66';
    fitFont(def.name, textW, 'bold 13px system-ui', 10);
    ctx.textAlign = 'left';
    ctx.fillText(def.name, textX, rowRect.y + 19);
    if (def.desc) {
      ctx.fillStyle = '#888c95';
      fitFont(def.desc, textW, '10px system-ui', 8);
      ctx.fillText(def.desc, textX, rowRect.y + 33);
    }
    ctx.textAlign = 'right';
    if (equipped) {
      ctx.fillStyle = '#8be08b';
      ctx.font = 'bold 10px system-ui';
      ctx.fillText('EQUIPPED', rowRect.x + w - 4, rowRect.y + 26);
    } else {
      ctx.fillStyle = can ? '#ffce44' : '#666';
      ctx.font = 'bold 13px system-ui';
      ctx.fillText(`$${entry.cost}`, rowRect.x + w - 4, rowRect.y + 26);
    }
    ctx.textAlign = 'left';
    if (can) {
      const id = entry.id;
      shopBuyRects.push({ rect: rowRect, action: () => buyFn(id) });
    }
    ly += rowH;
  }
  return ly;
}

// ---------- Loop ----------
let lastT = performance.now();
// In-game error log — captured by both the tick try/catch and the
// window-level 'error' listener, then drawn as a small panel in the top-
// right of the canvas. Keeps the most recent 5 errors so the user doesn't
// need DevTools to diagnose blank-screen bugs.
const recentErrors = []; // newest first
// User-controllable toggle (Settings → "Crash Reports: ON/OFF"). When OFF
// the overlay is hidden but errors still get logged into recentErrors so
// "Clear" + "Copy" + a later "ON" toggle still work. Persisted to
// localStorage so the preference survives a page reload.
let crashReportEnabled = (() => {
  try { return localStorage.getItem('deadzone-crash-report') !== 'off'; }
  catch (_) { return true; }
})();
function saveCrashReportPref() {
  try { localStorage.setItem('deadzone-crash-report', crashReportEnabled ? 'on' : 'off'); }
  catch (_) {}
}
function logErrorInGame(tag, err) {
  const msg = (err && (err.stack || err.message)) || String(err);
  if (recentErrors[0] && recentErrors[0].msg === msg) {
    recentErrors[0].t = performance.now();
    recentErrors[0].count = (recentErrors[0].count || 1) + 1;
    return;
  }
  recentErrors.unshift({ tag, msg, t: performance.now(), count: 1 });
  if (recentErrors.length > 5) recentErrors.length = 5;
}

function tick() {
  try {
    tickBody();
  } catch (err) {
    logErrorInGame('[tick]', err);
    console.error('[tick error]', err);
    // Reset transform so the next frame can draw cleanly even if the throw
    // happened mid-translate.
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.globalAlpha = 1;
    ctx.fillStyle = 'rgba(214, 48, 48, 0.85)';
    ctx.fillRect(W/2 - 240, H/2 - 30, 480, 60);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('Render error — see the panel in the top-right', W/2, H/2);
    ctx.textAlign = 'left';
  }
  // Always draw the error overlay last so it's visible regardless of
  // which game state we're in (menu, paused, playing, tutorial).
  drawResetConfirm();
  drawErrorOverlay();
  requestAnimationFrame(tick);
}

// Open an HTML overlay with the in-game error log in a selectable textarea
// so the player can manually highlight + copy with the mouse. Also has a
// "Copy to Clipboard" button that attempts the modern API — but unlike a
// pure clipboard call, the textarea is always visible so copy still works
// even on file:// URLs where the Clipboard API is often blocked.
function copyErrors() {
  if (recentErrors.length === 0) {
    floaters.push({ x: W/2, y: 80, text: 'No errors to copy', life: 1.6, color: '#9aa0ab' });
    return;
  }
  const text = recentErrors.map(e =>
    `${e.tag}${e.count > 1 ? ' ×' + e.count : ''}\n${e.msg}`
  ).join('\n\n---\n\n');
  let overlay = document.getElementById('dz-err-overlay');
  if (overlay) overlay.remove();
  overlay = document.createElement('div');
  overlay.id = 'dz-err-overlay';
  overlay.style.cssText =
    'position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);' +
    'width:720px; max-width:92vw; max-height:80vh;' +
    'background:#1a1d28; border:2px solid #ff5050; border-radius:6px;' +
    'padding:14px; z-index:9999; box-shadow:0 16px 50px rgba(0,0,0,0.7);' +
    'display:flex; flex-direction:column; gap:10px;' +
    'font-family:system-ui, -apple-system, sans-serif;';
  overlay.innerHTML =
    '<div style="color:#fff; font-weight:700; font-size:14px;">Errors — select the text and press <kbd style="background:#0c0e16;padding:1px 6px;border-radius:3px;">Cmd+C</kbd> / <kbd style="background:#0c0e16;padding:1px 6px;border-radius:3px;">Ctrl+C</kbd> to copy</div>' +
    '<textarea readonly style="width:100%; height:340px; background:#0c0e16; color:#dfe2e8; border:1px solid #33363f; font-family:ui-monospace,monospace; font-size:11.5px; padding:10px; line-height:1.4; resize:vertical; box-sizing:border-box;"></textarea>' +
    '<div style="display:flex; gap:8px;">' +
    '<button id="dz-err-copy" style="flex:1; background:#5a87c4; color:#fff; border:0; padding:10px; font-weight:700; cursor:pointer; border-radius:4px; font-size:13px;">Copy to Clipboard</button>' +
    '<button id="dz-err-close" style="flex:1; background:#33363f; color:#fff; border:0; padding:10px; font-weight:700; cursor:pointer; border-radius:4px; font-size:13px;">Close</button>' +
    '</div>';
  document.body.appendChild(overlay);
  const ta = overlay.querySelector('textarea');
  ta.value = text;
  ta.focus();
  ta.select();
  overlay.querySelector('#dz-err-copy').onclick = () => {
    ta.focus(); ta.select();
    let ok = false;
    try { ok = document.execCommand('copy'); } catch (e) {}
    if (!ok && navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).catch(() => {});
      ok = true;
    }
    floaters.push({ x: W/2, y: 80, text: ok ? 'Copied!' : 'Copy failed — select + Cmd+C manually', life: 1.8, color: ok ? '#8be08b' : '#d63030' });
  };
  overlay.querySelector('#dz-err-close').onclick = () => overlay.remove();
}

// In-canvas error panel — shows the most recent errors with their first
// few stack frames so the player can read them without DevTools.
// Pause button in the top-right corner of the canvas — always visible
// while the player is in-game. Touch users get the larger ☰ DOM button
// instead (setupTouch hides this one).
let pauseBtnRect = null;
function drawPauseButton() {
  if (gameState !== 'playing') { pauseBtnRect = null; return; }
  if (isTouch) { pauseBtnRect = null; return; }
  const w = 36, h = 30;
  const x = W - w - 12, y = 14;
  pauseBtnRect = { x, y, w, h };
  const hover = pointInRect(mouse, pauseBtnRect);
  ctx.fillStyle = hover ? 'rgba(40, 50, 70, 0.92)' : 'rgba(10, 12, 18, 0.78)';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = hover ? '#7ec8ff' : '#33363f';
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
  // Two vertical bars (pause glyph)
  ctx.fillStyle = hover ? '#fff' : '#cfd3da';
  ctx.fillRect(x + 11, y + 7, 4, 16);
  ctx.fillRect(x + 21, y + 7, 4, 16);
}

// "Are you sure?" reset confirmation. Drawn over the top of everything when
// resetConfirm is set; cleared by the keydown handler (Enter/Y/Escape/N) or
// by the Yes/No buttons here (hit-tested in the mousedown handler).
function drawResetConfirm() {
  if (!resetConfirm) return;
  ctx.save();
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.globalAlpha = 1;
  // Dim backdrop
  ctx.fillStyle = 'rgba(6, 8, 12, 0.72)';
  ctx.fillRect(0, 0, W, H);
  // Panel
  const w = 480, h = 200;
  const x = (W - w) / 2, y = (H - h) / 2;
  ctx.fillStyle = '#13151c';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#d63030';
  ctx.lineWidth = 2;
  ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
  // Left accent stripe
  ctx.fillStyle = '#d63030';
  ctx.fillRect(x, y, 4, h);
  // Title
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('Hard Reset?', W / 2, y + 42);
  // Body
  ctx.fillStyle = '#cfd3da';
  ctx.font = '13px system-ui';
  ctx.fillText('This wipes your money, weapons, perks, EXP,', W / 2, y + 78);
  ctx.fillText('pets, abilities, and the current run.', W / 2, y + 98);
  ctx.fillStyle = '#9aa0ab';
  ctx.font = '11px system-ui';
  ctx.fillText('Enter / Y to confirm · Escape / N to cancel', W / 2, y + 124);
  // Buttons
  const bw = 150, bh = 44, by = y + h - bh - 18, gap = 24;
  resetConfirmNoRect  = { x: (W - bw * 2 - gap) / 2,           y: by, w: bw, h: bh };
  resetConfirmYesRect = { x: (W - bw * 2 - gap) / 2 + bw + gap, y: by, w: bw, h: bh };
  // No (cancel)
  const noHover = pointInRect(mouse, resetConfirmNoRect);
  ctx.fillStyle = noHover ? '#1c2030' : '#11141c';
  ctx.fillRect(resetConfirmNoRect.x, resetConfirmNoRect.y, bw, bh);
  ctx.strokeStyle = noHover ? '#7ec8ff' : '#33363f';
  ctx.lineWidth = noHover ? 2 : 1;
  ctx.strokeRect(resetConfirmNoRect.x + 0.5, resetConfirmNoRect.y + 0.5, bw - 1, bh - 1);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px system-ui';
  ctx.fillText('Cancel', resetConfirmNoRect.x + bw / 2, by + 28);
  // Yes (destructive)
  const yesHover = pointInRect(mouse, resetConfirmYesRect);
  ctx.fillStyle = yesHover ? '#3a1a1a' : '#1a0e0e';
  ctx.fillRect(resetConfirmYesRect.x, resetConfirmYesRect.y, bw, bh);
  ctx.strokeStyle = yesHover ? '#ff5050' : '#d63030';
  ctx.lineWidth = yesHover ? 2 : 1;
  ctx.strokeRect(resetConfirmYesRect.x + 0.5, resetConfirmYesRect.y + 0.5, bw - 1, bh - 1);
  ctx.fillStyle = '#ff8a8a';
  ctx.font = 'bold 14px system-ui';
  ctx.fillText('Reset Run', resetConfirmYesRect.x + bw / 2, by + 28);
  ctx.textAlign = 'left';
  ctx.restore();
}

function drawErrorOverlay() {
  if (recentErrors.length === 0) return;
  // User can hide the panel from Settings without losing the underlying log.
  if (!crashReportEnabled) return;
  ctx.save();
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.globalAlpha = 1;
  const w = 560, lineH = 13;
  let totalH = 26;
  // Pre-measure for the panel height
  for (const e of recentErrors) {
    const lines = String(e.msg || '').split('\n').slice(0, 4);
    totalH += lineH * lines.length + 8;
  }
  const x = W - w - 8, y = 8;
  ctx.fillStyle = 'rgba(80, 8, 8, 0.94)';
  ctx.fillRect(x, y, w, totalH);
  ctx.strokeStyle = '#ff5050';
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 0.5, y + 0.5, w - 1, totalH - 1);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px ui-monospace, monospace';
  ctx.textAlign = 'left';
  ctx.fillText('ERRORS · most recent first · click  Clear Errors  in cheats to dismiss', x + 8, y + 16);
  let ly = y + 30;
  for (const e of recentErrors) {
    const lines = String(e.msg || '').split('\n').slice(0, 4);
    const head = lines[0] || '(no message)';
    ctx.fillStyle = '#ffd0d0';
    const headLine = e.tag + ' ' + head + (e.count > 1 ? `  ×${e.count}` : '');
    ctx.fillText(headLine.slice(0, 84), x + 8, ly);
    ly += lineH;
    for (let i = 1; i < lines.length; i++) {
      ctx.fillStyle = '#dfe2e8';
      ctx.fillText('  ' + lines[i].trim().slice(0, 82), x + 8, ly);
      ly += lineH;
    }
    ly += 6;
  }
  ctx.restore();
}

function tickBody() {
  const now = performance.now();
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;

  if (gameState === 'playing') {
    gameTime += dt;
    // Process queued boss-death nuke before any other update — runs detonateNuke
    // safely outside of any zombie-iteration loop that triggered the death.
    if (pendingBossDeath) {
      detonateNuke(pendingBossDeath.x, pendingBossDeath.y);
      pendingBossDeath = null;
    }
    updatePlayer(dt);
    if (coopEnabled) {
      updateP2(dt);
      // P2 down → respawn next to P1 with brief invuln. Only P1's death
      // triggers the run-end checkDeath flow.
      if (player2.hp <= 0) {
        player2.x = player.x + 30; player2.y = player.y + 30;
        player2.hp = player2.maxHp;
        player2.invuln = 2.5;
        floaters.push({ x: player2.x, y: player2.y - 24, text: 'P2 RESPAWN', life: 1.6, color: '#9bf07a' });
      }
    }
    if (!inShop() && !pendingCards) {
      if (mouse.down) tryShoot(gameTime);
      if (autoShoot)  playerAutoShoot(player, gameTime);
    }
    updateBullets(dt);
    updateZombies(dt);
    updateCoins(dt);
    updateGuns(dt);
    updateCrates(dt);
    updatePickups(dt);
    updateSlicks(dt);
    updateChests(dt);
    updateFloaters(dt);
    updateSlashes(dt);
    updateSparks(dt);
    updateDecoys(dt);
    updateBuildings(dt);
    updateBladeCrates(dt);
    updateSummons(dt);
    updatePets(dt);
    updateZombieBullets(dt);
    updateHealPulses(dt);
    updateHealFields(dt);
    updateHazards(dt);
    updateArenaEvent(dt);
    updateAbilityBooks(dt);
    updateParticles(dt);
    updateDecals(dt);
    updateTooltips(dt);
    updateWave(dt);
    updateShameTimer(dt);
    updateGuidedTutorial();
    // decay visual effects only while playing
    if (shakeAmt > 0) {
      shakeAmt -= 60 * dt;
      if (shakeAmt < 0) shakeAmt = 0;
    }
    if (flashRed > 0) {
      flashRed -= 1.4 * dt;
      if (flashRed < 0) flashRed = 0;
    }
    checkDeath();
  }

  render();
  // Overlay menus (game world is still rendered as a backdrop)
  if (gameState === 'menu') drawMainMenu();
  else if (gameState === 'paused') drawPauseMenu();
  else if (gameState === 'settings') drawSettingsMenu();
  else if (gameState === 'tutorial') drawTutorial();
  else if (gameState === 'tree') drawUpgradeTree();
  if (trainingMode && gameState === 'playing') drawTrainingBanner();

  // Custom-drawn cursor — last to draw, sits on top of every UI layer.
  // Suppressed in the sprite editor (any tab) so the player can see exactly
  // where they're painting using the system crosshair.
  const inSpriteEditor = gameState === 'settings' && settingsView === 'sprites';
  const useCustomCursor = hasCustomSprite('cursor') && !inSpriteEditor;
  const wantCursor = useCustomCursor ? 'none' : 'crosshair';
  if (c.style.cursor !== wantCursor) c.style.cursor = wantCursor;
  if (useCustomCursor) drawCustomSprite('cursor', mouse.x, mouse.y, 28);
}

// Global error capture — if any handler (mousedown, keydown, etc.) throws
// outside the tick loop, surface it in the console with a clear tag.
window.addEventListener('error', (e) => {
  console.error('[window error]', e.error || e.message);
  logErrorInGame('[window]', e.error || e.message);
});
window.addEventListener('unhandledrejection', (e) => {
  console.error('[promise]', e.reason);
  logErrorInGame('[promise]', e.reason);
});

// ---------- Touch controls ----------
// Wired here, after all game state + functions are declared, so we can
// reference autoShoot / ensureAudio / useSecondary / etc. directly.
(function setupTouch() {
  if (!isTouch) return;
  // Default to auto-shoot on touch — there's no LMB equivalent and freeing
  // the right thumb for buttons makes the game playable single-handed.
  autoShoot = true;

  const vstick        = document.getElementById('vstick');
  const vstickKnob    = vstick.querySelector('.knob');
  const vbtnSwap      = document.getElementById('vbtn-swap');
  const vbtnAbility   = document.getElementById('vbtn-ability');
  const vbtnSecondary = document.getElementById('vbtn-secondary');
  for (const el of [vstick, vbtnSwap, vbtnAbility, vbtnSecondary]) el.classList.remove('hidden');

  // Small pause/menu button top-right so the user can reach Settings/Pause
  // without a keyboard.
  const vbtnPause = document.createElement('div');
  vbtnPause.id = 'vbtn-pause';
  vbtnPause.textContent = '☰';
  vbtnPause.style.cssText = 'position:fixed; top:16px; right:16px; width:48px; height:48px; border-radius:50%; background:rgba(10,14,22,0.65); color:#fff; font:bold 22px system-ui; text-align:center; line-height:46px; border:2px solid rgba(255,255,255,0.5); z-index:50; user-select:none; -webkit-user-select:none;';
  document.body.appendChild(vbtnPause);

  function elemHit(el, x, y) {
    const r = el.getBoundingClientRect();
    return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
  }
  function canvasCoords(clientX, clientY) {
    const r = c.getBoundingClientRect();
    return {
      x: (clientX - r.left) * (W / r.width),
      y: (clientY - r.top) * (H / r.height),
    };
  }

  // Joystick state — sets keys['KeyW'] etc. so updatePlayer's existing input
  // reading covers touch movement without any new code path.
  const stickState = { dx: 0, dy: 0 };
  function setStick(clientX, clientY) {
    const r = vstick.getBoundingClientRect();
    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
    let dx = clientX - cx, dy = clientY - cy;
    const mag = Math.hypot(dx, dy);
    const maxR = r.width / 2 - 8;
    if (mag > maxR) { dx = dx / mag * maxR; dy = dy / mag * maxR; }
    vstickKnob.style.transform = 'translate(' + dx + 'px, ' + dy + 'px)';
    stickState.dx = dx / maxR;
    stickState.dy = dy / maxR;
    refreshStickKeys();
  }
  function resetStick() {
    stickState.dx = 0; stickState.dy = 0;
    vstickKnob.style.transform = '';
    refreshStickKeys();
  }
  function refreshStickKeys() {
    const m = Math.hypot(stickState.dx, stickState.dy);
    if (m < 0.25) {
      keys['KeyW'] = keys['KeyS'] = keys['KeyA'] = keys['KeyD'] = false;
      return;
    }
    const nx = stickState.dx, ny = stickState.dy;
    keys['KeyW'] = ny < -0.35;
    keys['KeyS'] = ny >  0.35;
    keys['KeyA'] = nx < -0.35;
    keys['KeyD'] = nx >  0.35;
  }

  function handleSwapTouch() {
    if (nearbyGun && nearbyGun.weapon !== player.weapon) doSwapWeapon();
    else if (nearbyBladeCrate && nearbyBladeCrate.secondary !== player.secondary) doSwapSecondary();
  }
  function handlePauseTouch() {
    if (gameState === 'playing') { gameState = 'paused'; SFX.uiClick && SFX.uiClick(); updateMusicForState && updateMusicForState(); }
    else if (gameState === 'paused') { gameState = 'playing'; SFX.uiClick && SFX.uiClick(); updateMusicForState && updateMusicForState(); }
  }

  // Each active touch carries its "kind" so move/end can dispatch correctly.
  const activeTouches = new Map(); // identifier -> 'stick' | 'aim' | 'secondary' | 'ability' | 'swap' | 'pause' | 'ui'

  document.addEventListener('touchstart', (e) => {
    ensureAudio(); resumeAudio();
    // While in any menu / card overlay, the in-game touch buttons (stick,
    // ability, secondary, swap) shouldn't drive the character. The Pause
    // button stays active so the user can always reach Settings or resume.
    const inGame = (gameState === 'playing') && !pendingCards;
    for (const t of e.changedTouches) {
      const cx = t.clientX, cy = t.clientY;
      if (inGame && elemHit(vstick, cx, cy)) {
        activeTouches.set(t.identifier, 'stick');
        setStick(cx, cy);
      } else if (elemHit(vbtnPause, cx, cy)) {
        activeTouches.set(t.identifier, 'pause');
        handlePauseTouch();
      } else if (inGame && elemHit(vbtnSwap, cx, cy)) {
        activeTouches.set(t.identifier, 'swap');
        handleSwapTouch();
      } else if (inGame && elemHit(vbtnAbility, cx, cy)) {
        activeTouches.set(t.identifier, 'ability');
        tryActivateSelected();
      } else if (inGame && elemHit(vbtnSecondary, cx, cy)) {
        activeTouches.set(t.identifier, 'secondary');
        const sd = SECONDARIES[player.secondary];
        if (sd && sd.kind === 'charge') startBowCharge();
        else useSecondary();
      } else {
        // Tap on the canvas / menu area — set mouse position + mouse.down,
        // then dispatch a synthetic mousedown so all existing menu/cheat/
        // shop click handlers fire. The existing mousedown handler already
        // pulls coords from c.getBoundingClientRect().
        const co = canvasCoords(cx, cy);
        mouse.x = co.x; mouse.y = co.y;
        activeTouches.set(t.identifier, 'aim');
        c.dispatchEvent(new MouseEvent('mousedown', { button: 0, clientX: cx, clientY: cy, bubbles: true }));
      }
    }
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchmove', (e) => {
    for (const t of e.changedTouches) {
      const kind = activeTouches.get(t.identifier);
      if (kind === 'stick') setStick(t.clientX, t.clientY);
      else if (kind === 'aim') {
        const co = canvasCoords(t.clientX, t.clientY);
        mouse.x = co.x; mouse.y = co.y;
      }
    }
    e.preventDefault();
  }, { passive: false });

  function endTouch(t) {
    const kind = activeTouches.get(t.identifier);
    activeTouches.delete(t.identifier);
    if (kind === 'stick') resetStick();
    else if (kind === 'aim') {
      // If no aim touches remain, drop mouse.down via a mouseup event so
      // any in-progress drag (slider, panel resize) releases cleanly.
      let still = false;
      for (const v of activeTouches.values()) if (v === 'aim') { still = true; break; }
      if (!still) {
        c.dispatchEvent(new MouseEvent('mouseup', { button: 0, clientX: t.clientX, clientY: t.clientY, bubbles: true }));
      }
    } else if (kind === 'secondary') {
      const sd = SECONDARIES[player.secondary];
      if (sd && sd.kind === 'charge' && player.bowHeld) releaseBow();
    }
  }
  document.addEventListener('touchend',    (e) => { for (const t of e.changedTouches) endTouch(t); e.preventDefault(); }, { passive: false });
  document.addEventListener('touchcancel', (e) => { for (const t of e.changedTouches) endTouch(t); e.preventDefault(); }, { passive: false });

  // Block iOS double-tap zoom on the canvas area
  document.addEventListener('gesturestart', (e) => e.preventDefault());
})();

tick();
</script>
