  const cursorDist = Math.hypot(mouse.x - player.x, mouse.y - player.y);
  const dist = Math.min(baseRange, Math.max(50, cursorDist));
  const startX = player.x + Math.cos(ang) * (player.r + 6);
  const startY = player.y + Math.sin(ang) * (player.r + 6);
  const targetX = player.x + Math.cos(ang) * dist;
  const targetY = player.y + Math.sin(ang) * dist;
  bullets.push({
    x: startX, y: startY,
    vx: 0, vy: 0,
    damage: 0, pierce: 0,
    hits: new Set(),
    life: 10,
    color: def.color,
    explosive: false, blastR: 0, blastDmg: 0,
    bulletKind: 'potion',
    arcBomb: true, isPotion: true,
    startX, startY, targetX, targetY,
    flightT: 0, flightDur: def.flightDur, peakHeight: def.peakHeight, h: 0,
    potionRadius: def.splashR,
    bounces: 0, leavesSlick: false, spawnChicks: 0,
    chains: 0, chainRange: 0, orbitAngle: 0, orbitRadius: 0, orbitSpeed: 0,
    homing: false, isCrit: false,
    bulletKnock: 0, clearHitsInterval: 0, clearHitsAt: 0,
    spawnToasts: 0, dropsHazard: null,
    effect: null, effectDur: 0, effectDps: 0,
    explodesIntoSauce: false,
  });
  SFX.throwBlade && SFX.throwBlade();
}

// Resolve a potion landing: pick a random effect, apply to non-boss zombies
// inside the splash radius, throw a colored particle burst + label floater.
function landPotion(x, y, radius) {
  const fx = POTION_EFFECTS[Math.floor(Math.random() * POTION_EFFECTS.length)];
  let hit = 0;
  for (const z of zombies) {
    if (z.isDummy) continue;
    if (z.isBoss) continue; // bosses ignore the splash
    const dx = z.x - x, dy = z.y - y;
    if (dx * dx + dy * dy < radius * radius) {
      fx.apply(z);
      hit++;
    }
  }
  // Splash particle burst tinted to the rolled effect
  for (let k = 0; k < 28; k++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 80 + Math.random() * 220;
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, life: 0.5 + Math.random()*0.35, color: fx.color });
  }
  // Label floater so the player can read which effect rolled
  floaters.push({ x, y: y - 24, text: fx.label, life: 1.6, color: fx.color });
  SFX.unlock();
}

function useSlowTime(def) {
  // Stamp the slow timer on every active zombie — reuses the cold-bullets
  // mechanic we already have so updateZombies needs no new code.
  for (const z of zombies) {
    if (z.isDummy) continue;
    z.slowTimer = Math.max(z.slowTimer || 0, def.duration);
  }
  // visual: a brief purple ring of particles around the player
  for (let i = 0; i < 28; i++) {
    const a = (i / 28) * Math.PI * 2;
    const s = 180 + Math.random() * 60;
    particles.push({ x: player.x, y: player.y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 0.6, color: def.color });
  }
  shake(4);
  SFX.unlock();
}

// Walk-over pickup that unlocks a single ability when the player touches it.
function updateAbilityBooks(dt) {
  for (let i = abilityBooks.length - 1; i >= 0; i--) {
    const b = abilityBooks[i];
    b.life -= dt;
    if (b.life <= 0) { abilityBooks.splice(i, 1); continue; }
    const dx = player.x - b.x, dy = player.y - b.y;
    if (dx*dx + dy*dy < (player.r + 18) * (player.r + 18)) {
      player.abilities[b.abilityId] = true;
      // Auto-select the newly-acquired ability so the player can fire it
      // immediately with Shift if it's their first.
      selectedAbility = ABILITY_KEYS.indexOf(b.abilityId);
      const def = ABILITIES[b.abilityId];
      floaters.push({ x: b.x, y: b.y - 22, text: `ABILITY: ${def.name}`, life: 3.0, color: def.color });
      showTooltip('abil:' + b.abilityId, `${def.name} unlocked`,
        (def.desc || 'New ability') + '\nTab/scroll cycles · Shift fires', def.color);
      for (let k = 0; k < 22; k++) {
        const a = Math.random() * Math.PI * 2;
        const s = 80 + Math.random() * 200;
        particles.push({ x: b.x, y: b.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.6, color: def.color });
      }
      (SFX_ABILITIES[b.abilityId] || SFX.chestOpen)();
      abilityBooks.splice(i, 1);
    }
  }
}

function useSummon(def) {
  // Per-kind stats so each summon kind feels distinct.
  const stats = (() => {
    switch (def.summon) {
      case 'bat':    return { hp: 18, life: 9,  dmg: 36, speed: 230, burst: ['#8a4ac0', '#3a1850'] };
      case 'wolf':   return { hp: 60, life: 15, dmg: 52, speed: 145, burst: ['#7a5030', '#3a2410'] };
      case 'spider': return { hp: 8,  life: 7,  dmg: 16, speed: 290, burst: ['#222222', '#5a3030'] };
      case 'spirit': return { hp: 14, life: 8,  dmg: 28, speed: 250, burst: ['#9bf0ff', '#4a8a9a'] };
      default:       return { hp: 24, life: 12, dmg: 22, speed: 165, burst: ['#fff5b8', '#ffe066'] };
    }
  })();
  for (let i = 0; i < def.count; i++) {
    const a = Math.random() * Math.PI * 2;
    summons.push({
      kind: def.summon,
      x: player.x + Math.cos(a) * 18,
      y: player.y + Math.sin(a) * 18,
      vx: Math.cos(a) * 80, vy: Math.sin(a) * 80,
      hp: stats.hp, hpMax: stats.hp,
      life: stats.life,
      dmg: stats.dmg,
      speed: stats.speed,
    });
  }
  // tome-opening particle puff in the summon's palette
  for (let k = 0; k < 22; k++) {
    const a = Math.random() * Math.PI * 2;
    const s = 100 + Math.random() * 180;
    particles.push({ x: player.x, y: player.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.5, color: k % 2 ? stats.burst[0] : stats.burst[1] });
  }
  SFX.chestOpen();
}

function useField(def) {
  healFields.push({ x: player.x, y: player.y, r: def.radius, life: def.life, max: def.life, hps: def.hps, color: def.color });
  // spawn ring of soothing particles
  for (let i = 0; i < 20; i++) {
    const a = (i / 20) * Math.PI * 2;
    particles.push({ x: player.x, y: player.y, vx: Math.cos(a)*120, vy: Math.sin(a)*120, life: 0.6, color: def.color });
  }
  SFX.pickup();
}

function updateSummons(dt) {
  for (let i = summons.length - 1; i >= 0; i--) {
    const s = summons[i];
    s.life -= dt;
    if (s.life <= 0 || s.hp <= 0) {
      for (let k = 0; k < 10; k++) {
        const a = Math.random() * Math.PI * 2;
        const sp = 60 + Math.random() * 140;
        particles.push({ x: s.x, y: s.y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, life: 0.5, color: k % 2 ? '#fff5b8' : '#ffe066' });
      }
      summons.splice(i, 1);
      continue;
    }
    // home toward the nearest zombie; if none, wander idly
    let near = null, bd2 = Infinity;
    for (const z of zombies) {
      const dx = z.x - s.x, dy = z.y - s.y;
      const d2 = dx*dx + dy*dy;
      if (d2 < bd2) { bd2 = d2; near = z; }
    }
    if (near) {
      const dx = near.x - s.x, dy = near.y - s.y;
      const d = Math.hypot(dx, dy) || 1;
      s.vx = (dx / d) * s.speed;
      s.vy = (dy / d) * s.speed;
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      // pecking contact damage
      if (d < near.r + 9) {
        near.hp -= s.dmg * dt;
        if (near.hp <= 0) {
          const idx = zombies.indexOf(near);
          if (idx >= 0) { killZombie(near); zombies.splice(idx, 1); }
        }
      }
    } else {
      // idle wander
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.vx *= 0.95;
      s.vy *= 0.95;
    }
    s.x = Math.max(6, Math.min(W - 6, s.x));
    s.y = Math.max(6, Math.min(H - 6, s.y));
  }
}

function updatePets(dt) {
  for (const p of pets) {
    const def = PETS[p.id];
    if (!def) continue;
    // Acquire / refresh target — nearest zombie in range
    let near = null, bd2 = def.range * def.range;
    for (const z of zombies) {
      const dx = z.x - p.x, dy = z.y - p.y;
      const d2 = dx * dx + dy * dy;
      if (d2 < bd2) { bd2 = d2; near = z; }
    }
    p.target = near;
    if (def.kind === 'orbit') {
      // Orbit smoothly around the player; aim is independent.
      p.orbitAng = (p.orbitAng || 0) + def.orbitSpeed * dt;
      p.x = player.x + Math.cos(p.orbitAng) * def.orbitRadius;
      p.y = player.y + Math.sin(p.orbitAng) * def.orbitRadius;
    } else {
      // Decide what to home toward: a target zombie if any, else the player
      // (with a small lag distance so the pet doesn't sit on top of them).
      // If def.keepDistance is set, the pet kites — approaches when too far,
      // backs away when too close. Used by the dragon's stand-off ray.
      let tx, ty, arriveR;
      if (near) { tx = near.x; ty = near.y; arriveR = def.keepDistance || (def.hitR || 8) + near.r; }
      else      { tx = player.x; ty = player.y; arriveR = 40; }
      const dx = tx - p.x, dy = ty - p.y;
      const d = Math.hypot(dx, dy) || 1;
      const tolerance = 30;
      if (d > arriveR + tolerance) {
        // Too far — move toward target
        p.x += (dx / d) * def.speed * dt;
        p.y += (dy / d) * def.speed * dt;
      } else if (near && def.keepDistance && d < arriveR - tolerance) {
        // Kiting pet too close to its target — back away (only when there's
        // an actual zombie to kite from; when idle following the player,
        // settling within arriveR is fine).
        p.x -= (dx / d) * def.speed * dt;
        p.y -= (dy / d) * def.speed * dt;
      }
      // Save aim heading for the sprite
      p.heading = Math.atan2(dy, dx);
    }
    // Attack — beam-kind pets handle channeling separately so the cooldown
    // only starts AFTER the stream ends, not at the moment of the first
    // pulse. Other kinds just check lastAttack against attackCd as before.
    const isBeaming = def.kind === 'beam' && (p.beamUntil || 0) > gameTime;
    const wasBeaming = !!p.beamWas;
    if (wasBeaming && !isBeaming) {
      // Beam just ended — kick off the recovery cooldown from this moment.
      p.lastAttack = 0;
    }
    p.beamWas = isBeaming;
    if (isBeaming) {
      // Channel: fire one rail pulse per beamFireInterval, re-aiming each
      // pulse so the beam tracks moving targets.
      if (near) {
        const dx = near.x - p.x, dy = near.y - p.y;
        const d = Math.hypot(dx, dy) || 1;
        p.heading = Math.atan2(dy, dx);
        const interval = def.beamFireInterval || 0.05;
        if (gameTime - (p.lastPulse || 0) >= interval) {
          p.lastPulse = gameTime;
          const ux = dx / d, uy = dy / d;
          const muzzleR = (def.hitR || 14) + 8;
          const spread = def.spread || 0.02;
          const a = (Math.random() - 0.5) * spread;
          const cs = Math.cos(a), sn = Math.sin(a);
          const vx = (ux * cs - uy * sn) * def.bulletSpeed;
          const vy = (ux * sn + uy * cs) * def.bulletSpeed;
          bullets.push({
            x: p.x + ux * muzzleR, y: p.y + uy * muzzleR,
            vx, vy,
            damage: def.dmg, pierce: 99,
            hits: new Set(),
            life: def.bulletLife,
            color: def.bulletColor || def.color,
            explosive: false, blastR: 0, blastDmg: 0,
            bulletKind: def.bulletKindOverride || 'rail',
            bounces: 0, leavesSlick: false, spawnChicks: 0,
            chains: 0, chainRange: 0,
            orbitAngle: 0, orbitRadius: 0, orbitSpeed: 0,
            homing: false, isCrit: false, petBullet: true,
          });
        }
      }
    } else {
      p.lastAttack = (p.lastAttack || 0) + dt;
    }
    if (!isBeaming && near && p.lastAttack >= def.attackCd) {
      if (def.kind === 'melee') {
        const dx = near.x - p.x, dy = near.y - p.y;
        const d = Math.hypot(dx, dy);
        if (d < (def.hitR || 12) + near.r) {
          near.hp -= def.dmg;
          pushDamageFloater(near, def.dmg, false);
          p.lastAttack = 0;
          // light particle burst on hit
          for (let k = 0; k < 4; k++) {
            const a = Math.random() * Math.PI * 2;
            const s = 60 + Math.random() * 80;
            particles.push({ x: near.x, y: near.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.3, color: def.color });
          }
          if (near.hp <= 0) {
            const idx = zombies.indexOf(near);
            if (idx >= 0) { killZombie(near); zombies.splice(idx, 1); }
          }
        }
      } else if (def.kind === 'beam') {
        // Open a fresh beam window. The streaming pulses themselves fire
        // each frame above (via the isBeaming branch). lastAttack stays
        // unchanged here so it can be reset to 0 when the beam ends.
        p.beamUntil = gameTime + (def.beamDuration || 0.6);
        p.lastPulse = 0;        // ensures the first pulse fires immediately
        p.beamFlashUntil = gameTime + (def.beamDuration || 0.6);
        shake(3);
      } else {
        // Fire a pet bullet at the target — uses the regular bullets pipeline
        // so all existing hit/explode logic applies. petBullet=true flags the
        // bullet so we can recolor it later.
        const dx = near.x - p.x, dy = near.y - p.y;
        const d = Math.hypot(dx, dy) || 1;
        bullets.push({
          x: p.x, y: p.y,
          vx: (dx / d) * def.bulletSpeed,
          vy: (dy / d) * def.bulletSpeed,
          damage: def.dmg, pierce: 0,
          hits: new Set(),
          life: def.bulletLife,
          color: def.bulletColor || def.color,
          explosive: false, blastR: 0, blastDmg: 0,
          bulletKind: null, bounces: 0, leavesSlick: false, spawnChicks: 0,
          chains: 0, chainRange: 0,
          orbitAngle: 0, orbitRadius: 0, orbitSpeed: 0,
          homing: false, isCrit: false, petBullet: true,
        });
        p.lastAttack = 0;
      }
    }
  }
}

// Draw a single pet at (cx, cy) at the given pixel size. Used by both the
// in-world render and the shop preview icon — the only difference is the
// "facing" heading (world uses the live one, the shop preview faces right).
function drawPet(id, cx, cy, size, heading = 0) {
  const def = PETS[id];
  if (!def) return;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(heading);
  const s = size * 0.5;
  ctx.strokeStyle = '#15151a';
  ctx.lineWidth = 1;
  switch (id) {
    case 'dog': {
      // shadow
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath(); ctx.ellipse(0, s * 0.6, s * 0.7, s * 0.18, 0, 0, Math.PI * 2); ctx.fill();
      // body
      ctx.fillStyle = def.color;
      ctx.fillRect(-s * 0.6, -s * 0.25, s * 1.2, s * 0.5);
      ctx.strokeRect(-s * 0.6, -s * 0.25, s * 1.2, s * 0.5);
      // head
      ctx.fillStyle = def.color;
      ctx.beginPath(); ctx.arc(s * 0.7, 0, s * 0.32, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      // snout
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath(); ctx.arc(s * 0.95, s * 0.05, s * 0.08, 0, Math.PI * 2); ctx.fill();
      // ear
      ctx.fillStyle = '#7a4a28';
      ctx.beginPath();
      ctx.moveTo(s * 0.5, -s * 0.3); ctx.lineTo(s * 0.4, -s * 0.55); ctx.lineTo(s * 0.7, -s * 0.3);
      ctx.closePath(); ctx.fill();
      // tail
      ctx.fillStyle = def.color;
      ctx.fillRect(-s * 0.7, -s * 0.1, -s * 0.2, s * 0.18);
      break;
    }
    case 'owl': {
      // round body
      ctx.fillStyle = def.color;
      ctx.beginPath(); ctx.arc(0, 0, s * 0.55, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      // wings (animate a bit)
      const wingT = Math.sin(gameTime * 8) * 0.25;
      ctx.fillStyle = '#a06a3a';
      ctx.save();
      ctx.rotate(wingT);
      ctx.fillRect(-s * 0.65, -s * 0.1, s * 0.35, s * 0.35);
      ctx.restore();
      ctx.save();
      ctx.rotate(-wingT);
      ctx.fillRect(s * 0.3, -s * 0.1, s * 0.35, s * 0.35);
      ctx.restore();
      // eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-s * 0.18, -s * 0.1, s * 0.16, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc( s * 0.18, -s * 0.1, s * 0.16, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath(); ctx.arc(-s * 0.18, -s * 0.1, s * 0.07, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc( s * 0.18, -s * 0.1, s * 0.07, 0, Math.PI * 2); ctx.fill();
      // beak
      ctx.fillStyle = '#ff9d3a';
      ctx.beginPath();
      ctx.moveTo(0, s * 0.05); ctx.lineTo(s * 0.1, s * 0.2); ctx.lineTo(-s * 0.1, s * 0.2);
      ctx.closePath(); ctx.fill();
      break;
    }
    case 'robot': {
      // chassis
      ctx.fillStyle = def.color;
      ctx.fillRect(-s * 0.55, -s * 0.5, s * 1.1, s);
      ctx.strokeRect(-s * 0.55, -s * 0.5, s * 1.1, s);
      // visor strip
      ctx.fillStyle = '#1a1a22';
      ctx.fillRect(-s * 0.5, -s * 0.35, s, s * 0.2);
      // glowing eye
      ctx.fillStyle = '#9bf0ff';
      ctx.fillRect(-s * 0.15, -s * 0.3, s * 0.3, s * 0.1);
      // shoulder cannon barrel facing right
      ctx.fillStyle = '#222a32';
      ctx.fillRect(s * 0.55, -s * 0.1, s * 0.5, s * 0.2);
      ctx.fillStyle = '#9bf0ff';
      ctx.fillRect(s * 1.05, -s * 0.05, 3, s * 0.1);
      // treads on the bottom
      ctx.fillStyle = '#111';
      ctx.fillRect(-s * 0.55, s * 0.4, s * 1.1, s * 0.15);
      break;
    }
    case 'ghost': {
      // translucent body
      ctx.globalAlpha = 0.75;
      ctx.fillStyle = def.color;
      // bell shape
      ctx.beginPath();
      ctx.arc(0, -s * 0.1, s * 0.55, Math.PI, Math.PI * 2);
      ctx.lineTo(s * 0.55, s * 0.45);
      ctx.lineTo(s * 0.3, s * 0.25);
      ctx.lineTo(0, s * 0.5);
      ctx.lineTo(-s * 0.3, s * 0.25);
      ctx.lineTo(-s * 0.55, s * 0.45);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
      // eyes
      ctx.fillStyle = '#1a1a22';
      ctx.beginPath(); ctx.arc(-s * 0.18, -s * 0.15, s * 0.08, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc( s * 0.18, -s * 0.15, s * 0.08, 0, Math.PI * 2); ctx.fill();
      break;
    }
    case 'drone': {
      // central core
      ctx.fillStyle = def.color;
      ctx.beginPath(); ctx.arc(0, 0, s * 0.35, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      // four arms with rotors
      const rot = gameTime * 6;
      for (let i = 0; i < 4; i++) {
        const a = (i / 4) * Math.PI * 2;
        const ex = Math.cos(a) * s * 0.6;
        const ey = Math.sin(a) * s * 0.6;
        ctx.strokeStyle = '#222';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(ex, ey); ctx.stroke();
        // rotor blur
        ctx.save();
        ctx.translate(ex, ey);
        ctx.rotate(rot + i);
        ctx.fillStyle = 'rgba(255,255,255,0.45)';
        ctx.fillRect(-s * 0.3, -1, s * 0.6, 2);
        ctx.restore();
      }
      // central eye
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(0, 0, s * 0.12, 0, Math.PI * 2); ctx.fill();
      break;
    }
    case 'dragon': {
      // Hard-angled, near-black silhouette to match the game's flat-shaded
      // aesthetic. Every body part is a polygon — no smooth ellipses except
      // the ground shadow + the muzzle ember halo. Both wings render as
      // dramatic bat-membranes spread to either side of the body, giving
      // the dragon a wide top-down "apex predator" presence.
      const dark   = '#000000';   // pure-black outlines
      const wing   = '#070710';   // wing membrane — near-black, very subtle blue
      const body   = def.color;   // dark cool-grey-black (#15151c)
      const accent = '#2a2a36';   // interior shading + belly stripe
      const ember  = '#7a1810';   // dim red highlight — body veins / scales
      // Ground shadow
      ctx.fillStyle = 'rgba(0,0,0,0.42)';
      ctx.beginPath(); ctx.ellipse(0, s * 0.78, s * 1.1, s * 0.24, 0, 0, Math.PI * 2); ctx.fill();

      // Tail — jagged zig-zag segments instead of a smooth curve
      const tailWag = Math.sin(gameTime * 4) * 0.18;
      ctx.fillStyle = dark;
      ctx.beginPath();
      ctx.moveTo(-s * 0.55,  s * 0.05);
      ctx.lineTo(-s * 0.75,  s * 0.22 + tailWag);
      ctx.lineTo(-s * 0.95, -s * 0.05 + tailWag);
      ctx.lineTo(-s * 1.20,  s * 0.14 + tailWag);
      ctx.lineTo(-s * 1.45, -s * 0.18 + tailWag);
      ctx.lineTo(-s * 1.60, -s * 0.45 + tailWag); // spike tip
      ctx.lineTo(-s * 1.30, -s * 0.10 + tailWag);
      ctx.lineTo(-s * 1.05,  s * 0.05 + tailWag);
      ctx.lineTo(-s * 0.80,  s * 0.02 + tailWag);
      ctx.lineTo(-s * 0.55, -s * 0.05);
      ctx.closePath();
      ctx.fill();

      // Wings are drawn LATER (after the body + spikes) so they layer
      // on top of the dragon's back. See "// Wings — drawn last" block.

      // Body — more jagged than before: 17-point polygon with sharper
      // alternating peaks and valleys along the silhouette.
      ctx.fillStyle = body;
      ctx.beginPath();
      ctx.moveTo(-s * 0.62, -s * 0.08);
      ctx.lineTo(-s * 0.45, -s * 0.20);
      ctx.lineTo(-s * 0.32, -s * 0.34);
      ctx.lineTo(-s * 0.12, -s * 0.22);
      ctx.lineTo( s * 0.02, -s * 0.42);
      ctx.lineTo( s * 0.20, -s * 0.28);
      ctx.lineTo( s * 0.36, -s * 0.38);
      ctx.lineTo( s * 0.55, -s * 0.22);
      ctx.lineTo( s * 0.55,  s * 0.22);
      ctx.lineTo( s * 0.40,  s * 0.32);
      ctx.lineTo( s * 0.22,  s * 0.22);
      ctx.lineTo( s * 0.08,  s * 0.40);
      ctx.lineTo(-s * 0.05,  s * 0.28);
      ctx.lineTo(-s * 0.22,  s * 0.42);
      ctx.lineTo(-s * 0.40,  s * 0.28);
      ctx.lineTo(-s * 0.58,  s * 0.20);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = dark;
      ctx.lineWidth = 1.6;
      ctx.stroke();
      // Darker belly stripe — adds depth without smoothing the silhouette
      ctx.fillStyle = accent;
      ctx.beginPath();
      ctx.moveTo(-s * 0.40,  s * 0.18);
      ctx.lineTo(-s * 0.05,  s * 0.36);
      ctx.lineTo( s * 0.25,  s * 0.30);
      ctx.lineTo( s * 0.42,  s * 0.10);
      ctx.lineTo( s * 0.20,  s * 0.18);
      ctx.lineTo(-s * 0.10,  s * 0.28);
      ctx.closePath();
      ctx.fill();
      // Red vein highlights — a couple of short dim red strokes along the
      // back, breaks up the pure-black silhouette and reminds the player
      // this is still a fire-breather under all that dark.
      ctx.strokeStyle = ember;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(-s * 0.20, -s * 0.05);
      ctx.lineTo( s * 0.00, -s * 0.20);
      ctx.lineTo( s * 0.18,  s * 0.05);
      ctx.moveTo( s * 0.20, -s * 0.15);
      ctx.lineTo( s * 0.35,  s * 0.00);
      ctx.stroke();

      // Back spikes — five sharp triangles, alternating heights (tallest in
      // the middle). Drawn AFTER the body so they bite through the spine.
      ctx.fillStyle = dark;
      const spikeXs = [-s * 0.35, -s * 0.18, s * 0.00, s * 0.18, s * 0.36];
      const spikeHs = [ 0.60,      0.78,      0.95,    0.72,     0.55    ];
      for (let k = 0; k < spikeXs.length; k++) {
        const sx = spikeXs[k];
        const h = spikeHs[k];
        ctx.beginPath();
        ctx.moveTo(sx,            -s * 0.32);
        ctx.lineTo(sx + s * 0.05, -s * h);
        ctx.lineTo(sx + s * 0.12, -s * 0.32);
        ctx.closePath();
        ctx.fill();
      }

      // Wings — drawn last so both layer on top of the dragon's back.
      // Each wing anchors on the dorsal centerline and extends UPWARD
      // (-y) and outward; one mirrors via scale(-1, 1) on the X axis so
      // the pair fans symmetrically left/right above the body. Flap
      // amplitude is wider (±0.45 rad) for a more dramatic motion.
      const wingT = Math.sin(gameTime * 4.5) * 0.45;
      function drawDragonWing(side) {
        ctx.save();
        ctx.translate(-s * 0.05, -s * 0.08);    // anchor between body + spikes
        ctx.scale(side, 1);                     // mirror X for the left wing
        ctx.rotate(-0.25 + wingT);              // tilt outward + flap
        ctx.fillStyle = wing;
        ctx.beginPath();
        ctx.moveTo(  0,            0);
        ctx.lineTo( s * 0.10, -s * 0.30);
        ctx.lineTo( s * 0.30, -s * 0.85);    // peak 1
        ctx.lineTo( s * 0.45, -s * 0.45);    // notch
        ctx.lineTo( s * 0.55, -s * 1.15);    // tall middle peak
        ctx.lineTo( s * 0.72, -s * 0.50);    // notch
        ctx.lineTo( s * 0.88, -s * 0.85);    // peak 3
        ctx.lineTo( s * 1.00, -s * 0.40);    // notch
        ctx.lineTo( s * 1.10, -s * 0.55);    // peak 4 (outer claw)
        ctx.lineTo( s * 1.18, -s * 0.10);    // wing tip
        ctx.lineTo( s * 0.70, -s * 0.05);
        ctx.lineTo( s * 0.20,  s * 0.05);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = dark;
        ctx.lineWidth = 1.4;
        ctx.stroke();
        // Finger-bone struts radiating from the wing root
        ctx.strokeStyle = dark;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, 0); ctx.lineTo(s * 0.30, -s * 0.80);
        ctx.moveTo(0, 0); ctx.lineTo(s * 0.55, -s * 1.05);
        ctx.moveTo(0, 0); ctx.lineTo(s * 0.85, -s * 0.80);
        ctx.moveTo(0, 0); ctx.lineTo(s * 1.10, -s * 0.50);
        ctx.moveTo(0, 0); ctx.lineTo(s * 1.15, -s * 0.10);
        ctx.stroke();
        // Faint red glow along the wing spine
        ctx.strokeStyle = ember;
        ctx.lineWidth = 0.9;
        ctx.beginPath();
        ctx.moveTo( 0, 0);
        ctx.lineTo( s * 0.40, -s * 0.30);
        ctx.lineTo( s * 0.85, -s * 0.35);
        ctx.lineTo( s * 1.15, -s * 0.12);
        ctx.stroke();
        ctx.restore();
      }
      drawDragonWing(-1);   // left wing  — extends up & back over the spine
      drawDragonWing( 1);   // right wing — extends up & forward over the spine

      // Neck wedge + head — sharp wedge instead of rounded snout
      ctx.fillStyle = body;
      ctx.beginPath();
      ctx.moveTo( s * 0.45, -s * 0.18);
      ctx.lineTo( s * 0.70, -s * 0.38);
      ctx.lineTo( s * 1.00, -s * 0.32);
      ctx.lineTo( s * 1.20, -s * 0.10);
      ctx.lineTo( s * 1.25,  s * 0.05);
      ctx.lineTo( s * 1.05,  s * 0.22);
      ctx.lineTo( s * 0.70,  s * 0.22);
      ctx.lineTo( s * 0.50,  s * 0.10);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = dark;
      ctx.lineWidth = 1.4;
      ctx.stroke();

      // Sharp horns — two backswept dark triangles
      ctx.fillStyle = dark;
      ctx.beginPath();
      ctx.moveTo( s * 0.78, -s * 0.36);
      ctx.lineTo( s * 0.50, -s * 0.68);
      ctx.lineTo( s * 0.88, -s * 0.42);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo( s * 0.90, -s * 0.34);
      ctx.lineTo( s * 0.72, -s * 0.62);
      ctx.lineTo( s * 0.98, -s * 0.38);
      ctx.closePath();
      ctx.fill();
      // Cheek spike
      ctx.beginPath();
      ctx.moveTo( s * 0.95,  s * 0.18);
      ctx.lineTo( s * 0.80,  s * 0.38);
      ctx.lineTo( s * 1.05,  s * 0.22);
      ctx.closePath();
      ctx.fill();

      // Eye socket (dark cavity) + glowing red pupil
      ctx.fillStyle = dark;
      ctx.beginPath();
      ctx.moveTo( s * 0.92, -s * 0.20);
      ctx.lineTo( s * 1.08, -s * 0.14);
      ctx.lineTo( s * 1.00, -s * 0.04);
      ctx.lineTo( s * 0.86, -s * 0.10);
      ctx.closePath();
      ctx.fill();
      const eyePulse = 0.85 + Math.sin(gameTime * 6) * 0.15;
      ctx.fillStyle = '#ff2020';
      ctx.beginPath();
      ctx.arc(s * 0.97, -s * 0.12, s * 0.05 * eyePulse, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffd0d0';
      ctx.beginPath();
      ctx.arc(s * 0.97, -s * 0.12, s * 0.02, 0, Math.PI * 2);
      ctx.fill();

      // Mouth slit + visible fangs (bone white, sharp triangles)
      ctx.fillStyle = dark;
      ctx.beginPath();
      ctx.moveTo(s * 1.00,  s * 0.04);
      ctx.lineTo(s * 1.22,  s * 0.00);
      ctx.lineTo(s * 1.20,  s * 0.10);
      ctx.lineTo(s * 1.02,  s * 0.12);
      ctx.closePath();
      ctx.fill();
      // Upper fang
      ctx.fillStyle = '#e8d8c0';
      ctx.beginPath();
      ctx.moveTo(s * 1.08, s * 0.06);
      ctx.lineTo(s * 1.12, s * 0.16);
      ctx.lineTo(s * 1.15, s * 0.06);
      ctx.closePath();
      ctx.fill();

      // Persistent muzzle ember (smaller + dimmer than before — fits the
      // darker palette while still telegraphing "this thing breathes fire").
      // Brightens during the channeled beam window via p.beamFlashUntil.
      const fx = s * 1.30, fy = s * 0.04;
      const pulse = 1 + Math.sin(gameTime * 12) * 0.20;
      const r0 = s * 0.22 * pulse;
      const halo = ctx.createRadialGradient(fx, fy, 1, fx, fy, r0);
      halo.addColorStop(0,    '#ffce44');
      halo.addColorStop(0.5,  '#c8401a');
      halo.addColorStop(1,    dark);
      ctx.fillStyle = halo;
      ctx.beginPath();
      ctx.arc(fx, fy, r0, 0, Math.PI * 2);
      ctx.fill();
      // small white-hot core
      ctx.fillStyle = '#fff5d6';
      ctx.beginPath();
      ctx.arc(fx, fy, s * 0.06 * pulse, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
  }
  ctx.restore();
}

function drawPets() {
  for (const p of pets) {
    const def = PETS[p.id];
    drawPet(p.id, p.x, p.y, (def && def.drawSize) || 28, p.heading || 0);
  }
}

function buyPet(id) {
  const def = PETS[id];
  if (!def) return;
  if (ownedPets.has(id)) return;
  if (player.money < def.cost) return;
  player.money -= def.cost;
  spawnPetCheat(id);
}

// Free spawn — used by the cheats panel and shared with buyPet for the
// actual pet-join effects. Returns silently if the pet is already owned.
function spawnPetCheat(id) {
  const def = PETS[id];
  if (!def || ownedPets.has(id)) return;
  ownedPets.add(id);
  pets.push({ id, x: player.x + 30, y: player.y + 30, vx: 0, vy: 0, lastAttack: 0, heading: 0, orbitAng: Math.random() * Math.PI * 2 });
  floaters.push({ x: player.x, y: player.y - 22, text: `${def.name} joined you`, life: 2.0, color: def.color });
  SFX.crate();
}

function updateHealFields(dt) {
  for (let i = healFields.length - 1; i >= 0; i--) {
    const f = healFields[i];
    f.life -= dt;
    if (f.life <= 0) { healFields.splice(i, 1); continue; }
    // heal the player if standing on the pad
    const dx = player.x - f.x, dy = player.y - f.y;
    if (dx*dx + dy*dy < f.r * f.r) {
      player.hp = Math.min(player.maxHp, player.hp + f.hps * dt);
    }
  }
}

// Active ability trigger. Only fires if the ability is unlocked AND off-cooldown.
function tryAbility(id) {
  if (pendingCards || inShop()) return;
  if (!player.abilities[id]) return;
  const def = ABILITIES[id];
  if (!def) return;
  const last = player.abilityLast[id] || -Infinity;
  // Quickstep perk only shortens the dash cooldown
  const cd = id === 'dash'
    ? def.cooldown * (1 - (player.special.quickstep || 0))
    : def.cooldown;
  if (gameTime - last < cd) return;
  player.abilityLast[id] = gameTime;
  if (id === 'dash') {
    // Dash in the current MOVEMENT direction (WASD/arrows). If the player
    // is standing still, fall back to the aim direction so the ability is
    // never useless.
    let mdx = 0, mdy = 0;
    if (keys['KeyW'] || keys['ArrowUp'])    mdy -= 1;
    if (keys['KeyS'] || keys['ArrowDown'])  mdy += 1;
    if (keys['KeyA'] || keys['ArrowLeft'])  mdx -= 1;
    if (keys['KeyD'] || keys['ArrowRight']) mdx += 1;
    let ang;
    if (mdx !== 0 || mdy !== 0) {
      ang = Math.atan2(mdy, mdx);
    } else {
      ang = Math.atan2(mouse.y - player.y, mouse.x - player.x);
    }
    const oldX = player.x, oldY = player.y;
    const tx = player.x + Math.cos(ang) * player.dashDistance;
    const ty = player.y + Math.sin(ang) * player.dashDistance;
    player.x = Math.max(player.r, Math.min(W - player.r, tx));
    player.y = Math.max(player.r, Math.min(H - player.r, ty));
    player.invuln = Math.max(player.invuln, player.dashInvuln);
    for (let k = 0; k < 10; k++) {
      const t = k / 10;
      particles.push({
        x: oldX + (player.x - oldX) * t,
        y: oldY + (player.y - oldY) * t,
        vx: 0, vy: 0,
        life: 0.32 - t * 0.22,
        color: def.color,
      });
    }
    shake(3);
  } else if (id === 'bulletTime') {
    // Stamp the existing slow timer on every active zombie AND set a global
    // timer so newly-spawned zombies also feel it.
    bulletTimeTimer = Math.max(bulletTimeTimer, def.duration);
    for (const z of zombies) {
      if (!z.isDummy) z.slowTimer = Math.max(z.slowTimer || 0, def.duration);
    }
    for (let i = 0; i < 36; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 80 + Math.random() * 140;
      particles.push({ x: player.x, y: player.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.6, color: def.color });
    }
  } else if (id === 'rage') {
    player.rageTimer = Math.max(player.rageTimer, def.duration);
    flashRed = Math.max(flashRed, 0.18);
    for (let i = 0; i < 28; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 100 + Math.random() * 200;
      particles.push({ x: player.x, y: player.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.5, color: def.color });
    }
  } else if (id === 'phase') {
    player.invuln = Math.max(player.invuln, def.duration);
    for (let i = 0; i < 24; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 80 + Math.random() * 160;
      particles.push({ x: player.x, y: player.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.55, color: def.color });
    }
  } else if (id === 'homing') {
    homingBulletsTimer = Math.max(homingBulletsTimer, def.duration);
    // retro-fit existing in-flight bullets so the effect feels instant
    for (const b of bullets) {
      if (!b.bulletKind || ['lightning'].indexOf(b.bulletKind) < 0) b.homing = true;
    }
    for (let i = 0; i < 18; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 60 + Math.random() * 140;
      particles.push({ x: player.x, y: player.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.5, color: def.color });
    }
  } else if (id === 'pull') {
    // Yank every non-boss zombie a big chunk of the distance toward the player.
    for (const z of zombies) {
      if (z.isBoss || z.isDummy) continue;
      const dx = player.x - z.x, dy = player.y - z.y;
      const d = Math.hypot(dx, dy) || 1;
      const pullDist = Math.min(d * 0.65, 320);
      z.x = Math.max(z.r, Math.min(W - z.r, z.x + (dx / d) * pullDist));
      z.y = Math.max(z.r, Math.min(H - z.r, z.y + (dy / d) * pullDist));
    }
    // imploding ring of particles
    for (let i = 0; i < 48; i++) {
      const a = (i / 48) * Math.PI * 2;
      particles.push({
        x: player.x + Math.cos(a) * 220, y: player.y + Math.sin(a) * 220,
        vx: -Math.cos(a) * 280, vy: -Math.sin(a) * 280,
        life: 0.55, color: def.color,
      });
    }
    shake(10);
  } else if (id === 'storm') {
    // One sky-to-ground bolt + chain hits per non-boss zombie on screen.
    for (let j = zombies.length - 1; j >= 0; j--) {
      const z = zombies[j];
      if (z.isBoss || z.isDummy) continue;
      sparks.push({ x1: z.x + (Math.random() - 0.5) * 40, y1: -20, x2: z.x, y2: z.y, life: 0.28, max: 0.28 });
      z.hp -= 40 + Math.random() * 30;
      if (z.hp <= 0) {
        killZombie(z);
        zombies.splice(j, 1);
      }
    }
    flashRed = Math.max(flashRed, 0.10);
    shake(12);
  }
  floaters.push({ x: player.x, y: player.y - 22, text: def.name, life: 1.4, color: def.color });
  shake(4);
  // Per-ability sound, falling back to the generic unlock cue
  (SFX_ABILITIES[id] || SFX.unlock)();
}

// Step the ability selector to the next/previous unlocked ability (Tab).
function cycleAbility(dir) {
  const unlocked = ABILITY_KEYS.filter(k => player.abilities[k]);
  if (!unlocked.length) return;
  // Find current selection within the unlocked subset
  const currentKey = ABILITY_KEYS[selectedAbility];
  let idx = unlocked.indexOf(currentKey);
  if (idx < 0) idx = 0;
  idx = (idx + dir + unlocked.length) % unlocked.length;
  selectedAbility = ABILITY_KEYS.indexOf(unlocked[idx]);
  SFX.uiClick();
}

// Activate whatever ability is currently selected (called from Shift).
function tryActivateSelected() {
  const key = ABILITY_KEYS[selectedAbility];
  if (key && player.abilities[key]) tryAbility(key);
}

// Per-ability sound effect played at activation.

  bulletTime() {
    tone({ freq: 480, type: 'sine', dur: 0.4, vol: 0.22, sweep: -250 });
    tone({ freq: 120, type: 'sine', dur: 0.6, vol: 0.18, sweep: -40, delay: 0.05 });
  },
  rage() {
    tone({ freq: 110, type: 'sawtooth', dur: 0.4, vol: 0.32, sweep: 80 });

  },
  phase() {
    tone({ freq: 720, type: 'sine', dur: 0.25, vol: 0.22, sweep: 600 });
    tone({ freq: 1320, type: 'sine', dur: 0.3, vol: 0.16, sweep: -400, delay: 0.05 });
  },
  homing() {
    tone({ freq: 440, type: 'square', dur: 0.16, vol: 0.22, sweep: 400 });
    tone({ freq: 880, type: 'square', dur: 0.16, vol: 0.18, sweep: 400, delay: 0.06 });
  },
  pull() {

  storm() {
    noise({ dur: 0.45, vol: 0.32, hipass: 2000 });
    tone({ freq: 90, type: 'sawtooth', dur: 0.4, vol: 0.28, sweep: -20 });

};

// (Dash is implemented via tryAbility('dash'); the old standalone tryDash
// has been folded into the active-ability system.)

// ----- Utility secondaries -----
function useHeal(def) {
  const before = player.hp;
  player.hp = Math.min(player.maxHp, player.hp + def.heal);
  const gained = player.hp - before;
  if (gained > 0) {
    floaters.push({ x: player.x, y: player.y - 22, text: `+${Math.ceil(gained)} HP`, life: 1.6, color: def.color });
    for (let i = 0; i < 18; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 60 + Math.random() * 120;
      particles.push({ x: player.x, y: player.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.55, color: def.color });
    }
  }
  SFX.pickup();
}

function useDecoy(def) {
  decoys.push({ x: player.x, y: player.y, hp: def.hp, hpMax: def.hp, life: def.life });
  // spawn ring
  for (let i = 0; i < 18; i++) {
    const a = (i / 18) * Math.PI * 2;
    particles.push({ x: player.x, y: player.y, vx: Math.cos(a) * 120, vy: Math.sin(a) * 120, life: 0.45, color: def.color });
  }
  SFX.crate();
}

function useStun(def) {
  for (const z of zombies) {
    const dx = z.x - player.x, dy = z.y - player.y;
    if (dx*dx + dy*dy < def.radius * def.radius) {
      z.slowTimer = Math.max(z.slowTimer || 0, def.duration);
    }
  }
  // expanding ring particles
  for (let i = 0; i < 56; i++) {
    const a = (i / 56) * Math.PI * 2;
    const s = 220 + Math.random() * 80;
    particles.push({ x: player.x, y: player.y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 0.65, color: def.color });
  }
  shake(10);
  SFX.unlock();
}

function nearestDecoy(z) {
  let best = null, bd2 = 300 * 300; // zombies only notice decoys within ~300px
  for (const d of decoys) {
    if (d.hp <= 0) continue;
    const dx = d.x - z.x, dy = d.y - z.y;
    const d2 = dx*dx + dy*dy;
    if (d2 < bd2) { bd2 = d2; best = d; }
  }
  return best;
}

function updateDecoys(dt) {
  for (let i = decoys.length - 1; i >= 0; i--) {
    const d = decoys[i];
    d.life -= dt;
    if (d.life <= 0 || d.hp <= 0) {
      // poof
      for (let k = 0; k < 20; k++) {
        const a = Math.random() * Math.PI * 2;
        const s = 80 + Math.random() * 160;
        particles.push({ x: d.x, y: d.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.6, color: '#ffce44' });
      }
      decoys.splice(i, 1);
    }
  }
}

// ---------- Buildings ----------
function snapBuildPos(x, y) {
  const g = 40;
  // grid cells are centered at multiples of g
  return { x: Math.round(x / g) * g, y: Math.round(y / g) * g };
}

function canPlaceBuilding(x, y, def) {
  // canvas bounds
  if (x - def.w/2 < 0 || x + def.w/2 > W) return false;
  if (y - def.h/2 < 0 || y + def.h/2 > H) return false;
  // shop area is off-limits
  if (x + def.w/2 > shop.x - 4 && x - def.w/2 < shop.x + shop.w + 4
   && y + def.h/2 > shop.y - 4 && y - def.h/2 < shop.y + shop.h + 4) return false;
  // overlap with other buildings
  for (const b of buildings) {
    if (Math.abs(x - b.x) < (def.w + b.w) / 2 && Math.abs(y - b.y) < (def.h + b.h) / 2) return false;
  }
  // overlap with player (would trap us)
  if (Math.abs(x - player.x) < def.w/2 + player.r && Math.abs(y - player.y) < def.h/2 + player.r) return false;
  return true;
}

function tryPlaceBuilding() {
  // Template / saved-base placement is multi-part: collect the parts list
  // here and delegate to placeMultiPart. Otherwise it's a single building.
  if (buildSelected === 'saved') {
    const parts = loadSavedBaseLayout();
    if (!parts) {
      floaters.push({ x: mouse.x, y: mouse.y - 20, text: 'No saved base', life: 1.4, color: '#d33' });
      return;
    }
    placeMultiPart(parts, '#80ffe0');
    return;
  }
  if (typeof buildSelected === 'string' && buildSelected.startsWith('template:')) {
    const id = buildSelected.slice('template:'.length);
    const tmpl = BASE_TEMPLATES.find(t => t.id === id);
    if (!tmpl) return;
    placeMultiPart(tmpl.parts, tmpl.color);
    return;
  }
  const def = BUILDINGS[buildSelected];
  if (!def) return;
  const { x, y } = snapBuildPos(mouse.x, mouse.y);
  if (!canPlaceBuilding(x, y, def)) return;
  if (player.money < def.cost) return;
  player.money -= def.cost;
  spawnBuilding(buildSelected, x, y);
  dropBurst(x, y, def.color, 14);
  SFX.crate();
}

// Spawn one building into buildings[] using its BUILDINGS def. Extracted
// so single + multi-part placement share the same instantiation logic.
function spawnBuilding(type, x, y) {
  const def = BUILDINGS[type];
  if (!def) return;
  const hpScale = (type === 'wall' && player.special.sturdyWalls)
    ? 1 + player.special.sturdyWalls
    : 1;
  const buildHp = Math.ceil(def.hp * hpScale);
  buildings.push({
    type,
    x, y,
    hp: buildHp, hpMax: buildHp,
    w: def.w, h: def.h,
    color: def.color,
    blocks: !!def.blocks,
    fireRate: def.fireRate || 0,
    range: def.range || 0,
    damage: def.damage || 0,
    dps: def.dps || 0,
    blastR: def.blastR || 0,
    blastDmg: def.blastDmg || 0,
    hps: def.hps || 0,
    radius: def.radius || 0,
    lastShot: 0,
    aimAng: 0,
  });
}

// Place a multi-part layout at the cursor. Each part's def must exist;
// every part position is grid-snapped and validated against canvas bounds,
// shop, other buildings (existing AND not-yet-placed parts of this same
// template), and the player. Total cost is the sum of all part defs. If
// ANY part fails or the player can't afford the total, the whole template
// is rejected and no money is spent.
function placeMultiPart(parts, accentColor) {
  const baseX = Math.round(mouse.x / 40) * 40;
  const baseY = Math.round(mouse.y / 40) * 40;
  let totalCost = 0;
  const resolved = [];
  for (const p of parts) {
    const def = BUILDINGS[p.type];
    if (!def) { /* unknown part type — skip silently rather than abort */ continue; }
    const px = baseX + p.dx;
    const py = baseY + p.dy;
    // Reject any part that lands inside an already-resolved-but-not-yet-
    // spawned part of THIS template (otherwise canPlaceBuilding wouldn't
    // catch overlapping parts since they aren't in buildings[] yet).
    let selfOverlap = false;
    for (const r of resolved) {
      if (Math.abs(px - r.x) < (def.w + BUILDINGS[r.type].w) / 2 &&
          Math.abs(py - r.y) < (def.h + BUILDINGS[r.type].h) / 2) {
        selfOverlap = true; break;
      }
    }
    if (selfOverlap) {
      floaters.push({ x: mouse.x, y: mouse.y - 20, text: 'Template self-overlap', life: 1.4, color: '#d33' });
      return;
    }
    if (!canPlaceBuilding(px, py, def)) {
      floaters.push({ x: mouse.x, y: mouse.y - 20, text: 'No room here', life: 1.4, color: '#d33' });
      return;
    }
    totalCost += def.cost;
    resolved.push({ type: p.type, x: px, y: py });
  }
  if (resolved.length === 0) return;
  if (player.money < totalCost) {
    floaters.push({ x: mouse.x, y: mouse.y - 20, text: `Need $${totalCost}`, life: 1.4, color: '#d33' });
    return;
  }
  player.money -= totalCost;
  for (const r of resolved) {
    spawnBuilding(r.type, r.x, r.y);
    dropBurst(r.x, r.y, BUILDINGS[r.type].color, 6);
  }
  shake(4);
  SFX.crate();
}

function updateBuildings(dt) {
  for (let i = buildings.length - 1; i >= 0; i--) {
    const b = buildings[i];
    if (b.hp <= 0) {
      for (let k = 0; k < 22; k++) {
        const a = Math.random() * Math.PI * 2;
        const s = 80 + Math.random() * 200;
        particles.push({ x: b.x, y: b.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.6, color: b.color });
      }
      shake(6);
      SFX.explosion();
      buildings.splice(i, 1);
      continue;
    }
    if (b.type === 'turret' || b.type === 'mortar') {
      b.lastShot -= dt;
      // pick the nearest zombie within range
      let near = null, bd2 = b.range * b.range;
      for (const z of zombies) {
        if (z.isDummy) continue;
        const dx = z.x - b.x, dy = z.y - b.y;
        const d2 = dx*dx + dy*dy;
        if (d2 < bd2) { bd2 = d2; near = z; }
      }
      if (near) {
        b.aimAng = Math.atan2(near.y - b.y, near.x - b.x);
        if (b.lastShot <= 0) {
          b.lastShot = 1 / b.fireRate;
          const ang = b.aimAng;
          const isMortar = b.type === 'mortar';
          bullets.push({
            x: b.x + Math.cos(ang) * 18,
            y: b.y + Math.sin(ang) * 18,
            vx: Math.cos(ang) * (isMortar ? 500 : 760),
            vy: Math.sin(ang) * (isMortar ? 500 : 760),
            damage: b.damage,
            pierce: 0,
            hits: new Set(),
            life: isMortar ? 1.4 : 1.0,
            color: b.color,
            explosive: isMortar,
            blastR: isMortar ? b.blastR : 0,
            blastDmg: isMortar ? b.blastDmg : 0,
            bulletKind: null,
            bounces: 0, leavesSlick: false, spawnChicks: 0,
            chains: 0, chainRange: 0,
            orbitAngle: 0, orbitRadius: 0, orbitSpeed: 0,
            isCrit: false,
          });
          SFX.shoot(isMortar ? 'rocket' : 'pistol');
        }
      }
    } else if (b.type === 'heal') {
      // passive HP regen for the player when standing inside the pylon's radius
      const dx = player.x - b.x, dy = player.y - b.y;
      if (dx*dx + dy*dy < b.radius * b.radius) {
        player.hp = Math.min(player.maxHp, player.hp + b.hps * dt);
      }
    } else if (b.type === 'spike') {
      // damage zombies standing on the trap
      for (let j = zombies.length - 1; j >= 0; j--) {
        const z = zombies[j];
        if (Math.abs(z.x - b.x) < b.w/2 + z.r && Math.abs(z.y - b.y) < b.h/2 + z.r) {
          z.hp -= b.dps * dt;
          if (z.hp <= 0) {
            killZombie(z);
            zombies.splice(j, 1);
          }
        }
      }
    }
  }
}

function swingMelee(def, ang) {
  const hitShape = def.hitShape || 'arc';
  // Center of impact for the 'circle' shape — sits in front of the player
  // along the aim direction, at def.range away.
  const cx = player.x + Math.cos(ang) * def.range;
  const cy = player.y + Math.sin(ang) * def.range;
  for (let i = zombies.length - 1; i >= 0; i--) {
    const z = zombies[i];
    // Hit test depends on shape: arc = angular sweep around player,
    // circle = disc planted in front of player.
    if (hitShape === 'arc') {
      const dx = z.x - player.x, dy = z.y - player.y;
      const d = Math.hypot(dx, dy);
      if (d > def.range + z.r) continue;
      const zAng = Math.atan2(dy, dx);
      let da = zAng - ang;
      while (da >  Math.PI) da -= Math.PI*2;
      while (da < -Math.PI) da += Math.PI*2;
      if (Math.abs(da) > def.arc / 2) continue;
    } else { // circle
      const dx = z.x - cx, dy = z.y - cy;
      const rr = def.circleR + z.r;
      if (dx*dx + dy*dy > rr * rr) continue;
    }

    // Distance from the player (used for damage / knockback direction)
    const pdx = z.x - player.x, pdy = z.y - player.y;
    const pd = Math.hypot(pdx, pdy) || 1;

    const { dmg, isCrit } = rollPerkedDamage(def.damage);
    // Boss Slayer perk applies to direct melee hits too
    const bossMul = z.isBoss && player.special.bossSlayer ? 1 + player.special.bossSlayer : 1;
    const actualDmg = modifyZombieDamage(z, dmg * bossMul, player.x, player.y);
    const dealt = Math.min(actualDmg, z.hp);
    z.hp -= actualDmg;
    pushDamageFloater(z, actualDmg, isCrit);
    if (player.special.lifesteal) {
      player.hp = Math.min(player.maxHp, player.hp + dealt * player.special.lifesteal);
    }
    if (player.special.slow) {
      z.slowTimer = Math.max(z.slowTimer || 0, player.special.slow);
    }
    // Knockback — stamp a launch velocity. Velocity decays exponentially in
    // updateZombies so the zombie flies back. Bosses resist (25% push).
    if (def.knockback) {
      const push = z.isBoss ? def.knockback * 0.25 : def.knockback;
      const knx = pdx / pd, kny = pdy / pd;
      const KNOCK_VEL_FACTOR = 5;
      z.knockVx = (z.knockVx || 0) + knx * push * KNOCK_VEL_FACTOR;
      z.knockVy = (z.knockVy || 0) + kny * push * KNOCK_VEL_FACTOR;
    }
    if (z.hp <= 0) {
      killZombie(z);
      zombies.splice(i, 1);
    }
    if (isCrit) {
      for (let p = 0; p < 6; p++) {
        const a = Math.random() * Math.PI * 2;
        const s = 100 + Math.random() * 180;
        particles.push({ x: z.x, y: z.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.4, color: '#fff5a8' });
      }
    }
  }
  // Visual: arc wedge for sweeps, expanding ring for circle smashes
  slashes.push({
    x: player.x, y: player.y, ang,
    life: 0.22, max: 0.22,
    range: def.range, arc: def.arc || 0,
    color: def.color,
    hitShape, circleR: def.circleR || 0,
  });
  shake(hitShape === 'circle' ? 8 : 4);
  SFX.swing();
}

function throwBlades(def, ang) {
  SFX.throwBlade();
  // Multishot perk can grant an extra blade per throw; Eagle Eye boosts speed.
  let shots = def.shots;
  if (player.special.multishot && Math.random() < player.special.multishot) shots += 1;
  const speedMul = 1 + (player.special.eagleEye || 0);
  for (let i = 0; i < shots; i++) {
    const a = ang + (i - (shots - 1) / 2) * def.spread;
    const { dmg, isCrit } = rollPerkedDamage(def.damage);
    bullets.push({
      x: player.x + Math.cos(a) * (player.r + 4),
      y: player.y + Math.sin(a) * (player.r + 4),
      vx: Math.cos(a) * def.speed * speedMul,
      vy: Math.sin(a) * def.speed * speedMul,
      damage: dmg,
      pierce: def.pierce,
      hits: new Set(),
      life: def.life,
      color: isCrit ? '#fff5a8' : def.color,
      explosive: false, blastR: 0, blastDmg: 0,
      bulletKind: 'kunai',
      bounces: 0, leavesSlick: false, spawnChicks: 0,
      isCrit,
    });
  }
}

function throwChakram(def, ang) {
  SFX.throwBlade();
  const { dmg, isCrit } = rollPerkedDamage(def.damage);
  const speedMul = 1 + (player.special.eagleEye || 0);
  bullets.push({
    x: player.x + Math.cos(ang) * (player.r + 6),
    y: player.y + Math.sin(ang) * (player.r + 6),
    vx: Math.cos(ang) * def.speed * speedMul,
    vy: Math.sin(ang) * def.speed * speedMul,
    damage: dmg,
    pierce: def.pierce,
    hits: new Set(),
    life: def.life,
    color: isCrit ? '#fff5a8' : def.color,
    explosive: false, blastR: 0, blastDmg: 0,
    bulletKind: 'chakram',
    bounces: 0, leavesSlick: false, spawnChicks: 0,
    // Re-hit the same zombie every 0.25s so the saw blade actually saws
    // instead of one-shotting per pass. Same mechanic the Pizza Cutter uses.
    clearHitsInterval: 0.25, clearHitsAt: 0,
    chakramTimer: 0, returning: false, outTime: def.outTime,
    isCrit,
  });
}

function updateSlashes(dt) {
  for (let i = slashes.length - 1; i >= 0; i--) {
    slashes[i].life -= dt;
    if (slashes[i].life <= 0) slashes.splice(i, 1);

}

function updateSparks(dt) {
  for (let i = sparks.length - 1; i >= 0; i--) {
    sparks[i].life -= dt;
    if (sparks[i].life <= 0) sparks.splice(i, 1);
  }
}

// Tesla chain — jump damage from a starting zombie to up to `count` nearby
// zombies within `range`, scaling damage down per hop. Each hop spawns a
// short-lived spark for the visual.
function chainLightning(fromZ, baseDmg, count, range) {
  const visited = new Set([fromZ]);
  let lastX = fromZ.x, lastY = fromZ.y;
  let dmg = baseDmg * 0.7;
  for (let h = 0; h < count; h++) {
    let best = null, bestD2 = range * range;
    for (const z of zombies) {
      if (visited.has(z)) continue;
      const dx = z.x - lastX, dy = z.y - lastY;
      const d2 = dx*dx + dy*dy;
      if (d2 < bestD2) { bestD2 = d2; best = z; }
    }
    if (!best) break;
    sparks.push({ x1: lastX, y1: lastY, x2: best.x, y2: best.y, life: 0.18, max: 0.18 });
    const dealt = Math.min(dmg, best.hp);
    best.hp -= dmg;
    if (player.special.lifesteal) {
      player.hp = Math.min(player.maxHp, player.hp + dealt * player.special.lifesteal);
    }
    if (player.special.slow) {
      best.slowTimer = Math.max(best.slowTimer || 0, player.special.slow);
    }
    if (best.hp <= 0) {
      const idx = zombies.indexOf(best);
      if (idx >= 0) { killZombie(best); zombies.splice(idx, 1); }
    } else {
      visited.add(best);
      lastX = best.x; lastY = best.y;
      dmg *= 0.7;
    }
  }
}

function explode(x, y, radius, dmg) {
  // Mighty Boom inflates the blast radius
  radius = radius * (1 + (player.special.mightyBoom || 0));
  // damage zombies in radius — bosses are immune to splash damage
  for (let j = zombies.length - 1; j >= 0; j--) {
    const z = zombies[j];
    if (z.isBoss) continue;
    const dx = z.x - x, dy = z.y - y;
    if (dx*dx + dy*dy < radius * radius) {
      const dmgDealt = Math.min(dmg, z.hp);
      z.hp -= dmg;
      pushDamageFloater(z, dmg, false);
      if (player.special.lifesteal) {
        player.hp = Math.min(player.maxHp, player.hp + dmgDealt * player.special.lifesteal);
      }
      if (player.special.slow) {
        z.slowTimer = Math.max(z.slowTimer || 0, player.special.slow);
      }
      if (z.hp <= 0) {
        killZombie(z);
        zombies.splice(j, 1);
      }
    }
  }
  for (let i = 0; i < 24; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 120 + Math.random() * 220;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.5 + Math.random()*0.3, color: '#ff8040' });
  }
  shake(14);
  SFX.explosion();
}

function detonateNuke(x, y) {
  // Skip bosses — they're immune. Mini-bosses take a chunk of HP but can't be
  // killed by the nuke itself; their hp is clamped to 1 so the player still
  // has to finish them off conventionally.
  for (let i = zombies.length - 1; i >= 0; i--) {
    const z = zombies[i];
    if (z.isBoss) continue;
    if (z.isMiniBoss) {
      const dmg = Math.max(80, z.hpMax * 0.45);
      z.hp = Math.max(1, z.hp - dmg);
      // small visual punch on the mini-boss so the player sees it took a hit
      for (let k = 0; k < 18; k++) {
        const a = Math.random() * Math.PI * 2;
        const s = 100 + Math.random() * 200;
        particles.push({ x: z.x, y: z.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.45, color: '#ffd166' });
      }
      continue;
    }
    kills++;
    spawnDeathParticles(z.x, z.y, z.color);
    addBlood(z.x, z.y, z.isBoss ? 2 : 1);
    dropCoinsFor(z);
    if (player.special.vampire) {
      player.hp = Math.min(player.maxHp, player.hp + player.special.vampire);
    }
    player.exp += z.expReward || 1;
    zombies.splice(i, 1);
  }
  for (let i = 0; i < 40; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 200 + Math.random() * 300;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.6, color: '#ffd166' });
  }
  shake(20);
  flashRed = Math.max(flashRed, 0.25);
}

function spawnPickupAt(x, y, type) {
  const def = PICKUP_TYPES[type];
  if (!def) return;
  pickups.push({ x, y, type, life: 30 });
  dropBurst(x, y, def.color, 16);
}

function spawnRandomPickup() {
  const type = PICKUP_KEYS[Math.floor(Math.random() * PICKUP_KEYS.length)];
  for (let tries = 0; tries < 25; tries++) {
    const x = 80 + Math.random() * (W - 160);
    const y = 80 + Math.random() * (H - 160);
    if (x > shop.x - 20 && x < shop.x + shop.w + 20 &&
        y > shop.y - 20 && y < shop.y + shop.h + 20) continue;
    if (Math.hypot(x - player.x, y - player.y) < 140) continue;
    spawnPickupAt(x, y, type);
    return;
  }
}

function tryDropPickup(z) {
  let chance = 0;
  if (z.isBoss)            chance = 1.0;
  else if (z.type === 'tank') chance = 0.18;
  else if (z.type === 'fast') chance = 0.09;
  else                     chance = 0.05;
  if (Math.random() >= chance) return;
  const type = PICKUP_KEYS[Math.floor(Math.random() * PICKUP_KEYS.length)];
  spawnPickupAt(z.x, z.y, type);
}

function updatePickups(dt) {
  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i];
    p.life -= dt;
    if (p.life <= 0) { pickups.splice(i, 1); continue; }
    const def = PICKUP_TYPES[p.type];
    const dx = player.x - p.x, dy = player.y - p.y;
    if (dx*dx + dy*dy < (player.r + 14) * (player.r + 14)) {
      def.apply();
      // Each pickup type has its own distinctive sound (fallback to generic).
      if (SFX_PICKUPS[p.type]) SFX_PICKUPS[p.type]();
      else SFX.pickup();
      for (let k = 0; k < 18; k++) {
        const a = Math.random() * Math.PI * 2;
        const s = 100 + Math.random() * 200;
        particles.push({ x: p.x, y: p.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.55, color: def.color });
      }
      pickups.splice(i, 1);
    }
  }
}

function dropGunAt(x, y, weapon, life) {
  guns.push({ x, y, weapon, life });
  dropBurst(x, y, WEAPONS[weapon].color, 16);
}

// Boss-defeat chest. Spawned when a boss dies; opens on contact and grants
// a random permanent upgrade for free.
function spawnBossChest(x, y) {

}

function openChest(c) {

  const pick = perms[Math.floor(Math.random() * perms.length)];
  pick.buy(); // applies effect AND bumps cost — consistent with shop purchases
  floaters.push({ x: c.x, y: c.y - 8, text: pick.name + '  (FREE)', life: 2.4, color: '#ffe066' });

    particles.push({ x: c.x, y: c.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.7 + Math.random()*0.4, color: i % 2 ? '#ffd166' : '#fff5b8' });
  }

}

function updateChests(dt) {
  for (let i = chests.length - 1; i >= 0; i--) {
    const c = chests[i];
    const dx = player.x - c.x, dy = player.y - c.y;

function updateFloaters(dt) {
  for (let i = floaters.length - 1; i >= 0; i--) {

    f.life -= dt;
    f.y -= 28 * dt;
    if (f.life <= 0) floaters.splice(i, 1);

function tryDropGun(z) {
  // bosses always drop, tanks have higher chance, regulars rare
  let chance = 0;
  if (z.isBoss)            chance = 1.0;
  else if (z.type === 'tank') chance = 0.10;
  else if (z.type === 'fast') chance = 0.02;
  else                     chance = 0.012;
  if (Math.random() >= chance) return;
  const weapon = DROPPABLE_WEAPONS[Math.floor(Math.random() * DROPPABLE_WEAPONS.length)];
  dropGunAt(z.x, z.y, weapon, 22);
}

function updatePlayer(dt) {
  // While the card-picker overlay is up, treat it like a menu: the character
  // freezes in place — no movement input, no aim-tracking, no held actions.
  // Other passive timers below (invuln, buffs, etc.) still tick so the player
  // doesn't get a free permanent shield by stalling on the perk screen.
  const inOverlay = !!pendingCards;
  let dx = 0, dy = 0;
  if (!inOverlay) {
    // When co-op is on, arrow keys belong to P2. Single-player keeps arrow
    // support so anyone who used arrows before still has them.
    const allowArrows = !coopEnabled;
    if (keys['KeyW'] || (allowArrows && keys['ArrowUp']))    dy -= 1;
    if (keys['KeyS'] || (allowArrows && keys['ArrowDown']))  dy += 1;
    if (keys['KeyA'] || (allowArrows && keys['ArrowLeft']))  dx -= 1;
    if (keys['KeyD'] || (allowArrows && keys['ArrowRight'])) dx += 1;
  }
  const len = Math.hypot(dx, dy);
  if (len > 0) { dx /= len; dy /= len; }
  const sp = player.speed * (player.buffs.fast > 0 ? 1.5 : 1);
  player.x = Math.max(player.r, Math.min(W - player.r, player.x + dx * sp * dt));
  player.y = Math.max(player.r, Math.min(H - player.r, player.y + dy * sp * dt));

  if (player.invuln > 0) player.invuln -= dt;

  // Bow charging — accumulate draw time while held, capped at chargeTime.
  if (player.bowHeld) {
    const bdef = SECONDARIES[player.secondary];
    if (!bdef || bdef.kind !== 'charge') {
      // Player swapped off the bow mid-draw; cancel cleanly
      cancelBowCharge();
    } else {
      player.bowCharge = Math.min(bdef.chargeTime, player.bowCharge + dt);
    }
  }

  for (const k in player.buffs) {
    if (k === 'shield') continue;
    if (player.buffs[k] > 0) {
      player.buffs[k] -= dt;
      if (player.buffs[k] < 0) player.buffs[k] = 0;
    }
  }

  // Regen perk — passive HP recovery
  if (player.special.regen) {
    player.hp = Math.min(player.maxHp, player.hp + player.special.regen * dt);
  }
  // Active ability timers tick down here so they affect this and next frames.
  if (player.rageTimer > 0) player.rageTimer = Math.max(0, player.rageTimer - dt);
  if (bulletTimeTimer > 0)  bulletTimeTimer  = Math.max(0, bulletTimeTimer  - dt);
  if (homingBulletsTimer > 0) homingBulletsTimer = Math.max(0, homingBulletsTimer - dt);
}

// Local co-op companion. Movement on arrow keys, primary fire is auto-aim
// at the nearest non-dummy zombie within 380px. Shares P1's weapon and all
// the stat/perk math through tryShootFor — only the spawn position and
// per-shot cooldown are per-P2.
function updateP2(dt) {
  // Card-pick overlay freezes P2 (movement + auto-fire) just like P1.
  const inOverlay = !!pendingCards;
  let dx = 0, dy = 0;
  if (!inOverlay) {
    if (keys['ArrowUp'])    dy -= 1;
    if (keys['ArrowDown'])  dy += 1;
    if (keys['ArrowLeft'])  dx -= 1;
    if (keys['ArrowRight']) dx += 1;
  }
  const len = Math.hypot(dx, dy);
  if (len > 0) { dx /= len; dy /= len; }
  const sp = player.speed * (player.buffs.fast > 0 ? 1.5 : 1);
  player2.x = Math.max(player2.r, Math.min(W - player2.r, player2.x + dx * sp * dt));
  player2.y = Math.max(player2.r, Math.min(H - player2.r, player2.y + dy * sp * dt));
  if (player2.invuln > 0) player2.invuln -= dt;
  // Decay P2's local buffs (own shield etc.)
  for (const k in player2.buffs) {
    if (k === 'shield') continue;
    if (player2.buffs[k] > 0) {
      player2.buffs[k] -= dt;
      if (player2.buffs[k] < 0) player2.buffs[k] = 0;
    }
  }
  // Auto-fire — shared helper finds nearest threat + fires through tryShootFor.
  // Skip while the card overlay is up so P2 doesn't keep mowing things down.
  if (!inOverlay) playerAutoShoot(player2, gameTime);
}

// Shared auto-fire used by P2 (always) and P1 (when the autoShoot toggle is
// on). Finds the nearest non-dummy zombie within 380px and fires at it
// using the player's shoot path so all the existing perk math applies.
function playerAutoShoot(p, nowSec) {
  let near = null, bd2 = 380 * 380;
  for (const z of zombies) {
    if (z.isDummy) continue;
    const zdx = z.x - p.x, zdy = z.y - p.y;
    const d2 = zdx*zdx + zdy*zdy;
    if (d2 < bd2) { bd2 = d2; near = z; }
  }
  if (near) {
    const ang = Math.atan2(near.y - p.y, near.x - p.x);
    tryShootFor(p, ang, nowSec);
  }
}

function zombieCanEnter(x, y, r) {
  // shop area is impassable
  if (x + r > shop.x && x - r < shop.x + shop.w
   && y + r > shop.y && y - r < shop.y + shop.h) return false;
  // blocking buildings (walls + turrets) act as solid AABBs
  for (const b of buildings) {
    if (!b.blocks) continue;
    if (x + r > b.x - b.w/2 && x - r < b.x + b.w/2
     && y + r > b.y - b.h/2 && y - r < b.y + b.h/2) return false;
  }
  return true;
}

function updateZombies(dt) {
  for (let i = zombies.length - 1; i >= 0; i--) {
    const z = zombies[i];
    // Dummies don't move, don't attack, don't aggro on anything.
    if (z.isDummy) continue;
    // Confusion (Mystery Potion) — overrides chase. The zombie picks a
    // random direction every ~1 second and stumbles toward it instead of
    // chasing anything sensible.
    let tx, ty;
    if (z.confuseTimer && z.confuseTimer > 0) {
      z.confuseTimer -= dt;
      z.confuseRetargetT = (z.confuseRetargetT || 0) - dt;
      if (z.confuseRetargetT <= 0) {
        z.confuseAng = Math.random() * Math.PI * 2;
        z.confuseRetargetT = 0.6 + Math.random() * 0.8;
      }
      tx = z.x + Math.cos(z.confuseAng) * 200;
      ty = z.y + Math.sin(z.confuseAng) * 200;
    } else {
      // Aggro toward the nearest decoy if there is one, else the nearest
      // living player (covers co-op P2 as well as P1).
      const lure = nearestDecoy(z);
      if (lure) { tx = lure.x; ty = lure.y; }
      else {
        let nearestP = player, bd2 = Infinity;
        for (const p of players) {
          if (p.hp <= 0) continue;
          const pdx = p.x - z.x, pdy = p.y - z.y;
          const d2 = pdx*pdx + pdy*pdy;
          if (d2 < bd2) { bd2 = d2; nearestP = p; }
        }
        tx = nearestP.x; ty = nearestP.y;
      }
    }
    const dx = tx - z.x, dy = ty - z.y;
    const d = Math.hypot(dx, dy) || 1;
    // banana slicks slow whoever's on top of them
    let speedMul = 1;
    for (const s of slicks) {
      const sx = z.x - s.x, sy = z.y - s.y;
      if (sx*sx + sy*sy < s.r * s.r) { speedMul = 0.35; break; }
    }
    // cold-bullets slow timer
    if (z.slowTimer && z.slowTimer > 0) {
      z.slowTimer -= dt;
      speedMul = Math.min(speedMul, 0.45);
    }
    // Confetti / Lawnmower stun — pauses the zombie entirely
    if (z.stunTimer && z.stunTimer > 0) {
      z.stunTimer -= dt;
      speedMul = 0;
    }
    // Burn (Confetti) / poison (Spaghetti) ticks — DoT applied each frame.
    if (z.burnTimer && z.burnTimer > 0) {
      z.burnTimer -= dt;
      z.hp -= (z.burnDps || 0) * dt;
      if (Math.random() < dt * 8) {
        particles.push({ x: z.x + (Math.random()-0.5)*8, y: z.y - 6, vx: 0, vy: -40, life: 0.3, color: '#ff8030' });
      }
    }
    if (z.poisonTimer && z.poisonTimer > 0) {
      z.poisonTimer -= dt;
      z.hp -= (z.poisonDps || 0) * dt;
      if (Math.random() < dt * 6) {
        particles.push({ x: z.x + (Math.random()-0.5)*8, y: z.y - 6, vx: 0, vy: -30, life: 0.4, color: '#d63030' });
      }
    }
    // Either DoT can kill the zombie — splice + drop if so.
    if ((z.burnTimer > 0 || z.poisonTimer > 0) && z.hp <= 0) {
      killZombie(z);
      zombies.splice(i, 1);
      continue;
    }
    // Bullet Time ability — global slow until the timer expires
    if (bulletTimeTimer > 0) speedMul = Math.min(speedMul, 0.30);
    const effSpeed = z.speed * speedMul;
    let vx = (dx / d) * effSpeed;
    let vy = (dy / d) * effSpeed;
    // Knockback velocity (stamped by melee hits) decays exponentially over
    // real time; while non-zero it dominates the chase velocity, launching
    // the zombie back in an arc.
    if (z.knockVx || z.knockVy) {
      vx += z.knockVx || 0;
      vy += z.knockVy || 0;
      // ~0.01 of velocity remains after 1 second (~99% decay/sec)
      const friction = Math.pow(0.01, dt);
      if (z.knockVx) z.knockVx = Math.abs(z.knockVx * friction) < 5 ? 0 : z.knockVx * friction;
      if (z.knockVy) z.knockVy = Math.abs(z.knockVy * friction) < 5 ? 0 : z.knockVy * friction;
    }
    const nx = z.x + vx * dt;
    const ny = z.y + vy * dt;
    if (zombieCanEnter(nx, z.y, z.r)) z.x = nx;
    if (zombieCanEnter(z.x, ny, z.r)) z.y = ny;
    // Soft clamp so launched zombies don't fly fully off-screen forever.
    z.x = Math.max(-z.r, Math.min(W + z.r, z.x));
    z.y = Math.max(-z.r, Math.min(H + z.r, z.y));

    // Boss type dispatch — each archetype has its own signature ability.
    if (z.isBoss) {
      switch (z.bossType) {
        case 'warlord':
        default: {
          z.minionTimer -= dt;
          if (z.minionTimer <= 0) {
            z.minionTimer = 4 + Math.random() * 2;
            spawnBossMinions(z, 3);
          }
          break;
        }
        case 'necromancer': {
          // Slower cadence but a bigger swarm — feels like a tide of dead.
          z.minionTimer -= dt;
          if (z.minionTimer <= 0) {
            z.minionTimer = 6 + Math.random() * 2;
            spawnBossMinions(z, 6);
            // Burst of purple particles for flavor
            for (let k = 0; k < 22; k++) {
              const a = Math.random() * Math.PI * 2;
              const s = 80 + Math.random() * 220;
              particles.push({ x: z.x, y: z.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.55, color: k % 2 ? '#c47eff' : '#3a1a5a' });
            }
          }
          break;
        }
        case 'charger': {
          // Cycle: idle → brief wind-up → charge boost → idle.
          if (z.charging) {
            z.chargeDur -= dt;
            if (z.chargeDur <= 0) {
              z.charging = false;
              z.speed = z.baseSpeed;
              z.chargeTimer = 4 + Math.random() * 2;
            }
            // Trail particles during the charge
            if (Math.random() < dt * 30) {
              particles.push({ x: z.x, y: z.y, vx: (Math.random()-0.5)*60, vy: (Math.random()-0.5)*60, life: 0.4, color: '#ff9d3a' });
            }
          } else {
            z.chargeTimer -= dt;
            if (z.chargeTimer <= 0) {
              // Wind-up flash then accelerate
              z.charging = true;
              z.chargeDur = 1.4;
              z.speed = z.baseSpeed * 4.2;
              for (let k = 0; k < 24; k++) {
                const a = Math.random() * Math.PI * 2;
                const s = 80 + Math.random() * 180;
                particles.push({ x: z.x, y: z.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.4, color: '#ffce44' });
              }
              shake(4);
            }
          }
          break;
        }
        case 'hexmage': {
          // Fires arcing hex bolts at the player on a fixed cadence. Uses
          // the existing zombieBullets pipeline so collision + damage work.
          z.shotTimer -= dt;
          if (z.shotTimer <= 0 && d > 60) {
            z.shotTimer = 1.5 + Math.random() * 0.8;
            spawnHexBolt(z, 3);
          }
          break;
        }
        case 'berserker': {
          // Rage scales with missing HP — at 0% HP missing the boss runs at
          // base values; at 100% missing it nearly doubles them.
          const rage = 1 - z.hp / z.hpMax;
          z.speed  = z.baseSpeed  * (1 + rage * 0.85);
          z.damage = z.baseDamage * (1 + rage * 0.60);
          // Red rage particles trail at high rage
          if (rage > 0.5 && Math.random() < dt * 18) {
            particles.push({ x: z.x + (Math.random()-0.5)*z.r, y: z.y + (Math.random()-0.5)*z.r, vx: 0, vy: -40, life: 0.4, color: '#ff5050' });
          }
          break;
        }
      }
    }

    // ---- Per-type behaviors ----
    if (z.type === 'spitter') {
      const def = ZOMBIE_TYPES.spitter;
      // back-off behavior — if closer than preferRange, push away from player
      if (d < def.preferRange) {
        const back = (def.preferRange - d) * 0.6;
        z.x -= (dx / d) * back * dt;
        z.y -= (dy / d) * back * dt;
      }
      z.shotTimer -= dt;
      if (z.shotTimer <= 0 && d > 40) {
        z.shotTimer = def.shotCd * (0.9 + Math.random() * 0.4);
        const sa = Math.atan2(player.y - z.y, player.x - z.x);
        zombieBullets.push({
          x: z.x, y: z.y,
          vx: Math.cos(sa) * def.shotSpeed,
          vy: Math.sin(sa) * def.shotSpeed,
          r: def.shotR, dmg: def.shotDmg * (1 + wave * 0.025),
          life: 2.2, color: '#c490ff',
        });
      }
    } else if (z.type === 'healer') {
      const def = ZOMBIE_TYPES.healer;
      z.healTimer -= dt;
      if (z.healTimer <= 0) {
        z.healTimer = def.healCd;
        // Pulse: heal every other zombie within healR (capped at hpMax)
        for (const other of zombies) {
          if (other === z) continue;
          if (other.isBoss) continue;
          const hx = other.x - z.x, hy = other.y - z.y;
          if (hx * hx + hy * hy < def.healR * def.healR) {
            other.hp = Math.min(other.hpMax, other.hp + def.healAmt);
          }
        }
        healPulses.push({ x: z.x, y: z.y, r: 0, max: def.healR, life: 0.6, maxLife: 0.6 });
      }
    } else if (z.type === 'spawner') {
      const def = ZOMBIE_TYPES.spawner;
      z.minionTimer -= dt;
      if (z.minionTimer <= 0 && zombies.length < 100) {
        z.minionTimer = def.minionCd * (0.85 + Math.random() * 0.3);
        for (let k = 0; k < 2; k++) {
          const a = Math.random() * Math.PI * 2;
          const dist = z.r + 10;
          const hp = Math.ceil(def.minionHp * (1 + wave * 0.07));
          zombies.push({
            x: z.x + Math.cos(a) * dist,
            y: z.y + Math.sin(a) * dist,
            type: 'spawn-minion',
            r: def.minionR, color: '#8a6448', speed: def.minionSpeed,
            hp, hpMax: hp,
            damage: def.minionDmg * (1 + wave * 0.025),
            money: 1, expReward: 1,
            phase: Math.random() * Math.PI * 2,
          });
        }
      }
    }

    // Contact damage + thorns — iterate every living player so P2 (when in
    // co-op) takes hits too. Perks like Iron Skin / Last Stand / Thorns read
    // from P1 (perks are a shared team-wide effect).
    let zombieDiedToThorns = false;
    for (const p of players) {
      if (p.hp <= 0) continue;
      const pdx = p.x - z.x, pdy = p.y - z.y;
      const pd = Math.hypot(pdx, pdy) || 1;
      const rr = z.r + p.r;
      const inContact = pdx*pdx + pdy*pdy < rr*rr;
      if (inContact && p.invuln <= 0 && !godMode) {
        if (p.buffs.shield > 0) {
          p.buffs.shield = 0;
          const knock = 12 / pd;
          p.x -= pdx * knock;
          p.y -= pdy * knock;
          p.invuln = 0.6;
          shake(8);
        } else {
          let dmgMul = 1 - (player.special.ironSkin || 0);
          if (player.special.lastStand && p.hp / p.maxHp < 0.2) {
            dmgMul -= player.special.lastStand;
          }
          const dmgTaken = z.damage * dt * Math.max(0, dmgMul);
          p.hp -= dmgTaken;
          flashRed = Math.max(flashRed, Math.min(0.35, dmgTaken * 0.03));
          SFX.playerHurt();
        }
      }
      if (inContact && player.special.thorns) {
        z.hp -= player.special.thorns * dt;
        if (z.hp <= 0) {
          killZombie(z);
          zombies.splice(i, 1);
          zombieDiedToThorns = true;
          break;
        }
      }
    }
    if (zombieDiedToThorns) continue;
    // Decoy contact damage — zombies tear into the decoy when in range.
    for (const dc of decoys) {
      const ddx = dc.x - z.x, ddy = dc.y - z.y;
      const drr = z.r + 14;
      if (ddx*ddx + ddy*ddy < drr*drr) {
        dc.hp -= z.damage * dt;
      }
    }
    // Building contact damage — zombies bash at walls/turrets they can't pass.
    for (const b of buildings) {
      if (Math.abs(z.x - b.x) < b.w/2 + z.r && Math.abs(z.y - b.y) < b.h/2 + z.r) {
        b.hp -= z.damage * dt * 0.5;
      }
    }
  }
}

// Returns true if the segment (x0,y0)->(x1,y1) passes within `r` of (cx,cy).
// Used by updateBullets to do swept collision so fast bullets can't tunnel
// past zombies that they would have intersected mid-frame.
function segmentHitsCircle(x0, y0, x1, y1, cx, cy, r) {
  const dx = x1 - x0, dy = y1 - y0;
  const len2 = dx*dx + dy*dy;
  if (len2 === 0) {
    const ex = cx - x0, ey = cy - y0;
    return ex*ex + ey*ey < r*r;
  }
  // closest-point parameter clamped to the segment
  let t = ((cx - x0) * dx + (cy - y0) * dy) / len2;
  if (t < 0) t = 0; else if (t > 1) t = 1;
  const px = x0 + t * dx, py = y0 + t * dy;
  const ex = cx - px, ey = cy - py;
  return ex*ex + ey*ey < r*r;
}

// Entry-point t along the segment where it first intersects the circle.
// Returns null when the segment never enters the disc. Used to place
// explosions / bounce origins at the actual impact instead of frame-end.
function segmentCircleEntry(x0, y0, x1, y1, cx, cy, r) {
  const dx = x1 - x0, dy = y1 - y0;
  const fx = x0 - cx, fy = y0 - cy;
  const a = dx*dx + dy*dy;
  const bq = 2 * (fx*dx + fy*dy);
  const cq = fx*fx + fy*fy - r*r;
  if (a === 0) return cq < 0 ? 0 : null;
  const disc = bq*bq - 4*a*cq;
  if (disc < 0) return null;
  const sd = Math.sqrt(disc);
  const t1 = (-bq - sd) / (2*a);
  const t2 = (-bq + sd) / (2*a);
  if (t1 >= 0 && t1 <= 1) return t1;
  if (t2 >= 0 && t2 <= 1) return t2;
  if (t1 < 0 && t2 > 1) return 0; // segment starts already inside the circle
  return null;
}

// Spitter projectiles + buildings/decoys deal damage to the player on contact.
// Type-specific incoming-damage modifier. Currently only the Shielded zombie
// uses this — front hits (where it's facing the player) deal reduced damage.
// Returns the effective damage value, leaving the caller to apply it to hp.
function modifyZombieDamage(z, dmg, hitX, hitY) {
  if (z.type !== 'shielded') return dmg;
  const def = ZOMBIE_TYPES.shielded;
  const fdx = player.x - z.x, fdy = player.y - z.y;
  const fl = Math.hypot(fdx, fdy) || 1;
  const hdx = hitX - z.x, hdy = hitY - z.y;
  const hl = Math.hypot(hdx, hdy) || 1;
  const dot = (fdx * hdx + fdy * hdy) / (fl * hl);
  // If the hit came from the same hemisphere as the player, the shield blocks.
  if (dot > def.shieldDot) return dmg * def.shieldMul;
  return dmg;
}

// Apply a per-bullet on-hit status effect. The bullet carries `effect` and
// optional `effectDur` / `effectDps`; this routes to the right zombie field.
function applyBulletStatus(b, z) {
  if (!b.effect || z.isBoss) return;
  const dur = b.effectDur || 3;
  switch (b.effect) {
    case 'burn':
      z.burnTimer = Math.max(z.burnTimer || 0, dur);
      z.burnDps = Math.max(z.burnDps || 0, b.effectDps || 6);
      break;
    case 'poison':
      z.poisonTimer = Math.max(z.poisonTimer || 0, dur);
      z.poisonDps = Math.max(z.poisonDps || 0, b.effectDps || 8);
      break;
    case 'slow':
      z.slowTimer = Math.max(z.slowTimer || 0, dur);
      break;
    case 'stun':
      z.stunTimer = Math.max(z.stunTimer || 0, Math.min(dur, 1.2));
      break;
    case 'knockback': {
      const kdx = z.x - player.x, kdy = z.y - player.y;
      const klen = Math.hypot(kdx, kdy) || 1;
      const push = 480;
      z.knockVx = (z.knockVx || 0) + (kdx / klen) * push;
      z.knockVy = (z.knockVy || 0) + (kdy / klen) * push;
      break;
    }
  }
}

function updateZombieBullets(dt) {
  for (let i = zombieBullets.length - 1; i >= 0; i--) {
    const b = zombieBullets[i];
    b.life -= dt;
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    // off-screen or expired
    if (b.life <= 0 || b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) {
      zombieBullets.splice(i, 1);
      continue;
    }
    // player hit?
    const dx = player.x - b.x, dy = player.y - b.y;
    const rr = b.r + player.r;
    if (dx * dx + dy * dy < rr * rr) {
      if (player.invuln <= 0 && !godMode) {
        if (player.buffs.shield > 0) {
          player.buffs.shield = 0;
          player.invuln = 0.6;
        } else {
          let dmgMul = 1 - (player.special.ironSkin || 0);
          if (player.special.lastStand && player.hp / player.maxHp < 0.2) {
            dmgMul -= player.special.lastStand;
          }
          const dmgTaken = b.dmg * Math.max(0, dmgMul);
          player.hp -= dmgTaken;
          flashRed = Math.max(flashRed, Math.min(0.4, dmgTaken * 0.05));
          SFX.playerHurt();
        }
      }
      // small splat regardless of whether the player took damage
      for (let k = 0; k < 6; k++) {
        const a = Math.random() * Math.PI * 2;
        const s = 80 + Math.random() * 120;
        particles.push({ x: b.x, y: b.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.4, color: b.color });
      }
      zombieBullets.splice(i, 1);
    }
  }
}

function updateHealPulses(dt) {
  for (let i = healPulses.length - 1; i >= 0; i--) {
    const h = healPulses[i];
    h.life -= dt;
    h.r = (1 - h.life / h.maxLife) * h.max;
    if (h.life <= 0) healPulses.splice(i, 1);
  }
}

function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    // Arc bomb: lobbed in a parabola from start to target. Position lerps
    // linearly along the ground; height follows a sin() arc so it visually
    // rises and falls. Explodes on landing — no mid-air zombie collision.
    if (b.arcBomb) {
      b.flightT += dt / b.flightDur;
      if (b.flightT >= 1) {
        // Mystery Potion takes a different landing path — random status
        // applied to zombies inside its splash radius (no direct damage).
        if (b.isPotion) {
          landPotion(b.targetX, b.targetY, b.potionRadius || 100);
        } else {
          explode(b.targetX, b.targetY, b.blastR, b.damage + b.blastDmg);
