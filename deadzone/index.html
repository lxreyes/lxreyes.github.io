<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<title>DEADZONE</title>
<style>
  html, body {
    margin: 0; height: 100%; width: 100%;
    background: radial-gradient(circle at 50% 30%, #14141a 0%, #06060a 80%);
    color: #eee; font-family: -apple-system, system-ui, sans-serif; overflow: hidden;
    user-select: none; -webkit-user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
    touch-action: none;
  }
  #wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 14px; height: calc(100% - 28px); }
  h1 { margin: 0; font-size: 18px; letter-spacing: 4px; }
  .sub { font-size: 11px; opacity: 0.55; }
  /* Canvas scales to fit its container while preserving 1200x680 aspect via
     the JS layout-fit code. On mobile the wrap chrome (h1, .sub) hides so
     the canvas can fill the viewport. */
  canvas { display: block; cursor: crosshair; background: #0d0e12; border-radius: 6px; box-shadow: 0 0 0 1px #2a2a33, 0 12px 40px rgba(0,0,0,0.5); touch-action: none; }
  kbd { background: #222; padding: 1px 5px; border-radius: 4px; font-family: ui-monospace, monospace; font-size: 10px; }

  /* Touch / small-viewport adjustments. Strip page chrome and let the
     canvas fill the screen. */
  body.touch #wrap { padding: 0; gap: 0; height: 100%; justify-content: center; }
  body.touch h1, body.touch .sub { display: none; }
  body.touch canvas { border-radius: 0; box-shadow: none; cursor: default; }

  /* Touch control overlays — virtual joystick (movement) on the left and
     a fire/aim pad on the right. Hidden by default; shown on touch. */
  .vctl { position: fixed; pointer-events: auto; z-index: 50; user-select: none; -webkit-user-select: none; }
  .vctl.hidden { display: none; }
  #vstick {
    left: 16px; bottom: 16px; width: 140px; height: 140px;
    border: 2px solid rgba(126, 200, 255, 0.55); border-radius: 50%;
    background: rgba(10, 14, 22, 0.55);
  }
  #vstick .knob {
    position: absolute; left: 50%; top: 50%; width: 60px; height: 60px;
    margin: -30px 0 0 -30px; border-radius: 50%;
    background: rgba(126, 200, 255, 0.65);
    border: 2px solid #fff;
  }
  #vbtn-secondary, #vbtn-ability, #vbtn-swap {
    width: 64px; height: 64px; border-radius: 50%; right: 16px;
    background: rgba(10, 14, 22, 0.55);
    color: #fff; font: bold 12px system-ui; text-align: center; line-height: 64px;
    border: 2px solid rgba(255, 255, 255, 0.35);
  }
  #vbtn-secondary { bottom: 16px;  border-color: #c47eff; }
  #vbtn-ability   { bottom: 96px;  border-color: #5cffec; }
  #vbtn-swap      { bottom: 176px; border-color: #ffd166; }
</style>
</head>
<body>
<div id="wrap">
  <h1>D E A D Z O N E</h1>
  <div class="sub"><kbd>WASD</kbd> move · <kbd>mouse</kbd> aim · <kbd>hold LMB</kbd> shoot · stand in the shop to see upgrades · press <kbd>1-9</kbd> to buy · <kbd>R</kbd> reset</div>
  <canvas id="c" width="1200" height="680"></canvas>
</div>
<!-- Touch overlays (added to DOM but hidden until touch is detected) -->
<div id="vstick" class="vctl hidden"><div class="knob"></div></div>
<div id="vbtn-swap" class="vctl hidden">SWAP</div>
<div id="vbtn-ability" class="vctl hidden">ABIL</div>
<div id="vbtn-secondary" class="vctl hidden">2ND</div>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const W = c.width, H = c.height;

// ---------- Touch / mobile support ----------
// The canvas keeps its internal 1200x680 logical resolution. CSS scales it
// to fit the viewport while preserving aspect; mouse-event coords are
// rescaled through c.getBoundingClientRect() (already done by the
// existing mousemove handler), so all gameplay code keeps working.
const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
if (isTouch) document.body.classList.add('touch');

function fitCanvas() {
  if (!isTouch) return;
  const aspect = W / H;
  const vw = window.innerWidth, vh = window.innerHeight;
  let cw, ch;
  if (vw / vh > aspect) { ch = vh; cw = ch * aspect; }
  else                  { cw = vw; ch = cw / aspect; }
  c.style.width  = cw + 'px';
  c.style.height = ch + 'px';
}
window.addEventListener('resize', fitCanvas);
window.addEventListener('orientationchange', fitCanvas);
fitCanvas();

// Offscreen-cached arena floor (riveted metal sheet panels). Drawn once at
// startup so the per-frame cost is a single drawImage blit. See
// buildMetalFloor() below.
const floorCache = document.createElement('canvas');
floorCache.width = W; floorCache.height = H;
function buildMetalFloor() {
  const fc = floorCache.getContext('2d');
  // Base fill: dark gunmetal everywhere
  fc.fillStyle = '#161922';
  fc.fillRect(0, 0, W, H);
  // Lay out sheets in a grid
  const sheetW = 240, sheetH = 180;
  const cols = Math.ceil(W / sheetW);
  const rows = Math.ceil(H / sheetH);
  for (let r = 0; r < rows; r++) {
    for (let c2 = 0; c2 < cols; c2++) {
      const sx = c2 * sheetW;
      const sy = r * sheetH;
      const sw = Math.min(sheetW, W - sx);
      const sh = Math.min(sheetH, H - sy);
      // Per-sheet tint — derived from grid position so every sheet looks
      // slightly different but stays stable.
      const tint = ((c2 * 31 + r * 17) % 12) - 6;
      const base = Math.max(22, Math.min(42, 32 + tint));
      fc.fillStyle = `rgb(${base - 3}, ${base}, ${base + 6})`;
      fc.fillRect(sx, sy, sw, sh);
      // Top/bottom shading gradient for depth
      const grad = fc.createLinearGradient(sx, sy, sx, sy + sh);
      grad.addColorStop(0, 'rgba(255, 255, 255, 0.045)');
      grad.addColorStop(0.5, 'rgba(0, 0, 0, 0)');
      grad.addColorStop(1, 'rgba(0, 0, 0, 0.10)');
      fc.fillStyle = grad;
      fc.fillRect(sx, sy, sw, sh);
      // Subtle horizontal "brushed metal" streaks
      fc.strokeStyle = 'rgba(255, 255, 255, 0.025)';
      fc.lineWidth = 1;
      for (let k = 0; k < 8; k++) {
        const yy = sy + ((k * 17 + (c2 * 13)) % sh);
        fc.beginPath();
        fc.moveTo(sx + 4, yy + 0.5);
        fc.lineTo(sx + sw - 4, yy + 0.5);
        fc.stroke();
      }
      // Dark seam between sheets (right + bottom edges of this sheet)
      fc.strokeStyle = '#0a0c10';
      fc.lineWidth = 1;
      fc.beginPath();
      fc.moveTo(sx + sw - 0.5, sy);
      fc.lineTo(sx + sw - 0.5, sy + sh);
      fc.moveTo(sx, sy + sh - 0.5);
      fc.lineTo(sx + sw, sy + sh - 0.5);
      fc.stroke();
      // Thin highlight along the top + left of each sheet (inset bevel)
      fc.strokeStyle = 'rgba(255, 255, 255, 0.06)';
      fc.beginPath();
      fc.moveTo(sx + 0.5, sy + sh);
      fc.lineTo(sx + 0.5, sy + 0.5);
      fc.lineTo(sx + sw, sy + 0.5);
      fc.stroke();
      // Rivets — at the four corners and at edge midpoints
      const rivetPts = [
        [sx + 8, sy + 8], [sx + sw - 8, sy + 8],
        [sx + 8, sy + sh - 8], [sx + sw - 8, sy + sh - 8],
        [sx + sw / 2, sy + 8], [sx + sw / 2, sy + sh - 8],
        [sx + 8, sy + sh / 2], [sx + sw - 8, sy + sh / 2],
      ];
      for (const [rx, ry] of rivetPts) {
        // dark socket
        fc.fillStyle = '#0a0c10';
        fc.beginPath(); fc.arc(rx, ry, 2.7, 0, Math.PI * 2); fc.fill();
        // metal head
        fc.fillStyle = '#3a4050';
        fc.beginPath(); fc.arc(rx, ry, 1.9, 0, Math.PI * 2); fc.fill();
        // top-left highlight (gives the rivet a 3D feel)
        fc.fillStyle = 'rgba(255, 255, 255, 0.45)';
        fc.beginPath(); fc.arc(rx - 0.5, ry - 0.5, 0.7, 0, Math.PI * 2); fc.fill();
      }
    }
  }
}
buildMetalFloor();

// ---------- Audio (procedural, Web Audio API) ----------
// Sounds are generated at runtime — no audio files needed, single-file kept.
// AudioContext is lazy-init'd on the first user gesture (autoplay policy).
let audioCtx = null;
let masterGain = null;
let soundMuted = false;
let sfxVolume = 1.0;   // 0..1, applied to the SFX masterGain
let musicVolume = 1.0; // 0..1, applied to the music master
const sfxLast = {};
const SFX_BASE = 0.32;    // SFX masterGain base level (before user scale + mute)
const MUSIC_BASE = 0.5;   // Music master base level

function ensureAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = soundMuted ? 0 : SFX_BASE * sfxVolume;
    masterGain.connect(audioCtx.destination);
    ensureMusic();
  } catch (e) { /* environment lacks Web Audio; sfx becomes a no-op */ }
}

// Re-apply the SFX master gain when sfxVolume or soundMuted changes.
function applySfxVolume() {
  if (!masterGain) return;
  const t = audioCtx.currentTime;
  masterGain.gain.cancelScheduledValues(t);
  masterGain.gain.setValueAtTime(masterGain.gain.value, t);
  masterGain.gain.linearRampToValueAtTime(soundMuted ? 0 : SFX_BASE * sfxVolume, t + 0.2);
}

// ----- Background music (procedural, note-based loops, two crossfaded layers) -----
//
// Each layer is a routing gain node. updateMusicForState fades between them.
// scheduleSong walks a song's tracks and pre-schedules a full loop's worth of
// note events on the audio clock; a setTimeout re-schedules the next loop just
// before the current one ends. Stops naturally when musicCurrentSong changes.
let musicMaster = null;
let musicMenuGain = null;   // routing node for the calm-loop notes
let musicCombatGain = null; // routing node for the combat-loop notes
let musicMenuLayer = null;  // filtered node the menu notes connect into
let musicCombatLayer = null;
let musicTargetState = null;
let musicCurrentSong = null;
let musicLoopTimer = null;
// Every osc/buffer source created by playMusicNote / playMusicNoise pushes
// itself here. updateMusicForState() iterates this list and hard-stops every
// tracked node before scheduling a new song — otherwise notes from a prior
// scheduleSong call remain on the audio clock and can become re-audible if
// their layer's gain ramps back up (rapid pause/unpause = music stacking).
// Each node also installs an onended handler that splices itself out, so the
// array auto-prunes as notes finish naturally and never grows unbounded.
let scheduledMusicNodes = [];

function stopAllScheduledMusicNodes() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  for (const node of scheduledMusicNodes) {
    try { node.stop(t); } catch (_) { /* already stopped */ }
  }
  scheduledMusicNodes.length = 0;
}

// Note name → frequency lookup for the few octaves we use.
const NOTE_FREQ = {
  'E1': 41.20, 'F1': 43.65, 'G1': 49.00, 'A1': 55.00, 'B1': 61.74,
  'C2': 65.41, 'D2': 73.42, 'E2': 82.41, 'F2': 87.31, 'G2': 98.00, 'A2': 110.00,
  'B2': 123.47, 'C3': 130.81, 'D3': 146.83, 'E3': 164.81, 'F3': 174.61, 'G3': 196.00, 'A3': 220.00,
  'B3': 246.94, 'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'F4': 349.23, 'G4': 392.00, 'A4': 440.00,
  'B4': 493.88, 'C5': 523.25, 'D5': 587.33, 'E5': 659.25, 'F5': 698.46, 'G5': 783.99, 'A5': 880.00,
  'B5': 987.77, 'C6': 1046.50, 'D6': 1174.66, 'E6': 1318.51, 'F6': 1396.91, 'G6': 1567.98, 'A6': 1760.00,
  'B6': 1975.53,
};

// Songs. Each track lists [beatOffset, noteName, durationInBeats] entries.
const SONG_MENU = {
  bpm: 60, bars: 8, beatsPerBar: 4, layer: 'menu',
  tracks: [
    // sparse sine lead (A minor pentatonic)
    { type: 'sine', vol: 0.55, notes: [
      [0, 'A3', 2], [2, 'C4', 2],
      [4, 'E4', 3], [7, 'D4', 1],
      [8, 'C4', 2], [10, 'A3', 2],
      // rest — bars 4 only sustained chord pad
      [16, 'E4', 2], [18, 'G4', 2],
      [20, 'E4', 4],
      [24, 'D4', 2], [26, 'C4', 2],
      [28, 'A3', 4],
    ]},
    // warm triangle pad — slow chord under everything
    { type: 'triangle', vol: 0.28, notes: [
      [0,  'A2', 8],
      [8,  'F2', 8],
      [16, 'G2', 8],
      [24, 'A2', 8],
    ]},
  ],
};

// Combat track — significantly more aggressive than the menu loop. 165 BPM,
// a driving 16th-note bass with octave alternation, a sub-bass holding the
// root for low-end weight, square + triangle leads doubled an octave apart,
// and a wide-open drum kit (every-beat kick + ghosts, 16th-note hi-hat,
// 2-and-4 snare + roll fills, crashes on bar starts). Built so the loop
// pushes the player rather than humming under them.
const SONG_COMBAT = {
  bpm: 165, bars: 8, beatsPerBar: 4, layer: 'combat',
  tracks: [
    // Sub-bass — sine wave on the root of each two-bar chord, held the full
    // chord. Sits below everything else and gives the saw bass a foundation.
    { kind: 'tone', type: 'sine', vol: 0.32, notes: [
      [0,  'A1', 8],   // Am
      [8,  'G1', 8],   // G
      [16, 'F1', 8],   // F
      [24, 'E1', 8],   // E
    ]},
    // Saw bass — 16th-note relentless drive. Two beats of root, two of octave
    // jump, with chromatic walk-ups at the end of each chord region.
    { kind: 'tone', type: 'sawtooth', vol: 0.30, notes: [
      // Bars 1-2 — Am
      [0,'A1',0.25],[0.25,'A1',0.25],[0.5,'A2',0.25],[0.75,'A1',0.25],
      [1,'A1',0.25],[1.25,'A2',0.25],[1.5,'A1',0.25],[1.75,'E2',0.25],
      [2,'A1',0.25],[2.25,'A1',0.25],[2.5,'A2',0.25],[2.75,'A1',0.25],
      [3,'A1',0.25],[3.25,'A2',0.25],[3.5,'C2',0.25],[3.75,'E2',0.25],
      [4,'A1',0.25],[4.25,'A1',0.25],[4.5,'A2',0.25],[4.75,'A1',0.25],
      [5,'A1',0.25],[5.25,'A2',0.25],[5.5,'A1',0.25],[5.75,'E2',0.25],
      [6,'A1',0.25],[6.25,'C2',0.25],[6.5,'D2',0.25],[6.75,'E2',0.25],
      [7,'A1',0.25],[7.25,'C2',0.25],[7.5,'E2',0.25],[7.75,'G2',0.25],
      // Bars 3-4 — G
      [8,'G1',0.25],[8.25,'G1',0.25],[8.5,'G2',0.25],[8.75,'G1',0.25],
      [9,'G1',0.25],[9.25,'G2',0.25],[9.5,'G1',0.25],[9.75,'D2',0.25],
      [10,'G1',0.25],[10.25,'G1',0.25],[10.5,'G2',0.25],[10.75,'G1',0.25],
      [11,'G1',0.25],[11.25,'G2',0.25],[11.5,'B1',0.25],[11.75,'D2',0.25],
      [12,'G1',0.25],[12.25,'G1',0.25],[12.5,'G2',0.25],[12.75,'G1',0.25],
      [13,'G1',0.25],[13.25,'G2',0.25],[13.5,'G1',0.25],[13.75,'D2',0.25],
      [14,'G1',0.25],[14.25,'B1',0.25],[14.5,'D2',0.25],[14.75,'B1',0.25],
      [15,'G1',0.25],[15.25,'B1',0.25],[15.5,'D2',0.25],[15.75,'F2',0.25],
      // Bars 5-6 — F
      [16,'F1',0.25],[16.25,'F1',0.25],[16.5,'F2',0.25],[16.75,'F1',0.25],
      [17,'F1',0.25],[17.25,'F2',0.25],[17.5,'F1',0.25],[17.75,'C2',0.25],
      [18,'F1',0.25],[18.25,'F1',0.25],[18.5,'F2',0.25],[18.75,'F1',0.25],
      [19,'F1',0.25],[19.25,'F2',0.25],[19.5,'A1',0.25],[19.75,'C2',0.25],
      [20,'F1',0.25],[20.25,'F1',0.25],[20.5,'F2',0.25],[20.75,'F1',0.25],
      [21,'F1',0.25],[21.25,'F2',0.25],[21.5,'F1',0.25],[21.75,'C2',0.25],
      [22,'F1',0.25],[22.25,'A1',0.25],[22.5,'C2',0.25],[22.75,'A1',0.25],
      [23,'F1',0.25],[23.25,'A1',0.25],[23.5,'C2',0.25],[23.75,'E2',0.25],
      // Bars 7-8 — E + climbing turnaround
      [24,'E1',0.25],[24.25,'E1',0.25],[24.5,'E2',0.25],[24.75,'E1',0.25],
      [25,'E1',0.25],[25.25,'E2',0.25],[25.5,'E1',0.25],[25.75,'B1',0.25],
      [26,'E1',0.25],[26.25,'G1',0.25],[26.5,'A1',0.25],[26.75,'B1',0.25],
      [27,'C2',0.25],[27.25,'D2',0.25],[27.5,'E2',0.25],[27.75,'G2',0.25],
      [28,'A1',0.25],[28.25,'C2',0.25],[28.5,'E2',0.25],[28.75,'G2',0.25],
      [29,'A2',0.25],[29.25,'G2',0.25],[29.5,'E2',0.25],[29.75,'C2',0.25],
      [30,'A1',0.25],[30.25,'B1',0.25],[30.5,'C2',0.25],[30.75,'D2',0.25],
      [31,'E2',0.25],[31.25,'G2',0.25],[31.5,'A2',0.25],[31.75,'B2',0.25],
    ]},
    // Square lead — denser minor riff. Comes in earlier (bar 1) so the loop
    // never feels empty, and answers itself across each chord region.
    { kind: 'tone', type: 'square', vol: 0.20, notes: [
      // bar 1-2 — Am hook
      [0, 'A4', 0.5], [0.5, 'C5', 0.5], [1, 'E5', 1], [2, 'D5', 0.5], [2.5, 'C5', 0.5], [3, 'B4', 1],
      [4, 'A4', 0.5], [4.5, 'C5', 0.5], [5, 'E5', 1], [6, 'G5', 1], [7, 'A5', 1],
      // bar 3-4 — G answer
      [8, 'B4', 0.5], [8.5, 'D5', 0.5], [9, 'G5', 1], [10, 'F5', 0.5], [10.5, 'E5', 0.5], [11, 'D5', 1],
      [12, 'B4', 0.5], [12.5, 'D5', 0.5], [13, 'G5', 1], [14, 'A5', 1], [15, 'B5', 1],
      // bar 5-6 — F
      [16, 'A4', 0.5], [16.5, 'C5', 0.5], [17, 'F5', 1], [18, 'E5', 0.5], [18.5, 'D5', 0.5], [19, 'C5', 1],
      [20, 'A4', 0.5], [20.5, 'C5', 0.5], [21, 'F5', 1], [22, 'A5', 2],
      // bar 7-8 — E climb + release
      [24, 'E4', 0.25], [24.25, 'G4', 0.25], [24.5, 'B4', 0.25], [24.75, 'E5', 0.25],
      [25, 'G5', 0.5], [25.5, 'A5', 0.5], [26, 'B5', 1.5], [27.5, 'A5', 0.5],
      [28, 'G5', 0.5], [28.5, 'F5', 0.5], [29, 'E5', 0.5], [29.5, 'D5', 0.5],
      [30, 'C5', 0.5], [30.5, 'B4', 0.5], [31, 'A4', 1],
    ]},
    // Lead harmony — triangle doubling one octave up. Adds that screaming
    // metal-lead sparkle without doubling oscillator count via square.
    { kind: 'tone', type: 'triangle', vol: 0.12, notes: [
      [0, 'A5', 0.5], [0.5, 'C6', 0.5], [1, 'E6', 1], [2, 'D6', 0.5], [2.5, 'C6', 0.5], [3, 'B5', 1],
      [4, 'A5', 0.5], [4.5, 'C6', 0.5], [5, 'E6', 1], [6, 'G6', 1], [7, 'A6', 1],
      [8, 'B5', 0.5], [8.5, 'D6', 0.5], [9, 'G6', 1], [10, 'F6', 0.5], [10.5, 'E6', 0.5], [11, 'D6', 1],
      [12, 'B5', 0.5], [12.5, 'D6', 0.5], [13, 'G6', 1], [14, 'A6', 1], [15, 'B6', 1],
      [16, 'A5', 0.5], [16.5, 'C6', 0.5], [17, 'F6', 1], [18, 'E6', 0.5], [18.5, 'D6', 0.5], [19, 'C6', 1],
      [20, 'A5', 0.5], [20.5, 'C6', 0.5], [21, 'F6', 1], [22, 'A6', 2],
      [24, 'E5', 0.25], [24.25, 'G5', 0.25], [24.5, 'B5', 0.25], [24.75, 'E6', 0.25],
      [25, 'G6', 0.5], [25.5, 'A6', 0.5], [26, 'B6', 1.5], [27.5, 'A6', 0.5],
      [28, 'G6', 0.5], [28.5, 'F6', 0.5], [29, 'E6', 0.5], [29.5, 'D6', 0.5],
      [30, 'C6', 0.5], [30.5, 'B5', 0.5], [31, 'A5', 1],
    ]},
    // String pad — sustained triad through each chord region. Slightly hotter
    // mix than the calm song so it cuts through the busy bass.
    { kind: 'tone', type: 'triangle', vol: 0.13, notes: [
      [0, 'A3', 8], [0, 'C4', 8], [0, 'E4', 8],
      [8, 'G3', 8], [8, 'B3', 8], [8, 'D4', 8],
      [16, 'F3', 8], [16, 'A3', 8], [16, 'C4', 8],
      [24, 'E3', 8], [24, 'G3', 8], [24, 'B3', 8],
    ]},
    // Kick — every beat + ghost on the "and of 4" for forward motion
    { kind: 'noise', vol: 0.40, lowpass: 220, dur: 0.09,
      hits: [
        0, 1, 2, 3,  3.5,
        4, 5, 6, 7,  7.5,
        8, 9, 10, 11, 11.5,
        12, 13, 14, 15, 15.5,
        16, 17, 18, 19, 19.5,
        20, 21, 22, 23, 23.5,
        24, 25, 26, 27, 27.5,
        28, 29, 30, 31, 31.5,
      ] },
    // Hi-hat — 16th notes. Tight and bright (high-passed) — drives tension.
    { kind: 'noise', vol: 0.07, hipass: 5800, dur: 0.022,

    { kind: 'noise', vol: 0.10, hipass: 4200, dur: 0.10,
      hits: Array.from({length: 16}, (_, i) =>
        Math.floor(i / 2) * 4 + (i % 2 === 0 ? 1.5 : 3.5)
      ) },
    // Snare — 2 + 4 backbeat with a touch more low-end than the menu's

      ) },

function ensureMusic() {
  if (musicMaster || !audioCtx) return;
  musicMaster = audioCtx.createGain();
  musicMaster.gain.value = soundMuted ? 0 : MUSIC_BASE * musicVolume;
  musicMaster.connect(audioCtx.destination);

  // Menu layer: warm lowpass
  musicMenuGain = audioCtx.createGain();
  musicMenuGain.gain.value = 0;
  musicMenuGain.connect(musicMaster);
  const menuLP = audioCtx.createBiquadFilter();
  menuLP.type = 'lowpass';
  menuLP.frequency.value = 2200;
  menuLP.connect(musicMenuGain);
  musicMenuLayer = menuLP;

  // Combat layer: cutoff opened so the new track's crash cymbals, 16th-note
  // hi-hats, and square-lead harmonics actually punch through. The old
  // 1600 Hz cutoff muffled the intensity — 4500 Hz lets the highs sparkle.
  musicCombatGain = audioCtx.createGain();
  musicCombatGain.gain.value = 0;
  musicCombatGain.connect(musicMaster);
  const combatLP = audioCtx.createBiquadFilter();
  combatLP.type = 'lowpass';
  combatLP.frequency.value = 4500;
  combatLP.connect(musicCombatGain);
  musicCombatLayer = combatLP;
}

// Schedule a single note: attack-decay envelope on a fresh oscillator.
function playMusicNote(freq, startTime, duration, type, vol, dest) {
  if (!audioCtx || !dest) return;
  const osc = audioCtx.createOscillator();
  osc.type = type;
  osc.frequency.value = freq;
  const env = audioCtx.createGain();
  env.gain.setValueAtTime(0, startTime);
  env.gain.linearRampToValueAtTime(vol, startTime + 0.02);
  // sustain for most of the duration, then short tail
  env.gain.setValueAtTime(vol, startTime + duration * 0.7);
  env.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.connect(env);
  env.connect(dest);
  osc.start(startTime);
  osc.stop(startTime + duration + 0.05);
  scheduledMusicNodes.push(osc);
  osc.onended = () => {
    const i = scheduledMusicNodes.indexOf(osc);
    if (i >= 0) scheduledMusicNodes.splice(i, 1);
  };
}

// Schedule a noise hit (kick / hat / snare etc) routed into the music layer.
function playMusicNoise(startTime, duration, vol, lowpass, hipass, dest) {
  if (!audioCtx || !dest) return;
  const n = Math.max(2, Math.floor(audioCtx.sampleRate * duration));
  const buffer = audioCtx.createBuffer(1, n, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < n; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  let node = src;
  if (lowpass) {
    const f = audioCtx.createBiquadFilter();
    f.type = 'lowpass'; f.frequency.value = lowpass;
    node.connect(f); node = f;
  }
  if (hipass) {
    const f = audioCtx.createBiquadFilter();
    f.type = 'highpass'; f.frequency.value = hipass;
    node.connect(f); node = f;
  }
  const env = audioCtx.createGain();
  env.gain.setValueAtTime(vol, startTime);
  env.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  node.connect(env); env.connect(dest);
  src.start(startTime);
  src.stop(startTime + duration + 0.05);
  scheduledMusicNodes.push(src);
  src.onended = () => {
    const i = scheduledMusicNodes.indexOf(src);
    if (i >= 0) scheduledMusicNodes.splice(i, 1);
  };
}

// Pre-schedule one full loop of a song; setTimeout queues the next loop just
// before this one ends. Re-arming stops automatically when musicCurrentSong
// changes (i.e., a different song was set).
function scheduleSong(song) {
  if (!audioCtx || !musicMenuLayer) return;
  if (musicLoopTimer) { clearTimeout(musicLoopTimer); musicLoopTimer = null; }
  musicCurrentSong = song;
  const beat = 60 / song.bpm;
  const loopDur = song.bars * song.beatsPerBar * beat;
  const dest = song.layer === 'menu' ? musicMenuLayer : musicCombatLayer;
  const startTime = audioCtx.currentTime + 0.08;
  for (const track of song.tracks) {
    if (track.kind === 'noise') {
      // percussion track — hits is a list of beat offsets
      for (const beatOffset of track.hits) {
        playMusicNoise(startTime + beatOffset * beat, track.dur, track.vol, track.lowpass || 0, track.hipass || 0, dest);
      }
    } else {
      for (const [beatOffset, name, durBeats] of track.notes) {
        const f = NOTE_FREQ[name];
        if (!f) continue;
        playMusicNote(f, startTime + beatOffset * beat, durBeats * beat, track.type, track.vol, dest);
      }
    }
  }
  musicLoopTimer = setTimeout(() => {
    if (musicCurrentSong === song) scheduleSong(song);
  }, Math.max(50, (loopDur - 0.05) * 1000));
}

// Crossfade between calm/combat layers based on the active game state.
function updateMusicForState() {
  if (!musicMaster) return;
  const inCombat = (gameState === 'playing');
  if (musicTargetState === inCombat) return;
  const firstCall = musicTargetState === null;
  musicTargetState = inCombat;
  const t = audioCtx.currentTime;
  const fade = firstCall ? 0.6 : 2.2;
  for (const g of [musicMenuGain, musicCombatGain]) {
    g.gain.cancelScheduledValues(t);
    g.gain.setValueAtTime(g.gain.value, t);
  }
  musicMenuGain.gain.linearRampToValueAtTime(inCombat ? 0 : 1, t + fade);
  musicCombatGain.gain.linearRampToValueAtTime(inCombat ? 1 : 0, t + fade);
  // Hard-stop every note from the prior scheduleSong call BEFORE queueing
  // the new song. Without this, rapid pause/unpause causes the prior song's
  // notes to remain on the audio clock, and the layer's gain ramping back
  // up makes them re-audible alongside the freshly-scheduled notes — two
  // playthroughs of the same song overlapping out of phase = "music stacks
  // on each other". Trade-off: the smooth simultaneous-fade crossfade
  // becomes "old song stops; new song fades in" — predictable and stack-free.
  stopAllScheduledMusicNodes();
  // Switch which song is being scheduled. Both songs always schedule into
  // their own layer (menu layer vs combat layer).
  scheduleSong(inCombat ? SONG_COMBAT : SONG_MENU);
}
function resumeAudio() {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  // The first user gesture should also wake the music layers.
  if (musicMaster && musicTargetState === null) updateMusicForState();
}

// Keep the music master in sync with mute / volume settings. Called when
// soundMuted or musicVolume changes.
function applyMusicMute() {
  if (!musicMaster) return;
  const t = audioCtx.currentTime;
  musicMaster.gain.cancelScheduledValues(t);
  musicMaster.gain.setValueAtTime(musicMaster.gain.value, t);
  musicMaster.gain.linearRampToValueAtTime(soundMuted ? 0 : MUSIC_BASE * musicVolume, t + 0.4);
}
// Quick tone with linear attack + exponential decay; optional pitch sweep.
function tone({ freq = 440, type = 'square', dur = 0.1, vol = 0.3, sweep = 0, delay = 0, attack = 0.005 } = {}) {
  if (!audioCtx || soundMuted) return;
  const t0 = audioCtx.currentTime + delay;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  if (sweep) osc.frequency.exponentialRampToValueAtTime(Math.max(20, freq + sweep), t0 + dur);
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(vol, t0 + attack);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  osc.connect(gain); gain.connect(masterGain);
  osc.start(t0); osc.stop(t0 + dur + 0.05);
}
// White-noise burst through optional low/high-pass filters.
function noise({ dur = 0.15, vol = 0.25, lowpass = 0, hipass = 0, delay = 0 } = {}) {
  if (!audioCtx || soundMuted) return;
  const t0 = audioCtx.currentTime + delay;
  const n = Math.floor(audioCtx.sampleRate * dur);
  const buffer = audioCtx.createBuffer(1, n, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < n; i++) data[i] = Math.random() * 2 - 1;
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  let node = source;
  if (lowpass) {
    const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = lowpass;
    node.connect(f); node = f;
  }
  if (hipass) {
    const f = audioCtx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = hipass;
    node.connect(f); node = f;
  }
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol, t0);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  node.connect(gain); gain.connect(masterGain);
  source.start(t0); source.stop(t0 + dur + 0.05);
}
// Throttle rapid-fire sounds (zombieHit, coin) so a crowd doesn't crackle.
function sfxThrottle(name, gapMs) {
  const now = performance.now();
  if (sfxLast[name] && now - sfxLast[name] < gapMs) return false;
  sfxLast[name] = now;
  return true;
}

// Trader weapons can never end up on the ground — they disappear when swapped
// away. Used by every gun-drop site (swap, arsenal buy, death).
function shouldDropOldWeapon(weapon) {
  if (!weapon || weapon === 'pistol') return false;
  const def = WEAPONS[weapon];
  // Trader-only weapons and cheat-only god weapons never enter the world —
  // they vanish silently when swapped out instead of dropping for pickup.
  if (def && (def.traderOnly || def.cheatOnly)) return false;
  return true;
}

// Separate gate for the swap-to-Storage path. The pistol is allowed here
// (it's the infinite default, but the player still expects a "→ Storage"
// floater every time they swap regardless of which gun was held). Trader-
// only / cheat-only weapons still can't enter Storage — same invariant as
// the world-drop gate.
function shouldStoreOldWeapon(weapon) {
  if (!weapon) return false;
  const def = WEAPONS[weapon];
  if (def && (def.traderOnly || def.cheatOnly)) return false;
  return true;
}

// Saved-base persistence. The player can snapshot the CURRENT buildings[]
// list to localStorage as one named slot. Parts are stored relative to an
// anchor (the player's grid-snapped position at save time) so the layout
// re-anchors wherever the cursor is on load.
const SAVED_BASE_KEY = 'deadzone-saved-base';
function saveCurrentBaseLayout() {
  if (buildings.length === 0) return false;
  const ax = Math.round(player.x / 40) * 40;
  const ay = Math.round(player.y / 40) * 40;
  const parts = buildings.map(b => ({
    type: b.type,
    dx: Math.round((b.x - ax) / 40) * 40,
    dy: Math.round((b.y - ay) / 40) * 40,
  }));
  try {
    localStorage.setItem(SAVED_BASE_KEY, JSON.stringify({ parts, savedAt: Date.now() }));
    return true;
  } catch (_) { return false; }
}
function loadSavedBaseLayout() {
  try {
    const raw = localStorage.getItem(SAVED_BASE_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (!data || !Array.isArray(data.parts) || data.parts.length === 0) return null;
    return data.parts;
  } catch (_) { return null; }
}
function hasSavedBase() {
  try { return localStorage.getItem(SAVED_BASE_KEY) !== null; }
  catch (_) { return false; }
}

// ---------- Tooltip popups (shown once per session per item) ----------
const tooltips = [];      // active info cards — { x, y, title, body, color, life, max }
const seenTooltips = new Set(); // ids we've already explained this session
function showTooltip(id, title, body, color) {
  if (seenTooltips.has(id)) return;
  seenTooltips.add(id);
  tooltips.push({
    x: player.x, y: player.y,
    title, body, color: color || '#7ec8ff',
    life: 5.0, max: 5.0,
  });
}
function updateTooltips(dt) {
  for (let i = tooltips.length - 1; i >= 0; i--) {
    tooltips[i].life -= dt;
    if (tooltips[i].life <= 0) tooltips.splice(i, 1);
  }
}
function drawTooltips() {
  for (const t of tooltips) {
    const lines = t.body.split('\n');
    const w = 240, lineH = 14;
    const h = 26 + lines.length * lineH + 10;
    const fade = Math.min(1, t.life / 1.0); // last second fades out
    // Anchor above the player position from when it was shown, but clamp so it
    // stays fully visible.
    const x = Math.max(10, Math.min(W - w - 10, t.x - w / 2));
    const y = Math.max(10, Math.min(H - h - 10, t.y - h - 32));
    ctx.save();
    ctx.globalAlpha = fade;
    ctx.fillStyle = 'rgba(10, 12, 18, 0.94)';
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = t.color;
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, w, h);
    // colored top stripe
    ctx.fillStyle = t.color;
    ctx.fillRect(x, y, w, 3);
    // title
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px system-ui';
    ctx.textAlign = 'left';
    ctx.fillText(t.title, x + 12, y + 22);
    // body lines
    ctx.fillStyle = '#dfe2e8';
    ctx.font = '11px system-ui';
    let by = y + 22 + 16;
    for (const line of lines) {
      ctx.fillText(line, x + 12, by);
      by += lineH;
    }
    ctx.restore();
  }
}

  for (let t = 1; t <= 4; t++) {
    const eff = TREE_EFFECTS[dir.id][t - 1];
    ROOT_TREE.push({
      id: dir.id + t,
      parent: t === 1 ? 'root' : dir.id + (t - 1),
      name: eff.name,
      desc: eff.desc,
      cost: TREE_TIER_COSTS[t],

let rootOwned = {}; // id → true if bought
function buyRootNode(id) {
  const node = ROOT_TREE.find(n => n.id === id);
  if (!node) return;
  if (rootOwned[id]) return;
  if (node.parent && !rootOwned[node.parent]) return;
  if (player.exp < node.cost) return;
  player.exp -= node.cost;
  rootOwned[id] = true;
  node.apply();
  floaters.push({ x: player.x, y: player.y - 22, text: node.name, life: 1.6, color: node.color });

function ensureSprite(id) {
  if (!customSprites[id]) customSprites[id] = new Uint8Array(SPRITE_SIZE * SPRITE_SIZE);
  return customSprites[id];
}
function hasCustomSprite(id) {
  const s = customSprites[id];
  if (!s) return false;
  for (let i = 0; i < s.length; i++) if (s[i] !== 0) return true;
  return false;
}
function saveSprites() {
  try {
    const data = {};
    for (const k in customSprites) {
      if (customSprites[k]) data[k] = Array.from(customSprites[k]);
    }
    localStorage.setItem('deadzone-sprites', JSON.stringify(data));
  } catch (e) { /* localStorage may be disabled in some contexts */ }
}
function loadSprites() {
  try {
    const stored = localStorage.getItem('deadzone-sprites');
    if (!stored) return;
    const data = JSON.parse(stored);
    for (const k in data) {
      if (Array.isArray(data[k])) customSprites[k] = new Uint8Array(data[k]);
    }
  } catch (e) { /* ignore */ }
}
// Render a custom sprite centered at (cx, cy). `targetSize` is the visual
// diameter we want to fill (matches z.r*2 or player.r*2 in the existing code).
function drawCustomSprite(id, cx, cy, targetSize) {
  const sprite = customSprites[id];
  if (!sprite) return;
  const scale = Math.max(1, targetSize / SPRITE_SIZE);
  const half = (SPRITE_SIZE * scale) / 2;
  for (let y = 0; y < SPRITE_SIZE; y++) {
    for (let x = 0; x < SPRITE_SIZE; x++) {
      const v = sprite[y * SPRITE_SIZE + x];
      if (!v) continue;
      ctx.fillStyle = SPRITE_PALETTE[v];
      ctx.fillRect(cx - half + x * scale, cy - half + y * scale, scale + 0.5, scale + 0.5);
    }
  }
}

}

// Draw a weapon at the local origin, pointing along +x. Caller handles transform.
// Charged Bow held visual. Drawn in the player's facing-rotated frame so
// +X is "forward toward the cursor". `t` is the current charge (0..1).
//   - At t=0 the string is straight (relaxed) and no arrow is shown.
//   - As t increases the string bends back and an arrow nocks/extends.
//   - Limbs flex slightly forward at full draw for a "loaded" feel.
function drawBow(r, t) {
  const x0 = r * 0.55;                        // forward offset from player center
  const top = -r * 0.95;
  const bot =  r * 0.95;
  const bulge = x0 + r * 0.35 + t * r * 0.10; // bow limbs bow forward more at draw
  // Outer wood limbs
  ctx.lineCap = 'round';
  ctx.strokeStyle = '#5a3a1f';
  ctx.lineWidth = 3.5;
  ctx.beginPath();
  ctx.moveTo(x0, top);
  ctx.quadraticCurveTo(bulge, -r * 0.3, bulge, 0);
  ctx.quadraticCurveTo(bulge, r * 0.3, x0, bot);
  ctx.stroke();
  // Inner wood highlight (lighter brown)
  ctx.strokeStyle = '#8a5d36';
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.moveTo(x0 + 1, top + 1);
  ctx.quadraticCurveTo(bulge - 1.5, -r * 0.3, bulge - 1.5, 0);
  ctx.quadraticCurveTo(bulge - 1.5, r * 0.3, x0 + 1, bot - 1);
  ctx.stroke();
  // Hand grip wrap at the middle
  ctx.strokeStyle = '#2a1810';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x0 + 2, -r * 0.22);
  ctx.lineTo(x0 + 2,  r * 0.22);
  ctx.stroke();
  ctx.lineCap = 'butt';
  // String — straight when relaxed, V-shape pulled back toward the player as t→1
  const pullX = x0 - t * (r * 0.95);
  ctx.strokeStyle = '#dfe2e8';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(x0, top);
  ctx.lineTo(pullX, 0);
  ctx.lineTo(x0, bot);
  ctx.stroke();
  // Nocked arrow — only while drawn
  if (t > 0) {
    const arrowEnd = x0 + r * 0.55 + t * r * 0.35;
    const arrowStart = pullX - 3;
    // shaft
    ctx.strokeStyle = '#c8b896';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(arrowStart, 0);
    ctx.lineTo(arrowEnd - 3, 0);
    ctx.stroke();
    // arrowhead
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.moveTo(arrowEnd, 0);
    ctx.lineTo(arrowEnd - 5, -2.6);
    ctx.lineTo(arrowEnd - 5,  2.6);
    ctx.closePath(); ctx.fill();
    // fletching — color brightens at full draw to mirror the arrow bullet
    ctx.fillStyle = t > 0.85 ? '#ffce44' : '#a8c5d8';
    ctx.beginPath();
    ctx.moveTo(arrowStart, -2.6);
    ctx.lineTo(arrowStart + 4, 0);
    ctx.lineTo(arrowStart,  2.6);
    ctx.closePath(); ctx.fill();
    // Small glow at the tip on a fully-charged arrow
    if (t > 0.9) {
      ctx.fillStyle = 'rgba(255, 209, 102, 0.55)';
      ctx.beginPath(); ctx.arc(arrowEnd, 0, 3.5, 0, Math.PI * 2); ctx.fill();
    }
  }
}

function drawGun(weapon, r) {
  const w = WEAPONS[weapon] || WEAPONS.pistol;
  // Custom-sprite override — if the user painted a gun in the sprite editor,
  // use that instead of the procedural silhouette. Slot id is `gun<Weapon>`
  // with the first letter uppercase.
  const gunSpriteId = 'gun' + weapon.charAt(0).toUpperCase() + weapon.slice(1);
  if (hasCustomSprite(gunSpriteId)) {
    drawCustomSprite(gunSpriteId, r * 0.7, 0, r * 2.0);
    return;
  }
  const x0 = r * 0.55;
  ctx.strokeStyle = '#15151a';
  ctx.lineWidth = 1;

  switch (weapon) {
    case 'shotgun': {
      // double-barrel feel: thick body + wood stock at the back + colored muzzle
      ctx.fillStyle = '#3a2a1a';                            // wood stock
      ctx.fillRect(x0 - r * 0.45, -3, r * 0.45, 6);
      ctx.fillStyle = '#222a32';                            // receiver
      ctx.fillRect(x0, -5, r * 1.5, 10);
      ctx.strokeRect(x0, -5, r * 1.5, 10);
      ctx.fillStyle = '#0d0f14';                            // barrel split
      ctx.fillRect(x0 + r * 0.4, -1, r * 1.1, 2);
      ctx.fillStyle = '#5a4030';                            // pump grip
      ctx.fillRect(x0 + r * 0.4, 5, r * 0.45, 3);
      ctx.fillStyle = w.color;
      ctx.fillRect(x0 + r * 1.5, -4, 5, 8);                 // muzzle
      break;
    }
    case 'smg': {
      // boxy receiver, mag underneath, stub stock
      ctx.fillStyle = '#2c2c34';                            // stock
      ctx.fillRect(x0 - r * 0.35, -2.5, r * 0.35, 5);
      ctx.fillStyle = '#1e2230';                            // receiver
      ctx.fillRect(x0, -4, r * 1.05, 8);
      ctx.strokeRect(x0, -4, r * 1.05, 8);
      ctx.fillStyle = '#2c2c34';                            // magazine
      ctx.fillRect(x0 + r * 0.2, 4, 5, 8);
      ctx.strokeRect(x0 + r * 0.2, 4, 5, 8);
      ctx.fillStyle = '#1a1a22';                            // short thin barrel
      ctx.fillRect(x0 + r * 1.05, -1.5, r * 0.5, 3);
      ctx.fillStyle = w.color;
      ctx.fillRect(x0 + r * 1.55, -2, 4, 4);                // muzzle
      break;
    }
    case 'rifle': {
      // long body, scope on top, stock at rear
      ctx.fillStyle = '#3a2a1a';                            // wood stock
      ctx.fillRect(x0 - r * 0.55, -3, r * 0.55, 6);
      ctx.fillStyle = '#1f2418';                            // receiver
      ctx.fillRect(x0, -3, r * 1.7, 6);
      ctx.strokeRect(x0, -3, r * 1.7, 6);
      ctx.fillStyle = '#1a1a1a';                            // scope tube
      ctx.fillRect(x0 + r * 0.45, -7, r * 0.6, 4);
      ctx.strokeRect(x0 + r * 0.45, -7, r * 0.6, 4);
      ctx.fillStyle = '#1a1a22';                            // long thin barrel
      ctx.fillRect(x0 + r * 1.7, -1.5, r * 0.55, 3);
      ctx.fillStyle = w.color;
      ctx.fillRect(x0 + r * 2.25, -2, 5, 4);                // muzzle
      break;
    }
    case 'rocket': {
      // fat tube + protruding rocket tip
      ctx.fillStyle = '#2a2a2a';
      ctx.fillRect(x0, -6, r * 1.35, 12);
      ctx.strokeRect(x0, -6, r * 1.35, 12);
      // bore
      ctx.fillStyle = '#0a0a0a';
      ctx.beginPath();
      ctx.arc(x0 + 3, 0, 4, 0, Math.PI * 2);
      ctx.fill();
      // top sight
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(x0 + r * 0.4, -8, 4, 2);
      // protruding rocket tip
      ctx.fillStyle = w.color;
      ctx.beginPath();
      ctx.moveTo(x0 + r * 1.35, -5);
      ctx.lineTo(x0 + r * 1.35 + 9, 0);
      ctx.lineTo(x0 + r * 1.35, 5);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      // tiny fin
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(x0 + r * 1.2, -7, 3, 2);
      ctx.fillRect(x0 + r * 1.2, 5, 3, 2);
      break;
    }
    case 'chicken': {
      // wide tube launcher with a chicken head peeking out the muzzle
      ctx.fillStyle = '#2a2a2a';
      ctx.fillRect(x0, -7, r * 1.45, 14);
      ctx.strokeRect(x0, -7, r * 1.45, 14);
      // bore
      ctx.fillStyle = '#0a0a0a';
      ctx.beginPath(); ctx.arc(x0 + 4, 0, 4.5, 0, Math.PI * 2); ctx.fill();
      // chicken head
      ctx.fillStyle = '#fff5b8';
      ctx.beginPath(); ctx.arc(x0 + r * 1.55, 0, 5, 0, Math.PI * 2); ctx.fill();
      ctx.stroke();
      // red comb
      ctx.fillStyle = '#d63030';
      ctx.beginPath();
      ctx.arc(x0 + r * 1.55 - 1, -5, 1.5, 0, Math.PI * 2);
      ctx.arc(x0 + r * 1.55 + 1, -5, 1.5, 0, Math.PI * 2);
      ctx.fill();
      // beak
      ctx.fillStyle = '#ff9d3a';
      ctx.beginPath();
      ctx.moveTo(x0 + r * 1.55 + 5, -1);
      ctx.lineTo(x0 + r * 1.55 + 10, 0);
      ctx.lineTo(x0 + r * 1.55 + 5, 2);
      ctx.closePath(); ctx.fill();
      // eye
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath(); ctx.arc(x0 + r * 1.55 + 1.5, -0.5, 0.9, 0, Math.PI * 2); ctx.fill();
      break;
    }
    case 'banana': {
      // bright yellow curved body — the gun IS a banana
      ctx.fillStyle = '#ffd942';
      ctx.beginPath();
      ctx.moveTo(x0 - r * 0.3, 4);
      ctx.quadraticCurveTo(x0 + r * 0.6, -10, x0 + r * 1.7, -2);
      ctx.quadraticCurveTo(x0 + r * 1.85, 3, x0 + r * 1.6, 5);
      ctx.quadraticCurveTo(x0 + r * 0.6, -3, x0 - r * 0.2, 7);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      // tip
      ctx.fillStyle = '#6a4a0a';
      ctx.fillRect(x0 + r * 1.7, -3, 3, 3);
      break;
    }
    case 'crossbow': {
      // wooden stock + horizontal limbs + a loaded bolt pointing forward
      ctx.fillStyle = '#5a3a18';
      ctx.fillRect(x0 - r * 0.3, -2, r * 1.2, 4);                     // stock
      ctx.strokeRect(x0 - r * 0.3, -2, r * 1.2, 4);
      // bow limbs (curved up/down)
      ctx.strokeStyle = '#3a2410';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x0 + r * 0.4, -10);
      ctx.quadraticCurveTo(x0 + r * 0.85, 0, x0 + r * 0.4, 10);
      ctx.stroke();
      // bowstring drawn back to the trigger
      ctx.strokeStyle = '#dfe2e8';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x0 + r * 0.4, -10); ctx.lineTo(x0 + r * 0.55, 0); ctx.lineTo(x0 + r * 0.4, 10);
      ctx.stroke();
      // bolt
      ctx.fillStyle = w.color;
      ctx.fillRect(x0 + r * 0.55, -1, r * 0.8, 2);
      ctx.beginPath();
      ctx.moveTo(x0 + r * 1.35, -3); ctx.lineTo(x0 + r * 1.5, 0); ctx.lineTo(x0 + r * 1.35, 3);
      ctx.closePath();
      ctx.fill();
      // restore stroke for the rest of drawGun
      ctx.strokeStyle = '#15151a';
      ctx.lineWidth = 1;
      break;
    }
    case 'flame': {
      // fuel tank in back, nozzle in front with a flickering flame tongue
      ctx.fillStyle = '#3a2a1a';
      ctx.fillRect(x0 - r * 0.5, -5, r * 0.5, 10);                    // tank
      ctx.strokeRect(x0 - r * 0.5, -5, r * 0.5, 10);
      ctx.fillStyle = '#22252e';
      ctx.fillRect(x0, -4, r * 1.1, 8);                                // body
      ctx.strokeRect(x0, -4, r * 1.1, 8);
      // nozzle
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(x0 + r * 1.1, -3, r * 0.35, 6);
      // flame tongue
      const flicker = (Math.sin(gameTime * 28) + 1) * 0.5;
      ctx.fillStyle = '#ff8030';
      ctx.beginPath();
      ctx.moveTo(x0 + r * 1.45, -3);
      ctx.quadraticCurveTo(x0 + r * 1.7 + flicker * 2, 0, x0 + r * 1.45, 3);
      ctx.quadraticCurveTo(x0 + r * 1.55, 0, x0 + r * 1.45, -3);
      ctx.fill();
      ctx.fillStyle = '#ffd166';
      ctx.beginPath();
      ctx.arc(x0 + r * 1.5, 0, 2 + flicker, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case 'rail': {
      // big slab body with a coil ramping toward a wide muzzle
      ctx.fillStyle = '#1b2230';
      ctx.fillRect(x0, -6, r * 1.6, 12);
      ctx.strokeRect(x0, -6, r * 1.6, 12);
      // emitter ring at the muzzle
      ctx.fillStyle = w.color;
      ctx.beginPath(); ctx.arc(x0 + r * 1.7, 0, 6, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#15151a';
      ctx.lineWidth = 1.2;
      ctx.stroke();
      ctx.fillStyle = '#0a0a0a';
      ctx.beginPath(); ctx.arc(x0 + r * 1.7, 0, 2.5, 0, Math.PI * 2); ctx.fill();
      // diagonal coil lines
      ctx.strokeStyle = w.color;
      ctx.lineWidth = 1;
      for (let k = 0; k < 3; k++) {
        ctx.beginPath();
        ctx.moveTo(x0 + 4 + k * 6, -5);
        ctx.lineTo(x0 + 4 + k * 6 + 5, 5);
        ctx.stroke();
      }
      break;
    }
    case 'twin': {
      // two short pistol bodies stacked vertically
      ctx.fillStyle = '#2e2e36';
      ctx.fillRect(x0, -6, r * 0.9, 5);
      ctx.fillRect(x0, 1, r * 0.9, 5);
      ctx.strokeRect(x0, -6, r * 0.9, 5);
      ctx.strokeRect(x0, 1, r * 0.9, 5);
      ctx.fillStyle = w.color;
      ctx.fillRect(x0 + r * 0.9, -5, 4, 3);
      ctx.fillRect(x0 + r * 0.9, 2, 4, 3);
      break;
    }
    case 'plus': {
      // squat barrel with a + emblem on the side and short cross-vents
      ctx.fillStyle = '#2a3a44';
      ctx.fillRect(x0, -5, r * 1.1, 10);
      ctx.strokeRect(x0, -5, r * 1.1, 10);
      // vertical vents (forming the visual + idea)
      ctx.fillStyle = w.color;
      ctx.fillRect(x0 + r * 0.45, -8, 2.5, 16);
      ctx.fillRect(x0 + r * 0.2, -1.5, r * 0.7, 3);
      // muzzle
      ctx.fillStyle = w.color;
      ctx.fillRect(x0 + r * 1.1, -3, 5, 6);
      break;
    }
    case 'tesla': {
      // coil body with prongs at the muzzle (lightning emitter)
      ctx.fillStyle = '#1c2230';
      ctx.fillRect(x0, -5, r * 1.1, 10);
      ctx.strokeRect(x0, -5, r * 1.1, 10);
      // coil rings
      ctx.strokeStyle = w.color;
      ctx.lineWidth = 1.5;
      for (let k = 0; k < 4; k++) {
        ctx.beginPath();
        ctx.moveTo(x0 + r * 0.1 + k * 3.5, -5);
        ctx.lineTo(x0 + r * 0.1 + k * 3.5, 5);
        ctx.stroke();
      }
      ctx.strokeStyle = '#15151a';
      ctx.lineWidth = 1;
      // prongs
      ctx.fillStyle = w.color;
      ctx.fillRect(x0 + r * 1.1, -6, 3, 4);
      ctx.fillRect(x0 + r * 1.1, 2, 3, 4);
      // arc sparkle
      ctx.beginPath();
      ctx.moveTo(x0 + r * 1.15, -3);
      ctx.lineTo(x0 + r * 1.35, 0);
      ctx.lineTo(x0 + r * 1.15, 3);
      ctx.stroke();
      break;
    }
    case 'orbit': {
      // bulbous emitter with a small orb floating above
      ctx.fillStyle = '#2c1f3a';
      ctx.fillRect(x0, -5, r * 0.9, 10);
      ctx.strokeRect(x0, -5, r * 0.9, 10);
      // muzzle ring
      ctx.fillStyle = w.color;
      ctx.beginPath(); ctx.arc(x0 + r * 0.95, 0, 5, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#15151a';
      ctx.lineWidth = 1.2;
      ctx.stroke();
      // tiny orb above, orbiting visually
      const ob = Math.sin(gameTime * 4) * 2;
      ctx.fillStyle = w.color;
      ctx.beginPath(); ctx.arc(x0 + r * 0.4, -8 + ob, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff5b8';
      ctx.beginPath(); ctx.arc(x0 + r * 0.4 - 0.6, -8.6 + ob, 1, 0, Math.PI * 2); ctx.fill();
      break;
    }
    case 'duck': {
      // small body with a duck riding on top
      ctx.fillStyle = '#2e2e36';
      ctx.fillRect(x0, -3, r * 0.85, 6);
      ctx.strokeRect(x0, -3, r * 0.85, 6);
      ctx.fillStyle = w.color;
      ctx.fillRect(x0 + r * 0.85, -2, 4, 4); // muzzle
      // duck body on top
      ctx.fillStyle = '#ffe066';
      ctx.beginPath(); ctx.arc(x0 + r * 0.5, -6, 4.5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      // duck head
      ctx.beginPath(); ctx.arc(x0 + r * 0.95, -8, 3, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      // beak
      ctx.fillStyle = '#ff9d3a';
      ctx.beginPath();
      ctx.moveTo(x0 + r * 0.95 + 2, -8);
      ctx.lineTo(x0 + r * 0.95 + 6, -7.5);
      ctx.lineTo(x0 + r * 0.95 + 2, -7);
      ctx.closePath(); ctx.fill();
      // eye
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath(); ctx.arc(x0 + r * 0.95 + 0.5, -8.5, 0.6, 0, Math.PI * 2); ctx.fill();
      break;
    }
    case 'fish': {
      // hand grip + a fish held sideways as a club
      ctx.fillStyle = '#3a2a1a';
      ctx.fillRect(x0 - r * 0.2, -2, r * 0.4, 4); // grip
      ctx.fillStyle = '#9bc8e8';
      ctx.beginPath(); ctx.ellipse(x0 + r * 0.85, 0, r * 0.85, 5, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      // tail
      ctx.fillStyle = '#9bc8e8';
      ctx.beginPath();
      ctx.moveTo(x0 + r * 1.7, 0);
      ctx.lineTo(x0 + r * 2.05, -4.5);
      ctx.lineTo(x0 + r * 2.05, 4.5);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      // eye
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath(); ctx.arc(x0 + r * 0.3, -1, 0.9, 0, Math.PI*2); ctx.fill();
      // gill
      ctx.strokeStyle = '#5a87a8';
      ctx.beginPath(); ctx.moveTo(x0 + r * 0.55, -2); ctx.lineTo(x0 + r * 0.55, 2); ctx.stroke();
      ctx.strokeStyle = '#15151a';
      break;
    }
    case 'pizza': {
      // pistol grip with a spinning pizza wheel saw at the muzzle
      ctx.fillStyle = '#2e2e36';
      ctx.fillRect(x0, -3, r * 0.7, 6);
      ctx.strokeRect(x0, -3, r * 0.7, 6);
      // saw
      const wx = x0 + r * 0.85;
      const spin = gameTime * 14;
      ctx.save();
      ctx.translate(wx, 0);
      ctx.rotate(spin);
      // crust
      ctx.fillStyle = '#d99a4a';
      ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI*2); ctx.fill();
      // cheese
      ctx.fillStyle = '#ffd966';
      ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI*2); ctx.fill();
      // pepperoni
      ctx.fillStyle = '#c0301a';
      for (let k = 0; k < 5; k++) {
        const a = (k / 5) * Math.PI * 2;
        ctx.beginPath(); ctx.arc(Math.cos(a) * 3, Math.sin(a) * 3, 1.2, 0, Math.PI*2); ctx.fill();
      }
      ctx.strokeStyle = '#7a4a18';
      ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI*2); ctx.stroke();
      ctx.restore();
      ctx.strokeStyle = '#15151a';
      ctx.lineWidth = 1;
      break;
    }
    case 'toaster': {
      // boxy toaster slot with a slice of toast peeking out + a barrel
      ctx.fillStyle = '#7a3a18';
      ctx.fillRect(x0, -7, r * 0.95, 14); // toaster body
      ctx.strokeRect(x0, -7, r * 0.95, 14);
      // slot
      ctx.fillStyle = '#0a0a14';
      ctx.fillRect(x0 + 3, -5, r * 0.95 - 6, 4);
      // toast
      ctx.fillStyle = '#d8a060';
      ctx.beginPath();
      ctx.moveTo(x0 + 5, -5);
      ctx.lineTo(x0 + r * 0.95 - 5, -5);
      ctx.lineTo(x0 + r * 0.95 - 5, -8);
      ctx.lineTo(x0 + 5, -8);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      // butter
      ctx.fillStyle = '#ffe89a';
      ctx.fillRect(x0 + r * 0.4, -7.5, 4, 1.5);
      // lever
      ctx.strokeStyle = '#a06030';
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(x0 + r * 0.95, 0);
      ctx.lineTo(x0 + r * 0.95 + 4, 4);
      ctx.stroke();
      ctx.strokeStyle = '#15151a';
      ctx.lineWidth = 1;
      // muzzle
      ctx.fillStyle = w.color;
      ctx.fillRect(x0 + r * 0.95, -2, 4, 4);
      break;
    }
    case 'noodle': {
      // Heavy beam-rifle — long sniper body with a sauce-pot "fuel tank"
      // mounted on top + a glowing red emitter at the muzzle. Reads as a
      // gun (not a kitchen utensil) so the huge-cooldown sniper feel matches.
      // wood stock
      ctx.fillStyle = '#3a2a1a';
      ctx.fillRect(x0 - r * 0.55, -3, r * 0.55, 6);
      // long receiver
      ctx.fillStyle = '#1f2418';
      ctx.fillRect(x0, -4, r * 1.5, 8);
      ctx.strokeRect(x0, -4, r * 1.5, 8);
      // sauce-pot fuel tank on top — small cylindrical pot with noodle ends
      const px = x0 + r * 0.5, py = -9;
      ctx.fillStyle = '#888c95';
      ctx.fillRect(px, py, r * 0.6, 5);
      ctx.strokeRect(px, py, r * 0.6, 5);
      // sauce inside the tank
      ctx.fillStyle = '#ff5050';
      ctx.fillRect(px + 1.2, py + 1.2, r * 0.6 - 2.4, 2.6);
      // a couple of noodles sticking out of the top of the pot
      ctx.strokeStyle = '#ffd966';
      ctx.lineWidth = 1;
      for (let k = 0; k < 3; k++) {
        ctx.beginPath();
        ctx.moveTo(px + 2 + k * 3, py);
        ctx.lineTo(px + 2 + k * 3, py - 2);
        ctx.stroke();
      }
      // sauce feed hose from tank into the receiver
      ctx.strokeStyle = '#ff5050';
      ctx.lineWidth = 1.6;
      ctx.beginPath();
      ctx.moveTo(px + r * 0.3, py + 5);
      ctx.lineTo(px + r * 0.3, -4);
      ctx.stroke();
      // sight on top of the receiver
      ctx.strokeStyle = '#15151a';
      ctx.lineWidth = 1;
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(x0 + r * 1.05, -7, r * 0.25, 3);
      // long barrel
      ctx.fillStyle = '#1a1a22';
      ctx.fillRect(x0 + r * 1.5, -2, r * 0.55, 4);
      // glowing red emitter / muzzle — wider, with a soft halo
      ctx.fillStyle = '#ff5050';
      ctx.beginPath();
      ctx.arc(x0 + r * 2.1, 0, 4.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff5d6';
      ctx.beginPath();
      ctx.arc(x0 + r * 2.1, 0, 1.8, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case 'mower': {
      // handle + boxy mower deck with rotating blade peeking out the bottom
      ctx.fillStyle = '#3a2a1a';
      ctx.fillRect(x0 - r * 0.3, -1, r * 0.4, 2); // handle
      // deck
      ctx.fillStyle = '#5cd86b';
      ctx.fillRect(x0 + r * 0.1, -5, r * 1.0, 10);
      ctx.strokeRect(x0 + r * 0.1, -5, r * 1.0, 10);
      // engine bump
      ctx.fillStyle = '#1a3a22';
      ctx.fillRect(x0 + r * 0.4, -7, r * 0.4, 4);
      // wheels
      ctx.fillStyle = '#15151a';
      ctx.beginPath(); ctx.arc(x0 + r * 0.25, 6, 2.6, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x0 + r * 0.95, 6, 2.6, 0, Math.PI*2); ctx.fill();
      // blade
      ctx.strokeStyle = '#cfcfd6';
      ctx.lineWidth = 1.6;
      const sp = gameTime * 24;
      ctx.beginPath();
      ctx.moveTo(x0 + r * 0.55 + Math.cos(sp) * 8, 4 + Math.sin(sp) * 1.5);
      ctx.lineTo(x0 + r * 0.55 - Math.cos(sp) * 8, 4 - Math.sin(sp) * 1.5);
      ctx.stroke();
      ctx.strokeStyle = '#15151a';
      ctx.lineWidth = 1;
      break;
    }
    case 'confetti': {
      // bulky party cannon with confetti spilling out the muzzle
      ctx.fillStyle = '#5a3a8a';
      ctx.fillRect(x0, -5, r * 0.9, 10);
      ctx.strokeRect(x0, -5, r * 0.9, 10);
      // hoops
      ctx.strokeStyle = '#ff80c0';
      ctx.lineWidth = 1.4;
      for (let k = 0; k < 3; k++) {
        ctx.beginPath();
        ctx.moveTo(x0 + r * 0.1 + k * 7, -5);
        ctx.lineTo(x0 + r * 0.1 + k * 7, 5);
        ctx.stroke();
      }
      ctx.strokeStyle = '#15151a';
      ctx.lineWidth = 1;
      // muzzle bell
      ctx.fillStyle = '#ff80c0';
      ctx.beginPath();
      ctx.moveTo(x0 + r * 0.9, -5);
      ctx.lineTo(x0 + r * 1.35, -7);
      ctx.lineTo(x0 + r * 1.35, 7);
      ctx.lineTo(x0 + r * 0.9, 5);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      // confetti specks
      const cols = ['#5cd86b', '#ffce44', '#7ec8ff', '#fff'];
      for (let k = 0; k < 4; k++) {
        ctx.fillStyle = cols[k];
        ctx.fillRect(x0 + r * 1.4 + (k % 2) * 3, -3 + k * 2, 1.4, 1.4);
      }
      break;
    }
    case 'burger': {
      // squat slingshot with a stacked burger on the muzzle
      ctx.fillStyle = '#3a2a1a';
      ctx.fillRect(x0, -3, r * 0.8, 6);
      ctx.strokeRect(x0, -3, r * 0.8, 6);
      // burger stack at the muzzle
      const bx = x0 + r * 0.85;
      ctx.fillStyle = '#c47a3a'; ctx.beginPath(); ctx.ellipse(bx, -3, 5, 2, 0, Math.PI, Math.PI*2); ctx.fill(); // top bun
      ctx.fillStyle = '#5a2e18'; ctx.fillRect(bx - 5, -1, 10, 1.5); // patty
      ctx.fillStyle = '#ffd166'; ctx.fillRect(bx - 5, 0.5, 10, 1);  // cheese
      ctx.fillStyle = '#a4632b'; ctx.beginPath(); ctx.ellipse(bx, 2.5, 5, 1.8, 0, 0, Math.PI); ctx.fill(); // bottom bun
      break;
    }
    case 'bagel': {
      // launcher with a bagel ring on the muzzle
      ctx.fillStyle = '#2a2a32';
      ctx.fillRect(x0, -4, r * 0.85, 8);
      ctx.strokeRect(x0, -4, r * 0.85, 8);
      const bx = x0 + r * 1.0;
      ctx.fillStyle = '#d9a64a';
      ctx.beginPath(); ctx.arc(bx, 0, 5, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#0a0a14';
      ctx.beginPath(); ctx.arc(bx, 0, 1.8, 0, Math.PI*2); ctx.fill();
      break;
    }
    case 'donut': {
      // triple-barrel pastry launcher
      ctx.fillStyle = '#2c2230';
      ctx.fillRect(x0, -6, r * 1.0, 12);
      ctx.strokeRect(x0, -6, r * 1.0, 12);
      // three small donuts at the muzzle (one per shot)
      const bx = x0 + r * 1.05;
      for (let k = -1; k <= 1; k++) {
        ctx.fillStyle = '#e8b878';
        ctx.beginPath(); ctx.arc(bx + 2, k * 4, 2.8, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#ff9bd1';
        ctx.beginPath(); ctx.arc(bx + 2, k * 4, 2.3, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#0a0a14';
        ctx.beginPath(); ctx.arc(bx + 2, k * 4, 0.8, 0, Math.PI*2); ctx.fill();
      }
      break;
    }
    case 'kebab': {
      // grill-fork rifle with meat chunks on the skewer barrel
      ctx.fillStyle = '#3a2a1a';
      ctx.fillRect(x0 - r * 0.4, -2, r * 0.4, 4); // wood handle
      ctx.fillStyle = '#222a32';
      ctx.fillRect(x0, -3, r * 0.9, 6);
      ctx.strokeRect(x0, -3, r * 0.9, 6);
      // skewer barrel
      ctx.strokeStyle = '#a08070';
      ctx.lineCap = 'round';
      ctx.lineWidth = 1.8;
      ctx.beginPath(); ctx.moveTo(x0 + r * 0.9, 0); ctx.lineTo(x0 + r * 1.9, 0); ctx.stroke();
      ctx.lineCap = 'butt';
      // meat chunks on the skewer
      ctx.fillStyle = '#a35a2a';
      ctx.beginPath(); ctx.arc(x0 + r * 1.15, 0, 2.2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x0 + r * 1.55, 0, 2.2, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#5cd86b';
      ctx.beginPath(); ctx.arc(x0 + r * 1.35, 0, 1.4, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#15151a';
      ctx.lineWidth = 1;
      break;
    }
    case 'soda': {
      // backpack-style tank + nozzle (soda dispenser)
      ctx.fillStyle = '#1a3a4a';
      ctx.fillRect(x0 - r * 0.3, -7, r * 0.4, 14); // tank
      ctx.strokeRect(x0 - r * 0.3, -7, r * 0.4, 14);
      // bubbles inside the tank
      ctx.fillStyle = '#52cfff';
      ctx.beginPath(); ctx.arc(x0 - r * 0.1, -3, 1.2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x0 - r * 0.15, 1, 0.9, 0, Math.PI*2); ctx.fill();
      // hose
      ctx.strokeStyle = '#52cfff';
      ctx.lineWidth = 1.6;
      ctx.beginPath(); ctx.moveTo(x0 + r * 0.1, 0); ctx.lineTo(x0 + r * 0.6, 0); ctx.stroke();
      ctx.strokeStyle = '#15151a';
      ctx.lineWidth = 1;
      // nozzle
      ctx.fillStyle = '#2a2a32';
      ctx.fillRect(x0 + r * 0.6, -3, r * 0.55, 6);
      ctx.strokeRect(x0 + r * 0.6, -3, r * 0.55, 6);
      ctx.fillStyle = '#fbfbff';
      ctx.fillRect(x0 + r * 1.15, -2, 3, 4); // spout
      break;
    }
    case 'bubble': {
      // bubble wand — a long thin handle with a big ring at the end
      ctx.fillStyle = '#1a2a44';
      ctx.fillRect(x0, -2, r * 1.0, 4);
      ctx.strokeRect(x0, -2, r * 1.0, 4);
      // bubble ring
      ctx.strokeStyle = w.color;
      ctx.lineWidth = 2.4;
      ctx.beginPath(); ctx.arc(x0 + r * 1.45, 0, 6, 0, Math.PI*2); ctx.stroke();
      // soap shimmer
      ctx.strokeStyle = 'rgba(255,255,255,0.7)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(x0 + r * 1.45 - 2, -2, 2.5, 0.6, 1.6); ctx.stroke();
      ctx.strokeStyle = '#15151a';
      ctx.lineWidth = 1;
      break;
    }
    case 'harpoon': {
      // long barrel + protruding harpoon head with a rope coil
      ctx.fillStyle = '#222a32';
      ctx.fillRect(x0, -4, r * 1.4, 8);
      ctx.strokeRect(x0, -4, r * 1.4, 8);
      // rope coil on the side
      ctx.strokeStyle = '#a06030';
      ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.arc(x0 + r * 0.35, -7, 2.6, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.arc(x0 + r * 0.35, -7, 1.4, 0, Math.PI * 2); ctx.stroke();
      ctx.strokeStyle = '#15151a';
      ctx.lineWidth = 1;
      // harpoon shaft + head
      ctx.fillStyle = '#a0a8b8';
      ctx.fillRect(x0 + r * 1.4, -1, 8, 2);
      ctx.fillStyle = '#e8eef6';
      ctx.beginPath();
      ctx.moveTo(x0 + r * 1.4 + 14, 0);
      ctx.lineTo(x0 + r * 1.4 + 8, -3.4);
      ctx.lineTo(x0 + r * 1.4 + 8, 3.4);
      ctx.closePath(); ctx.fill();
      // barb hooks
      ctx.strokeStyle = '#7c8494';
      ctx.lineWidth = 1.1;
      ctx.beginPath();
      ctx.moveTo(x0 + r * 1.4 + 8, -3.4); ctx.lineTo(x0 + r * 1.4 + 5, -5);
      ctx.moveTo(x0 + r * 1.4 + 8,  3.4); ctx.lineTo(x0 + r * 1.4 + 5,  5);
      ctx.stroke();
      ctx.strokeStyle = '#15151a';
      break;
    }
    case 'discoball': {
      // short stubby launcher with a strobing disco orb at the muzzle
      ctx.fillStyle = '#2a1f30';
      ctx.fillRect(x0, -4, r * 0.85, 8);
      ctx.strokeRect(x0, -4, r * 0.85, 8);
      // orb
      const bx = x0 + r * 1.05;
      ctx.fillStyle = '#3a3a44';
      ctx.beginPath(); ctx.arc(bx, 0, 5.5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      // mirror tiles — hue shifts with gameTime
      const hue = (gameTime * 240) % 360;
      for (let gx = -1; gx <= 1; gx++) {
        for (let gy = -1; gy <= 1; gy++) {
          const h = (hue + (gx + 1) * 40 + (gy + 1) * 70) % 360;
          ctx.fillStyle = `hsl(${h}, 95%, 65%)`;
          ctx.fillRect(bx + gx * 2 - 0.9, gy * 2 - 0.9, 1.8, 1.8);
        }
      }
      break;
    }
    case 'boomerang': {
      // thrower stick with a boomerang notched on top
      ctx.fillStyle = '#3a2a1a';
      ctx.fillRect(x0, -3, r * 0.9, 6);
      ctx.strokeRect(x0, -3, r * 0.9, 6);
      // boomerang lying across the muzzle
      const bx = x0 + r * 0.95;
      ctx.fillStyle = w.color;
      ctx.save();
      ctx.translate(bx, 0);
      ctx.rotate(-0.35);
      ctx.beginPath();
      ctx.moveTo(-6, 0); ctx.lineTo(-2, -2); ctx.lineTo(2, -6);
      ctx.lineTo(4, -2); ctx.lineTo(6, 0); ctx.lineTo(4, 2);
      ctx.lineTo(2, 6); ctx.lineTo(-2, 2);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#7a4a18'; ctx.lineWidth = 1; ctx.stroke();
      ctx.restore();
      ctx.strokeStyle = '#15151a';
      break;
    }
    case 'vacuum': {
      // wide cone nozzle pointing outward (sucks in, doesn't shoot out)
      ctx.fillStyle = '#2a2a32';
      ctx.fillRect(x0, -4, r * 0.7, 8);
      ctx.strokeRect(x0, -4, r * 0.7, 8);
      // motor housing
      ctx.fillStyle = '#cf6030';
      ctx.beginPath(); ctx.arc(x0 + r * 0.35, 0, 4, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      // cone
      ctx.fillStyle = '#7a8494';
      ctx.beginPath();
      ctx.moveTo(x0 + r * 0.7, -3); ctx.lineTo(x0 + r * 0.7, 3);
      ctx.lineTo(x0 + r * 1.5, 7); ctx.lineTo(x0 + r * 1.5, -7);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      // inner dark mouth
      ctx.fillStyle = '#0a0a14';
      ctx.beginPath();
      ctx.ellipse(x0 + r * 1.45, 0, 2, 5.5, 0, 0, Math.PI * 2);
      ctx.fill();
      // little airy wisp being sucked in
      ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
      ctx.beginPath(); ctx.arc(x0 + r * 1.75, 1, 0.9, 0, Math.PI * 2); ctx.fill();
      break;
    }
    default: { // pistol — short, with grip below
      ctx.fillStyle = '#2e2e36';
      ctx.fillRect(x0, -3.5, r * 0.95, 7);
      ctx.strokeRect(x0, -3.5, r * 0.95, 7);
      // grip
      ctx.fillStyle = '#2a2a32';
      ctx.fillRect(x0 + r * 0.05, 3.5, 4, 6);
      ctx.strokeRect(x0 + r * 0.05, 3.5, 4, 6);
      // muzzle
      ctx.fillStyle = w.color;
      ctx.fillRect(x0 + r * 0.95, -2, 4, 4);
      break;
    }
  }
}

// Dispatch bullet drawing to a gag-specific shape, falling back to a plain disc.
function drawBullet(b) {
  // Custom-sprite override — per-bulletKind slot first, then a generic
  // "bulletDefault" fallback. The painted sprite rotates with the bullet's
  // velocity so the silhouette stays oriented correctly.
  const kindSlot = b.bulletKind
    ? 'bullet' + b.bulletKind.charAt(0).toUpperCase() + b.bulletKind.slice(1)
    : null;
  if (kindSlot && hasCustomSprite(kindSlot)) {
    const ang = Math.atan2(b.vy, b.vx);
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(ang);
    drawCustomSprite(kindSlot, 0, 0, 18);
    ctx.restore();
    return;
  }
  if (hasCustomSprite('bulletDefault')) {
    const ang = Math.atan2(b.vy, b.vx);
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(ang);
    drawCustomSprite('bulletDefault', 0, 0, 14);
    ctx.restore();
    return;
  }
  if (b.bulletKind === 'chicken') {
    const ang = Math.atan2(b.vy, b.vx);
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(ang);
    // body
    ctx.fillStyle = '#fff5b8';
    ctx.beginPath(); ctx.ellipse(0, 0, 7, 5.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#15151a';
    ctx.lineWidth = 1;
    ctx.stroke();
    // comb
    ctx.fillStyle = '#d63030';
    ctx.beginPath(); ctx.arc(-1, -5, 1.5, 0, Math.PI*2);
    ctx.arc(1, -5, 1.5, 0, Math.PI*2); ctx.fill();
    // beak (forward = +x)
    ctx.fillStyle = '#ff9d3a';
    ctx.beginPath();
    ctx.moveTo(6, -1); ctx.lineTo(11, 0); ctx.lineTo(6, 2); ctx.closePath();
    ctx.fill();
    // eye
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.arc(3, -1, 0.9, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    return;
  }
  if (b.bulletKind === 'chick') {
    const ang = Math.atan2(b.vy, b.vx);
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(ang);
    ctx.fillStyle = '#ffe066';
    ctx.beginPath(); ctx.arc(0, 0, 3.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff9d3a';
    ctx.beginPath();
    ctx.moveTo(2.8, 0); ctx.lineTo(5.5, 0.7); ctx.lineTo(2.8, 1.2); ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.arc(1.4, -1, 0.6, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    return;
  }
  if (b.bulletKind === 'banana') {
    // Classic crescent banana with tapered tips, dark stem at one end and a
    // lighter fruit-flesh highlight along the inside of the curve.
    const ang = Math.atan2(b.vy, b.vx);
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(ang);
    // Outline path: long crescent
    ctx.fillStyle = '#ffd942';
    ctx.beginPath();
    ctx.moveTo(-8, 4);                       // bottom-left tail
    ctx.quadraticCurveTo(-2, -7, 8, -3);    // top arc to right tip
    ctx.quadraticCurveTo(11, -2, 11, 0);    // right tip
    ctx.quadraticCurveTo(11, 1, 8, 1);      // bottom of right tip
    ctx.quadraticCurveTo(0, -1, -7, 5);     // bottom arc back
    ctx.quadraticCurveTo(-9, 5, -8, 4);     // left tail
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#a07e1c';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Lighter belly highlight (the inside of the curve)
    ctx.fillStyle = '#fff2a0';
    ctx.beginPath();
    ctx.moveTo(-5, 3);
    ctx.quadraticCurveTo(0, -3.5, 6, -1.5);
    ctx.quadraticCurveTo(0, -1, -5, 3);
    ctx.closePath();
    ctx.fill();
    // Dark stem at the right tip
    ctx.fillStyle = '#4a3a18';
    ctx.fillRect(10, -1.6, 3, 1.4);
    ctx.restore();
    return;
  }
  if (b.bulletKind === 'duck') {
    const ang = Math.atan2(b.vy, b.vx);
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(ang);
    // body
    ctx.fillStyle = '#ffe066';
    ctx.beginPath(); ctx.ellipse(-1, 1, 6, 4.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#15151a';
    ctx.lineWidth = 1;
    ctx.stroke();
    // head
    ctx.fillStyle = '#ffe066';
    ctx.beginPath(); ctx.arc(4, -2, 3.2, 0, Math.PI*2); ctx.fill();
    ctx.stroke();
    // beak
    ctx.fillStyle = '#ff9d3a';
    ctx.beginPath();
    ctx.moveTo(6.5, -2); ctx.lineTo(11, -1.5); ctx.lineTo(6.5, -0.5); ctx.closePath();
    ctx.fill();
    // eye
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.arc(5, -2.7, 0.7, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    return;
  }
  if (b.bulletKind === 'kunai') {
    const ang = Math.atan2(b.vy, b.vx);
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(ang);
    // narrow diamond blade
    ctx.fillStyle = b.color || '#9ab0c0';
    ctx.beginPath();
    ctx.moveTo(8, 0); ctx.lineTo(0, 2); ctx.lineTo(-6, 0); ctx.lineTo(0, -2);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#15151a';
    ctx.lineWidth = 1;
    ctx.stroke();
    // wrapped handle
    ctx.fillStyle = '#3a2410';
    ctx.fillRect(-6, -1.5, 4, 3);
    ctx.restore();
    return;
  }
  if (b.bulletKind === 'chakram') {
    const spin = (gameTime * 22) + b.x * 0.13;
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(spin);
    // outer sawblade ring
    ctx.fillStyle = b.color || '#ff8040';
    ctx.beginPath(); ctx.arc(0, 0, 9, 0, Math.PI*2); ctx.fill();
    // serrated teeth
    ctx.fillStyle = '#1a1a1a';
    for (let k = 0; k < 8; k++) {
      const a = (k / 8) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * 8, Math.sin(a) * 8);
      ctx.lineTo(Math.cos(a + 0.18) * 12, Math.sin(a + 0.18) * 12);
      ctx.lineTo(Math.cos(a + 0.36) * 8, Math.sin(a + 0.36) * 8);
      ctx.closePath(); ctx.fill();
    }
    // inner hub
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.arc(0, 0, 3.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = b.color || '#ff8040';
    ctx.beginPath(); ctx.arc(0, 0, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    return;
  }
  if (b.bulletKind === 'arrow') {
    // Charged-bow arrow — length and feather brightness scale with the draw
    // amount stored on the bullet (bowCharge: 0..1). Tip gets a glow at full
    // draw so a max-charge shot reads as more powerful in flight.
    const ang = Math.atan2(b.vy, b.vx);
    const ch = b.bowCharge != null ? b.bowCharge : 0.6;
    const len = 12 + ch * 10;
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(ang);
    // shaft
    ctx.fillStyle = '#c8b896';
    ctx.fillRect(-len * 0.55, -1, len, 2);
    // fletching (back end) — color brightens with charge
    ctx.fillStyle = ch > 0.7 ? '#ffce44' : '#a8c5d8';
    ctx.beginPath();
    ctx.moveTo(-len * 0.55, -3); ctx.lineTo(-len * 0.55 + 5, 0); ctx.lineTo(-len * 0.55, 3);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-len * 0.55 - 3, -2.5); ctx.lineTo(-len * 0.55 + 2, 0); ctx.lineTo(-len * 0.55 - 3, 2.5);
    ctx.closePath(); ctx.fill();
    // arrowhead
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.moveTo(len * 0.45 - 4, -3); ctx.lineTo(len * 0.45 + 4, 0); ctx.lineTo(len * 0.45 - 4, 3);
    ctx.closePath(); ctx.fill();
    // glow at full charge
    if (ch > 0.85) {
      ctx.fillStyle = 'rgba(255, 206, 68, 0.6)';
      ctx.beginPath(); ctx.arc(len * 0.45, 0, 4, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
    return;
  }
  if (b.bulletKind === 'bolt') {
    // crossbow bolt — thin shaft with feathered tail + arrowhead
    const ang = Math.atan2(b.vy, b.vx);
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(ang);
    ctx.fillStyle = b.color || '#a06a2a';
    ctx.fillRect(-8, -1, 14, 2);                  // shaft
    // feathered fletching
    ctx.fillStyle = '#dfe2e8';
    ctx.beginPath();
    ctx.moveTo(-8, -3); ctx.lineTo(-4, 0); ctx.lineTo(-8, 3); ctx.closePath();
    ctx.fill();
    // arrowhead
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.moveTo(6, -3); ctx.lineTo(10, 0); ctx.lineTo(6, 3); ctx.closePath();
    ctx.fill();
    ctx.restore();
    return;
  }
  if (b.bulletKind === 'flame') {
    // flickering flame blob — random tint per frame for a fire look
    const r = 3.5 + Math.random() * 1.5;
    const colors = ['#ff8030', '#ffce44', '#ff5050'];
    const c0 = colors[(Math.random() * colors.length) | 0];
    const grad = ctx.createRadialGradient(b.x, b.y, 0.5, b.x, b.y, r * 2);
    grad.addColorStop(0, '#fff5b8');
