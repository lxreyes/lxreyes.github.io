    glow.addColorStop(1, `hsla(${hue}, 100%, 60%, 0)`);
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(b.x, b.y, r * 2.4, 0, Math.PI*2); ctx.fill();
    // ball
    ctx.fillStyle = '#3a3a44';
    ctx.beginPath(); ctx.arc(b.x, b.y, r, 0, Math.PI*2); ctx.fill();
    // mirror tiles — a 3x3 grid of bright squares whose hue shifts each frame
    for (let gx = -1; gx <= 1; gx++) {
      for (let gy = -1; gy <= 1; gy++) {
        const h = (hue + (gx + 1) * 40 + (gy + 1) * 70) % 360;
        ctx.fillStyle = `hsl(${h}, 95%, 65%)`;
        ctx.fillRect(b.x + gx * 2.5 - 1, b.y + gy * 2.5 - 1, 2, 2);
      }
    }
    return;
  }
  if (b.bulletKind === 'boomerang') {
    const spin = gameTime * 18 + b.x * 0.04;
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(spin);
    ctx.fillStyle = b.color || '#d8a060';
    ctx.beginPath();
    ctx.moveTo(-8, 0); ctx.lineTo(-2, -2); ctx.lineTo(2, -8); ctx.lineTo(4, -2);
    ctx.lineTo(8, 0); ctx.lineTo(4, 2); ctx.lineTo(2, 8); ctx.lineTo(-2, 2);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#7a4a18';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
    return;
  }
  if (b.bulletKind === 'dust') {
    // Airy suction wisp — translucent white puff with a soft halo and a
    // wavering tail. Reads as "air being pulled" rather than a solid pellet.
    const ang = Math.atan2(b.vy, b.vx) + Math.sin(gameTime * 22 + b.x * 0.4) * 0.6;
    const pulse = 1 + Math.sin(gameTime * 18 + b.x * 0.2) * 0.15;
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(ang);
    // outer halo
    const halo = ctx.createRadialGradient(0, 0, 0.5, 0, 0, 6 * pulse);
    halo.addColorStop(0, 'rgba(255, 255, 255, 0.55)');
    halo.addColorStop(1, 'rgba(255, 255, 255, 0)');
    ctx.fillStyle = halo;
    ctx.beginPath(); ctx.arc(0, 0, 6 * pulse, 0, Math.PI * 2); ctx.fill();
    // streaky white wisp body
    ctx.fillStyle = 'rgba(255, 255, 255, 0.72)';
    ctx.beginPath();
    ctx.ellipse(0, 0, 4 * pulse, 1.5, 0, 0, Math.PI * 2);
    ctx.fill();
    // bright core highlight
    ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
    ctx.beginPath();
    ctx.ellipse(0.5, 0, 1.6, 0.7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    return;
  }
  // default — plain circle (explosive rockets render larger)
  ctx.fillStyle = b.color || '#ffe066';
  ctx.beginPath(); ctx.arc(b.x, b.y, b.explosive ? 5 : 3, 0, Math.PI*2); ctx.fill();
}

// Draw an ability-specific symbol centered at (x, y). Color comes from the
// caller so the book stays themed; line/fill primitives are kept simple
// so each icon reads at small sizes.
function drawAbilityIcon(id, x, y, s, color) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  if (id === 'bulletTime') {
    // clock face — circle + hour/minute hands
    ctx.beginPath(); ctx.arc(x, y, s * 0.6, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, y); ctx.lineTo(x, y - s * 0.45);
    ctx.moveTo(x, y); ctx.lineTo(x + s * 0.35, y);
    ctx.stroke();
  } else if (id === 'rage') {
    // angry brow lines + drop (sweat? flame?)
    ctx.beginPath();
    ctx.moveTo(x - s * 0.5, y - s * 0.1); ctx.lineTo(x - s * 0.05, y - s * 0.35);
    ctx.moveTo(x + s * 0.5, y - s * 0.1); ctx.lineTo(x + s * 0.05, y - s * 0.35);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, y - s * 0.05);
    ctx.quadraticCurveTo(x + s * 0.45, y + s * 0.3, x, y + s * 0.55);
    ctx.quadraticCurveTo(x - s * 0.45, y + s * 0.3, x, y - s * 0.05);
    ctx.fill();
  } else if (id === 'phase') {
    // ghost — round top, wavy bottom
    ctx.beginPath();
    ctx.arc(x, y - s * 0.05, s * 0.45, Math.PI, 0);
    ctx.lineTo(x + s * 0.45, y + s * 0.4);
    ctx.lineTo(x + s * 0.25, y + s * 0.25);
    ctx.lineTo(x + s * 0.05, y + s * 0.45);
    ctx.lineTo(x - s * 0.15, y + s * 0.25);
    ctx.lineTo(x - s * 0.35, y + s * 0.45);
    ctx.lineTo(x - s * 0.45, y + s * 0.4);
    ctx.closePath();
    ctx.stroke();
  } else if (id === 'homing') {
    // target — three concentric rings
    ctx.beginPath(); ctx.arc(x, y, s * 0.6, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(x, y, s * 0.38, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(x, y, s * 0.15, 0, Math.PI * 2); ctx.fill();
  } else if (id === 'pull') {
    // four arrows pointing inward
    for (let k = 0; k < 4; k++) {
      const a = k * Math.PI / 2;
      const tx = x + Math.cos(a) * s * 0.5;
      const ty = y + Math.sin(a) * s * 0.5;
      const ix = x + Math.cos(a) * s * 0.15;
      const iy = y + Math.sin(a) * s * 0.15;
      ctx.beginPath();
      ctx.moveTo(tx, ty);
      ctx.lineTo(ix, iy);
      ctx.stroke();
      // arrowhead at the inside end
      ctx.beginPath();
      ctx.moveTo(ix, iy);
      ctx.lineTo(ix + Math.cos(a - 2.3) * s * 0.2, iy + Math.sin(a - 2.3) * s * 0.2);
      ctx.moveTo(ix, iy);
      ctx.lineTo(ix + Math.cos(a + 2.3) * s * 0.2, iy + Math.sin(a + 2.3) * s * 0.2);
      ctx.stroke();
    }
  } else if (id === 'storm') {
    // lightning bolt
    ctx.beginPath();
    ctx.moveTo(x - s * 0.2, y - s * 0.55);
    ctx.lineTo(x + s * 0.3, y - s * 0.05);
    ctx.lineTo(x - s * 0.05, y + s * 0.05);
    ctx.lineTo(x + s * 0.25, y + s * 0.55);
    ctx.lineTo(x - s * 0.3, y);
    ctx.lineTo(x, y);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

// Draw a distinctive icon for a pickup type, centered at (x, y).
// All icons are drawn in dark ink so they read against the colored pickup body.
function drawPickupIcon(type, x, y, s) {
  ctx.save();
  ctx.fillStyle = '#15151a';
  ctx.strokeStyle = '#15151a';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  switch (type) {
    case 'health': { // medical + cross
      const t = Math.max(2, s * 0.28);
      ctx.fillRect(x - t/2, y - s*0.6, t, s*1.2);
      ctx.fillRect(x - s*0.6, y - t/2, s*1.2, t);
      break;
    }
    case 'shield': { // shield outline
      ctx.beginPath();
      ctx.moveTo(x, y - s*0.7);
      ctx.lineTo(x + s*0.55, y - s*0.35);
      ctx.lineTo(x + s*0.5,  y + s*0.25);
      ctx.lineTo(x,          y + s*0.7);
      ctx.lineTo(x - s*0.5,  y + s*0.25);
      ctx.lineTo(x - s*0.55, y - s*0.35);
      ctx.closePath();
      ctx.stroke();
      break;
    }
    case 'triple': { // three pellets in a triangle
      const r = Math.max(1.6, s * 0.18);
      ctx.beginPath(); ctx.arc(x,            y - s*0.4, r, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x - s*0.4,    y + s*0.3, r, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + s*0.4,    y + s*0.3, r, 0, Math.PI*2); ctx.fill();
      break;
    }
    case 'rapid': { // lightning bolt
      ctx.beginPath();
      ctx.moveTo(x - s*0.15, y - s*0.7);
      ctx.lineTo(x + s*0.35, y - s*0.05);
      ctx.lineTo(x + s*0.05, y + s*0.05);
      ctx.lineTo(x + s*0.2,  y + s*0.7);
      ctx.lineTo(x - s*0.35, y + s*0.05);
      ctx.lineTo(x - s*0.05, y - s*0.05);
      ctx.closePath();
      ctx.fill();
      break;
    }
    case 'speed': { // double chevron »
      ctx.beginPath();
      ctx.moveTo(x - s*0.5, y - s*0.45);
      ctx.lineTo(x - s*0.05, y);
      ctx.lineTo(x - s*0.5, y + s*0.45);
      ctx.moveTo(x + s*0.05, y - s*0.45);
      ctx.lineTo(x + s*0.5, y);
      ctx.lineTo(x + s*0.05, y + s*0.45);
      ctx.stroke();
      break;
    }
    case 'bomb': { // round bomb with fuse + spark
      ctx.beginPath(); ctx.arc(x, y + s*0.15, s*0.55, 0, Math.PI*2); ctx.fill();
      // collar
      ctx.fillRect(x - s*0.18, y - s*0.42, s*0.36, s*0.16);
      // fuse
      ctx.beginPath();
      ctx.moveTo(x + s*0.05, y - s*0.35);
      ctx.quadraticCurveTo(x + s*0.45, y - s*0.55, x + s*0.55, y - s*0.85);
      ctx.stroke();
      // spark
      ctx.fillStyle = '#ffce44';
      ctx.beginPath(); ctx.arc(x + s*0.55, y - s*0.85, 2.5, 0, Math.PI*2); ctx.fill();
      break;
    }
  }
  ctx.restore();
}

function darken(hex, amount = 0.4) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  const f = 1 - amount;
  return '#' + [r, g, b].map(c => Math.max(0, Math.round(c * f)).toString(16).padStart(2, '0')).join('');
}

addEventListener('keydown', e => {
  ensureAudio(); resumeAudio();
  // Global keys that work in every state
  if (e.code === 'KeyM') {
    soundMuted = !soundMuted;
    applyMusicMute();
    if (!soundMuted) SFX.uiClick();
    return;
  }
  // Escape switches game-state — checked before recording the key
  if (e.code === 'Escape') {
    if (resetConfirm)                  { resetConfirm = false; SFX.uiClick(); return; }
    if (buildMode)                     { buildMode = false; SFX.uiClick(); return; }
    if (gameState === 'playing')       { gameState = 'paused'; clearKeys(); SFX.uiClick(); updateMusicForState(); return; }
    if (gameState === 'paused')        { gameState = 'playing'; SFX.uiClick(); updateMusicForState(); return; }
    if (gameState === 'settings')      { gameState = hasGame ? 'paused' : 'menu'; SFX.uiClick(); updateMusicForState(); return; }
    if (gameState === 'tutorial')      { gameState = hasGame ? 'paused' : 'menu'; SFX.uiClick(); return; }
    if (gameState === 'tree')          { gameState = 'playing'; SFX.uiClick(); return; }
    if (gameState === 'menu')          return;
  }
  // T closes the upgrade tree when it's open (toggle behavior)
  if (e.code === 'KeyT' && gameState === 'tree') {
    gameState = 'playing';
    SFX.uiClick();
    return;
  }
  // While a menu overlay is up, swallow other keys so movement/shoot stay frozen.
  if (gameState !== 'playing') return;

  keys[e.code] = true;
  if (e.code === 'KeyR') resetConfirm = true;
  // Enter / Y confirms a pending reset; Escape / N cancels
  if (resetConfirm) {
    if (e.code === 'Enter' || e.code === 'KeyY') {
      resetConfirm = false;
      hardReset();
      SFX.uiClick && SFX.uiClick();
    } else if (e.code === 'Escape' || e.code === 'KeyN') {
      resetConfirm = false;
      SFX.uiClick && SFX.uiClick();
    }
  }
  if (e.code === 'KeyB' && !pendingCards) {
    buildMode = !buildMode;
    SFX.uiClick();
  }
  if (e.code === 'KeyT' && !pendingCards) {
    gameState = 'tree';
    SFX.uiClick();
    return;
  }
  // card pick takes priority over everything else digit-related
  if (pendingCards) {
    if (e.code === 'Digit1') { pickCard(0); return; }
    if (e.code === 'Digit2') { pickCard(1); return; }
    if (e.code === 'Digit3') { pickCard(2); return; }
    return;
  }
  if (e.code === 'Space' && intermission > 0 && !trainingMode) {
    intermission = 0;
    beginNextWave();
    e.preventDefault();
  }
  if (e.code === 'KeyE' && nearbyGun) doSwapWeapon();
  if (e.code === 'KeyF' && nearbyBladeCrate) doSwapSecondary();
  if (e.code === 'KeyQ' && !inShop() && !pendingCards) {
    const sd = SECONDARIES[player.secondary];
    if (sd && sd.kind === 'charge') startBowCharge();
    else useSecondary();
  }
  // Shift fires the currently-selected ability (dash is one of them)
  if ((e.code === 'ShiftLeft' || e.code === 'ShiftRight') && !inShop() && !pendingCards) {
    tryActivateSelected();
  }
  // Tab cycles forward through unlocked abilities (no-op if none unlocked)
  if (e.code === 'Tab' && !inShop() && !pendingCards) {
    cycleAbility(e.shiftKey ? -1 : 1);
    e.preventDefault();
  }
  // Direct hotkeys are still here for power users
  if (e.code === 'KeyZ') tryAbility('bulletTime');
  if (e.code === 'KeyX') tryAbility('rage');
  if (e.code === 'KeyC') tryAbility('phase');
  if (e.code === 'KeyV') tryAbility('homing');
  if (e.code === 'KeyG') tryAbility('pull');
  if (e.code === 'KeyH') tryAbility('storm');
  // build-mode digit selection takes priority over shop/cheats
  if (buildMode && e.code.startsWith('Digit')) {
    const bi = ['Digit1','Digit2','Digit3','Digit4','Digit5'].indexOf(e.code);
    if (bi >= 0 && BUILDING_KEYS[bi]) { buildSelected = BUILDING_KEYS[bi]; SFX.uiClick(); return; }
  }
  // shop buying — or cheat-code entry when standing outside the shop
  if (inShop()) {
    const idx = ['Digit1','Digit2','Digit3','Digit4','Digit5','Digit6','Digit7','Digit8','Digit9'].indexOf(e.code);
    if (idx >= 0 && idx < upgrades.length) tryBuy(idx);
  } else if (!cheatsUnlocked && e.code.startsWith('Digit')) {
    cheatBuffer = (cheatBuffer + e.code.slice(5)).slice(-CHEAT_CODE.length);
    if (cheatBuffer === CHEAT_CODE) {
      cheatsUnlocked = true;
      cheatsOpen = true;
      floaters.push({ x: 98, y: 200, text: 'CHEATS UNLOCKED', life: 2.8, color: '#8be08b' });
      shake(6);
      SFX.unlock();
    }
  }
});
addEventListener('keyup', e => {
  keys[e.code] = false;
  // Bow release on Q up
  if (e.code === 'KeyQ' && player.bowHeld) releaseBow();
});

// Scroll wheel routes by context:
//   - tutorial overlay  → page next/prev (one step per notch)
//   - in shop panel     → scroll the active tab's body
//   - settings page     → scroll the settings body (if/when it grows)
//   - otherwise playing → cycle the selected ability
// preventDefault is called whenever we consume the event so the page itself
// (the wrapping body) doesn't also scroll.
c.addEventListener('wheel', e => {
  if (e.deltaY === 0) return;
  // Tutorial: a single wheel notch pages forward/back.
  if (gameState === 'tutorial') {
    if (e.deltaY > 0) tutorialPage = Math.min(TUTORIAL_PAGES.length - 1, tutorialPage + 1);
    else              tutorialPage = Math.max(0, tutorialPage - 1);
    e.preventDefault();
    return;
  }
  if (gameState !== 'playing') return;
  // Wheel inside the cheats panel scrolls its body when content overflows.
  if (cheatsBodyRect && cheatsMaxScroll > 0 && pointInRect(mouse, cheatsBodyRect)) {
    cheatsScrollY = Math.max(0, Math.min(cheatsMaxScroll, cheatsScrollY + e.deltaY));
    e.preventDefault();
    return;
  }
  // Shop is open whenever the player stands inside the shop rect.
  if (inShop()) {
    shopScroll[shopTab] = Math.max(0, Math.min(shopMaxScroll, (shopScroll[shopTab] || 0) + e.deltaY));
    e.preventDefault();
    return;
  }
  cycleAbility(e.deltaY > 0 ? 1 : -1);
  e.preventDefault();
}, { passive: false });
// Drop any held movement when leaving play so the player doesn't keep walking
// during a paused screen.
function clearKeys() { for (const k in keys) keys[k] = false; mouse.down = false; }

c.addEventListener('mousemove', e => {
  const r = c.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) * (W / r.width);
  mouse.y = (e.clientY - r.top)  * (H / r.height);
  // dragging the cheats panel
  if (cheatsDrag) {
    cheatsDrag.moved = true;
    cheatsPanel.x = Math.max(0, Math.min(W - cheatsPanel.w, mouse.x - cheatsDrag.offX));
    cheatsPanel.y = Math.max(0, Math.min(H - 30, mouse.y - cheatsDrag.offY));
  }
  // resizing the cheats panel by dragging its bottom-right corner handle
  if (cheatsResize) {
    const dx = mouse.x - cheatsResize.startX;
    const dy = mouse.y - cheatsResize.startY;
    cheatsPanel.w = Math.max(220, Math.min(900, cheatsResize.startW + dx));
    cheatsPanel.h = Math.max(100, Math.min(H - 20, cheatsResize.startH + dy));
    // Keep the panel inside the canvas after a resize
    cheatsPanel.x = Math.max(0, Math.min(W - cheatsPanel.w, cheatsPanel.x));
    cheatsPanel.y = Math.max(0, Math.min(H - cheatsPanel.h, cheatsPanel.y));
  }
  // dragging a stat slider
  if (sliderDrag && sliderDrag.slider.rect) {
    sliderDrag.slider.set(sliderValueAt(sliderDrag.slider, mouse.x));
  }
  // painting in the sprite editor
  if (spriteEditorPaint && spriteEditorRects && spriteEditorRects.grid) {
    const g = spriteEditorRects.grid;
    if (pointInRect(mouse, g)) {
      const cx = Math.floor((mouse.x - g.x) / g.cell);
      const cy = Math.floor((mouse.y - g.y) / g.cell);
      if (cx >= 0 && cx < SPRITE_SIZE && cy >= 0 && cy < SPRITE_SIZE) {
        const sprite = ensureSprite(spriteEditorTarget);
        sprite[cy * SPRITE_SIZE + cx] = spriteEditorPaint.color;
      }
    }
  }
});
c.addEventListener('mousedown', e => {
  ensureAudio(); resumeAudio();
  // Menus take all clicks
  if (gameState !== 'playing') {
    if (e.button === 0) {
      // settings sliders are interactive only on the main settings page —
      // the sprite editor reuses some of the same screen space.
      if (gameState === 'settings' && settingsView === 'main') {
        for (const s of settingsSliders) {
          if (s.rect && pointInRect(mouse, s.rect)) {
            sliderDrag = { slider: s };
            s.set(sliderValueAt(s, mouse.x));
            return;
          }
        }
      }
      handleMenuClick();
    }
    return;
  }
  // right-click triggers the secondary blade
  if (e.button === 2) {
    if (!pendingCards && !inShop()) {
      const sd = SECONDARIES[player.secondary];
      if (sd && sd.kind === 'charge') startBowCharge();
      else useSecondary();
    }
    return;
  }
  if (e.button !== 0) return;
  // build mode absorbs clicks for placement (toolbar handles its own clicks first)
  if (buildMode && !pendingCards) {
    // Toolbar slot click — every rect carries its own `select` callback so
    // the handler dispatches building-type / template / save / load picks
    // uniformly without special-casing here.
    if (buildToolbarRects) {
      for (const rect of buildToolbarRects) {
        if (pointInRect(mouse, rect) && typeof rect.select === 'function') {
          rect.select();
          return;
        }
      }
    }
    tryPlaceBuilding();
    return;
  }
  // card picker eats clicks while open
  if (pendingCards) {
    for (let i = 0; i < 3; i++) {
      if (cardRects[i] && pointInRect(mouse, cardRects[i])) { pickCard(i); return; }
    }
    return;
  }
  // The shop panel sits at the bottom-left and visually covers anything
  // behind it. When the player is in shop, swallow clicks landing in that
  // area before they fall through to the cheats panel (which is also
  // bottom-left and easily overlaps).
  const shopUIRect = { x: 18, y: H - 540 - 18, w: 360, h: 540 };
  const clickInShopUI = inShop() && pointInRect(mouse, shopUIRect);
  // Pause button (top-right corner) — pauses immediately when clicked
  if (pauseBtnRect && pointInRect(mouse, pauseBtnRect) && gameState === 'playing') {
    gameState = 'paused';
    clearKeys();
    SFX.uiClick && SFX.uiClick();
    updateMusicForState && updateMusicForState();
    return;
  }
  // "Are you sure?" reset confirmation is modal — eat the click whether
  // it lands on a button or anywhere else (anywhere else = treat as cancel
  // so a stray click can't accidentally reset the run).
  if (resetConfirm) {
    if (resetConfirmYesRect && pointInRect(mouse, resetConfirmYesRect)) {
      resetConfirm = false;
      hardReset();
      SFX.uiClick && SFX.uiClick();
    } else {
      resetConfirm = false;
      SFX.uiClick && SFX.uiClick();
    }
    return;
  }
  // Guided-tutorial Skip button takes priority over everything else when
  // active — lets the user bail out without clicking through menus.
  if (guidedActive && guidedSkipRect && pointInRect(mouse, guidedSkipRect)) {
    endGuidedTutorial();
    SFX.uiClick && SFX.uiClick();
    return;
  }
  // cheats panel takes priority
  if (!clickInShopUI && cheatsHeaderRect && pointInRect(mouse, cheatsHeaderRect)) {
    cheatsDrag = { offX: mouse.x - cheatsPanel.x, offY: mouse.y - cheatsPanel.y, moved: false };
    return;
  }
  // resize handle on the bottom-right corner of an open cheats panel
  if (!clickInShopUI && cheatsOpen && cheatsResizeRect && pointInRect(mouse, cheatsResizeRect)) {
    cheatsResize = {
      startX: mouse.x, startY: mouse.y,
      startW: cheatsPanel.w,
      // If h hasn't been set yet, snapshot the live panel height we just drew
      startH: cheatsPanel.h != null ? cheatsPanel.h : (cheatsResizeRect.y + cheatsResizeRect.h - cheatsPanel.y + 4),
    };
    return;
  }
  if (!clickInShopUI && cheatsOpen) {
    // tab bar — switch between general / weapons
    for (const tab of cheatsTabRects) {
      if (pointInRect(mouse, tab)) {
        cheatsTab = tab.id;
        SFX.uiClick();
        return;
      }
    }
    // section headers toggle their group open/closed
    for (const sec of cheatSections) {
      if (sec.headerRect && pointInRect(mouse, sec.headerRect)) {
        sec.open = !sec.open;
        SFX.uiClick();
        return;
      }
    }
    // STATS section header — toggles sliders open/closed
    if (slidersHeaderRect && pointInRect(mouse, slidersHeaderRect)) {
      slidersOpen = !slidersOpen;
      SFX.uiClick();
      return;
    }
    // individual cheat buttons
    for (const sec of cheatSections) {
      if (!sec.open) continue;
      for (const c of sec.items) {
        if (c.rect && pointInRect(mouse, c.rect)) { SFX.uiClick(); c.run(); return; }
      }
    }
    // sliders — start a drag and seek the clicked position immediately
    for (const s of cheatSliders) {
      if (s.rect && pointInRect(mouse, s.rect)) {
        sliderDrag = { slider: s };
        s.set(sliderValueAt(s, mouse.x));
        return;
      }
    }
  }
  if (intermission > 0 && !trainingMode && pointInRect(mouse, skipBtn)) {
    intermission = 0;
    beginNextWave();
    return;
  }
  if (nearbyGun && nearbyGun.weapon !== player.weapon && pointInRect(mouse, swapBtn)) {
    doSwapWeapon();
    return;
  }
  if (nearbyBladeCrate && nearbyBladeCrate.secondary !== player.secondary && pointInRect(mouse, swapBladeBtn)) {
    doSwapSecondary();
    return;
  }
  // shop panel clicks (tabs + buy/retrieve rows) — only when the player is
  // actually standing in the shop and the panel is being drawn.
  if (inShop()) {
    if (shopTabRects) {
      for (const r of shopTabRects) {
        if (pointInRect(mouse, r)) {
          if (shopTab !== r.id) shopScroll[r.id] = 0;
          shopTab = r.id;
          SFX.uiClick();
          return;
        }
      }
    }
    for (const b of shopBuyRects) {
      if (pointInRect(mouse, b.rect)) { SFX.uiClick(); b.action(); return; }
    }
    // Click was inside the shop but missed every target — swallow it so
    // holding LMB in the shop doesn't accidentally fire on mouseup.
    return;
  }
  mouse.down = true;
});
addEventListener('mouseup', e => {
  if (e.button === 0) mouse.down = false;
  // Bow release on RMB up
  if (e.button === 2 && player.bowHeld) releaseBow();
  // finish the cheats-header drag — if the mouse never moved, treat it as a toggle click
  if (cheatsDrag) {
    if (!cheatsDrag.moved) { cheatsOpen = !cheatsOpen; SFX.uiClick(); }
    cheatsDrag = null;
  }
  cheatsResize = null;
  sliderDrag = null;
  // commit sprite edits to localStorage when the player releases the brush
  if (spriteEditorPaint) {
    spriteEditorPaint = null;
    saveSprites();
  }
});
addEventListener('contextmenu', e => e.preventDefault());

function buyArsenalPrimary(id) {
  const entry = ARSENAL_PRIMARIES.find(p => p.id === id);

  if (player.weapon === id) return; // already wielding it
  player.money -= entry.cost;

  // default fallback but the player wants a consistent swap log);
  // traderOnly / cheatOnly weapons still vanish silently.
  const old = player.weapon;
  if (shouldStoreOldWeapon(old)) {
    pushToStorage('weapon', old);
    floaters.push({ x: player.x, y: player.y - 28, text: '→ Storage', life: 1.4, color: WEAPONS[old].color });
  }

  }

function buyArsenalSecondary(id) {

  if (!entry || player.money < entry.cost) return;
  if (player.secondary === id) return;
  player.money -= entry.cost;
  // Old secondary goes straight to Storage (mirrors the primary swap behavior).
  const old = player.secondary;
  if (old && SECONDARIES[old]) {
    pushToStorage('secondary', old);
    floaters.push({ x: player.x, y: player.y - 28, text: '→ Storage', life: 1.4, color: SECONDARIES[old].color });

// ---------- Storage box (in the corner of the shop) ----------
// When dropped weapons or utility crates time out in the world, instead of
// vanishing they're moved into the storage box. Capped FIFO so it can't grow
// unbounded — oldest entry falls off when full.
const STORAGE_CAP = 12;
const storage = []; // entries: { kind: 'weapon'|'secondary', id, color, tag, name }
let storedMoney = 0; // $ banked when coins despawn before pickup — Claim from the Storage tab
// Small chest visual in the corner of the shop world rect
const storageChest = { x: 0, y: 0, w: 36, h: 28 }; // positioned during render

function pushToStorage(kind, id) {
  const def = kind === 'weapon' ? WEAPONS[id] : SECONDARIES[id];
  if (!def) return;
  storage.push({ kind, id, color: def.color, tag: def.tag || '?', name: def.name });
  if (storage.length > STORAGE_CAP) storage.shift();
}

// Swap helpers — single entry point for ANY weapon swap (cheats, swap pickup,
// shop buy). Routes the OLD weapon into Storage via shouldStoreOldWeapon
// (pistol IS allowed here, even though it's the infinite default — the
// player wants a consistent swap log; traderOnly / cheatOnly are still
// filtered out and can't enter storage).
function setPrimaryAndStoreOld(id) {
  const old = player.weapon;
  if (old === id) return;
  if (shouldStoreOldWeapon(old)) {
    pushToStorage('weapon', old);
    floaters.push({ x: player.x, y: player.y - 28, text: '→ Storage', life: 1.4, color: WEAPONS[old].color });
  }
  player.weapon = id;
}

function setSecondaryAndStoreOld(id) {
  const old = player.secondary;
  if (old === id) return;
  if (old && SECONDARIES[old]) {
    pushToStorage('secondary', old);
    floaters.push({ x: player.x, y: player.y - 28, text: '→ Storage', life: 1.4, color: SECONDARIES[old].color });
  }
  player.secondary = id;
  player.lastSecondary = -10;
}

function retrieveFromStorage(idx) {
  const item = storage[idx];
  if (!item) return;
  if (item.kind === 'weapon') {
    // drop next to the player so they can swap normally
    dropGunAt(player.x + 14, player.y + 14, item.id, 60);
  } else {
    bladeCrates.push({ x: player.x + 14, y: player.y + 14, secondary: item.id, life: 60 });
  }
  storage.splice(idx, 1);
  SFX.crate();
}

// ---------- Game logic ----------
function shake(amt) { shakeAmt = Math.max(shakeAmt, amt); }

// Shows a floating damage number above a hit zombie when that zombie is the
// trainer dummy. Called from every damage application site so secondaries
// (melee, AoE, pets, hazards) get the same numeric readout primaries do.
function pushDamageFloater(z, dmg, isCrit) {
  if (!z || !z.isDummy || dmg <= 0) return;
  floaters.push({
    x: z.x + (Math.random() - 0.5) * 16,
    y: z.y - 14,
    text: (isCrit ? 'CRIT ' : '') + Math.round(dmg).toString(),
    life: 0.8,
    color: isCrit ? '#fff5a8' : '#dfe2e8',
  });
}

function addBlood(x, y, scale = 1) {
  decals.push({ x, y, r: 8 * scale + Math.random()*3, color: 'rgba(115, 18, 18, 0.55)', life: 14, max: 14 });
  for (let i = 0; i < 4; i++) {
    const a = Math.random() * Math.PI * 2;
    const d = (4 + Math.random() * 9) * scale;
    decals.push({
      x: x + Math.cos(a)*d, y: y + Math.sin(a)*d,
      r: 3 * scale + Math.random()*2.5,
      color: 'rgba(90, 12, 12, 0.45)',
      life: 10 + Math.random()*3, max: 13,
    });
  }
}

function updateDecals(dt) {
  for (let i = decals.length - 1; i >= 0; i--) {
    decals[i].life -= dt;
    if (decals[i].life <= 0) decals.splice(i, 1);
  }
}

function muzzleFlash(x, y, ang) {
  for (let i = 0; i < 4; i++) {
    const a = ang + (Math.random() - 0.5) * 0.4;
    const s = 240 + Math.random() * 160;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.07 + Math.random()*0.05, color: '#fff4a8' });
  }
}

function spawnDeathParticles(x, y, col) {
  for (let i = 0; i < 8; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 60 + Math.random() * 180;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.4 + Math.random()*0.3, color: col });
  }
}

// A short outward burst in the given color — used whenever a loot drop appears,
// so the player's eye is drawn to it.
function dropBurst(x, y, color, n = 14) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 90 + Math.random() * 180;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.45 + Math.random()*0.2, color });
  }
}

// Handle all the side effects of a zombie reaching hp <= 0. Caller is
// responsible for splicing the zombie out of the zombies array — we do not
// touch the array here so this is safe to call from any iteration order.
function killZombie(z) {
  // Dummies don't count toward kills, don't drop loot, just poof.
  if (z.isDummy) {
    for (let k = 0; k < 18; k++) {
      const a = Math.random() * Math.PI * 2;
      const s = 100 + Math.random() * 180;
      particles.push({ x: z.x, y: z.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.55, color: '#cdd1da' });
    }
    return;
  }
  // Exploders detonate on death — small AoE damage to player + other zombies.
  // Done before splicing in the caller's loop so we don't recurse infinitely.
  if (z.type === 'exploder' && !z._exploded) {
    z._exploded = true;
    const def = ZOMBIE_TYPES.exploder;
    explode(z.x, z.y, def.explodeR, def.explodeDmg * (1 + wave * 0.04));
    // also hurt the player if in range
    const pdx = player.x - z.x, pdy = player.y - z.y;
    if (pdx*pdx + pdy*pdy < def.explodeR * def.explodeR && player.invuln <= 0 && !godMode) {
      if (player.buffs.shield > 0) {
        player.buffs.shield = 0;
        player.invuln = 0.6;
      } else {
        const dmgMul = 1 - (player.special.ironSkin || 0);
        const dmg = def.explodeDmg * (1 + wave * 0.04) * Math.max(0, dmgMul) * 0.6;
        player.hp -= dmg;
        flashRed = Math.max(flashRed, 0.4);
      }
    }
  }
  kills++;
  spawnDeathParticles(z.x, z.y, z.color);
  addBlood(z.x, z.y, z.isBoss ? 2 : 1);
  dropCoinsFor(z);
  tryDropGun(z);
  tryDropPickup(z);
  tryDropBladeCrate(z);
  // Mini-bosses are mid-tier elites — give them a more generous drop kit
  // than normal zombies (but well below boss-tier so real bosses still feel
  // special). Guaranteed pickup + 2 bonus pickup rolls + ~50% gun + ~60%
  // utility crate + a small coin shower on top.
  if (z.isMiniBoss) {
    spawnPickupAt(z.x, z.y, PICKUP_KEYS[Math.floor(Math.random() * PICKUP_KEYS.length)]);
    for (let k = 0; k < 2; k++) {
      if (Math.random() < 0.55) {
        const a = Math.random() * Math.PI * 2;
        const px = z.x + Math.cos(a) * 16, py = z.y + Math.sin(a) * 16;
        spawnPickupAt(px, py, PICKUP_KEYS[Math.floor(Math.random() * PICKUP_KEYS.length)]);
      }
    }
    if (Math.random() < 0.5) {
      const w = DROPPABLE_WEAPONS[Math.floor(Math.random() * DROPPABLE_WEAPONS.length)];
      dropGunAt(z.x, z.y, w, 30);
    }
    if (Math.random() < 0.6) {
      const keys = Object.keys(SECONDARIES);
      const pick = keys[Math.floor(Math.random() * keys.length)];
      bladeCrates.push({ x: z.x, y: z.y, secondary: pick, life: 30 });
      dropBurst(z.x, z.y, SECONDARIES[pick].color, 14);
    }
    // Coin shower scaled to the wave so it feels like a real reward
    const coinPile = 8 + Math.floor(wave * 0.8);
    for (let k = 0; k < coinPile; k++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 80 + Math.random() * 220;
      coins.push({ x: z.x, y: z.y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, value: 4 + Math.floor(Math.random() * 6), life: 14 });
    }
    dropBurst(z.x, z.y, '#ffa040', 26);
  }
  if (player.special.vampire) {
    player.hp = Math.min(player.maxHp, player.hp + player.special.vampire);
  }
  // Soul Steal — each kill stacks a short invuln window
  if (player.special.soulSteal) {
    player.invuln = Math.min(2.5, Math.max(player.invuln, 0) + player.special.soulSteal);
  }
  // Adrenaline — each kill refreshes the existing fast-speed buff for a beat
  if (player.special.adrenaline) {
    player.buffs.fast = Math.max(player.buffs.fast, player.special.adrenaline);
  }
  // Lucky Find — occasional bonus coin shower beyond the standard drop
  if (player.special.luckyFind && Math.random() < player.special.luckyFind) {
    for (let k = 0; k < 3; k++) {
      const a = Math.random() * Math.PI * 2;
      const s = 80 + Math.random() * 120;
      coins.push({ x: z.x, y: z.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, value: Math.max(2, Math.ceil(z.money * 0.4)), life: 9 });
    }
  }
  // EXP drop — small per normal kill, large per boss kill (scales per bossNum)
  player.exp += z.expReward || 1;
  if (z.isBoss) {
    spawnBossChest(z.x, z.y);
    // Boss kills also drop an "ability book" — an open grimoire on the
    // ground that the player can walk over to unlock a random missing
    // ability. (Normal zombies do NOT drop ability books.)
    const locked = ABILITY_KEYS.filter(k => !player.abilities[k]);
    if (locked.length) {
      const pick = locked[Math.floor(Math.random() * locked.length)];
      abilityBooks.push({
        x: z.x + (Math.random() - 0.5) * 30,
        y: z.y + (Math.random() - 0.5) * 30,
        abilityId: pick,
        life: 60,
      });
      dropBurst(z.x, z.y, ABILITIES[pick].color, 22);
    }
    // Queue a non-boss nuke at the boss position. We defer the actual
    // detonation to the start of the next tick so the kill site can finish
    // its iteration without the zombies array being mutated mid-loop.
    pendingBossDeath = { x: z.x, y: z.y };
  }
  SFX.zombieDie();
}

// Random chance to drop a blade crate from a killed zombie. Crates are
// auto-collected on contact and swap player.secondary to the contained type.
function tryDropBladeCrate(z) {
  let chance = 0;
  if (z.isBoss)             chance = 1.0;
  else if (z.type === 'tank') chance = 0.10;
  else if (z.type === 'fast') chance = 0.04;
  else                      chance = 0.025;
  if (Math.random() >= chance) return;
  const keys = Object.keys(SECONDARIES);
  const pick = keys[Math.floor(Math.random() * keys.length)];
  bladeCrates.push({ x: z.x, y: z.y, secondary: pick, life: 24 });
  dropBurst(z.x, z.y, SECONDARIES[pick].color, 14);
}

function updateBladeCrates(dt) {
  nearbyBladeCrate = null;
  let bestD2 = 60 * 60; // hover radius
  for (let i = bladeCrates.length - 1; i >= 0; i--) {
    const c = bladeCrates[i];
    c.life -= dt;
    if (c.life <= 0) {
      pushToStorage('secondary', c.secondary);
      bladeCrates.splice(i, 1);
      continue;
    }
    const dx = player.x - c.x, dy = player.y - c.y;
    const d2 = dx*dx + dy*dy;
    if (d2 < bestD2) { bestD2 = d2; nearbyBladeCrate = c; }
  }
}

// Swap the player's secondary to the nearby crate's blade. Mirrors doSwapWeapon
// in spirit — confirm prompt, particle burst, drop the old one (for now we just
// discard the previous secondary since they're free-to-find).
function doSwapSecondary() {
  if (!nearbyBladeCrate) return;
  if (nearbyBladeCrate.secondary === player.secondary) return;
  const def = SECONDARIES[nearbyBladeCrate.secondary];
  // First-time info popup for the equipped secondary
  if (def) showTooltip('sec:' + nearbyBladeCrate.secondary, `${def.name} equipped`, def.desc || 'New secondary', def.color);
  const cx = nearbyBladeCrate.x, cy = nearbyBladeCrate.y;
  // Old secondary goes straight to the Storage box — same behavior as primary swaps.
  const old = player.secondary;
  if (old && SECONDARIES[old]) {
    pushToStorage('secondary', old);
    floaters.push({ x: player.x, y: player.y - 28, text: '→ Storage', life: 1.4, color: SECONDARIES[old].color });
  }
  player.secondary = nearbyBladeCrate.secondary;
  player.lastSecondary = -10;
  const idx = bladeCrates.indexOf(nearbyBladeCrate);
  if (idx >= 0) bladeCrates.splice(idx, 1);
  floaters.push({ x: cx, y: cy - 22, text: `Equipped ${def.name}`, life: 2.0, color: def.color });
  for (let k = 0; k < 18; k++) {
    const a = Math.random() * Math.PI * 2;
    const s = 100 + Math.random() * 200;
    particles.push({ x: cx, y: cy, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.5, color: def.color });
  }
  SFX.swap();
  nearbyBladeCrate = null;
}

function dropCoinsFor(z) {
  // greed perk inflates the drop value
  const total = Math.round(z.money * (1 + (player.special.greed || 0)));
  const n = Math.min(6, Math.ceil(total / 3));
  const per = Math.max(1, Math.round(total / n));
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 60 + Math.random() * 100;
    coins.push({ x: z.x, y: z.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, value: per, life: 9 });
  }
  dropBurst(z.x, z.y, '#ffce44', 10);
}

function edgeSpawnPoint() {
  const edge = Math.floor(Math.random() * 4);
  if (edge === 0) return { x: Math.random() * W,  y: -20 };
  if (edge === 1) return { x: W + 20,             y: Math.random() * H };
  if (edge === 2) return { x: Math.random() * W,  y: H + 20 };
  return            { x: -20,             y: Math.random() * H };
}

// Pick a zombie type given the current wave. Tougher mixes show up later.
// ---------- Zombie type catalog ----------
// Each entry holds the base stats + behavior knobs for one zombie type.
// `gate` is the lowest wave the type can appear from (rollType respects it).
// `weight(w)` returns the relative spawn chance at wave w (capped internally).
// Boss archetypes cycled in order on each boss wave (every 20th wave).
// Each entry tweaks the base boss stats and tags the spawned zombie with a
// `bossType` field so updateZombies + render branches per type. Order
// matters — players will see them in this order across runs.
const BOSS_TYPES = [
  { id: 'warlord',     name: 'The Warlord',     color: '#9a2828', auraColor: '255, 60, 60',
    hpMul: 1.00, dmgMul: 1.00, speedMul: 1.00,
    desc: 'Summons minions while alive' },
  { id: 'necromancer', name: 'The Necromancer', color: '#7a3a9a', auraColor: '196, 126, 255',
    hpMul: 0.85, dmgMul: 0.90, speedMul: 0.80,
    desc: 'Raises the dead in larger waves' },
  { id: 'charger',     name: 'The Charger',     color: '#d36030', auraColor: '255, 140, 60',
    hpMul: 1.05, dmgMul: 1.30, speedMul: 1.10,
    desc: 'Winds up + lunges at the player' },
  { id: 'hexmage',     name: 'The Hex Mage',    color: '#3a7aa0', auraColor: '122, 200, 240',
    hpMul: 0.80, dmgMul: 0.85, speedMul: 0.65,
    desc: 'Hurls homing hex bolts from afar' },
  { id: 'berserker',   name: 'The Berserker',   color: '#1a1a22', auraColor: '255, 80, 80',
    hpMul: 1.20, dmgMul: 1.10, speedMul: 0.95,
    desc: 'Gets faster and angrier the more it bleeds' },
];

const ZOMBIE_TYPES = {
  normal:   { hp: 22, speed: 62,  damage: 14, r: 12, color: '#5e8c4a', money: 3,  exp: 1, gate: 0 },
  fast:     { hp: 14, speed: 120, damage: 10, r: 9,  color: '#a85040', money: 5,  exp: 2, gate: 2 },
  tank:     { hp: 75, speed: 38,  damage: 26, r: 19, color: '#374827', money: 14, exp: 4, gate: 4 },
  // Detonates on death — AoE damage + visual boom. Slow + chunky.
  exploder: { hp: 30, speed: 50,  damage: 18, r: 13, color: '#ff6030', money: 7,  exp: 3, gate: 3,
              explodeR: 95, explodeDmg: 45 },
  // Periodically pulses, healing nearby zombies. Stays back, supports.
  healer:   { hp: 38, speed: 45,  damage: 8,  r: 13, color: '#7af0a8', money: 9,  exp: 3, gate: 5,
              healCd: 3.5, healR: 110, healAmt: 12 },
  // Keeps distance from the player and lobs slow projectiles.
  spitter:  { hp: 28, speed: 60,  damage: 12, r: 11, color: '#a070d0', money: 8,  exp: 3, gate: 4,
              shotCd: 2.4, shotSpeed: 280, shotDmg: 12, shotR: 6, preferRange: 220 },
  // Carries a directional shield — front hits are heavily reduced.
  shielded: { hp: 55, speed: 42,  damage: 22, r: 17, color: '#7090b0', money: 13, exp: 4, gate: 6,
              shieldDot: 0.4, shieldMul: 0.30 },
  // Periodically births small fast minions while alive.
  spawner:  { hp: 70, speed: 28,  damage: 16, r: 18, color: '#604030', money: 16, exp: 5, gate: 8,
              minionCd: 5.0, minionHp: 10, minionSpeed: 130, minionDmg: 8, minionR: 8 },
};

function rollType() {
  const r = Math.random();
  // Cumulative-window roll, ordered rarest → most common; first hit wins.
  // Each weight is capped so a single type never crowds out the others.
  let c = 0;
  c += wave >= ZOMBIE_TYPES.spawner.gate  ? Math.min(0.05, (wave - 8)  * 0.005) : 0; if (r < c) return 'spawner';
  c += wave >= ZOMBIE_TYPES.shielded.gate ? Math.min(0.08, (wave - 6)  * 0.008) : 0; if (r < c) return 'shielded';
  c += wave >= ZOMBIE_TYPES.healer.gate   ? Math.min(0.06, (wave - 5)  * 0.006) : 0; if (r < c) return 'healer';
  c += wave >= ZOMBIE_TYPES.spitter.gate  ? Math.min(0.08, (wave - 4)  * 0.009) : 0; if (r < c) return 'spitter';
  c += wave >= ZOMBIE_TYPES.exploder.gate ? Math.min(0.10, (wave - 3)  * 0.011) : 0; if (r < c) return 'exploder';
  c += wave >= ZOMBIE_TYPES.tank.gate     ? Math.min(0.20, 0.02 + wave * 0.011)  : 0; if (r < c) return 'tank';
  c += wave >= ZOMBIE_TYPES.fast.gate     ? Math.min(0.32, 0.05 + wave * 0.018)  : 0; if (r < c) return 'fast';
  return 'normal';
}

// Build a zombie object from a type id, applying wave scaling. Shared by
// spawnZombie() (random) and spawnSpecific() (cheats / events).
function makeZombieOfType(type, x, y) {
  const def = ZOMBIE_TYPES[type] || ZOMBIE_TYPES.normal;
  const hpMul = 1 + wave * 0.09;
  const dmgMul = 1 + wave * 0.025;
  const moneyMul = 1 + wave * 0.04;
  const hp = Math.ceil(def.hp * hpMul);
  const z = {
    x, y, type,
    r: def.r, color: def.color, speed: def.speed,
    hp, hpMax: hp,
    damage: def.damage * dmgMul,
    money: Math.ceil(def.money * moneyMul),
    expReward: def.exp,
    phase: Math.random() * Math.PI * 2,
  };
  // Per-type runtime fields
  if (type === 'healer')   z.healTimer   = def.healCd * (0.5 + Math.random() * 0.5);
  if (type === 'spitter')  z.shotTimer   = def.shotCd * (0.4 + Math.random() * 0.5);
  if (type === 'spawner')  z.minionTimer = def.minionCd * (0.4 + Math.random() * 0.6);
  if (type === 'exploder') z.fuse        = Math.random() * Math.PI * 2; // visual pulse phase
  return z;
}

function spawnZombie(pos) {
  if (zombies.length >= 120) return;
  const { x, y } = pos || edgeSpawnPoint();
  zombies.push(makeZombieOfType(rollType(), x, y));
}

// Cheat / event helper: spawn a specific zombie type at an arena edge.
function spawnSpecific(type) {
  if (zombies.length >= 120) return;
  if (!ZOMBIE_TYPES[type]) return;
  const { x, y } = edgeSpawnPoint();
  zombies.push(makeZombieOfType(type, x, y));
}

// Trainer dummy — stationary punching bag at the center of the arena. Massive
// HP, no movement, no contact damage. Shows damage floaters when hit so the
// player can see exactly how much each weapon dishes out.
// Tomes Shop now exposes every SPECIAL_UPGRADES entry directly. Each pick
// stacks via the same apply() the post-wave card draw uses, costing a flat
// EXP price per buy.
const TOMES_SHOP_COST = 25;
// Perks sorted into role-based sections so the shop reads cleanly.
const SHOP_SECTIONS = [
  { id: 'offense',  name: 'Offense',  color: '#ff5050',
    ids: ['heavyCal', 'crit', 'critBurst', 'multishot', 'bossSlayer', 'eagleEye', 'mightyBoom', 'slow', 'glass', 'berserk'] },
  { id: 'defense',  name: 'Defense',  color: '#5cd86b',
    ids: ['ironSkin', 'lastStand', 'thorns', 'soulSteal', 'battleCry', 'sturdyWalls'] },
  { id: 'sustain',  name: 'Sustain',  color: '#c47eff',
    ids: ['regen', 'lifesteal', 'vampire', 'juggernaut', 'waveCrush'] },
  { id: 'mobility', name: 'Mobility', color: '#5cffec',
    ids: ['quickstep', 'adrenaline', 'mightyThrow'] },
  { id: 'economy',  name: 'Economy',  color: '#ffce44',
    ids: ['greed', 'magnet', 'luckyFind'] },
];
let tomeShopSection = 'offense';
function buyShopPerk(id) {
  const def = SPECIAL_UPGRADES[id];
  if (!def) return;
  if (player.exp < TOMES_SHOP_COST) return;
  player.exp -= TOMES_SHOP_COST;
  def.apply();
  player.specialLevels[id] = (player.specialLevels[id] || 0) + 1;
  floaters.push({ x: player.x, y: player.y - 22, text: def.name, life: 1.6, color: def.color });
  SFX.perkPick();
}

function buyTreeUpgrade(branch) {
  const tree = UPGRADE_TREE[branch];
  if (!tree) return;
  const level = treeLevels[branch] || 0;
  if (level >= tree.nodes.length) return;
  const node = tree.nodes[level];
  if (player.exp < node.cost) return;
  player.exp -= node.cost;
  node.apply();
  treeLevels[branch] = level + 1;
  floaters.push({ x: player.x, y: player.y - 22, text: node.name, life: 1.6, color: tree.color });
  SFX.perkPick();
}

function spawnTrainerDummy() {
  zombies.push({
    x: W / 2, y: H / 2,
    type: 'dummy',
    isDummy: true,
    r: 18,
    color: '#cdd1da',
    speed: 0,
    hp: 99999, hpMax: 99999,
    damage: 0,
    money: 0,
    phase: 0,
  });
}

function spawnBoss() {
  const bossNum = Math.max(1, Math.floor(wave / 20));
  const def = BOSS_TYPES[(bossNum - 1) % BOSS_TYPES.length];
  const { x, y } = edgeSpawnPoint();
  // Each successive boss is significantly tougher than the last on top of the
  // existing additive scaling — a 1.25x multiplier per boss compounds quickly.
  const scale = Math.pow(1.25, bossNum - 1);
  const baseHp = (600 + bossNum * 500) * scale * def.hpMul;
  const baseSpeed = (50 + bossNum * 7) * def.speedMul;
  const baseDamage = (40 + bossNum * 12) * Math.pow(1.10, bossNum - 1) * def.dmgMul;
  zombies.push({
    x, y, type: 'boss', isBoss: true,
    bossNum,
    bossType: def.id,
    bossName: def.name,
    bossColor: def.color,
    bossAura: def.auraColor,
    r: 32 + bossNum * 3,
    color: def.color,
    speed: baseSpeed,
    baseSpeed,                              // berserker / charger restore from this
    hp: Math.ceil(baseHp), hpMax: Math.ceil(baseHp),
    damage: Math.ceil(baseDamage),
    baseDamage: Math.ceil(baseDamage),      // berserker scales damage off this
    money: 200 + bossNum * 120,
    expReward: 30 + bossNum * 20,
    minionTimer: 4 + Math.random() * 1.5,
    chargeTimer: 4 + Math.random() * 2,     // Charger wind-up cycle
    charging: false, chargeDur: 0,
    shotTimer: 1.5 + Math.random() * 1.0,   // Hex Mage shot cycle
    phase: Math.random() * Math.PI * 2,
  });
}

// Cheat helper — spawn a boss of a specific archetype. Temporarily forces the
// wave-derived bossNum to one that maps to the requested type, calls
// spawnBoss, then restores the real wave. Stats still scale from the real
// wave so the spawn doesn't feel free.
function spawnSpecificBoss(id) {
  const idx = BOSS_TYPES.findIndex(b => b.id === id);
  if (idx < 0) return;
  const realWave = wave;
  // Want a bossNum where (bossNum - 1) % BOSS_TYPES.length === idx and the
  // resulting stats roughly match the current wave's scaling.
  const realBossNum = Math.max(1, Math.floor(realWave / 20));
  const cycle = Math.max(1, Math.ceil(realBossNum / BOSS_TYPES.length));
  const targetBossNum = (cycle - 1) * BOSS_TYPES.length + idx + 1;
  wave = targetBossNum * 20;
  spawnBoss();
  wave = realWave;
}

// Hex Mage projectile — a slow, fat homing-feel bolt fired at the player.
// Uses the existing zombieBullets array so collision + player damage work
// without any new pipeline.
function spawnHexBolt(z, n = 1) {
  for (let i = 0; i < n; i++) {
    const spread = (i - (n - 1) / 2) * 0.22;
    const a = Math.atan2(player.y - z.y, player.x - z.x) + spread;
    const sp = 240;
    zombieBullets.push({
      x: z.x, y: z.y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      r: 8,
      dmg: Math.ceil(z.damage * 0.35),
      life: 3.5,
      color: '#a0c8e8',
    });
  }
}

function spawnBossMinions(boss, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const dist = boss.r + 12;
    const x = boss.x + Math.cos(a) * dist;
    const y = boss.y + Math.sin(a) * dist;
    const hp = Math.ceil(16 + wave * 0.6);
    zombies.push({
      x, y, type: 'minion',
      r: 9, color: '#8b3a3a', speed: 115,
      hp, hpMax: hp, damage: 12, money: 3,
      phase: Math.random() * Math.PI * 2,
    });
  }
}

// Spawn a mini-boss — used by waves divisible by 5 (excluding real boss waves).
// Hardier than a tank but well below boss tier; rewards a chunky money/exp pile.
function spawnMiniBoss() {
  const { x, y } = edgeSpawnPoint();
  const hpMul = 1 + wave * 0.10;
  const dmgMul = 1 + wave * 0.03;
  const hp = Math.ceil(280 * hpMul);
  zombies.push({
    x, y, type: 'miniBoss', isMiniBoss: true,
    r: 24, color: '#3a4858',
    speed: 50,
    hp, hpMax: hp,
    damage: 30 * dmgMul,
    money: 60 + wave * 4,
    expReward: 12 + Math.floor(wave * 0.5),
    phase: Math.random() * Math.PI * 2,
  });
  floaters.push({ x: W / 2, y: 70, text: 'MINI-BOSS APPROACHING', life: 2.4, color: '#ffa040' });
  shake(8);
  SFX.bossSpawn();
}

// ---------- Random arena events (one per wave) ----------
// Catalog of event ids and what they do. `fire(state)` runs the one-shot
// effect; some events also leave behind state (active = { type, timer })
// for a few seconds so their visual lingers.
const ARENA_EVENTS = ['supplyDrop', 'blackout', 'hordePush', 'healZone'];
// Sub-pool for Absolute Chaos. Blackout is intentionally excluded — its
// fade math (line ~9425 area) assumes a fresh 10s window, so overlapping
// blackouts would jump. Boss Rush isn't in the arena event pool to begin
// with (handled in the wave-spawn branch). healZone stays because a
// surprise heal mid-panic is a fun beat.
const CHAOS_SUB_EVENTS = ['supplyDrop', 'hordePush', 'healZone'];
const CHAOS_DURATION = 18;            // total seconds the chaos window lasts
const CHAOS_SUB_INTERVAL = 3;         // seconds between sub-event fires
const CHAOS_MIN_WAVE = 10;            // earliest wave chaos can roll
const CHAOS_ROLL_CHANCE = 0.02;       // 2% of eligible wave-event rolls

let chaosBanner = 0;                  // gameTime when the chaos banner fades out

function triggerChaos() {
  chaosTimer = CHAOS_DURATION;
  // First sub-event fires immediately so the banner and the action land
  // together (no 3-9s windup like a normal pendingEvent).
  chaosNextSub = gameTime;
  chaosBanner = gameTime + 4.5;
  // Nuke any pending normal event — it would have been a chaos pool member
  // anyway, and chaos is firing its own pulses now.
  pendingEvent = null;
  shake(28);
  if (SFX && SFX.bossSpawn) SFX.bossSpawn();
  floaters.push({ x: W / 2, y: 96, text: 'EVENT: ABSOLUTE CHAOS', life: 2.4, color: '#ff2a2a' });
}

function scheduleArenaEvent() {
  // 30% of waves are quiet — no event. Otherwise pick one at random and queue
  // it to fire a few seconds in.
  if (trainingMode) return;
  // Absolute Chaos pre-empts a normal event roll. Rare (2%), gated by minimum
  // wave so the player has some build before the chaos window opens.
  if (wave >= CHAOS_MIN_WAVE && Math.random() < CHAOS_ROLL_CHANCE) {
    triggerChaos();
    return;
  }
  if (Math.random() < 0.30) { pendingEvent = null; return; }
  const type = ARENA_EVENTS[Math.floor(Math.random() * ARENA_EVENTS.length)];
  pendingEvent = { type, fireIn: 3 + Math.random() * 6 };
}

function fireArenaEvent(type) {
  if (type === 'supplyDrop') {
    // Drop a money crate AND a pickup in the same spot, partyhat-style.
    let x, y, ok = false;
    for (let attempt = 0; attempt < 30 && !ok; attempt++) {
      x = 80 + Math.random() * (W - 160);
      y = 80 + Math.random() * (H - 160);
      if (x > shop.x - 20 && x < shop.x + shop.w + 20 && y > shop.y - 20 && y < shop.y + shop.h + 20) continue;
      ok = true;
    }
    crates.push({ x, y, value: 60 + Math.floor(wave * 2) });
    const ptype = PICKUP_KEYS[Math.floor(Math.random() * PICKUP_KEYS.length)];
    spawnPickupAt(x + 24, y, ptype);
    floaters.push({ x: W / 2, y: 96, text: 'EVENT: Supply Drop', life: 2.0, color: '#ffd166' });
    SFX.crate();
  } else if (type === 'blackout') {
    activeEvent = { type, timer: 10.0 };
    floaters.push({ x: W / 2, y: 96, text: 'EVENT: Blackout', life: 2.0, color: '#5a87c4' });
    SFX.uiClick();
  } else if (type === 'hordePush') {
    // Spawn a sudden burst of 6 zombies from one edge.
    const base = edgeSpawnPoint();
    for (let i = 0; i < 6; i++) {
      const ox = (Math.random() - 0.5) * 60;
      const oy = (Math.random() - 0.5) * 60;
      spawnZombie({ x: base.x + ox, y: base.y + oy });
    }
    floaters.push({ x: W / 2, y: 96, text: 'EVENT: Horde Push', life: 2.0, color: '#ff5050' });
    shake(6);
  } else if (type === 'healZone') {
    // Drop a healing field somewhere safe so the player has to go grab it.
    let x, y, ok = false;
    for (let attempt = 0; attempt < 30 && !ok; attempt++) {
      x = 100 + Math.random() * (W - 200);
      y = 100 + Math.random() * (H - 200);
      if (x > shop.x - 20 && x < shop.x + shop.w + 20 && y > shop.y - 20 && y < shop.y + shop.h + 20) continue;
      ok = true;
    }
    healFields.push({ x, y, r: 60, life: 12, max: 12, hps: 14, color: '#5cd86b' });
    floaters.push({ x: W / 2, y: 96, text: 'EVENT: Heal Zone', life: 2.0, color: '#5cd86b' });
  }
}

// Trader lifecycle: called from endCurrentWave so the timing aligns with the
// intermission. Decrements the trader's remaining waves, removes them at 0,
// then rolls a fresh arrival if eligible.
function processTraderForWaveEnd() {
  const cx = shop.x + shop.w / 2, cy = shop.y - 16;
  if (trader) {
    trader.wavesLeft -= 1;
    if (trader.wavesLeft <= 0) {
      trader = null;
      traderCooldown = TRADER_COOLDOWN_WAVES;
      floaters.push({ x: cx, y: cy, text: 'Trader has left', life: 3.0, color: '#c47eff' });
    }
  } else if (traderCooldown > 0) {
    traderCooldown -= 1;
  } else if (Math.random() < TRADER_ARRIVAL_CHANCE) {
    trader = { wavesLeft: TRADER_STAY_WAVES };
    floaters.push({ x: cx, y: cy, text: 'A Trader has arrived!', life: 3.5, color: '#c47eff' });
    SFX.unlock();
  }
  // Food Trader follows the same cadence but with its own cooldown / odds.
  // Floaters use a slightly offset Y so they don't stack on the regular
  // trader's announcement when both arrive on the same wave end.
  const fy = cy + 18;
  if (foodTrader) {
    foodTrader.wavesLeft -= 1;
    if (foodTrader.wavesLeft <= 0) {
      foodTrader = null;
      foodTraderCooldown = FOOD_TRADER_COOLDOWN_WAVES;
      floaters.push({ x: cx, y: fy, text: 'Food Trader has left', life: 3.0, color: '#ff9bd1' });
    }
  } else if (foodTraderCooldown > 0) {
    foodTraderCooldown -= 1;
  } else if (Math.random() < FOOD_TRADER_ARRIVAL_CHANCE) {
    foodTrader = { wavesLeft: FOOD_TRADER_STAY_WAVES };
    floaters.push({ x: cx, y: fy, text: 'A Food Trader has arrived!', life: 3.5, color: '#ff9bd1' });
    SFX.unlock();
  }
}

function buyTraderWeapon(id) { buyFromStock(id, TRADER_STOCK, !!trader); }
function buyFoodTraderWeapon(id) { buyFromStock(id, FOOD_TRADER_STOCK, !!foodTrader); }

function buyFromStock(id, stock, traderPresent) {
  if (!traderPresent) return; // safety — should never hit, the tab is hidden
  const entry = stock.find(t => t.id === id);
  if (!entry || player.money < entry.cost) return;
  if (player.weapon === id) return;
  player.money -= entry.cost;
  const old = player.weapon;
  // Old weapon goes to Storage. Trader-only / cheat-only still vanish
  // silently; the pistol IS allowed to enter storage (the player wants
  // consistent swap behavior even for the default weapon).
  if (shouldStoreOldWeapon(old)) {
    pushToStorage('weapon', old);
    floaters.push({ x: player.x, y: player.y - 28, text: '→ Storage', life: 1.4, color: WEAPONS[old].color });
  }
  player.weapon = id;
  const def = WEAPONS[id];
  if (def) {
    showTooltip('weapon:' + id, `${def.name} acquired`, def.desc || 'Trader exclusive', def.color);
    floaters.push({ x: player.x, y: player.y - 22, text: `Bought ${def.name}`, life: 1.6, color: def.color });
  }
  SFX.swap();
}

function updateArenaEvent(dt) {
  if (pendingEvent) {
    pendingEvent.fireIn -= dt;
    if (pendingEvent.fireIn <= 0) {
      const t = pendingEvent.type;
      pendingEvent = null;
      fireArenaEvent(t);
    }
  }
  if (activeEvent) {
    activeEvent.timer -= dt;
    if (activeEvent.timer <= 0) activeEvent = null;
  }
  // Absolute Chaos — every CHAOS_SUB_INTERVAL seconds during the window,
  // fire a uniform-random sub-event (blackout / boss rush excluded). Window
  // counts down independently so a sub-event overwriting activeEvent doesn't
  // wipe chaos itself.
  if (chaosTimer > 0) {
    chaosTimer = Math.max(0, chaosTimer - dt);
    if (gameTime >= chaosNextSub) {
      const t = CHAOS_SUB_EVENTS[Math.floor(Math.random() * CHAOS_SUB_EVENTS.length)];
      fireArenaEvent(t);
      chaosNextSub = gameTime + CHAOS_SUB_INTERVAL;
    }
  }
}

// BOSS RUSH — very rare variant of a boss wave where 5 bosses spawn instead
// of 1. Triggered only on wave 60+ to keep early bosses approachable. The
// boss-rush banner is shown for a few seconds when it fires.
let bossRushBanner = 0; // game-time when banner should disappear

// ---------- Shop-camping shame ----------
// If P1 sits inside the shop rect for an extremely long time WHILE a wave is
// actively running, pop a deadpan banner shaming them (with a small "sorry
// if you weren't camping" apology underneath). State lives here so all the
// gates (begin/end wave, hardReset, in-shop edge transitions) can reach it.
const SHAME_THRESHOLD_SEC = 45;     // continuous shop-camping seconds before the banner
const SHAME_BANNER_LIFE   = 5.0;    // total banner duration incl. fades
let shopCampTimer = 0;              // seconds accumulated continuously inside the shop
let shameBannerLife = 0;            // remaining banner display time (counts down)
let shameFiredThisWave = false;     // hard cap: at most once per wave
let shameFiredThisSession = false;  // once per continuous in-shop session
let wasInShopLastFrame = false;     // edge-detect inShop() flips

function triggerShameBanner() {
  shameBannerLife = SHAME_BANNER_LIFE;
  shameFiredThisWave = true;
  shameFiredThisSession = true;
}

function updateShameTimer(dt) {
  // Banner display countdown runs independently of the camp timer so the
  // banner can fade out gracefully even if the wave ends mid-fade.
  if (shameBannerLife > 0) {
    shameBannerLife = Math.max(0, shameBannerLife - dt);
  }
  // Hard gates — every "not really fighting" condition resets the camp timer
  // and short-circuits accumulation.
  const inGame =
    gameState === 'playing' &&
    !pendingCards &&
    !resetConfirm &&
    !trainingMode &&
    !guidedActive &&
    intermission <= 0 &&
    wave >= 1 &&
    bossRushBanner <= gameTime;
  const inShopNow = inGame && inShop();
  // Edge: left the shop (or any gate fell) → reset both the accumulator and
  // the per-session "already shamed" flag so a fresh entry re-arms the joke.
  if (wasInShopLastFrame && !inShopNow) {
    shopCampTimer = 0;
    shameFiredThisSession = false;
  }
  wasInShopLastFrame = inShopNow;
  if (!inShopNow) return;
  // Accumulate continuous shop time.
  shopCampTimer += dt;
  // Trigger when we cross the threshold, but only once per wave AND once per session.
  if (
    !shameFiredThisWave &&
    !shameFiredThisSession &&
    shopCampTimer >= SHAME_THRESHOLD_SEC
  ) {
    triggerShameBanner();
  }
}

function spawnBossRush() {
  // Spread the 5 bosses across different edge spawn points so they don't
  // cluster on top of each other / instantly overlap the player.
  for (let k = 0; k < 5; k++) {
    spawnBoss();
  }
  bossRushBanner = gameTime + 4.5;
  // Big screen punch for emphasis
  shake(28);
  SFX.bossSpawn();
}

function beginNextWave() {
  wave++;
  bestWave = Math.max(bestWave, wave);
  // Battle Cry — start every wave with a one-hit shield
  if (player.special.battleCry) player.buffs.shield = 1;
  // Reset shop-camping state for the new wave — fresh wave = fresh chance
  // to be shamed (or to avoid shame entirely by, you know, fighting).
  shameFiredThisWave = false;
  shameFiredThisSession = false;
  shopCampTimer = 0;
  isBossWave = (wave % 20 === 0);
  if (isBossWave) {
    waveZombiesToSpawn = 0;
    // 5% chance of BOSS RUSH on any boss wave from 60 onward.
    if (wave >= 60 && Math.random() < 0.05) {
      spawnBossRush();
    } else {
      spawnBoss();
      SFX.bossSpawn();
    }
  } else {
    waveZombiesToSpawn = 5 + Math.floor(wave * 1.8);
    waveSpawnTimer = 0.4;
    SFX.waveStart();
    // Mini-boss every 5th non-boss wave — alongside the normal spawn queue
    if (wave > 0 && wave % 5 === 0) spawnMiniBoss();
  }
  // each wave gets a free money crate somewhere in the arena
  spawnMoneyCrate();
  if (wave > 0 && wave % 5 === 0) spawnMoneyCrate(); // bonus every 5 waves
  // ...and a random pickup
  spawnRandomPickup();
  if (wave > 0 && wave % 5 === 0) spawnRandomPickup(); // bonus every 5 waves
  // Roll a random arena event (skipped on boss waves so the boss fight is
  // a focused duel and any in-flight event is cleared). Chaos state cleared
  // here too — a chaos window in flight when the next wave starts gets cut
  // off cleanly.
  pendingEvent = null;
  activeEvent = null;
  chaosTimer = 0;
  chaosNextSub = 0;
  chaosBanner = 0;
  if (!isBossWave) scheduleArenaEvent();
}

function endCurrentWave() {
  player.money += 8 + wave * 3;
  intermission = isBossWave ? 12 : 7; // longer breather after a boss
  // Wave Crusher — heal player at the end of every wave
  if (player.special.waveCrush) {
    player.hp = Math.min(player.maxHp, player.hp + player.special.waveCrush);
  }
  // Reset cooldowns so the next wave starts with every tool ready. We clear
  // the "lastUsed" timestamps (cooldowns) but intentionally leave active-effect
  // timers (rageTimer / bulletTimeTimer / homingBulletsTimer) alone — if the
  // player popped an ability right before the kill, the effect should still
  // run to completion.
  player.lastShot = 0;
  player.lastSecondary = -10;
  player.abilityLast = {};
  cancelBowCharge();
  if (coopEnabled) {
    player2.lastShot = 0;
    player2.lastSecondary = -10;
  }
  floaters.push({ x: player.x, y: player.y - 28, text: 'COOLDOWNS RESET', life: 1.6, color: '#7ec8ff' });
  // every wave offers 3 random perks to pick from
  pendingCards = pickThreeUpgrades();
  // Roll the roaming trader's state for the next intermission.
  processTraderForWaveEnd();
}

function pickThreeUpgrades() {
  // Fisher–Yates shuffle, take first 3 — guarantees distinct cards in one offer.
  const arr = SPECIAL_KEYS.slice();
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr.slice(0, 3);
}

function pickCard(idx) {
  if (!pendingCards) return;
  const key = pendingCards[idx];
  if (!key) return;
  const def = SPECIAL_UPGRADES[key];
  SFX.perkPick();
  def.apply();
  player.specialLevels[key] = (player.specialLevels[key] || 0) + 1;
  // celebratory burst at the picked card
  const r = cardRects[idx];
  if (r) {
    const cx = r.x + r.w / 2, cy = r.y + r.h / 2;
    for (let i = 0; i < 32; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 100 + Math.random() * 280;
      particles.push({ x: cx, y: cy, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.7 + Math.random()*0.3, color: def.color });
    }
    floaters.push({ x: cx, y: cy - 30, text: def.name + (player.specialLevels[key] > 1 ? ` LV ${player.specialLevels[key]}` : ''), life: 2.2, color: def.color });
  }
  shake(6);
  pendingCards = null;
  cardRects = [null, null, null];
}

function updateWave(dt) {
  // Training Arena has no wave system — the player only fights what they
  // explicitly spawn via cheats.
  if (trainingMode) return;
  // Card pick blocks the wave from starting — perk first, then manual start.
  if (pendingCards) return;
  if (intermission > 0) {
    // No auto-advance — the next wave only starts when the player presses
    // Space or clicks START NOW. Stay parked at the current intermission
    // value so the UI keeps the "ready to start" panel visible.
    return;
  }
  // spawn remaining zombies for this wave (boss waves spawn 0). Zombies arrive
  // in packs of 2-4 from the same edge point so they read as coordinated
  // groups rather than a steady drip.
  if (waveZombiesToSpawn > 0) {
    waveSpawnTimer -= dt;
    while (waveSpawnTimer <= 0 && waveZombiesToSpawn > 0) {
      const groupSize = Math.min(waveZombiesToSpawn, 2 + Math.floor(Math.random() * 3)); // 2..4
      const base = edgeSpawnPoint();
      for (let i = 0; i < groupSize; i++) {
        const ox = (Math.random() - 0.5) * 70;
        const oy = (Math.random() - 0.5) * 70;
        spawnZombie({ x: base.x + ox, y: base.y + oy });
      }
      waveZombiesToSpawn -= groupSize;
      // Wait roughly the same total time per zombie, but in fewer bursts.
      waveSpawnTimer += Math.max(0.32, (0.85 - wave * 0.013) * groupSize * 0.75);
    }
  } else if (zombies.every(z => z.isDummy) && wave > 0) {
    // Dummies (training props) don't count toward wave completion
    endCurrentWave();
  }
}

function tryShoot(nowSec) {
  // P1's shot — aim direction comes from the mouse.
  const baseAng = Math.atan2(mouse.y - player.y, mouse.x - player.x);
  tryShootFor(player, baseAng, nowSec);
}

// Shared shoot path — used by P1 (mouse aim) and P2 (auto-aim). Reads stats
// and perks from P1 (shared) but spawns bullets from `p`'s position and uses
// `p.lastShot` for the per-shooter cadence.
function tryShootFor(p, baseAng, nowSec) {
  const w = WEAPONS[player.weapon] || WEAPONS.pistol;
  // lockedRate weapons ignore the player's fireRate upgrades AND the Rapid buff —
  // their cooldown is part of the weapon's identity (e.g. the Spaghetti Beam
  // is a heavy charged shot every ~2.5s; speeding it up would break it).
  const fr = w.lockedRate
    ? w.fireRate
    : player.fireRate * w.fireRate * (player.buffs.rapid > 0 ? 2 : 1);
  const interval = 1 / fr;
  if (nowSec - p.lastShot < interval) return;
  p.lastShot = nowSec;
  SFX.shoot(player.weapon);
  const extra = player.buffs.triple > 0 ? 2 : 0;          // triple buff = +2 spread shots
  // Multishot perk: rolls once per trigger pull to add a bonus shot.
  let shots = w.shots + extra;
  if (player.special.multishot && Math.random() < player.special.multishot) shots += 1;
  const spread = w.spread + (extra > 0 ? 0.16 : 0);

  // Base per-bullet damage, modified by glass-cannon + heavy-caliber + berserk.
  let dmgBase = player.damage * w.damage
    * (1 + (player.special.glassCannon || 0))
    * (1 + (player.special.heavyCal || 0));
  if (player.special.berserk && player.hp / player.maxHp < 0.3) {
    dmgBase *= 1 + player.special.berserk;
  }
  // Eagle Eye boosts bullet velocity
  const bSpeed = player.bulletSpeed * w.bulletSpeed * (1 + (player.special.eagleEye || 0));
  const pierce = w.pierce + player.pierce;

  const muzzleX = p.x + Math.cos(baseAng) * (p.r + 8);
  const muzzleY = p.y + Math.sin(baseAng) * (p.r + 8);
  muzzleFlash(muzzleX, muzzleY, baseAng);

  // Pattern dispatch: each special weapon picks its own set of fire angles.
  let angles;
  if (w.pattern === 'plus') {
    // 4-arm cross that rotates with the aim direction — the "forward" arm
    // points at the mouse, the other three are 90° offsets from it.
    angles = [baseAng, baseAng + Math.PI / 2, baseAng + Math.PI, baseAng - Math.PI / 2];
    // multishot rolls a 5th forward bullet for fun
    if (shots > w.shots + extra) angles.push(baseAng);
  } else if (w.pattern === 'orbit') {
    // bullets are spawned orbiting the player, evenly spaced around baseAng
    angles = [];
    const n = w.shots;
    for (let i = 0; i < n; i++) angles.push(baseAng + (i / n) * Math.PI * 2);
  } else if (w.pattern === 'twin') {
    // two parallel shots — same angle, offset perpendicular to aim
    angles = [baseAng, baseAng];
  } else if (w.pattern === 'death') {
    // Full-circle pattern — bullets evenly distributed around the player,
    // anchored to baseAng so the ring slowly rotates with aim. Used by the
    // "Death" laser and Omnislash god weapons.
    angles = [];
    const n = shots;
    for (let i = 0; i < n; i++) angles.push(baseAng + (i / n) * Math.PI * 2);
  } else {
    // standard fan spread used by every original weapon
    angles = [];
    for (let i = 0; i < shots; i++) {
      angles.push(baseAng + (shots > 1 ? (i - (shots - 1) / 2) * spread : 0));
    }
  }

  let twinIdx = 0;
  for (const a of angles) {
    const isCrit = !!(player.special.crit && Math.random() < player.special.crit);
    const dmg = isCrit ? dmgBase * (2 + (player.special.critBurst || 0)) : dmgBase;
    const isOrbit = w.pattern === 'orbit';
    // perpendicular offset for the twin pistols
    const twinOff = (w.pattern === 'twin') ? ((twinIdx++ === 0) ? -6 : 6) : 0;
    const perpX = -Math.sin(a) * twinOff, perpY = Math.cos(a) * twinOff;
    const sx = isOrbit
      ? p.x + Math.cos(a) * w.orbitRadius
      : p.x + Math.cos(a) * (p.r + 4) + perpX;
    const sy = isOrbit
      ? p.y + Math.sin(a) * w.orbitRadius
      : p.y + Math.sin(a) * (p.r + 4) + perpY;
    bullets.push({
      x: sx, y: sy,
      vx: isOrbit ? 0 : Math.cos(a) * bSpeed,
      vy: isOrbit ? 0 : Math.sin(a) * bSpeed,
      damage: dmg, pierce,
      hits: new Set(),
      life: w.life,
      color: isCrit ? '#fff5a8' : w.color,
      explosive: !!w.explosive,
      blastR: w.blastR || 0,
      blastDmg: w.blastDmg || 0,
      bulletKind: isOrbit ? 'orbit' : (w.bulletKind || null),
      bounces: w.bounces || 0,
      leavesSlick: !!w.leavesSlick,
      spawnChicks: w.spawnChicks || 0,
      // tesla chain-lightning fields
      chains: w.chains || 0,
      chainRange: w.chainRange || 0,
      // orbiter fields
      orbitAngle: isOrbit ? a : 0,
      orbitRadius: isOrbit ? w.orbitRadius : 0,
      orbitSpeed: isOrbit ? w.orbitSpeed : 0,
      // Homing Bullets ability applies while its timer is active
      homing: homingBulletsTimer > 0 && !isOrbit,
      isCrit,
      // Trader-weapon hooks — passed through so the bullet carries its own
      // on-hit behavior. Each is null/0 for vanilla weapons.
      bulletKnock: w.bulletKnock || 0,
      clearHitsInterval: w.clearHitsInterval || 0,
      clearHitsAt: 0,
      spawnToasts: w.spawnToasts || 0,
      dropsHazard: w.dropsHazard || null,
      effect: w.randomEffect ? randomConfettiEffect() : (w.effect || null),
      effectDur: w.effectDur || 0,
      effectDps: w.effectDps || 0,
      explodesIntoSauce: !!w.explodesIntoSauce,
      slowOnHit: w.slowOnHit || 0,
      stunOnHit: w.stunOnHit || 0,
    });
  }
}

// Confetti picks a random elemental effect per shot. The color/effect is also
// baked into the bullet so drawBullet can tint accordingly.
function randomConfettiEffect() {
  const choices = ['burn', 'slow', 'stun', 'knockback', 'poison'];
  return choices[Math.floor(Math.random() * choices.length)];
}

// ---------- Secondary weapons ----------
// Compute the damage modifier from crit + glass-cannon + berserk perks.
// Returns { dmg, isCrit } so callers can tint visuals on crit.
function rollPerkedDamage(baseDmg) {
  let dmg = baseDmg
    * (1 + (player.special.glassCannon || 0))
    * (1 + (player.special.heavyCal || 0));
  if (player.special.berserk && player.hp / player.maxHp < 0.3) {
    dmg *= 1 + player.special.berserk;
  }
  // Rage ability — flat x2 damage window
  if (player.rageTimer > 0) dmg *= 2;
  const isCrit = !!(player.special.crit && Math.random() < player.special.crit);
  if (isCrit) dmg *= 2 + (player.special.critBurst || 0); // crit burst adds extra crit multiplier
  return { dmg, isCrit };
}

function useSecondary() {
  const def = player.secondary && SECONDARIES[player.secondary];
  if (!def) return;
  // Bow uses a different input model — press/hold/release — and isn't fired
  // through this single-press path.
  if (def.kind === 'charge') return;
  const cd = def.cooldown * (1 - (player.special.mightyThrow || 0));
  if (gameTime - player.lastSecondary < cd) return;
  player.lastSecondary = gameTime;
  const ang = Math.atan2(mouse.y - player.y, mouse.x - player.x);
  if (def.kind === 'melee')      swingMelee(def, ang);
  else if (def.kind === 'thrown') throwBlades(def, ang);
  else if (def.kind === 'returning') throwChakram(def, ang);
  else if (def.kind === 'heal')   useHeal(def);
  else if (def.kind === 'decoy')  useDecoy(def);
  else if (def.kind === 'stun')   useStun(def);
  else if (def.kind === 'summon') useSummon(def);
  else if (def.kind === 'field')  useField(def);
  else if (def.kind === 'launcher') useBombLauncher(def);
  else if (def.kind === 'potion')   usePotion(def);
  else if (def.kind === 'slowtime') useSlowTime(def);
}

// ---------- Charged Bow input lifecycle ----------
function startBowCharge() {
  const def = player.secondary && SECONDARIES[player.secondary];
  if (!def || def.kind !== 'charge') return;
  // Respect post-shot cooldown so the player can't spam tap-fire
  const cd = def.cooldown * (1 - (player.special.mightyThrow || 0));
  if (gameTime - player.lastSecondary < cd) return;
  player.bowHeld = true;
  player.bowCharge = 0;
}

function releaseBow() {
  const def = player.secondary && SECONDARIES[player.secondary];
  if (!def || def.kind !== 'charge' || !player.bowHeld) return;
  player.bowHeld = false;
  const ang = Math.atan2(mouse.y - player.y, mouse.x - player.x);
  fireBow(def, ang, player.bowCharge);
  player.bowCharge = 0;
  player.lastSecondary = gameTime;
}

function cancelBowCharge() {
  player.bowHeld = false;
  player.bowCharge = 0;
}

function fireBow(def, ang, chargeSec) {
  const t = Math.max(0, Math.min(1, chargeSec / def.chargeTime));
  // Linear scale across damage / speed / pierce. At t=0 you still get a weak
  // shot so a tap fire isn't useless.
  const baseDmg = def.minDamage + (def.maxDamage - def.minDamage) * t;
  const speed = def.minSpeed + (def.maxSpeed - def.minSpeed) * t;
  const pierce = Math.floor(def.minPierce + (def.maxPierce - def.minPierce) * t);
  // Route through the crit/perk damage roll so the bow scales with offense
  // perks the same way other secondaries do.
  const { dmg, isCrit } = rollPerkedDamage(baseDmg);
  const speedMul = 1 + (player.special.eagleEye || 0);
  bullets.push({
    x: player.x + Math.cos(ang) * (player.r + 8),
    y: player.y + Math.sin(ang) * (player.r + 8),
    vx: Math.cos(ang) * speed * speedMul,
    vy: Math.sin(ang) * speed * speedMul,
    damage: dmg, pierce,
    hits: new Set(),
    life: def.life,
    color: isCrit ? '#fff5a8' : def.color,
    explosive: false, blastR: 0, blastDmg: 0,
    bulletKind: 'arrow', bounces: 0, leavesSlick: false, spawnChicks: 0,
    chains: 0, chainRange: 0,
    orbitAngle: 0, orbitRadius: 0, orbitSpeed: 0,
    homing: false, isCrit,
    bulletKnock: 0, clearHitsInterval: 0, clearHitsAt: 0,
    spawnToasts: 0, dropsHazard: null,
    effect: null, effectDur: 0, effectDps: 0,
    explodesIntoSauce: false,
    bowCharge: t, // for the arrow renderer
  });
  // Visual punch — heavier loosens get a bigger flash + tiny screen shake
  muzzleFlash(player.x + Math.cos(ang) * (player.r + 10), player.y + Math.sin(ang) * (player.r + 10), ang);
  if (t > 0.8) shake(3);
  SFX.shoot('rifle');
}

// Bomb Launcher — fire an explosive bullet in the aim direction. Reuses the
// existing bullet/explode pipeline rather than introducing a new entity.
function useBombLauncher(def) {
  const ang = Math.atan2(mouse.y - player.y, mouse.x - player.x);
  // Lobbed shells have a hard range cap. If the cursor is closer than the
  // max range, the bomb lands exactly at the cursor; if farther, it caps
  // out at the max range along the aim line. Mighty-Throw extends the
  // effective range a bit so the perk still does something here.
  const baseRange = def.range * (1 + (player.special.eagleEye || 0));
  const cursorDist = Math.hypot(mouse.x - player.x, mouse.y - player.y);
  const dist = Math.min(baseRange, Math.max(60, cursorDist));
  const startX = player.x + Math.cos(ang) * (player.r + 6);
  const startY = player.y + Math.sin(ang) * (player.r + 6);
  const targetX = player.x + Math.cos(ang) * dist;
  const targetY = player.y + Math.sin(ang) * dist;
  const { dmg, isCrit } = rollPerkedDamage(def.damage);
  bullets.push({
    x: startX, y: startY,
    vx: 0, vy: 0,                  // unused — arcBomb interpolates manually
    damage: dmg, pierce: 0,
    hits: new Set(),
    life: 10,                      // big number; flightT clears the bomb on land
    color: isCrit ? '#fff5a8' : def.color,
    explosive: false,              // explosion fires on landing, not on hit
    blastR: def.blastR,
    blastDmg: def.blastDmg,
    bulletKind: 'bomb',
    // ---- arc-bomb specific ----
    arcBomb: true,
    startX, startY, targetX, targetY,
    flightT: 0,
    flightDur: def.flightDur,
    peakHeight: def.peakHeight,
    h: 0,                          // current visual rise (px above ground)
    // ---- standard tail (most ignored for arc bombs) ----
    bounces: 0, leavesSlick: false, spawnChicks: 0,
    chains: 0, chainRange: 0,
    orbitAngle: 0, orbitRadius: 0, orbitSpeed: 0,
    homing: false, isCrit,
    bulletKnock: 0, clearHitsInterval: 0, clearHitsAt: 0,
    spawnToasts: 0, dropsHazard: null,
    effect: null, effectDur: 0, effectDps: 0,
    explodesIntoSauce: false,
  });
  muzzleFlash(player.x + Math.cos(ang) * (player.r + 10), player.y + Math.sin(ang) * (player.r + 10), ang);
  SFX.shoot('rocket');
}

// 10 nasty effects the Mystery Potion can roll on impact. Each apply(z)
// mutates the hit zombie directly using the existing status fields where
// possible; the rare ones (confusion) add their own counter.
const POTION_EFFECTS = [
  { id: 'burn', label: 'Burn', color: '#ff5050', apply(z) {
      z.burnTimer = Math.max(z.burnTimer || 0, 5);
      z.burnDps = Math.max(z.burnDps || 0, 14);
  } },
  { id: 'poison', label: 'Poison', color: '#5cd86b', apply(z) {
      z.poisonTimer = Math.max(z.poisonTimer || 0, 8);
      z.poisonDps = Math.max(z.poisonDps || 0, 10);
  } },
  { id: 'frost', label: 'Frost', color: '#a0d0ff', apply(z) {
      z.slowTimer = Math.max(z.slowTimer || 0, 6);
  } },
  { id: 'freeze', label: 'Freeze', color: '#7eb0ff', apply(z) {
      z.stunTimer = Math.max(z.stunTimer || 0, 2.5);
      z.slowTimer = Math.max(z.slowTimer || 0, 2.5);
  } },
  { id: 'shock', label: 'Shockwave', color: '#ffce44', apply(z) {
      const ang = Math.atan2(z.y - player.y, z.x - player.x);
      const push = z.isBoss ? 350 : 1400;
      z.knockVx = (z.knockVx || 0) + Math.cos(ang) * push;
      z.knockVy = (z.knockVy || 0) + Math.sin(ang) * push;
  } },
  { id: 'bleed', label: 'Bleed', color: '#a82020', apply(z) {
      z.poisonTimer = Math.max(z.poisonTimer || 0, 4);
      z.poisonDps = Math.max(z.poisonDps || 0, 28);
  } },
  { id: 'confuse', label: 'Confusion', color: '#c47eff', apply(z) {
      z.confuseTimer = 5;
      z.confuseAng = Math.random() * Math.PI * 2;
      z.confuseRetargetT = 0.8;
  } },
  { id: 'toxic', label: 'Toxic Mire', color: '#80c060', apply(z) {
      z.slowTimer = Math.max(z.slowTimer || 0, 6);
      z.poisonTimer = Math.max(z.poisonTimer || 0, 6);
      z.poisonDps = Math.max(z.poisonDps || 0, 12);
  } },
  { id: 'inferno', label: 'Inferno', color: '#ff8030', apply(z) {
      z.burnTimer = Math.max(z.burnTimer || 0, 6);
      z.burnDps = Math.max(z.burnDps || 0, 16);
      z.slowTimer = Math.max(z.slowTimer || 0, 4);
  } },
  { id: 'damnation', label: 'DAMNATION', color: '#ffffff', apply(z) {
      // Jackpot — everything at once, slightly shorter durations
      z.burnTimer = Math.max(z.burnTimer || 0, 6);
      z.burnDps = Math.max(z.burnDps || 0, 14);
      z.poisonTimer = Math.max(z.poisonTimer || 0, 6);
      z.poisonDps = Math.max(z.poisonDps || 0, 12);
      z.slowTimer = Math.max(z.slowTimer || 0, 6);
      z.stunTimer = Math.max(z.stunTimer || 0, 1.5);
  } },
];

// Mystery Potion — arc-thrown projectile that lands and applies a random
// status to every non-boss zombie in the splash radius.
function usePotion(def) {
  const ang = Math.atan2(mouse.y - player.y, mouse.x - player.x);
  const baseRange = def.range * (1 + (player.special.eagleEye || 0));
