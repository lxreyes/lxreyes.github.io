  ctx.strokeRect(startX - 14, y1 - 22, panelW + 28, panelH);
  // Title spans the panel
  ctx.fillStyle = '#88aadd';
  ctx.font = 'bold 12px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('BUILD  ·  [B] exit  ·  click to place', startX + panelW / 2, y1 - 8);

  // Row 1 — individual building types (hotkeys 1-5)
  const row1Start = (W - row1Total) / 2;
  for (let i = 0; i < BUILDING_KEYS.length; i++) {
    const key = BUILDING_KEYS[i];
    const def = BUILDINGS[key];
    const x = row1Start + i * (sw1 + gap1);
    const rect = { x, y: y1, w: sw1, h: sh1, select: () => { buildSelected = key; SFX.uiClick(); } };
    buildToolbarRects.push(rect);
    const selected = key === buildSelected;
    const canAfford = player.money >= def.cost;
    const hover = pointInRect(mouse, rect);
    ctx.fillStyle = selected ? '#1a3a5a' : (hover ? '#1c2030' : '#13151c');
    ctx.fillRect(x, y1, sw1, sh1);
    ctx.strokeStyle = selected ? def.color : (canAfford ? '#33363f' : '#5a3030');
    ctx.lineWidth = selected ? 3 : 1.5;
    ctx.strokeRect(x, y1, sw1, sh1);
    ctx.fillStyle = def.color;
    ctx.fillRect(x + 10, y1 + 12, 32, 32);
    ctx.strokeStyle = '#15151a';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 10, y1 + 12, 32, 32);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px system-ui';
    ctx.textAlign = 'left';
    ctx.fillText(def.name, x + 52, y1 + 26);
    ctx.fillStyle = canAfford ? '#ffce44' : '#d33';
    ctx.font = 'bold 12px system-ui';
    ctx.fillText(`$${def.cost}`, x + 52, y1 + 44);
    ctx.fillStyle = '#5a5d66';
    ctx.font = '10px system-ui';
    ctx.textAlign = 'right';
    ctx.fillText(`[${i + 1}]`, x + sw1 - 8, y1 + 14);
    ctx.textAlign = 'left';
  }

  // Row 2 — prebuilt templates + Save + Load
  const row2Start = (W - row2Total) / 2;
  for (let i = 0; i < BASE_TEMPLATES.length; i++) {
    const tmpl = BASE_TEMPLATES[i];
    const tmplKey = 'template:' + tmpl.id;
    const x = row2Start + i * (sw2 + gap2);
    const totalCost = tmpl.parts.reduce((s, p) => s + (BUILDINGS[p.type] ? BUILDINGS[p.type].cost : 0), 0);
    const rect = { x, y: y2, w: sw2, h: sh2, select: () => { buildSelected = tmplKey; SFX.uiClick(); } };
    buildToolbarRects.push(rect);
    const selected = tmplKey === buildSelected;
    const canAfford = player.money >= totalCost;
    const hover = pointInRect(mouse, rect);
    ctx.fillStyle = selected ? '#1a3a5a' : (hover ? '#1c2030' : '#13151c');
    ctx.fillRect(x, y2, sw2, sh2);
    ctx.strokeStyle = selected ? tmpl.color : (canAfford ? '#33363f' : '#5a3030');
    ctx.lineWidth = selected ? 3 : 1.5;
    ctx.strokeRect(x, y2, sw2, sh2);
    // Mini template preview — a 3x3 grid where placed cells fill in
    const previewSize = 30;
    const cell = previewSize / 3;
    const px0 = x + 10;
    const py0 = y2 + 12;
    ctx.fillStyle = '#0a0c12';
    ctx.fillRect(px0, py0, previewSize, previewSize);
    ctx.strokeStyle = '#22252e';
    ctx.lineWidth = 1;
    ctx.strokeRect(px0, py0, previewSize, previewSize);
    ctx.fillStyle = tmpl.color;
    for (const part of tmpl.parts) {
      // dx/dy are in 40px grid units relative to center (origin = 1,1 cell)
      const gx = Math.round(part.dx / 40) + 1;
      const gy = Math.round(part.dy / 40) + 1;
      if (gx >= 0 && gx < 3 && gy >= 0 && gy < 3) {
        ctx.fillRect(px0 + gx * cell + 1, py0 + gy * cell + 1, cell - 2, cell - 2);
      }
    }
    // Name + total cost
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px system-ui';
    ctx.textAlign = 'left';
    fitFont(tmpl.name, sw2 - 50, 'bold 11px system-ui', 9);
    ctx.fillText(tmpl.name, x + 46, y2 + 24);
    ctx.fillStyle = canAfford ? '#ffce44' : '#d33';
    ctx.font = 'bold 11px system-ui';
    ctx.fillText(`$${totalCost}`, x + 46, y2 + 40);
    ctx.fillStyle = '#5a5d66';
    ctx.font = '9px system-ui';
    fitFont(tmpl.desc, sw2 - 14, '9px system-ui', 8);
    ctx.fillText(tmpl.desc, x + 6, y2 + sh2 - 6);
  }

  // Save current layout — labelled with the current building count
  {
    const x = row2Start + BASE_TEMPLATES.length * (sw2 + gap2);
    const enabled = buildings.length > 0;
    const rect = { x, y: y2, w: sw2, h: sh2, select: () => {
      if (saveCurrentBaseLayout()) {
        floaters.push({ x: player.x, y: player.y - 26, text: 'Layout saved', life: 1.6, color: '#5cd86b' });
        SFX.uiClick();
      } else {
        floaters.push({ x: player.x, y: player.y - 26, text: 'Nothing to save', life: 1.4, color: '#d33' });
      }
    } };
    buildToolbarRects.push(rect);
    const hover = pointInRect(mouse, rect);
    ctx.fillStyle = hover && enabled ? '#1c3a1c' : '#13151c';
    ctx.fillRect(x, y2, sw2, sh2);
    ctx.strokeStyle = enabled ? '#5cd86b' : '#33363f';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(x, y2, sw2, sh2);
    ctx.fillStyle = enabled ? '#fff' : '#5a5d66';
    ctx.font = 'bold 14px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('Save Layout', x + sw2 / 2, y2 + 24);
    ctx.fillStyle = '#888c95';
    ctx.font = '10px system-ui';
    ctx.fillText(`${buildings.length} placed`, x + sw2 / 2, y2 + 42);
    ctx.textAlign = 'left';
  }

  // Load saved layout — picks the buildSelected, clicking the world commits
  {
    const x = row2Start + (BASE_TEMPLATES.length + 1) * (sw2 + gap2);
    const enabled = hasSavedBase();
    const selected = buildSelected === 'saved';
    const rect = { x, y: y2, w: sw2, h: sh2, select: () => {
      if (!enabled) {
        floaters.push({ x: player.x, y: player.y - 26, text: 'No saved base', life: 1.4, color: '#d33' });
        return;
      }
      buildSelected = 'saved';
      SFX.uiClick();
    } };
    buildToolbarRects.push(rect);
    const hover = pointInRect(mouse, rect);
    ctx.fillStyle = selected ? '#1a3a5a' : (hover && enabled ? '#1c2030' : '#13151c');
    ctx.fillRect(x, y2, sw2, sh2);
    ctx.strokeStyle = selected ? '#80ffe0' : (enabled ? '#80ffe0' : '#33363f');
    ctx.lineWidth = selected ? 3 : 1.5;
    ctx.strokeRect(x, y2, sw2, sh2);
    ctx.fillStyle = enabled ? '#fff' : '#5a5d66';
    ctx.font = 'bold 14px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('Load Layout', x + sw2 / 2, y2 + 24);
    ctx.fillStyle = '#888c95';
    ctx.font = '10px system-ui';
    ctx.fillText(enabled ? 'click to place' : '(none saved)', x + sw2 / 2, y2 + 42);
    ctx.textAlign = 'left';
  }
}

// Shrink ctx.font until `text` fits within `maxW`. Mutates ctx.font in place.
// Stops at minSize so labels never become unreadably small.
function fitFont(text, maxW, fontTemplate, minSize = 10) {
  ctx.font = fontTemplate;
  if (ctx.measureText(text).width <= maxW) return;
  const m = fontTemplate.match(/\b(\d+)px/);
  if (!m) return;
  let size = parseInt(m[1]);
  while (size > minSize) {
    size--;
    ctx.font = fontTemplate.replace(/\b\d+px/, size + 'px');
    if (ctx.measureText(text).width <= maxW) return;
  }
}

// ----- Menus -----
function drawMenuButton(rect, label, hint, accent) {
  const hover = pointInRect(mouse, rect);
  // soft top→bottom gradient body
  const grad = ctx.createLinearGradient(0, rect.y, 0, rect.y + rect.h);
  if (hover) {
    grad.addColorStop(0, '#262b3a');
    grad.addColorStop(1, '#15182a');
  } else {
    grad.addColorStop(0, '#181b24');
    grad.addColorStop(1, '#0c0e16');
  }
  ctx.fillStyle = grad;
  ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
  // colored accent stripe down the left edge
  ctx.fillStyle = accent;
  ctx.fillRect(rect.x, rect.y, 5, rect.h);
  // border (slightly brighter on hover, in the accent color)
  ctx.strokeStyle = hover ? accent : '#33363f';
  ctx.lineWidth = hover ? 2.5 : 1.5;
  ctx.strokeRect(rect.x + 0.5, rect.y + 0.5, rect.w - 1, rect.h - 1);
  // subtle top highlight stripe (just on hover) — gives a tactile "lifted" feel
  if (hover) {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.06)';
    ctx.fillRect(rect.x + 6, rect.y + 1, rect.w - 8, 3);
  }
  // Center the text inside the area AFTER the accent stripe so it visually
  // balances. inner is the writable width with a small right margin too.
  const stripe = 5;
  const padL = stripe + 8, padR = 10;
  const inner = rect.w - padL - padR;
  const centerX = rect.x + padL + inner / 2;
  // label — shrinks if too long for the button. Y positions are derived from
  // rect.h so a shorter button (e.g., the 52px settings rows) keeps the hint
  // text inside the button instead of letting it drop below.
  ctx.fillStyle = '#fff';
  fitFont(label, inner, 'bold 22px system-ui', 14);
  ctx.textAlign = 'center';
  const labelY = rect.y + (hint ? rect.h * 0.45 + 2 : rect.h / 2 + 8);
  ctx.fillText(label, centerX, labelY);
  if (hint) {
    ctx.fillStyle = hover ? '#bcd6ff' : '#9aa0ab';
    fitFont(hint, inner, '12px system-ui', 9);
    ctx.fillText(hint, centerX, rect.y + rect.h * 0.80);
  }
  ctx.textAlign = 'left';
}

function drawMainMenu() {
  // dark overlay
  ctx.fillStyle = 'rgba(6, 8, 12, 0.78)';
  ctx.fillRect(0, 0, W, H);

  // subtle radial red glow behind the title — makes it feel ominous without
  // being too in-your-face
  const titleY = H / 2 - 110;
  const glow = ctx.createRadialGradient(W/2, titleY, 30, W/2, titleY, 400);
  glow.addColorStop(0, 'rgba(214, 48, 48, 0.22)');
  glow.addColorStop(1, 'rgba(214, 48, 48, 0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  // title — offset shadow + main red text for a touch of depth
  ctx.font = 'bold 84px system-ui';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
  ctx.fillText('D E A D Z O N E', W / 2 + 3, titleY + 3);
  ctx.fillStyle = '#ff5050';
  ctx.fillText('D E A D Z O N E', W / 2, titleY);

  // thin horizontal rule with side accents
  const ruleY = titleY + 22;
  ctx.strokeStyle = '#5a87c4';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(W/2 - 130, ruleY); ctx.lineTo(W/2 - 16, ruleY);
  ctx.moveTo(W/2 + 16, ruleY); ctx.lineTo(W/2 + 130, ruleY);
  ctx.stroke();
  // small diamond in the middle of the rule
  ctx.fillStyle = '#5a87c4';
  ctx.beginPath();
  ctx.moveTo(W/2, ruleY - 4); ctx.lineTo(W/2 + 4, ruleY);
  ctx.lineTo(W/2, ruleY + 4); ctx.lineTo(W/2 - 4, ruleY); ctx.closePath();
  ctx.fill();

  // subtitle in all caps with letter spacing baked into the text
  ctx.fillStyle = '#9aa0ab';
  ctx.font = 'bold 12px system-ui';
  ctx.fillText('W A V E   ·   S U R V I V A L   ·   Z O M B I E S', W / 2, ruleY + 22);
  if (bestWave > 0) {
    ctx.fillStyle = '#88aadd';
    ctx.font = '13px system-ui';
    ctx.fillText(`best wave so far · ${bestWave}`, W / 2, ruleY + 44);
  }

  // buttons
  const bw = 280;
  const showResume = hasGame;
  const buttons = [];
  if (showResume) buttons.push({ id: 'resume', label: 'Resume', hint: '', accent: '#8be08b' });
  buttons.push({ id: 'play',     label: showResume ? 'New Game' : 'Play', hint: 'face the horde', accent: '#7ec8ff' });
  buttons.push({ id: 'training', label: 'Training Arena',                 hint: 'cheats unlocked · practice freely', accent: '#ffd166' });
  buttons.push({ id: 'tutorial', label: 'How to Play',                    hint: 'controls + systems', accent: '#5cffec' });
  buttons.push({ id: 'guided',   label: 'Guided Tutorial',                hint: 'walks you through each action', accent: '#9bf07a' });
  buttons.push({ id: 'settings', label: 'Settings',                        hint: 'audio, sprites, more', accent: '#c47eff' });
  // Adaptive sizing — the button stack grew from 4 to 6 entries, so size
  // them to fit between the title block and the bottom of the canvas
  // instead of using fixed dimensions that overflowed.
  const titleEnd = 280;
  const bottomMargin = 24;
  const gap = 10;
  const avail = (H - bottomMargin) - titleEnd;
  const bh = Math.min(68, Math.floor((avail - gap * (buttons.length - 1)) / buttons.length));
  const totalH = buttons.length * bh + (buttons.length - 1) * gap;
  let by = Math.max(titleEnd + 6, (H + titleEnd - totalH) / 2);
  menuButtons = [];
  for (const b of buttons) {
    const rect = { x: (W - bw) / 2, y: by, w: bw, h: bh, id: b.id };
    drawMenuButton(rect, b.label, b.hint, b.accent);
    menuButtons.push(rect);
    by += bh + gap;
  }
  ctx.textAlign = 'left';
}

// ---------- Guided (physical) tutorial ----------
// A sequence of steps shown as a banner at the top of the gameplay screen.
// Each step describes one action; gameplay continues normally and the step's
// done(s) check polls every frame to decide when to advance. The trainingMode
// flag is on so waves don't spawn — players control when they go.
let guidedActive = false;
let guidedStep = 0;
let guidedScratch = {};
let guidedFlashUntil = -1;

const GUIDED_STEPS = [
  {
    text: 'Move with WASD or the arrow keys',
    setup(s) { s.x0 = player.x; s.y0 = player.y; },
    done(s) { return Math.hypot(player.x - s.x0, player.y - s.y0) > 90; },
  },
  {
    text: 'Move your MOUSE to aim — your gun rotates with the cursor',
    setup(s) { s.m0x = mouse.x; s.m0y = mouse.y; },
    done(s) { return Math.hypot(mouse.x - s.m0x, mouse.y - s.m0y) > 80; },
  },
  {
    text: 'Hold LEFT CLICK to fire your pistol',
    setup(s) { s.t0 = gameTime; },
    done(s) { return player.lastShot > s.t0; },
  },
  {
    text: 'A zombie appeared! Take it down',
    setup(s) { s.k0 = kills; spawnSpecific('normal'); },
    done(s) { return kills > s.k0; },
  },
  {
    text: 'Walk to the SHOP — top-right corner, dashed blue area',
    done() { return inShop(); },
  },
  {
    text: 'Press 1 to buy "Max HP +20" — $25 added to your wallet',
    setup(s) { player.money = Math.max(player.money, 25); s.hp0 = player.maxHp; },
    done(s) { return player.maxHp > s.hp0; },
  },
  {
    text: 'Step out of the shop, then press SHIFT to DASH (i-frame teleport)',
    setup(s) { s.t0 = gameTime; },
    done(s) { return (player.abilityLast.dash || 0) > s.t0; },
  },
  {
    text: 'Press Q (or right-click) to swing your secondary (Katana)',
    setup(s) { s.t0 = gameTime; },
    done(s) { return player.lastSecondary > s.t0; },
  },
  {
    text: 'You\'re ready! Press SPACE on the menu to begin a real run',
    setup(s) { s.t0 = gameTime; },
    done(s) { return gameTime - s.t0 > 3; },
  },
];

function startGuidedTutorial() {
  hardReset();
  trainingMode = true;
  hasGame = true;
  gameState = 'playing';
  player.x = W / 2; player.y = H / 2;
  guidedActive = true;
  guidedStep = 0;
  guidedScratch = {};
  guidedFlashUntil = -1;
  const first = GUIDED_STEPS[0];
  if (first && first.setup) first.setup(guidedScratch);
}

function endGuidedTutorial() {
  guidedActive = false;
  guidedStep = 0;
  guidedScratch = {};
  trainingMode = false;
  zombies.length = 0;
  bullets.length = 0;
  gameState = 'menu';
}

function updateGuidedTutorial() {
  if (!guidedActive) return;
  if (gameState !== 'playing') return;
  const step = GUIDED_STEPS[guidedStep];
  if (!step) { endGuidedTutorial(); return; }
  try {
    if (step.done(guidedScratch)) {
      guidedFlashUntil = gameTime + 0.9;
      guidedStep++;
      guidedScratch = {};
      const next = GUIDED_STEPS[guidedStep];
      if (!next) { endGuidedTutorial(); return; }
      if (next.setup) next.setup(guidedScratch);
    }
  } catch (err) {
    // Bad step shouldn't kill the run — log and skip past it
    logErrorInGame('[guided]', err);
    guidedStep++;
    guidedScratch = {};
  }
}

// Banner drawn in the HUD layer when the guided tutorial is active.
let guidedSkipRect = null;
function drawGuidedTutorialBanner() {
  if (!guidedActive) return;
  const step = GUIDED_STEPS[guidedStep];
  if (!step) return;
  const w = 640, h = 80;

  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#5cffec';
  ctx.lineWidth = 2;
  ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
  ctx.fillStyle = '#5cffec';
  ctx.fillRect(x, y, 4, h);
  // Header
  ctx.fillStyle = '#5cffec';
  ctx.font = 'bold 11px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(`GUIDED TUTORIAL · STEP ${guidedStep + 1} of ${GUIDED_STEPS.length}`, W / 2, y + 20);
  // Instruction
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 17px system-ui';
  fitFont(step.text, w - 40, 'bold 17px system-ui', 13);
  ctx.fillText(step.text, W / 2, y + 50);
  // Skip button at the right end
  const sw = 64, sh = 26;

  const hover = pointInRect(mouse, guidedSkipRect);
  ctx.fillStyle = hover ? '#33363f' : '#1c1f28';
  ctx.fillRect(sx, sy, sw, sh);

    ctx.fillStyle = '#8be08b';
    ctx.font = 'bold 14px system-ui';
    ctx.fillText('✓ Step complete', W / 2, y + h + 22);
  }
  ctx.textAlign = 'left';
}

function drawTutorial() {
  ctx.fillStyle = 'rgba(6, 8, 12, 0.92)';
  ctx.fillRect(0, 0, W, H);

  const page = TUTORIAL_PAGES[tutorialPage];
  const accent = page.accent;

  // header
  ctx.textAlign = 'center';
  ctx.fillStyle = '#9aa0ab';
  ctx.font = 'bold 11px system-ui';
  ctx.fillText(`HOW TO PLAY  ·  ${tutorialPage + 1} / ${TUTORIAL_PAGES.length}`, W / 2, 50);
  ctx.fillStyle = accent;
  ctx.font = 'bold 40px system-ui';
  ctx.fillText(page.title, W / 2, 92);
  // thin underline
  ctx.strokeStyle = accent;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(W / 2 - 80, 104); ctx.lineTo(W / 2 + 80, 104);
  ctx.stroke();

  // content panel
  const panelX = 140, panelY = 130, panelW = W - 280, panelH = H - 230;
  ctx.fillStyle = 'rgba(14, 16, 24, 0.85)';
  ctx.fillRect(panelX, panelY, panelW, panelH);
  ctx.strokeStyle = '#33363f';
  ctx.lineWidth = 1;
  ctx.strokeRect(panelX + 0.5, panelY + 0.5, panelW - 1, panelH - 1);
  // accent stripe on the left
  ctx.fillStyle = accent;
  ctx.fillRect(panelX, panelY, 4, panelH);

  // sections — laid out in two columns
  const colW = (panelW - 60) / 2;
  const col1X = panelX + 24;
  const col2X = panelX + 24 + colW + 12;
  let col = 0, y1 = panelY + 30, y2 = panelY + 30;
  for (const sec of page.sections) {
    const x = col === 0 ? col1X : col2X;
    let y = col === 0 ? y1 : y2;
    ctx.textAlign = 'left';
    ctx.fillStyle = accent;
    ctx.font = 'bold 16px system-ui';
    ctx.fillText(sec.heading, x, y);
    y += 8;
    // underline
    ctx.strokeStyle = accent;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, y); ctx.lineTo(x + 40, y);
    ctx.stroke();
    y += 14;
    ctx.fillStyle = '#dfe2e8';
    ctx.font = '13px system-ui';
    for (const line of sec.lines) {
      // bullet
      ctx.fillStyle = accent;
      ctx.fillRect(x, y - 7, 3, 3);
      ctx.fillStyle = '#dfe2e8';
      ctx.fillText(line, x + 10, y);
      y += 18;
    }
    y += 14;
    if (col === 0) y1 = y; else y2 = y;
    col = 1 - col;
  }

  // nav buttons
  menuButtons = [];
  const bw = 140, bh = 44, by = H - 78;
  const prevRect = { x: W / 2 - bw - 90, y: by, w: bw, h: bh, id: 'tutorial-prev' };
  const nextRect = { x: W / 2 + 90,      y: by, w: bw, h: bh, id: 'tutorial-next' };
  const closeRect = { x: W / 2 - bw / 2, y: by, w: bw, h: bh, id: 'tutorial-close' };
  if (tutorialPage > 0) {
    drawMenuButton(prevRect, '← Prev', null, '#7ec8ff');
    menuButtons.push(prevRect);
  }
  drawMenuButton(closeRect, 'Back to Menu', null, '#ff5050');
  menuButtons.push(closeRect);
  if (tutorialPage < TUTORIAL_PAGES.length - 1) {
    drawMenuButton(nextRect, 'Next →', null, '#7ec8ff');
    menuButtons.push(nextRect);
  }

  ctx.textAlign = 'left';
}

    const rect = { x: (W - bw) / 2, y: by, w: bw, h: 46, trackX: 0, trackW: 0 };

  const backRect = { x: (W - bw) / 2, y: H - 90, w: bw, h: bh, id: 'back' };

function drawSpriteEditor() {
  ctx.fillStyle = 'rgba(6, 8, 12, 0.92)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#fff';
  fitFont('Sprite Editor', W - 40, 'bold 32px system-ui', 18);
  ctx.textAlign = 'center';
  ctx.fillText('Sprite Editor', W / 2, 50);
  ctx.fillStyle = '#9aa0ab';
  fitFont('pick a category, pick a target, pick a color, drag to paint', W - 80, '12px system-ui', 10);
  ctx.fillText('pick a category, pick a target, pick a color, drag to paint', W / 2, 70);

  menuButtons = [];
  spriteEditorRects = { tabs: [], categoryTabs: [], palette: [], grid: null, clear: null, back: null };

  // Top row: CATEGORY tabs (General / Zombies / Guns / Bullets)
  const catW = 140, catH = 30, catGap = 8;
  const catsTotalW = SPRITE_CATEGORIES.length * catW + (SPRITE_CATEGORIES.length - 1) * catGap;
  let cx = (W - catsTotalW) / 2;
  for (const c2 of SPRITE_CATEGORIES) {
    const rect = { x: cx, y: 88, w: catW, h: catH, id: c2.id };
    const active = spriteEditorCategory === c2.id;
    const hover = pointInRect(mouse, rect);
    ctx.fillStyle = active ? '#1a3a5a' : (hover ? '#1c2030' : '#13151c');
    ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
    ctx.strokeStyle = active ? '#7ec8ff' : '#33363f';
    ctx.lineWidth = active ? 2 : 1;
    ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
    ctx.fillStyle = '#fff';
    fitFont(c2.label, rect.w - 12, 'bold 13px system-ui', 10);
    ctx.textAlign = 'center';
    ctx.fillText(c2.label, rect.x + rect.w / 2, rect.y + 20);
    spriteEditorRects.categoryTabs.push(rect);
    cx += catW + catGap;
  }

  // Second row: TARGET sub-tabs for the chosen category
  const activeCategory = SPRITE_CATEGORIES.find(c2 => c2.id === spriteEditorCategory) || SPRITE_CATEGORIES[0];
  // Ensure the active target belongs to the current category; if not, reset
  // to the first target in that category.
  if (!activeCategory.targets.some(t => t.id === spriteEditorTarget)) {
    spriteEditorTarget = activeCategory.targets[0].id;
  }
  const tabW = 96, tabH = 26, tabGap = 5;
  const tabsTotalW = activeCategory.targets.length * tabW + (activeCategory.targets.length - 1) * tabGap;
  let tx = (W - tabsTotalW) / 2;
  for (const t of activeCategory.targets) {
    const rect = { x: tx, y: 124, w: tabW, h: tabH, id: t.id };
    const active = spriteEditorTarget === t.id;
    const hover = pointInRect(mouse, rect);
    ctx.fillStyle = active ? '#1a3a5a' : (hover ? '#1c2030' : '#13151c');
    ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
    ctx.strokeStyle = active ? '#7ec8ff' : '#33363f';
    ctx.lineWidth = active ? 2 : 1;
    ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
    ctx.fillStyle = hasCustomSprite(t.id) ? '#8be08b' : '#fff';
    fitFont(t.label, rect.w - 10, 'bold 11px system-ui', 8);
    ctx.textAlign = 'center';
    ctx.fillText(t.label, rect.x + rect.w / 2, rect.y + 17);
    spriteEditorRects.tabs.push(rect);
    tx += tabW + tabGap;
  }

  // Grid — sized to fit between the two-row tab header and the bottom
  // Clear/Done buttons. 464 = 29px per cell, leaves room for the buttons
  // (h=36 each) below the grid plus ~10px of canvas margin.
  const gridSize = 464;
  const cell = gridSize / SPRITE_SIZE; // 29px per cell
  const gx = (W - gridSize) / 2 - 60; // shift left to make room for palette
  const gy = 156;
  spriteEditorRects.grid = { x: gx, y: gy, w: gridSize, h: gridSize, cell };

  // checkerboard background to show transparency
  for (let yy = 0; yy < SPRITE_SIZE; yy++) {
    for (let xx = 0; xx < SPRITE_SIZE; xx++) {
      ctx.fillStyle = ((xx + yy) % 2 === 0) ? '#1a1d24' : '#22252e';
      ctx.fillRect(gx + xx * cell, gy + yy * cell, cell, cell);
    }
  }
  // pixels
  const sprite = ensureSprite(spriteEditorTarget);
  for (let yy = 0; yy < SPRITE_SIZE; yy++) {
    for (let xx = 0; xx < SPRITE_SIZE; xx++) {
      const v = sprite[yy * SPRITE_SIZE + xx];
      if (!v) continue;
      ctx.fillStyle = SPRITE_PALETTE[v];
      ctx.fillRect(gx + xx * cell, gy + yy * cell, cell, cell);
    }
  }
  // grid lines
  ctx.strokeStyle = 'rgba(0,0,0,0.35)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= SPRITE_SIZE; i++) {
    ctx.beginPath(); ctx.moveTo(gx + i * cell + 0.5, gy); ctx.lineTo(gx + i * cell + 0.5, gy + gridSize); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(gx, gy + i * cell + 0.5); ctx.lineTo(gx + gridSize, gy + i * cell + 0.5); ctx.stroke();
  }
  // outer border
  ctx.strokeStyle = '#5a87c4';
  ctx.lineWidth = 2;
  ctx.strokeRect(gx - 1, gy - 1, gridSize + 2, gridSize + 2);
  // hover cell highlight
  if (pointInRect(mouse, spriteEditorRects.grid)) {
    const hx = Math.floor((mouse.x - gx) / cell);
    const hy = Math.floor((mouse.y - gy) / cell);
    if (hx >= 0 && hx < SPRITE_SIZE && hy >= 0 && hy < SPRITE_SIZE) {
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.strokeRect(gx + hx * cell + 1, gy + hy * cell + 1, cell - 2, cell - 2);
    }
  }

  // Palette on the right
  const palX = gx + gridSize + 28;
  const palY = gy;
  const swatch = 40, swGap = 6;
  for (let i = 0; i < SPRITE_PALETTE.length; i++) {
    const sx = palX, sy = palY + i * (swatch + swGap);
    const rect = { x: sx, y: sy, w: swatch, h: swatch, index: i };
    const isErase = i === 0;
    const active = spriteEditorColor === i;
    // checkerboard for transparent slot
    if (isErase) {
      ctx.fillStyle = '#1a1d24';
      ctx.fillRect(sx, sy, swatch, swatch);
      ctx.fillStyle = '#33363f';
      for (let yy = 0; yy < 4; yy++) for (let xx = 0; xx < 4; xx++) {
        if ((xx + yy) % 2 === 0) ctx.fillRect(sx + xx * 10, sy + yy * 10, 10, 10);
      }
    } else {
      ctx.fillStyle = SPRITE_PALETTE[i];
      ctx.fillRect(sx, sy, swatch, swatch);
    }
    ctx.strokeStyle = active ? '#fff' : '#1a1a1a';
    ctx.lineWidth = active ? 3 : 1;
    ctx.strokeRect(sx, sy, swatch, swatch);
    if (isErase) {
      ctx.fillStyle = '#dfe2e8';
      fitFont('erase', swatch - 6, 'bold 10px system-ui', 8);
      ctx.textAlign = 'center';
      ctx.fillText('erase', sx + swatch / 2, sy + swatch / 2 + 3);
    }
    spriteEditorRects.palette.push(rect);
  }

  // Tools below the grid
  const tY = gy + gridSize + 18;
  const clearRect = { x: gx + 10, y: tY, w: 120, h: 36, id: 'spriteClear' };
  ctx.fillStyle = pointInRect(mouse, clearRect) ? '#3a3030' : '#221a1a';
  ctx.fillRect(clearRect.x, clearRect.y, clearRect.w, clearRect.h);
  ctx.strokeStyle = '#d36'; ctx.lineWidth = 2;
  ctx.strokeRect(clearRect.x, clearRect.y, clearRect.w, clearRect.h);
  ctx.fillStyle = '#fff';
  fitFont('Clear', clearRect.w - 16, 'bold 13px system-ui', 10);
  ctx.textAlign = 'center';
  ctx.fillText('Clear', clearRect.x + clearRect.w / 2, clearRect.y + 23);
  menuButtons.push(clearRect);

  // Back to Settings
  const backRect = { x: gx + gridSize - 130, y: tY, w: 130, h: 36, id: 'spriteBack' };
  drawMenuButton(backRect, 'Done', null, '#7ec8ff');
  menuButtons.push(backRect);

  ctx.textAlign = 'left';
}

function drawUpgradeTree() {
  // dim everything behind
  ctx.fillStyle = 'rgba(6, 8, 12, 0.75)';
  ctx.fillRect(0, 0, W, H);

  menuButtons = [];

  // Title + EXP readout
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(treeView === 'roots' ? 'THE TREE OF UPGRADES' : 'TOMES SHOP', W / 2, 48);
  ctx.fillStyle = '#7ec8ff';
  ctx.font = 'bold 18px system-ui';
  ctx.fillText(`${player.exp} EXP`, W / 2, 72);

  // Tab switcher — Tomes Shop / Root System
  const tabW = 170, tabH = 30, tabGap = 8;
  const tabs = [
    { id: 'tab-tomes', label: 'Tomes Shop',           view: 'tomes' },
    { id: 'tab-roots', label: 'The Tree of Upgrades', view: 'roots' },
  ];
  const totalTabW = tabs.length * tabW + (tabs.length - 1) * tabGap;
  let tx = (W - totalTabW) / 2;
  for (const t of tabs) {
    const rect = { x: tx, y: 88, w: tabW, h: tabH, id: t.id };
    const active = treeView === t.view;
    const hover = pointInRect(mouse, rect);
    ctx.fillStyle = active ? '#1a3a5a' : (hover ? '#1c2030' : '#13151c');
    ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
    ctx.strokeStyle = active ? '#7ec8ff' : '#33363f';
    ctx.lineWidth = active ? 2 : 1;
    ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
    ctx.fillStyle = '#fff';
    fitFont(t.label, rect.w - 12, 'bold 13px system-ui', 10);
    ctx.textAlign = 'center';
    ctx.fillText(t.label, rect.x + rect.w / 2, rect.y + 20);
    menuButtons.push(rect);
    tx += tabW + tabGap;
  }

  // Dispatch to the selected view
  if (treeView === 'roots') { drawRootTreeContent(); return; }

  // ---- TOMES SHOP body — perks sorted into role sections ----
  ctx.fillStyle = '#9aa0ab';
  ctx.font = '13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(`each tome costs ${TOMES_SHOP_COST} EXP · picks stack`, W / 2, 138);

  // Section pills — click to switch which group of tomes is shown
  const pillW = 130, pillH = 26, pillGap = 8;
  const pillsTotalW = SHOP_SECTIONS.length * pillW + (SHOP_SECTIONS.length - 1) * pillGap;
  let px = (W - pillsTotalW) / 2;
  for (const sec of SHOP_SECTIONS) {
    const rect = { x: px, y: 152, w: pillW, h: pillH, id: 'sec-' + sec.id };
    const active = tomeShopSection === sec.id;
    const hover = pointInRect(mouse, rect);
    ctx.fillStyle = active ? '#1a3a5a' : (hover ? '#1c2030' : '#13151c');
    ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
    ctx.strokeStyle = active ? sec.color : '#33363f';
    ctx.lineWidth = active ? 2 : 1;
    ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
    // colored dot indicating the section
    ctx.fillStyle = sec.color;
    ctx.beginPath(); ctx.arc(rect.x + 12, rect.y + rect.h / 2, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    fitFont(`${sec.name} (${sec.ids.length})`, rect.w - 30, 'bold 12px system-ui', 9);
    ctx.textAlign = 'left';
    ctx.fillText(`${sec.name} (${sec.ids.length})`, rect.x + 22, rect.y + 17);
    menuButtons.push(rect);
    px += pillW + pillGap;
  }

  const section = SHOP_SECTIONS.find(s => s.id === tomeShopSection) || SHOP_SECTIONS[0];
  const ids = section.ids;
  const cols = 4;
  const cardW = 220, cardH = 60, cgap = 10;
  const gridW = cols * cardW + (cols - 1) * cgap;
  const gridX = (W - gridW) / 2;
  const gridY = 192;

  for (let i = 0; i < ids.length; i++) {
    const id = ids[i];
    const def = SPECIAL_UPGRADES[id];
    const col = i % cols, row = Math.floor(i / cols);
    const rx = gridX + col * (cardW + cgap);
    const ry = gridY + row * (cardH + cgap);
    const lvl = player.specialLevels[id] || 0;
    const canAfford = player.exp >= TOMES_SHOP_COST;
    const rect = { x: rx, y: ry, w: cardW, h: cardH, id: 'shop-' + id };
    const hover = pointInRect(mouse, rect);
    // body
    ctx.fillStyle = hover ? '#1c2030' : '#11141c';
    ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
    ctx.strokeStyle = hover ? def.color : (lvl > 0 ? '#5cb85c' : '#33363f');
    ctx.lineWidth = hover ? 2 : (lvl > 0 ? 1.5 : 1);
    ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
    // colored stripe down the left edge
    ctx.fillStyle = def.color;
    ctx.fillRect(rect.x, rect.y, 4, rect.h);
    // name (top line)
    ctx.fillStyle = '#fff';
    fitFont(def.name, rect.w - 70, 'bold 13px system-ui', 10);
    ctx.textAlign = 'left';
    ctx.fillText(def.name, rect.x + 12, rect.y + 19);
    // desc (second line, smaller)
    ctx.fillStyle = '#9aa0ab';
    fitFont(def.desc, rect.w - 70, '11px system-ui', 9);
    ctx.fillText(def.desc, rect.x + 12, rect.y + 36);
    // level + cost on the right
    ctx.textAlign = 'right';
    if (lvl > 0) {
      ctx.fillStyle = '#5cb85c';
      ctx.font = 'bold 11px system-ui';
      ctx.fillText('×' + lvl, rect.x + rect.w - 12, rect.y + 19);
    }
    ctx.fillStyle = canAfford ? '#7ec8ff' : '#d33';
    ctx.font = 'bold 11px system-ui';
    ctx.fillText(`${TOMES_SHOP_COST} EXP`, rect.x + rect.w - 12, rect.y + 50);
    ctx.textAlign = 'left';
    menuButtons.push(rect);
  }

  // close button
  const closeRect = { x: W / 2 - 110, y: H - 76, w: 220, h: 48, id: 'tree-close' };
  drawMenuButton(closeRect, 'Close  (T)', null, '#7ec8ff');
  menuButtons.push(closeRect);
  ctx.textAlign = 'left';
}

// Root System tree — content body inside drawUpgradeTree when treeView === 'roots'.
function drawRootTreeContent() {
  // hint
  ctx.fillStyle = '#9aa0ab';
  ctx.font = '13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('grow your roots — each child requires its parent', W / 2, 142);

  // Center the tree slightly above center to leave room for the close button.
  const cx = W / 2, cy = H / 2 + 10;

  // First pass: draw the root-like connection lines between parent and child
  for (const node of ROOT_TREE) {
    if (!node.parent) continue;
    const parent = ROOT_TREE.find(n => n.id === node.parent);
    if (!parent) continue;
    const x1 = cx + parent.x, y1 = cy + parent.y;
    const x2 = cx + node.x,   y2 = cy + node.y;
    const owned = !!rootOwned[node.id];
    // curved line — perpendicular offset gives an organic root feel
    const dx = x2 - x1, dy = y2 - y1;
    const len = Math.hypot(dx, dy) || 1;
    const px = -dy / len * 14, py = dx / len * 14;
    const mx = (x1 + x2) / 2 + px * 0.6;
    const my = (y1 + y2) / 2 + py * 0.6;
    ctx.strokeStyle = owned ? '#8a5a18' : '#3a2410';
    ctx.lineWidth = owned ? 6 : 3;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.quadraticCurveTo(mx, my, x2, y2);
    ctx.stroke();
  }

  // Second pass: draw each node and register clickable rects
  for (const node of ROOT_TREE) {
    const nx = cx + node.x, ny = cy + node.y;
    const owned = !!rootOwned[node.id];
    const parentOwned = !node.parent || !!rootOwned[node.parent];
    const available = !owned && parentOwned;
    const canAfford = available && player.exp >= node.cost;
    // Smaller per-tier node radius now that the tree extends further out.
    const r = node.id === 'root' ? 28 : 20;
    const rect = { x: nx - r, y: ny - r, w: r * 2, h: r * 2, id: 'root-' + node.id };
    const hover = pointInRect(mouse, rect);
    // glow if available
    if (available) {
      const glow = ctx.createRadialGradient(nx, ny, r, nx, ny, r * 1.8);
      glow.addColorStop(0, node.color + (canAfford ? 'aa' : '44'));
      glow.addColorStop(1, node.color + '00');
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(nx, ny, r * 1.8, 0, Math.PI*2); ctx.fill();
    }
    // body
    ctx.fillStyle = owned ? '#22382a' : (available ? (hover ? '#1c2030' : '#11141c') : '#0a0c12');
    ctx.beginPath(); ctx.arc(nx, ny, r, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = owned ? '#5cb85c' : (available ? node.color : '#33363f');
    ctx.lineWidth = owned ? 3 : (available ? 2.5 : 1.5);
    ctx.stroke();
    // name (fits to circle width)
    ctx.fillStyle = owned ? '#5cb85c' : '#fff';
    fitFont(node.name, r * 1.7, 'bold 12px system-ui', 9);
    ctx.textAlign = 'center';
    ctx.fillText(node.name, nx, ny - 2);
    // status — cost / locked / owned
    ctx.font = '10px system-ui';
    if (owned) {
      ctx.fillStyle = '#5cb85c';
      ctx.fillText('OWNED', nx, ny + 12);
    } else if (available) {
      ctx.fillStyle = canAfford ? '#7ec8ff' : '#d33';
      ctx.fillText(node.cost === 0 ? 'FREE' : `${node.cost} EXP`, nx, ny + 12);
    } else {
      ctx.fillStyle = '#5a5d66';
      ctx.fillText('LOCKED', nx, ny + 12);
    }
    if (available || node.cost === 0 && !owned) menuButtons.push(rect);
  }

  // tooltip for the hovered node — desc on the bottom
  for (const node of ROOT_TREE) {
    const nx = cx + node.x, ny = cy + node.y;
    const r = node.id === 'root' ? 28 : 20;
    const rect = { x: nx - r, y: ny - r, w: r * 2, h: r * 2 };
    if (pointInRect(mouse, rect)) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 13px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText(node.desc, W / 2, H - 130);
      break;
    }
  }

  // close button
  const closeRect = { x: W / 2 - 110, y: H - 76, w: 220, h: 48, id: 'tree-close' };
  drawMenuButton(closeRect, 'Close  (T)', null, '#7ec8ff');
  menuButtons.push(closeRect);
  ctx.textAlign = 'left';
}

function drawTrainingBanner() {
  ctx.fillStyle = 'rgba(255, 209, 102, 0.18)';

  ctx.strokeStyle = '#ffd166';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, H - 22); ctx.lineTo(W, H - 22); ctx.stroke();
  ctx.fillStyle = '#ffd166';
  ctx.font = 'bold 11px system-ui';

// Menu button click dispatch — called from mousedown when a menu is active.
function handleMenuClick() {
  // Sprite editor — check tabs, palette, grid before regular buttons
  if (gameState === 'settings' && settingsView === 'sprites' && spriteEditorRects) {
    // category tabs (top row) — switching category resets target to first slot
    for (const r of (spriteEditorRects.categoryTabs || [])) {
      if (pointInRect(mouse, r)) {
        spriteEditorCategory = r.id;
        const cat = SPRITE_CATEGORIES.find(c2 => c2.id === r.id);
        if (cat) spriteEditorTarget = cat.targets[0].id;
        SFX.uiClick();
        return true;
      }
    }
    // sub-tabs (second row) — pick a slot inside the current category
    for (const r of spriteEditorRects.tabs) {
      if (pointInRect(mouse, r)) { spriteEditorTarget = r.id; SFX.uiClick(); return true; }
    }
    // palette
    for (const r of spriteEditorRects.palette) {
      if (pointInRect(mouse, r)) { spriteEditorColor = r.index; SFX.uiClick(); return true; }
    }
    // grid — start painting drag
    const grid = spriteEditorRects.grid;
    if (grid && pointInRect(mouse, grid)) {
      const cx = Math.floor((mouse.x - grid.x) / grid.cell);
      const cy = Math.floor((mouse.y - grid.y) / grid.cell);
      if (cx >= 0 && cx < SPRITE_SIZE && cy >= 0 && cy < SPRITE_SIZE) {
        const sprite = ensureSprite(spriteEditorTarget);
        sprite[cy * SPRITE_SIZE + cx] = spriteEditorColor;
        spriteEditorPaint = { color: spriteEditorColor };
      }
      return true;
    }
  }
  for (const r of menuButtons) {
    if (!pointInRect(mouse, r)) continue;
    SFX.uiClick();
    handleMenuAction(r.id);
    return true;
  }
  return false;
}

function handleMenuAction(id) {
  switch (id) {
    case 'resume':
      gameState = 'playing';
      break;
    case 'play':
      hardReset();
      trainingMode = false;
      hasGame = true;
      gameState = 'playing';
      break;
    case 'training':
      hardReset();
      trainingMode = true;
      cheatsUnlocked = true;
      cheatsOpen = true;
      hasGame = true;
      gameState = 'playing';
      spawnTrainerDummy();
      break;
    case 'settings':
      gameState = 'settings';
      break;
    case 'tutorial':
      gameState = 'tutorial';
      tutorialPage = 0;
      break;
    case 'guided':
      startGuidedTutorial();
      break;
    case 'tutorial-next':
      tutorialPage = Math.min(TUTORIAL_PAGES.length - 1, tutorialPage + 1);
      break;
    case 'tutorial-prev':
      tutorialPage = Math.max(0, tutorialPage - 1);
      break;
    case 'tutorial-close':
      // Return to wherever the tutorial was opened from — pause overlay if
      // a game is in progress, otherwise the main menu.
      gameState = hasGame ? 'paused' : 'menu';
      break;
    case 'menu':
      gameState = 'menu';
      break;
    case 'back':
      if (gameState === 'settings' && settingsView === 'sprites') {
        settingsView = 'main';
        break;
      }
      gameState = hasGame ? 'paused' : 'menu';
      break;
    case 'mute':
      soundMuted = !soundMuted;
      applyMusicMute();
      applySfxVolume();
      break;
    case 'toggleCoop':
      coopEnabled ? disableCoop() : enableCoop();
      break;
    case 'toggleAutoShoot':
      autoShoot = !autoShoot;
      break;
    case 'toggleCrashReport':
      crashReportEnabled = !crashReportEnabled;
      saveCrashReportPref();
      break;
    case 'clearCrashReports':
      recentErrors.length = 0;
      break;
    case 'sprites':
      settingsView = 'sprites';
      break;
    case 'spriteBack':
      settingsView = 'main';
      break;
    case 'spriteClear': {
      const s = ensureSprite(spriteEditorTarget);
      s.fill(0);
      saveSprites();
      break;
    }
    case 'tree-close':
      gameState = 'playing';
      break;
    case 'tab-tomes': treeView = 'tomes'; break;
    case 'tab-roots': treeView = 'roots'; break;
    default:
      if (id && id.startsWith('shop-')) {
        buyShopPerk(id.slice('shop-'.length));
      } else if (id && id.startsWith('root-')) {
        buyRootNode(id.slice('root-'.length));
      } else if (id && id.startsWith('sec-')) {
        tomeShopSection = id.slice('sec-'.length);
      }
      break;
  }
  updateMusicForState();
}

// Tiny pictogram per cheats section so each one is recognizable at a glance.
// Drawn at (cx, cy) at the given size, in the section's accent color.
function drawCheatSectionIcon(id, cx, cy, size, color) {
  ctx.save();
  ctx.translate(cx, cy);
  const s = size * 0.5;
  ctx.fillStyle = color;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.4;
  switch (id) {
    case 'player': // bust silhouette
      ctx.beginPath(); ctx.arc(0, -s * 0.45, s * 0.42, 0, Math.PI*2); ctx.fill();
      ctx.fillRect(-s * 0.55, -s * 0.05, s * 1.1, s * 0.75);
      break;
    case 'waves': // double crest
      ctx.beginPath();
      ctx.moveTo(-s, s * 0.25);
      ctx.quadraticCurveTo(-s * 0.5, -s * 0.6, 0, s * 0.25);
      ctx.quadraticCurveTo(s * 0.5, s * 0.9, s, s * 0.25);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-s, -s * 0.35);
      ctx.quadraticCurveTo(-s * 0.5, -s, 0, -s * 0.35);
      ctx.quadraticCurveTo(s * 0.5, s * 0.2, s, -s * 0.35);
      ctx.stroke();
      break;
    case 'spawn': // zombie head with two dark eyes
      ctx.beginPath(); ctx.arc(0, 0, s * 0.8, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#0e1018';
      ctx.beginPath(); ctx.arc(-s * 0.28, -s * 0.18, s * 0.15, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc( s * 0.28, -s * 0.18, s * 0.15, 0, Math.PI*2); ctx.fill();
      break;
    case 'loadout': // package with cross-tape
      ctx.fillRect(-s * 0.7, -s * 0.6, s * 1.4, s * 1.2);
      ctx.fillStyle = '#0e1018';
      ctx.fillRect(-s * 0.08, -s * 0.6, s * 0.16, s * 1.2);
      ctx.fillRect(-s * 0.7, -s * 0.08, s * 1.4, s * 0.16);
      break;
    case 'audio': // speaker
      ctx.fillRect(-s * 0.6, -s * 0.35, s * 0.35, s * 0.7);
      ctx.beginPath();
      ctx.moveTo(-s * 0.25, -s * 0.7);
      ctx.lineTo( s * 0.4,  -s * 0.3);
      ctx.lineTo( s * 0.4,   s * 0.3);
      ctx.lineTo(-s * 0.25,  s * 0.7);
      ctx.closePath(); ctx.fill();
      break;
    case 'abilities': // lightning bolt
      ctx.beginPath();
      ctx.moveTo( s * 0.15, -s);
      ctx.lineTo(-s * 0.45, s * 0.1);
      ctx.lineTo( s * 0.0,  s * 0.1);
      ctx.lineTo(-s * 0.2,   s);
      ctx.lineTo( s * 0.5, -s * 0.1);
      ctx.lineTo( s * 0.05, -s * 0.1);
      ctx.closePath(); ctx.fill();
      break;
    case 'pets': // paw print
      ctx.beginPath(); ctx.arc(0, s * 0.25, s * 0.42, 0, Math.PI*2); ctx.fill();
      for (let i = 0; i < 4; i++) {
        const ax = -s * 0.55 + i * s * 0.37;
        ctx.beginPath(); ctx.arc(ax, -s * 0.4, s * 0.18, 0, Math.PI*2); ctx.fill();
      }
      break;
    case 'events': // 8-point burst
      ctx.beginPath();
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2;
        const r = i % 2 === 0 ? s : s * 0.45;
        const px = Math.cos(a) * r, py = Math.sin(a) * r;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath(); ctx.fill();
      break;
    case 'trader': // coin with $
      ctx.beginPath(); ctx.arc(0, 0, s * 0.85, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#0e1018';
      ctx.font = 'bold ' + Math.max(8, Math.round(s * 1.3)) + 'px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText('$', 0, s * 0.45);
      ctx.textAlign = 'left';
      break;
    case 'primary-basic':
    case 'primary-special':
    case 'primary-gag':
    case 'primary-godtier':
    case 'primary-trader': // gun silhouette — barrel + grip
      ctx.fillRect(-s * 0.8, -s * 0.15, s * 1.5, s * 0.35);
      ctx.fillRect(-s * 0.65, s * 0.2, s * 0.3, s * 0.5);
      // muzzle
      ctx.fillStyle = '#0e1018';
      ctx.fillRect(s * 0.55, -s * 0.05, s * 0.2, s * 0.12);
      break;
    case 'secondary-melee': // sword
      ctx.fillRect(-s * 0.7, -s * 0.08, s * 1.4, s * 0.18); // blade
      ctx.fillRect(-s * 0.8, -s * 0.25, s * 0.15, s * 0.5); // pommel
      ctx.fillRect(-s * 0.65, -s * 0.35, s * 0.1, s * 0.7); // guard
      break;
    case 'secondary-thrown': // throwing-knife triangle + ring
      ctx.beginPath();
      ctx.moveTo( s,        0);
      ctx.lineTo(-s * 0.2, -s * 0.35);
      ctx.lineTo(-s * 0.2,  s * 0.35);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.4;
      ctx.beginPath(); ctx.arc(-s * 0.6, 0, s * 0.28, 0, Math.PI*2); ctx.stroke();
      break;
    case 'secondary-utility': // medical cross
      ctx.fillRect(-s * 0.18, -s * 0.7, s * 0.36, s * 1.4);
      ctx.fillRect(-s * 0.7, -s * 0.18, s * 1.4, s * 0.36);
      break;
    case 'secondary-tomes': // book with spine line
      ctx.fillRect(-s * 0.7, -s * 0.85, s * 1.4, s * 1.7);
      ctx.fillStyle = '#0e1018';
      ctx.fillRect(-s * 0.05, -s * 0.85, s * 0.1, s * 1.7);
      // small bookmark
      ctx.fillStyle = color;
      ctx.fillRect(s * 0.35, -s * 0.85, s * 0.18, s * 0.6);
      break;
    case 'stats': // horizontal slider track + knob
      ctx.fillRect(-s * 0.8, -s * 0.08, s * 1.6, s * 0.16);
      ctx.beginPath(); ctx.arc(s * 0.15, 0, s * 0.3, 0, Math.PI*2); ctx.fill();
      break;
  }
  ctx.restore();
}

// Per-section accent colors. Picked to echo each section's role in-game so
// the visual identity carries through to the cheats panel.
function cheatSectionColor(id) {
  switch (id) {
    case 'player':            return '#7ec8ff';
    case 'waves':             return '#ff5050';
    case 'spawn':             return '#ff8060';
    case 'loadout':           return '#5a87c4';
    case 'audio':             return '#9aa0ab';
    case 'coop':              return '#9bf07a';
    case 'abilities':         return '#5cffec';
    case 'pets':              return '#80ffe0';
    case 'events':            return '#ffd166';
    case 'trader':            return '#c47eff';
    case 'primary-basic':     return '#7ec8ff';
    case 'primary-special':   return '#c47eff';
    case 'primary-gag':       return '#ffd166';
    case 'primary-trader':    return '#c47eff';
    case 'primary-godtier':   return '#ff2030';
    case 'secondary-melee':   return '#e8edf4';
    case 'secondary-thrown':  return '#8aa0b4';
    case 'secondary-utility': return '#5cd86b';
    case 'secondary-tomes':   return '#c47eff';
    default:                  return '#88aadd';
  }
}

function drawCheats() {
  // hidden until the player enters the unlock code
  if (!cheatsUnlocked) {
    cheatsHeaderRect = null;
    cheatsResizeRect = null;
    slidersHeaderRect = null;
    cheatsTabRects = [];
    for (const sec of cheatSections) {
      sec.headerRect = null;
      for (const c of sec.items) c.rect = null;
    }
    for (const s of cheatSliders) s.rect = null;
    return;
  }
  const x = cheatsPanel.x, y = cheatsPanel.y;
  const header = 26, secHeaderH = 24;
  const tabH = 22; // height of the tab bar shown when panel is open
  // Panel width is user-resizable via the right-edge handle (clamped in
  // mousemove). Items per row is computed from the current width.
  const w = cheatsPanel.w;
  const padPanel = 6;
  const itemW = 100;
  const itemH = 22;
  const itemGap = 2;
  const sliderRowH = 22;
  const itemsPerRow = Math.max(1, Math.floor((w - padPanel * 2) / (itemW + itemGap)));
  // Section taxonomy: which tab each section belongs to.
  const isWeaponSec = (sec) => sec.id.startsWith('primary-') || sec.id.startsWith('secondary-');
  const visibleSections = cheatSections.filter(sec => {
    return cheatsTab === 'weapons' ? isWeaponSec(sec) : !isWeaponSec(sec);
  });
  // STATS slider section only shows on the 'general' tab — it's not weapons.
  const showSliders = cheatsTab === 'general';
  // Compute body height by walking the same layout we'll use below
  function sectionContentH(sec) {
    if (!sec.open) return 0;
    const rows = Math.ceil(sec.items.length / itemsPerRow);
    return rows * (itemH + itemGap) + 4;
  }
  let bodyH = 0;
  if (cheatsOpen) {
    bodyH += tabH + 4; // tab bar
    for (const sec of visibleSections) {
      bodyH += secHeaderH + 2 + sectionContentH(sec);
    }
    if (showSliders) {
      bodyH += secHeaderH + 2;
      if (slidersOpen) bodyH += cheatSliders.length * (sliderRowH + 2) + 6;
    }
  }
  // autoH is the panel height needed to show everything. If the user has
  // explicitly set cheatsPanel.h via the corner handle, honor that and let
  // overflow content scroll inside the body region.
  const autoH = cheatsOpen ? header + bodyH + 6 : header;
  const h = cheatsOpen
    ? (cheatsPanel.h != null ? Math.max(header + 40, cheatsPanel.h) : autoH)
    : header;
  // Compute scroll bounds — if the user-set height is shorter than the auto
  // content height, the difference is scrollable.
  cheatsMaxScroll = Math.max(0, autoH - h);
  if (cheatsScrollY > cheatsMaxScroll) cheatsScrollY = cheatsMaxScroll;
  if (cheatsScrollY < 0) cheatsScrollY = 0;
  // Outer panel — slightly more opaque than before, single-pixel border
  ctx.fillStyle = 'rgba(10, 12, 18, 0.96)';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = godMode ? '#8be08b' : '#33363f';
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);

  // Top header — drag handle + title + master chevron
  ctx.fillStyle = cheatsDrag ? '#1c2030' : '#0e1018';
  ctx.fillRect(x, y, w, header);
  // bottom 1px divider for the header
  ctx.fillStyle = '#22252e';
  ctx.fillRect(x, y + header - 1, w, 1);
  // grip dots (top-left)
  ctx.fillStyle = '#5a87c4';
  for (let k = 0; k < 3; k++) {
    ctx.fillRect(x + 6, y + 9 + k * 4, 3, 2);
    ctx.fillRect(x + 12, y + 9 + k * 4, 3, 2);
  }
  ctx.fillStyle = '#a8c5f0';
  ctx.font = 'bold 12px system-ui';
  ctx.textAlign = 'left';
  ctx.fillText('CHEATS', x + 24, y + 17);
  ctx.fillStyle = '#9aa0ab';
  ctx.textAlign = 'right';
  ctx.font = '12px system-ui';
  ctx.fillText(cheatsOpen ? '▾' : '▸', x + w - 10, y + 17);
  ctx.textAlign = 'left';

  cheatsHeaderRect = { x, y, w, h: header };

  if (!cheatsOpen) {
    slidersHeaderRect = null;
    cheatsResizeRect = null;
    cheatsTabRects = [];
    for (const sec of cheatSections) {
      sec.headerRect = null;
      for (const c of sec.items) c.rect = null;
    }
    for (const s of cheatSliders) s.rect = null;
    return;
  }

  // ---- Tab bar (general / weapons) — drawn ABOVE the scrolling body ----
  const tabs = [
    { id: 'general', label: 'General', color: '#7ec8ff' },
    { id: 'weapons', label: 'Weapons', color: '#c47eff' },
  ];
  const tabY = y + header + 4;
  const tabW = (w - padPanel * 2 - 4) / tabs.length;
  cheatsTabRects = [];
  for (let i = 0; i < tabs.length; i++) {
    const t = tabs[i];
    const tx = x + padPanel + i * (tabW + 4);
    const active = cheatsTab === t.id;
    const hover = pointInRect(mouse, { x: tx, y: tabY, w: tabW, h: tabH });
    ctx.fillStyle = active ? t.color : (hover ? '#1c2030' : '#10131c');
    ctx.fillRect(tx, tabY, tabW, tabH);
    ctx.strokeStyle = active ? '#fff' : '#33363f';
    ctx.lineWidth = 1;
    ctx.strokeRect(tx + 0.5, tabY + 0.5, tabW - 1, tabH - 1);
    ctx.fillStyle = active ? '#0e1018' : '#cfd3da';
    ctx.font = 'bold 11px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(t.label, tx + tabW / 2, tabY + 15);
    cheatsTabRects.push({ x: tx, y: tabY, w: tabW, h: tabH, id: t.id });
  }
  ctx.textAlign = 'left';

  // ---- Vertical section list with horizontal-wrap items per open section ----
  // Body clip: everything from below the tab bar to just above the corner
  // resize handle. Anything beyond the visible body gets scrolled via cheatsScrollY.
  const bodyClipTop = tabY + tabH + 4;
  const bodyClipBottom = y + h - 6;
  const bodyClipH = Math.max(0, bodyClipBottom - bodyClipTop);
  cheatsBodyRect = { x, y: bodyClipTop, w, h: bodyClipH };
  ctx.save();
  ctx.beginPath();
  ctx.rect(x + 1, bodyClipTop, w - 2, bodyClipH);
  ctx.clip();
  ctx.translate(0, -cheatsScrollY);

  let by = tabY + tabH + 4;

  // Clear hit-rects for sections on the inactive tab so clicks don't fire
  // through to invisible items.
  for (const sec of cheatSections) {
    if (!visibleSections.includes(sec)) {
      sec.headerRect = null;
      for (const c of sec.items) c.rect = null;
    }
  }

  // Helper that draws a full-width section header (vertical-stack style).
  const drawSectionHeader = (sec, accent, name, isStats = false) => {
    const rect = { x: x + padPanel, y: by, w: w - padPanel * 2, h: secHeaderH, sec };
    if (sec) sec.headerRect = rect;
    if (isStats) slidersHeaderRect = rect;
    const open = sec ? sec.open : slidersOpen;
    const hover = pointInRect(mouse, rect);
    ctx.fillStyle = open ? '#161924' : (hover ? '#1a1d28' : '#10131c');
    ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
    // Left accent stripe in section color
    ctx.fillStyle = accent;
    ctx.fillRect(rect.x, rect.y, 3, rect.h);
    // Icon + name
    drawCheatSectionIcon(isStats ? 'stats' : sec.id, rect.x + 16, rect.y + rect.h / 2, 12, accent);
    ctx.fillStyle = open ? accent : '#cfd3da';
    ctx.font = 'bold 10px system-ui';
    ctx.textAlign = 'left';
    ctx.fillText(name.toUpperCase(), rect.x + 28, rect.y + 15);
    // Item count when closed + chevron
    if (!open && sec) {
      ctx.fillStyle = '#5a5d66';
      ctx.font = '9px system-ui';
      ctx.textAlign = 'right';
      ctx.fillText(`${sec.items.length}`, rect.x + rect.w - 20, rect.y + 15);
    }
    ctx.fillStyle = open ? accent : '#5a5d66';
    ctx.font = '10px system-ui';
    ctx.textAlign = 'right';
    ctx.fillText(open ? '▾' : '▸', rect.x + rect.w - 6, rect.y + 15);
    ctx.textAlign = 'left';
  };

  for (const sec of visibleSections) {
    const accent = cheatSectionColor(sec.id);
    drawSectionHeader(sec, accent, sec.name);
    by += secHeaderH + 2;

    if (!sec.open) {
      for (const c of sec.items) c.rect = null;
      continue;
    }

    // Items lay out left-to-right inside the section's row block, wrapping
    // to additional rows when they overflow the panel width.
    let col = 0;
    let iy = by;
    for (const c of sec.items) {
      const isOn = c.toggle ? c.toggle() : false;
      const ix = x + padPanel + col * (itemW + itemGap);
      const rect = { x: ix, y: iy, w: itemW, h: itemH };
      c.rect = rect;
      const bhov = pointInRect(mouse, rect);
      // Body fill
      if (isOn) ctx.fillStyle = '#1e3a26';
      else if (bhov) ctx.fillStyle = '#1c2030';
      else ctx.fillStyle = '#14171f';
      ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
      // Faint accent stripe along the top
      ctx.save();
      ctx.globalAlpha = isOn ? 0.95 : (bhov ? 0.6 : 0.25);
      ctx.fillStyle = accent;
      ctx.fillRect(rect.x, rect.y, rect.w, 2);
      ctx.restore();
      // Label
      const labelStr = typeof c.label === 'function' ? c.label() : c.label;
      ctx.fillStyle = isOn ? '#bff0bf' : (bhov ? '#fff' : '#dfe2e8');
      const rightPad = c.toggle ? 18 : 4;
      fitFont(labelStr, rect.w - 8 - rightPad, 'bold 10px system-ui', 8);
      ctx.textAlign = 'left';
      ctx.fillText(labelStr, rect.x + 6, rect.y + 14);
      // Toggle dot — small green pulse when on, dim ring when off
      if (c.toggle) {
        const dx = rect.x + rect.w - 10;
        const dy = rect.y + rect.h / 2;
        if (isOn) {
          ctx.fillStyle = 'rgba(139, 224, 139, 0.35)';
          ctx.beginPath(); ctx.arc(dx, dy, 6, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#8be08b';
          ctx.beginPath(); ctx.arc(dx, dy, 3.5, 0, Math.PI * 2); ctx.fill();
        } else {
          ctx.strokeStyle = '#3a3d46';
          ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.arc(dx, dy, 4, 0, Math.PI * 2); ctx.stroke();
        }
      }
      // advance to next slot in row, wrap if needed
      col++;
      if (col >= itemsPerRow) {
        col = 0;
        iy += itemH + itemGap;
      }
    }
    // Move by past the last row of items (account for partial row)
    by = iy + (col > 0 ? itemH + itemGap : 0) + 4;
  }

  // STATS section — only on the General tab (it's not weapons)
  if (showSliders) {
    const statsColor = '#9aa0ab';
    drawSectionHeader(null, statsColor, 'Stats', true);
    by += secHeaderH + 2;

    if (slidersOpen) {
      // Sliders stacked vertically — each spans the full panel width
      const trackX = x + padPanel + 90;
      const trackW = w - padPanel * 2 - 90 - 40;
      const knobR = 5;
      for (const s of cheatSliders) {
        const rect = { x: x + padPanel, y: by, w: w - padPanel * 2, h: sliderRowH, trackX, trackW, trackY: by + 11 };
        s.rect = rect;
        ctx.fillStyle = '#9aa0ab';
        ctx.font = 'bold 10px system-ui';
        ctx.textAlign = 'left';
        ctx.fillText(s.label, x + padPanel + 6, by + 14);
        // Track
        ctx.fillStyle = '#1c1f28';
        ctx.fillRect(trackX, by + 8, trackW, 6);
        ctx.strokeStyle = '#33363f';
        ctx.lineWidth = 1;
        ctx.strokeRect(trackX, by + 8, trackW, 6);
        // Fill + knob
        const val = s.get();
        const t = Math.max(0, Math.min(1, (val - s.min) / (s.max - s.min)));
        ctx.fillStyle = '#5a87c4';
        ctx.fillRect(trackX, by + 8, trackW * t, 6);
        ctx.fillStyle = sliderDrag && sliderDrag.slider === s ? '#fff' : '#88aadd';
        ctx.beginPath();
        ctx.arc(trackX + trackW * t, by + 11, knobR, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#0a0a0a';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px system-ui';
        ctx.textAlign = 'right';
        const display = s.step < 1 ? val.toFixed(1) : Math.round(val).toString();
        ctx.fillText(display, x + w - padPanel - 4, by + 14);
        ctx.textAlign = 'left';
        by += sliderRowH + 2;
      }
    } else {
      for (const s of cheatSliders) s.rect = null;
    }
  } else {
    // STATS hidden on the weapons tab — clear its hit-rects
    slidersHeaderRect = null;
    for (const s of cheatSliders) s.rect = null;
  }

  // End of the clipped + translated body region — restore canvas state so the
  // resize handle and scrollbar draw at fixed screen positions.
  ctx.restore();

  // Shift every hit-test rect we just stored into screen-space (the translate
  // moved drawing up by cheatsScrollY, but rects were captured at content y).
  const sy = cheatsScrollY;
  if (sy !== 0) {
    for (const sec of visibleSections) {
      if (sec.headerRect) sec.headerRect = { ...sec.headerRect, y: sec.headerRect.y - sy };
      if (sec.open) {
        for (const c of sec.items) {
          if (c.rect) c.rect = { ...c.rect, y: c.rect.y - sy };
        }
      }
    }
    if (slidersHeaderRect) slidersHeaderRect = { ...slidersHeaderRect, y: slidersHeaderRect.y - sy };
    for (const s of cheatSliders) {
      if (s.rect) {
        s.rect = { ...s.rect, y: s.rect.y - sy, trackY: s.rect.trackY - sy };
      }
    }
  }
  // Drop rects that scrolled entirely outside the visible body so clicks
  // on hidden rows don't register.
  const inBody = r => r && r.y + r.h > bodyClipTop && r.y < bodyClipBottom;
  for (const sec of visibleSections) {
    if (!inBody(sec.headerRect)) sec.headerRect = null;
    if (sec.open) {
      for (const c of sec.items) if (!inBody(c.rect)) c.rect = null;
    }
  }
  if (!inBody(slidersHeaderRect)) slidersHeaderRect = null;
  for (const s of cheatSliders) if (!inBody(s.rect)) s.rect = null;

  // Scrollbar on the right edge when the body overflows
  if (cheatsMaxScroll > 0) {
    const trackX = x + w - 12, trackY = bodyClipTop + 2, trackH = bodyClipH - 4;
    ctx.fillStyle = 'rgba(80, 90, 110, 0.18)';
    ctx.fillRect(trackX, trackY, 3, trackH);
    const thumbH = Math.max(24, trackH * (bodyClipH / (bodyClipH + cheatsMaxScroll)));
    const thumbY = trackY + (trackH - thumbH) * (cheatsScrollY / cheatsMaxScroll);
    ctx.fillStyle = '#5a87c4';
    ctx.fillRect(trackX, thumbY, 3, thumbH);
  }

  // Corner resize handle (bottom-right) — drag to resize both width and height
  const handleSize = 14;
  cheatsResizeRect = { x: x + w - handleSize, y: y + h - handleSize, w: handleSize, h: handleSize };
  const hovHandle = pointInRect(mouse, cheatsResizeRect) || cheatsResize;
  ctx.fillStyle = hovHandle ? '#5a87c4' : '#3a3d46';
  // Three diagonal dashes hint at "drag to resize"
  for (let k = 0; k < 3; k++) {
    const off = 3 + k * 3;
    ctx.fillRect(cheatsResizeRect.x + cheatsResizeRect.w - off - 4, cheatsResizeRect.y + cheatsResizeRect.h - off, 4, 1.5);
  }
}

// Convert a slider's mouse-x into its bound value, snapped to its step.
function sliderValueAt(s, mx) {
  const t = Math.max(0, Math.min(1, (mx - s.rect.trackX) / s.rect.trackW));
  let v = s.min + t * (s.max - s.min);
  v = Math.round(v / s.step) * s.step;
  if (s.step < 1) v = parseFloat(v.toFixed(2));
  return v;
}

function drawBladeSwapPrompt() {
  const cur = player.secondary ? SECONDARIES[player.secondary] : null;
  const newSec = SECONDARIES[nearbyBladeCrate.secondary];
  if (!newSec) return;
  const w = 460, h = 124;
  const x = (W - w) / 2;
  // sit just above the gun-swap prompt area (or wherever else is free)
  const y = H - h - 160;
  ctx.fillStyle = 'rgba(10, 12, 18, 0.92)';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = newSec.color;
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, w, h);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('UTILITY CRATE', x + w / 2, y + 20);

  const drawSlot = (xs, ys, def, label, align) => {
    if (!def) {
      ctx.fillStyle = '#33363f';
      ctx.fillRect(xs, ys, 28, 28);
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 1;
      ctx.strokeRect(xs, ys, 28, 28);
      ctx.fillStyle = '#888c95';
      ctx.font = 'italic 11px system-ui';
      ctx.textAlign = 'left';
      ctx.fillText('(none)', xs + 36, ys + 18);
      return;
    }
    ctx.fillStyle = def.color;
    ctx.fillRect(xs, ys, 28, 28);
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 1;
    ctx.strokeRect(xs, ys, 28, 28);
    ctx.fillStyle = '#1a1a1a';
    ctx.font = 'bold 15px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(def.tag, xs + 14, ys + 20);
    ctx.fillStyle = '#888c95';
    ctx.font = '10px system-ui';
    ctx.textAlign = align;
    ctx.fillText(label, align === 'left' ? xs : xs + 28, ys - 4);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px system-ui';
    ctx.fillText(def.name, align === 'left' ? xs + 36 : xs - 8, ys + 18);
  };
  drawSlot(x + 24, y + 46, cur, 'CURRENT', 'left');
  drawSlot(x + w - 24 - 28, y + 46, newSec, 'NEW', 'right');

  ctx.fillStyle = '#7ec8ff';
  ctx.font = 'bold 22px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('→', x + w / 2, y + 64);

  // confirm button
  swapBladeBtn.w = 130; swapBladeBtn.h = 30;
  swapBladeBtn.x = x + w - swapBladeBtn.w - 14;
  swapBladeBtn.y = y + h - swapBladeBtn.h - 10;
  const hover = pointInRect(mouse, swapBladeBtn);
  ctx.fillStyle = hover ? '#3a3a7a' : '#2a2a4a';
  ctx.fillRect(swapBladeBtn.x, swapBladeBtn.y, swapBladeBtn.w, swapBladeBtn.h);
  ctx.strokeStyle = hover ? '#9aa0ff' : newSec.color;
  ctx.lineWidth = 2;
  ctx.strokeRect(swapBladeBtn.x, swapBladeBtn.y, swapBladeBtn.w, swapBladeBtn.h);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('[F] Equip', swapBladeBtn.x + swapBladeBtn.w / 2, swapBladeBtn.y + 20);

  ctx.fillStyle = '#888c95';
  ctx.font = '11px system-ui';
  ctx.textAlign = 'left';
  ctx.fillText('walk away to keep current', x + 14, y + h - 18);
  ctx.textAlign = 'left';
}

function drawSwapPrompt() {
  const cur = WEAPONS[player.weapon];
  const newW = WEAPONS[nearbyGun.weapon];
  const w = 480, h = 150;
  const x = (W - w) / 2, y = H - h - 24;
  ctx.fillStyle = 'rgba(10, 12, 18, 0.92)';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = newW.color;
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, w, h);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('WEAPON FOUND', x + w / 2, y + 22);

  // current weapon (left)
  const drawSlot = (xs, ys, wpn, label, align) => {
    ctx.fillStyle = wpn.color;
    ctx.fillRect(xs, ys, 28, 28);
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 1;
    ctx.strokeRect(xs, ys, 28, 28);
    ctx.fillStyle = '#1a1a1a';
    ctx.font = 'bold 15px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(wpn.tag, xs + 14, ys + 20);
    ctx.fillStyle = '#888c95';
    ctx.font = '10px system-ui';
    ctx.textAlign = align;
    ctx.fillText(label, align === 'left' ? xs : xs + 28, ys - 4);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px system-ui';
    ctx.fillText(wpn.name, align === 'left' ? xs + 36 : xs - 8, ys + 18);
  };
  drawSlot(x + 24, y + 50, cur, 'CURRENT', 'left');
  drawSlot(x + w - 24 - 28, y + 50, newW, 'NEW', 'right');

  // arrow
  ctx.fillStyle = '#7ec8ff';
  ctx.font = 'bold 22px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('→', x + w / 2, y + 70);

  // stat compare row
  const stat = (k, a, b) => {
    const better = parseFloat(b) > parseFloat(a);
    const worse  = parseFloat(b) < parseFloat(a);
    return [k, a, b, better ? '#5cb85c' : worse ? '#d36' : '#fff'];
  };
  // lockedRate weapons show their fixed fireRate instead of multiplying
  // the player's upgrades through (upgrades don't apply to them).
  const curRate = (cur.lockedRate ? cur.fireRate : player.fireRate * cur.fireRate).toFixed(2);
  const newRate = (newW.lockedRate ? newW.fireRate : player.fireRate * newW.fireRate).toFixed(2);
  const rows = [
    stat('Dmg',    (player.damage * cur.damage).toFixed(1),                (player.damage * newW.damage).toFixed(1)),
    stat('Rate',   curRate,                                                newRate),
    stat('Shots',  cur.shots,                                              newW.shots),
    stat('Pierce', cur.pierce + player.pierce,                             newW.pierce + player.pierce),
  ];
  ctx.font = '11px system-ui';
  let ly = y + 96;
  for (const [k, a, b, col] of rows) {
    ctx.fillStyle = '#888c95';
    ctx.textAlign = 'center';
    ctx.fillText(k, x + w / 2, ly);
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'left';
    ctx.fillText(String(a), x + 80, ly);
    ctx.fillStyle = col;
    ctx.textAlign = 'right';
    ctx.fillText(String(b), x + w - 80, ly);
    ly += 13;
  }

  // swap button (positioned dynamically so click hit-test stays in sync)
  swapBtn.w = 130; swapBtn.h = 30;
  swapBtn.x = x + w - swapBtn.w - 14;
  swapBtn.y = y + h - swapBtn.h - 10;
  const hover = pointInRect(mouse, swapBtn);
  ctx.fillStyle = hover ? '#3a7a3a' : '#2a4a2a';
  ctx.fillRect(swapBtn.x, swapBtn.y, swapBtn.w, swapBtn.h);
  ctx.strokeStyle = hover ? '#8be08b' : '#5cb85c';
  ctx.lineWidth = 2;
  ctx.strokeRect(swapBtn.x, swapBtn.y, swapBtn.w, swapBtn.h);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 13px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('[E] Swap', swapBtn.x + swapBtn.w / 2, swapBtn.y + 20);

  ctx.fillStyle = '#888c95';
  ctx.font = '11px system-ui';
  ctx.textAlign = 'left';
  ctx.fillText('walk away to keep current', x + 14, y + h - 18);

  ctx.textAlign = 'left';
}

function drawStats() {
  const w = WEAPONS[player.weapon] || WEAPONS.pistol;
  const sec = player.secondary && SECONDARIES[player.secondary];
  const unlockedAbilities = ABILITY_KEYS.filter(k => player.abilities[k]);
  const pw = 200;
  // base 168 + secondary row + per-ability row + section header
  const abilHeader = 16;
  const abilRow = 22;
  const ph = 168
    + (sec ? 30 : 0)
    + (unlockedAbilities.length ? abilHeader + unlockedAbilities.length * abilRow + 6 : 0);
  const px = W - pw - 14, py = H - ph - 14;
  ctx.fillStyle = 'rgba(10, 12, 18, 0.88)';
  ctx.fillRect(px, py, pw, ph);
  ctx.strokeStyle = '#33363f';
  ctx.lineWidth = 1;
  ctx.strokeRect(px, py, pw, ph);

  // Primary weapon — dark cell with the actual gun silhouette inside
  ctx.fillStyle = '#0d0f16';
  ctx.fillRect(px + 12, py + 12, 28, 22);
  ctx.strokeStyle = w.color;
  ctx.lineWidth = 1;
  ctx.strokeRect(px + 12 + 0.5, py + 12 + 0.5, 27, 21);
  drawShopWeaponIcon(player.weapon, px + 26, py + 23, 18);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 15px system-ui';
  ctx.textAlign = 'left';
  ctx.fillText(w.name, px + 48, py + 28);

  // divider
  ctx.fillStyle = '#22252e';
  ctx.fillRect(px + 12, py + 42, pw - 24, 1);

  // lockedRate weapons (e.g. Spaghetti Beam) ignore the player's fireRate
  // upgrades, so the displayed rate is the raw weapon value.
  const effRate = (w.lockedRate ? w.fireRate : player.fireRate * w.fireRate).toFixed(1);
  const rows = [
    ['Damage',    (player.damage * w.damage).toFixed(1)],
    ['Fire Rate', effRate + '/s' + (w.lockedRate ? ' · fixed' : '')],
    ['Bullet Sp', Math.round(player.bulletSpeed * w.bulletSpeed)],
    ['Pierce',    w.pierce + player.pierce],
    ['Speed',     Math.round(player.speed)],
    ['Max HP',    player.maxHp],
  ];
  ctx.font = '12px system-ui';
  let ly = py + 60;
  for (const [k, v] of rows) {
    ctx.fillStyle = '#888c95';
    ctx.textAlign = 'left';
    ctx.fillText(k, px + 12, ly);
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'right';
    ctx.fillText(String(v), px + pw - 12, ly);
    ly += 18;
  }
  ctx.textAlign = 'left';

  // Secondary blade row + cooldown bar (only shown when one is equipped)
  let rowY = py + 168;
  if (sec) {
    ctx.fillStyle = '#22252e';
    ctx.fillRect(px + 12, rowY - 8, pw - 24, 1);
    // Secondary — dark cell with the secondary's model icon inside
    ctx.fillStyle = '#0d0f16';
    ctx.fillRect(px + 12, rowY, 22, 18);
    ctx.strokeStyle = sec.color;
    ctx.lineWidth = 1;
    ctx.strokeRect(px + 12 + 0.5, rowY + 0.5, 21, 17);
    drawShopSecondaryIcon(player.secondary, px + 23, rowY + 9, 16);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px system-ui';
    ctx.fillText(sec.name, px + 40, rowY + 12);
    ctx.fillStyle = '#888c95';
    ctx.font = '10px system-ui';
    ctx.textAlign = 'right';
    ctx.fillText('RMB / Q', px + pw - 12, rowY + 9);
    ctx.textAlign = 'left';
    const elapsed = gameTime - player.lastSecondary;
    const ratio = Math.max(0, Math.min(1, elapsed / sec.cooldown));
    const barW = pw - 24, barH = 5;
    const bx = px + 12, by = rowY + 14;
    ctx.fillStyle = '#1d1f26';
    ctx.fillRect(bx, by, barW, barH);
    ctx.fillStyle = ratio >= 1 ? sec.color : '#5a5d66';
    ctx.fillRect(bx, by, barW * ratio, barH);
    rowY += 28;
  }
  // Abilities section — every unlocked ability with cooldown bar + selection
  // highlight. Cycled via Tab / scroll wheel; fired with Shift.
  if (unlockedAbilities.length) {
    ctx.fillStyle = '#22252e';
    ctx.fillRect(px + 12, rowY - 4, pw - 24, 1);
    ctx.fillStyle = '#88aadd';
    ctx.font = 'bold 10px system-ui';
    ctx.textAlign = 'left';
    ctx.fillText('ABILITIES  ·  Tab / scroll  ·  Shift', px + 12, rowY + 8);
    rowY += abilHeader;
    const curKey = ABILITY_KEYS[selectedAbility];
    for (const id of unlockedAbilities) {
      const def = ABILITIES[id];
      const isSelected = id === curKey;
      const cd = id === 'dash'
        ? def.cooldown * (1 - (player.special.quickstep || 0))
        : def.cooldown;
      const elapsed = gameTime - (player.abilityLast[id] || -Infinity);
      const ratio = Math.max(0, Math.min(1, elapsed / cd));
      const ready = ratio >= 1;
      // selection backdrop
      if (isSelected) {
        ctx.fillStyle = 'rgba(126, 200, 255, 0.10)';
        ctx.fillRect(px + 8, rowY - 1, pw - 16, abilRow);
        ctx.strokeStyle = '#7ec8ff';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(px + 8, rowY - 1, pw - 16, abilRow);
      }
      // color swatch
      ctx.fillStyle = def.color;
      ctx.fillRect(px + 12, rowY + 2, 8, 8);
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 1;
      ctx.strokeRect(px + 12, rowY + 2, 8, 8);
      // name
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 11px system-ui';
      ctx.textAlign = 'left';
      fitFont(def.name, pw - 80, 'bold 11px system-ui', 9);
      ctx.fillText(def.name, px + 24, rowY + 9);
      // hotkey hint — Shift fires the selected one
      ctx.fillStyle = '#888c95';
      ctx.font = '9px system-ui';
      ctx.textAlign = 'right';
      ctx.fillText(isSelected ? 'Shift' : (id === 'dash' ? '—' : def.key.slice(3)), px + pw - 12, rowY + 9);
      ctx.textAlign = 'left';
      // cooldown bar
      const barW = pw - 28, barH = 3;
      const bx = px + 14, by = rowY + 14;
      ctx.fillStyle = '#1d1f26';
      ctx.fillRect(bx, by, barW, barH);
      ctx.fillStyle = ready ? def.color : '#5a5d66';
      ctx.fillRect(bx, by, barW * ratio, barH);
      rowY += abilRow;
    }
  }
}

function drawWaveBanner() {
  // Boss HP bar — shown whenever any boss is alive (covers cheat-spawned bosses too)
  {
    const allBosses = zombies.filter(z => z.isBoss);
    const boss = allBosses[0];
    if (boss) {
      const bw = 540, bh = 18;
      const bx = (W - bw) / 2, by = 14;
      ctx.fillStyle = 'rgba(20, 5, 5, 0.85)';
      ctx.fillRect(bx, by, bw, bh);
      // For boss rush, draw a combined HP bar across all live bosses.
      let curHp, maxHp;
      if (allBosses.length > 1) {
        curHp = 0; maxHp = 0;
        for (const b of allBosses) { curHp += Math.max(0, b.hp); maxHp += b.hpMax; }
      } else {
        curHp = Math.max(0, boss.hp); maxHp = boss.hpMax;
      }
      ctx.fillStyle = '#ff3838';
      ctx.fillRect(bx, by, bw * curHp / maxHp, bh);
      ctx.strokeStyle = '#ff8080';
      ctx.lineWidth = 2;
      ctx.strokeRect(bx, by, bw, bh);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 12px system-ui';
      ctx.textAlign = 'center';
      let bossLabel;
      if (allBosses.length > 1) {
        bossLabel = `BOSS RUSH  ·  ${allBosses.length} REMAINING  ·  WAVE ${wave}`;
      } else {
        bossLabel = boss.bossName ? `${boss.bossName.toUpperCase()}  ·  WAVE ${wave}` : `BOSS — WAVE ${wave}`;
      }
      ctx.fillText(bossLabel, W / 2, by + 13);
      ctx.textAlign = 'left';
    }
  }
  // Intermission countdown — center of screen, big.
  // Skip it in training mode (no waves) and while a perk pick is pending
  // (the card UI takes over this screen space).
  if (intermission > 0 && !pendingCards && !trainingMode) {
    ctx.fillStyle = 'rgba(0,0,0,0.42)';
    const tw = 400, th = 80;
    ctx.fillRect((W - tw) / 2, H / 2 - th / 2 - 100, tw, th);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px system-ui';
    ctx.textAlign = 'center';
    const next = wave + 1;
    let label;
    if (next % 20 === 0) {
      // Preview the next boss's name on the intermission banner
      const nextBossNum = Math.max(1, Math.floor(next / 20));
      const nextBossDef = BOSS_TYPES[(nextBossNum - 1) % BOSS_TYPES.length];
      label = `BOSS WAVE ${next}  ·  ${nextBossDef.name}`;
    } else {
      label = `Wave ${next}`;
    }
    ctx.fillText(label, W / 2, H / 2 - 100);
    ctx.fillStyle = '#9aa0ab';
    ctx.font = '13px system-ui';
    ctx.fillText(`Ready when you are  ·  go to shop, then start`, W / 2, H / 2 - 78);
    ctx.textAlign = 'left';

    // Skip button
    const hovered = pointInRect(mouse, skipBtn);
    ctx.fillStyle = hovered ? '#3a7a3a' : '#2a4a2a';
    ctx.fillRect(skipBtn.x, skipBtn.y, skipBtn.w, skipBtn.h);
    ctx.strokeStyle = hovered ? '#8be08b' : '#5cb85c';
    ctx.lineWidth = 2;
    ctx.strokeRect(skipBtn.x, skipBtn.y, skipBtn.w, skipBtn.h);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('START NOW  ▶', skipBtn.x + skipBtn.w / 2, skipBtn.y + 25);
    ctx.fillStyle = '#9aa0ab';
    ctx.font = '10px system-ui';
    ctx.fillText('click or press Space', W / 2, skipBtn.y + skipBtn.h + 16);
    ctx.textAlign = 'left';
  }
}

function drawBossRushBanner() {
  if (bossRushBanner <= gameTime) return;
  const remaining = bossRushBanner - gameTime;
  // Fade in for the first 0.25s, hold, then fade the last 0.6s.
  let alpha = 1;
  if (remaining > 4.0) alpha = (4.5 - remaining) / 0.5;
  else if (remaining < 0.6) alpha = remaining / 0.6;
  alpha = Math.max(0, Math.min(1, alpha));
  // Throbbing scale on the headline for arena-event drama.
  const pulse = 1 + Math.sin(gameTime * 8) * 0.04;
  const cx = W / 2, cy = H / 2 - 40;
  ctx.save();
  // Dim background bar behind the text
  ctx.fillStyle = `rgba(120, 0, 0, ${0.42 * alpha})`;
  ctx.fillRect(0, cy - 70, W, 160);
  ctx.fillStyle = `rgba(0, 0, 0, ${0.55 * alpha})`;
  ctx.fillRect(0, cy - 50, W, 120);
  ctx.translate(cx, cy);
  ctx.scale(pulse, pulse);
  ctx.textAlign = 'center';
  // Glowy red headline
  ctx.shadowColor = `rgba(255, 60, 60, ${alpha})`;
  ctx.shadowBlur = 24;
  ctx.fillStyle = `rgba(255, 70, 70, ${alpha})`;
  ctx.font = 'bold 64px system-ui';
  ctx.fillText('BOSS RUSH', 0, 0);
  ctx.shadowBlur = 0;
  ctx.fillStyle = `rgba(255, 220, 220, ${alpha})`;
  ctx.font = 'bold 18px system-ui';
  ctx.fillText('FIVE BOSSES HAVE ARRIVED', 0, 30);
  ctx.restore();
}

// Shop-camping shame banner — deadpan headline + small apology subtitle.
// Mirrors drawBossRushBanner: deadline-gated alpha (fade-in/hold/fade-out),
// non-modal, drawn in HUD-screen space (after the world transform restored).
function drawShameBanner() {
  if (shameBannerLife <= 0) return;
  // Fade in over the first 0.6s, hold, fade out over the last 1.2s.
  let alpha = 1;
  const elapsed = SHAME_BANNER_LIFE - shameBannerLife;
  if (elapsed < 0.6) alpha = elapsed / 0.6;
  else if (shameBannerLife < 1.2) alpha = shameBannerLife / 1.2;
  alpha = Math.max(0, Math.min(1, alpha));
  const cx = W / 2;
  const cy = Math.floor(H * 0.38); // above middle, below wave / boss bar
  ctx.save();
  // Stacked dim panels behind the text — deep crimson over near-black so the
  // shame reads as "you're in trouble" without competing with the existing
  // boss-rush red.
  ctx.fillStyle = `rgba(60, 0, 0, ${0.40 * alpha})`;
  ctx.fillRect(0, cy - 60, W, 130);
  ctx.fillStyle = `rgba(0, 0, 0, ${0.55 * alpha})`;
  ctx.fillRect(0, cy - 44, W, 96);
  ctx.translate(cx, cy);
  ctx.textAlign = 'center';
  // Glowy red headline — slightly smaller than BOSS RUSH so the two visual
  // weights stay distinct if they ever overlap (boss rush wins).
  ctx.shadowColor = `rgba(255, 80, 80, ${alpha})`;
  ctx.shadowBlur = 22;
  ctx.fillStyle = `rgba(255, 110, 110, ${alpha})`;
  ctx.font = 'bold 44px system-ui';
  ctx.fillText('YOU SHOULD BE ASHAMED', 0, 0);
  ctx.shadowBlur = 0;
  // Tiny apology subtitle in light grey italic
  ctx.fillStyle = `rgba(210, 210, 220, ${0.85 * alpha})`;
  ctx.font = 'italic 14px system-ui';
  ctx.fillText('(sorry if you were not camping)', 0, 26);
  ctx.restore();
  ctx.textAlign = 'left';
}

// Absolute Chaos banner — pulses on top of the screen for ~4.5s when the
// chaos meta-event triggers. Pattern mirrors drawBossRushBanner but uses a
// brighter red and the subtitle hints at the spam to come. Non-modal.
function drawChaosBanner() {
  if (chaosBanner <= gameTime) return;
  const remaining = chaosBanner - gameTime;
  // Fade in over the first 0.5s, hold, fade out over the last 0.6s.
  let alpha = 1;
  if (remaining > 4.0) alpha = (4.5 - remaining) / 0.5;
  else if (remaining < 0.6) alpha = remaining / 0.6;
  alpha = Math.max(0, Math.min(1, alpha));
  // Tighter pulse than Boss Rush to feel more frantic.
  const pulse = 1 + Math.sin(gameTime * 10) * 0.05;
  const cx = W / 2;
  const cy = H / 2 - 80;       // higher than Boss Rush so they don't collide
  ctx.save();
  ctx.fillStyle = `rgba(120, 0, 0, ${0.42 * alpha})`;
  ctx.fillRect(0, cy - 70, W, 160);
  ctx.fillStyle = `rgba(0, 0, 0, ${0.55 * alpha})`;
  ctx.fillRect(0, cy - 50, W, 120);
  ctx.translate(cx, cy);
  ctx.scale(pulse, pulse);
  ctx.textAlign = 'center';
  ctx.shadowColor = `rgba(255, 42, 42, ${alpha})`;
  ctx.shadowBlur = 28;
  ctx.fillStyle = `rgba(255, 60, 60, ${alpha})`;
  ctx.font = 'bold 64px system-ui';
  ctx.fillText('ABSOLUTE CHAOS', 0, 0);
  ctx.shadowBlur = 0;
  ctx.fillStyle = `rgba(255, 220, 220, ${alpha})`;
  ctx.font = 'bold 18px system-ui';
  ctx.fillText('EVENT STORM INCOMING', 0, 30);
  ctx.restore();
  ctx.textAlign = 'left';
}

function drawHud() {
  // HP
  const hpW = 220, hpH = 14;
