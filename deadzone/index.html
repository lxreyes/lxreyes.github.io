        }
        bullets.splice(i, 1);
        continue;
      }
      const u = b.flightT;
      b.x = b.startX + (b.targetX - b.startX) * u;
      b.y = b.startY + (b.targetY - b.startY) * u;
      b.h = Math.sin(u * Math.PI) * b.peakHeight;
      continue; // skip normal motion + hit checks
    }
    // chakram: tracks the mouse for outTime seconds, then turns to home back
    // to the player. Same turn-rate logic in both phases — the only thing
    // that swaps is the homing target.
    if (b.bulletKind === 'chakram') {
      b.chakramTimer = (b.chakramTimer || 0) + dt;
      if (!b.returning && b.chakramTimer >= b.outTime) {
        b.returning = true;
        b.hits.clear();
      }
      const tx = b.returning ? player.x : mouse.x;
      const ty = b.returning ? player.y : mouse.y;
      const tgtA = Math.atan2(ty - b.y, tx - b.x);
      const curA = Math.atan2(b.vy, b.vx);
      let da = tgtA - curA;
      while (da >  Math.PI) da -= Math.PI*2;
      while (da < -Math.PI) da += Math.PI*2;
      // Outbound: turn rate ramps up over the outgoing phase. Starts very
      // loose (the chakram behaves like a thrown projectile that barely
      // steers) and grows tight (it snaps onto the cursor) as the outTime
      // progresses. Return phase stays a fixed tight turn so it always
      // catches up to the player.
      let turnRate;
      if (b.returning) {
        turnRate = 9;
      } else {
        const phase = Math.max(0, Math.min(1, b.chakramTimer / b.outTime));
        // Old "2 + phase*12" rate left the disc unable to steer for the
        // first half of its flight — "sometimes the chakram won't follow
        // the cursor". Bumped to a much higher floor so the disc always
        // tracks the mouse from launch.
        turnRate = 7 + phase * 8; // 7 rad/s → 15 rad/s across the outgoing phase
      }
      const turn = Math.sign(da) * Math.min(Math.abs(da), turnRate * dt);
      const newA = curA + turn;
      const sp = Math.hypot(b.vx, b.vy);
      b.vx = Math.cos(newA) * sp;
      b.vy = Math.sin(newA) * sp;
      if (b.returning) {
        const ddx = player.x - b.x, ddy = player.y - b.y;
        if (ddx*ddx + ddy*ddy < 30 * 30) {
          bullets.splice(i, 1);
          continue;
        }
      }
    }
    // homing chicks adjust velocity toward nearest zombie
    if (b.homing) {
      let near = null, bd2 = Infinity;
      for (const z of zombies) {
        const dx = z.x - b.x, dy = z.y - b.y;
        const d2 = dx*dx + dy*dy;
        if (d2 < bd2) { bd2 = d2; near = z; }
      }
      if (near) {
        const tgtA = Math.atan2(near.y - b.y, near.x - b.x);
        const curA = Math.atan2(b.vy, b.vx);
        let da = tgtA - curA;
        while (da >  Math.PI) da -= Math.PI*2;
        while (da < -Math.PI) da += Math.PI*2;
        const turn = Math.sign(da) * Math.min(Math.abs(da), 9 * dt);
        const newA = curA + turn;
        const sp = Math.hypot(b.vx, b.vy);
        b.vx = Math.cos(newA) * sp;
        b.vy = Math.sin(newA) * sp;
      }
    }
    // Stash where the bullet was at the start of this frame — swept collision
    // checks the segment from prevX/prevY to b.x/b.y so fast bullets can't
    // tunnel past zombies.
    const prevX = b.x, prevY = b.y;
    // orbiter: position is computed from the player + orbit angle each frame
    if (b.bulletKind === 'orbit') {
      b.orbitAngle += b.orbitSpeed * dt;
      b.x = player.x + Math.cos(b.orbitAngle) * b.orbitRadius;
      b.y = player.y + Math.sin(b.orbitAngle) * b.orbitRadius;
      // clear hit set every short interval so the same zombie can be hit on
      // each pass — otherwise an orbit just brushes everyone once.
      b.orbitHitClear = (b.orbitHitClear || 0) - dt;
      if (b.orbitHitClear <= 0) {
        b.hits.clear();
        b.orbitHitClear = 0.35;
      }
    } else {
      b.x += b.vx * dt;
      b.y += b.vy * dt;
    }
    b.life -= dt;
    // Pizza Cutter: periodically clear its hit set so the saw can re-damage
    // the same zombie if it stays in contact while the wheel spins/bounces.
    if (b.clearHitsInterval) {
      b.clearHitsAt = (b.clearHitsAt || 0) - dt;
      if (b.clearHitsAt <= 0) {
        b.hits.clear();
        b.clearHitsAt = b.clearHitsInterval;
      }
    }
    if (b.life <= 0 || (b.bulletKind !== 'orbit' && (b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20))) {
      // banana drops a slick where it dies
      if (b.leavesSlick && b.x > 0 && b.x < W && b.y > 0 && b.y < H) {
        addSlick(b.x, b.y, 'banana');
      }
      // Lawnmower leaves a damaging grass-clipping field on expiry
      if (b.dropsHazard === 'grass' && b.x > 0 && b.x < W && b.y > 0 && b.y < H) {
        spawnHazard(b.x, b.y, 'grass');
      }
      bullets.splice(i, 1);
      continue;
    }
    let consumed = false;
    for (let j = zombies.length - 1; j >= 0; j--) {
      const z = zombies[j];
      if (b.hits.has(z)) continue;
      const rr = z.r + 3;
      // Swept test: did the bullet's motion this frame pass within rr of the
      // zombie? Catches fast bullets (railgun, kunai, chakram) that would
      // otherwise hop right past in a single frame.
      if (segmentHitsCircle(prevX, prevY, b.x, b.y, z.x, z.y, rr)) {
        if (b.explosive) {
          // Place the explosion at the actual impact point along the segment
          // so it lines up with the zombie instead of where the bullet ended.
          const t = segmentCircleEntry(prevX, prevY, b.x, b.y, z.x, z.y, rr);
          const hitX = t == null ? b.x : prevX + (b.x - prevX) * t;
          const hitY = t == null ? b.y : prevY + (b.y - prevY) * t;
          explode(hitX, hitY, b.blastR, b.damage + b.blastDmg);
          if (b.spawnChicks > 0) spawnChicks(hitX, hitY, b.spawnChicks, b.damage * 0.5);
          // Toaster Cannon: pop out small toast shrapnel in random directions.
          if (b.spawnToasts > 0) spawnToastShrapnel(hitX, hitY, b.spawnToasts, b.damage * 0.45);
          consumed = true;
          break;
        }
        // Boss Slayer perk amplifies direct damage to bosses
        let dmgApplied = z.isBoss && player.special.bossSlayer
          ? b.damage * (1 + player.special.bossSlayer)
          : b.damage;
        dmgApplied = modifyZombieDamage(z, dmgApplied, b.x, b.y);
        const dmgDealt = Math.min(dmgApplied, z.hp);
        z.hp -= dmgApplied;
        b.hits.add(z);
        SFX.zombieHit();
        // ---- Trader-weapon on-hit effects (data-driven via bullet flags) ----
        // Fish Slap: huge knockback per pellet — launches zombies away from
        // the player. Bosses resist as usual.
        if (b.bulletKnock) {
          const kdx = z.x - player.x, kdy = z.y - player.y;
          const klen = Math.hypot(kdx, kdy) || 1;
          const push = (z.isBoss ? b.bulletKnock * 0.2 : b.bulletKnock);
          z.knockVx = (z.knockVx || 0) + (kdx / klen) * push;
          z.knockVy = (z.knockVy || 0) + (kdy / klen) * push;
        }
        // Confetti / Spaghetti: per-bullet status effect from b.effect.
        applyBulletStatus(b, z);
        // Soda Spritz: brief slow on every hit, stacks via Math.max.
        if (b.slowOnHit) {
          z.slowTimer = Math.max(z.slowTimer || 0, b.slowOnHit);
        }
        // Disco Ball: brief stun on every contact. Bosses resist (capped).
        if (b.stunOnHit) {
          const dur = z.isBoss ? Math.min(b.stunOnHit, 0.25) : b.stunOnHit;
          z.stunTimer = Math.max(z.stunTimer || 0, dur);
        }
        // Trainer dummy shows a damage floater so you can read the numbers
        pushDamageFloater(z, dmgApplied, b.isCrit);
        // Tesla: chain to nearby zombies after the direct hit.
        if (b.bulletKind === 'lightning' && b.chains > 0) {
          chainLightning(z, b.damage, b.chains, b.chainRange);
        }
        // lifesteal — heal a fraction of damage actually dealt
        if (player.special.lifesteal) {
          player.hp = Math.min(player.maxHp, player.hp + dmgDealt * player.special.lifesteal);
        }
        // cold bullets — slow the target briefly
        if (player.special.slow) {
          z.slowTimer = Math.max(z.slowTimer || 0, player.special.slow);
        }
        if (z.hp <= 0) {
          // Spaghetti Beam splatters the zombie into a sauce hazard on kill.
          if (b.explodesIntoSauce) spawnHazard(z.x, z.y, 'sauce');
          killZombie(z);
          if (z.isBoss) shake(18);
          zombies.splice(j, 1);
        }
        // rubber duck: bounce off the zombie instead of being consumed
        if (b.bounces > 0) {
          b.bounces--;
          b.damage *= 0.75;
          b.hits.clear();
          const sp = Math.hypot(b.vx, b.vy);
          const newA = Math.atan2(b.vy, b.vx) + (Math.random() - 0.5) * 1.8 + Math.PI; // mostly reversed + scatter
          b.vx = Math.cos(newA) * sp;
          b.vy = Math.sin(newA) * sp;
          // tiny squeak puff
          for (let k = 0; k < 5; k++) {
            const a = Math.random() * Math.PI * 2;
            const s = 60 + Math.random() * 120;
            particles.push({ x: b.x, y: b.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.3, color: '#fff5b8' });
          }
          break;
        }
        // banana: leave a slick where it lands
        if (b.leavesSlick) {
          addSlick(b.x, b.y);
        }
        if (b.pierce <= 0) { consumed = true; break; }
        b.pierce--;
      }
    }
    if (consumed) bullets.splice(i, 1);
  }
}

function addSlick(x, y, kind = 'banana') {
  slicks.push({ x, y, r: 24, life: 8, max: 8, ang: Math.random() * Math.PI * 2, kind });
}

function updateSlicks(dt) {
  for (let i = slicks.length - 1; i >= 0; i--) {
    slicks[i].life -= dt;
    if (slicks[i].life <= 0) slicks.splice(i, 1);
  }
}

// Used by the Chicken Launcher: small homing chicks scatter from the explosion.
function spawnChicks(x, y, n, dmg) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 260 + Math.random() * 120;
    bullets.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      damage: Math.max(4, dmg),
      pierce: 0,
      hits: new Set(),
      life: 0.9,
      color: '#fff5b8',
      explosive: false,
      blastR: 0,
      blastDmg: 0,
      bulletKind: 'chick',
      homing: true,
      bounces: 0,
      leavesSlick: false,
      spawnChicks: 0,
    });
  }
  // burst of feathers
  for (let i = 0; i < 24; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 60 + Math.random() * 200;
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, life: 0.7 + Math.random()*0.4, color: i % 2 ? '#fff5b8' : '#ffe066' });
  }
}

// Toaster Cannon: spawn small toast shrapnel from the explosion site. Each
// piece is a short-lived bullet that flies in a random direction.
function spawnToastShrapnel(x, y, n, dmg) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 280 + Math.random() * 140;
    bullets.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      damage: Math.max(3, dmg),
      pierce: 0,
      hits: new Set(),
      life: 0.7,
      color: '#d8a060',
      explosive: false, blastR: 0, blastDmg: 0,
      bulletKind: 'toast',
      homing: false, bounces: 0, leavesSlick: false, spawnChicks: 0, spawnToasts: 0,
      chains: 0, chainRange: 0, orbitAngle: 0, orbitRadius: 0, orbitSpeed: 0,
      isCrit: false, bulletKnock: 0, clearHitsInterval: 0, clearHitsAt: 0,
      dropsHazard: null, effect: null, effectDur: 0, effectDps: 0,
    });
  }
  for (let i = 0; i < 12; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 60 + Math.random() * 160;
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, life: 0.5, color: i % 2 ? '#d8a060' : '#ffe89a' });
  }
}

// Lawnmower hazard / future damage-zone helper. Spawns a lingering disc that
// damages any zombie standing on it.
function spawnHazard(x, y, kind) {
  if (kind === 'grass') {
    hazards.push({ x, y, r: 30, life: 4.0, max: 4.0, dps: 35, kind: 'grass' });
  } else if (kind === 'sauce') {
    hazards.push({ x, y, r: 26, life: 2.4, max: 2.4, dps: 30, kind: 'sauce' });
    // Sauce burst for impact feedback
    for (let k = 0; k < 14; k++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 80 + Math.random() * 220;
      particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, life: 0.5 + Math.random()*0.3, color: k % 3 === 0 ? '#ffd166' : '#a82020' });
    }
  }
}

function updateHazards(dt) {
  for (let i = hazards.length - 1; i >= 0; i--) {
    const h = hazards[i];
    h.life -= dt;
    if (h.life <= 0) { hazards.splice(i, 1); continue; }
    // Tick damage on zombies standing on the hazard
    for (let j = zombies.length - 1; j >= 0; j--) {
      const z = zombies[j];
      if (z.isBoss || z.isDummy) continue;
      const dx = z.x - h.x, dy = z.y - h.y;
      if (dx * dx + dy * dy < h.r * h.r) {
        z.hp -= h.dps * dt;
        if (z.hp <= 0) { killZombie(z); zombies.splice(j, 1); }
      }
    }
  }
}

function updateGuns(dt) {
  nearbyGun = null;
  let bestD2 = 50 * 50; // hover radius
  for (let i = guns.length - 1; i >= 0; i--) {
    const g = guns[i];
    g.life -= dt;
    if (g.life <= 0) {
      pushToStorage('weapon', g.weapon);
      guns.splice(i, 1);
      continue;
    }
    const dx = player.x - g.x, dy = player.y - g.y;
    const d2 = dx*dx + dy*dy;
    if (d2 < bestD2) { nearbyGun = g; bestD2 = d2; }
  }
}

function doSwapWeapon() {
  if (!nearbyGun || nearbyGun.weapon === player.weapon) return;
  SFX.swap();
  const old = player.weapon;
  // First-time info popup for the equipped gun
  const def = WEAPONS[nearbyGun.weapon];
  if (def) showTooltip('weapon:' + nearbyGun.weapon, `${def.name} equipped`, def.desc || 'New primary weapon', def.color);
  const gx = nearbyGun.x, gy = nearbyGun.y;
  const newCol = WEAPONS[nearbyGun.weapon].color;
  player.weapon = nearbyGun.weapon;
  const idx = guns.indexOf(nearbyGun);
  if (idx >= 0) guns.splice(idx, 1);
  // Swapped-out weapon goes straight into the shop's Storage box — no more
  // ground-crate babysitting. Pistol is allowed (the player wants a
  // consistent swap log); traderOnly / cheatOnly weapons still vanish.
  if (shouldStoreOldWeapon(old)) {
    pushToStorage('weapon', old);
    floaters.push({ x: player.x, y: player.y - 28, text: '→ Storage', life: 1.4, color: WEAPONS[old].color });
  }
  for (let k = 0; k < 16; k++) {
    const a = Math.random() * Math.PI * 2;
    const s = 80 + Math.random() * 160;
    particles.push({ x: gx, y: gy, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.5, color: newCol });
  }
  nearbyGun = null;
}

function updateCrates(dt) {
  for (let i = crates.length - 1; i >= 0; i--) {
    const cr = crates[i];
    const dx = player.x - cr.x, dy = player.y - cr.y;
    if (dx*dx + dy*dy < (player.r + 14) * (player.r + 14)) {
      player.money += cr.value;
      SFX.crate();
      for (let k = 0; k < 14; k++) {
        const a = Math.random() * Math.PI * 2;
        const s = 80 + Math.random() * 180;
        particles.push({ x: cr.x, y: cr.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.6, color: '#ffce44' });
      }
      crates.splice(i, 1);
    }
  }
}

function spawnMoneyCrate() {
  for (let tries = 0; tries < 25; tries++) {
    const x = 80 + Math.random() * (W - 160);
    const y = 80 + Math.random() * (H - 160);
    if (x > shop.x - 20 && x < shop.x + shop.w + 20 &&
        y > shop.y - 20 && y < shop.y + shop.h + 20) continue;
    if (Math.hypot(x - player.x, y - player.y) < 160) continue;
    crates.push({ x, y, value: 20 + Math.floor(Math.random() * 30) + Math.floor(wave * 1.5) });
    dropBurst(x, y, '#ffce44', 18);
    return;
  }
}

function updateCoins(dt) {
  for (let i = coins.length - 1; i >= 0; i--) {
    const k = coins[i];
    // friction
    const f = Math.pow(0.001, dt);
    k.vx *= f; k.vy *= f;
    k.x += k.vx * dt;
    k.y += k.vy * dt;
    k.life -= dt;

    const dx = player.x - k.x, dy = player.y - k.y;
    const d = Math.hypot(dx, dy);
    const magnetR = 80 * (1 + (player.special.magnet || 0));
    if (d < magnetR) {
      // magnetize
      const pull = 280;
      k.x += (dx / d) * pull * dt;
      k.y += (dy / d) * pull * dt;
    }
    if (d < player.r + 5) {
      player.money += k.value;
      SFX.coin();
      coins.splice(i, 1);
    } else if (k.life <= 0) {
      // Coin expired without being picked up — bank its value instead of
      // letting it vanish. The Storage tab shows a Claim button.
      storedMoney += k.value;
      coins.splice(i, 1);
    }
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= Math.pow(0.01, dt);
    p.vy *= Math.pow(0.01, dt);
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function checkDeath() {
  if (player.hp > 0) return;

  deaths++;
  bestKills = Math.max(bestKills, kills);
  SFX.death();

  // drop weapon (pistol is infinite default, not a real drop). Trader-only
  // weapons evaporate on death rather than dropping — they can't exist on the
  // ground.
  if (shouldDropOldWeapon(player.weapon)) {
    dropGunAt(player.x, player.y, player.weapon, 60);
  }
  player.weapon = 'pistol';
  // drop money as a small shower of coins
  const drop = player.money;
  player.money = 0;
  if (drop > 0) {
    dropBurst(player.x, player.y, '#ffce44', 12);
    const n = Math.min(20, Math.max(4, Math.ceil(drop / 10)));
    const per = Math.max(1, Math.round(drop / n));
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 60 + Math.random() * 140;
      coins.push({ x: player.x, y: player.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, value: per, life: 60 });
    }
  }
  addBlood(player.x, player.y, 1.4);

  // reset player state
  player.hp = player.maxHp;
  player.x = SPAWN.x; player.y = SPAWN.y;
  for (const k in player.buffs) player.buffs[k] = 0;
  cancelBowCharge();
  player.invuln = 2.0;

  // visual feedback
  shake(28);
  flashRed = 0.85;

  // restart the current wave from the beginning
  zombies.length = 0;
  bullets.length = 0;
  zombieBullets.length = 0;
  healPulses.length = 0;
  pendingEvent = null;
  activeEvent = null;
  // A chaos window in flight is cancelled when the player dies — they get a
  // clean wave restart, not chaos sub-events spawning into a fresh corpse.
  chaosTimer = 0;
  chaosNextSub = 0;
  chaosBanner = 0;
  if (wave > 0) {
    if (isBossWave) {
      spawnBoss();
      waveZombiesToSpawn = 0;
    } else {
      waveZombiesToSpawn = 5 + Math.floor(wave * 1.8);
      waveSpawnTimer = 1.0;
      if (wave % 5 === 0) spawnMiniBoss();
    }
  }
}

function hardReset() {
  player.x = SPAWN.x; player.y = SPAWN.y;
  player.hp = player.maxHp = 100;
  player.money = 0;
  player.speed = 220;
  player.damage = 10;
  player.fireRate = 4;
  player.bulletSpeed = 700;
  player.pierce = 0;
  player.invuln = 0;
  player.lastShot = 0;
  for (const k in player.buffs) player.buffs[k] = 0;
  player.special = {};
  player.specialLevels = {};
  player.exp = 0;
  player.abilities = { dash: true };
  player.abilityLast = {};
  player.rageTimer = 0;
  bulletTimeTimer = 0;
  homingBulletsTimer = 0;
  selectedAbility = ABILITY_KEYS.indexOf('dash'); // start cycle on dash
  abilityBooks.length = 0;
  treeLevels = { combat: 0, survival: 0, economy: 0 };
  rootOwned = {};
  treeView = 'tomes';
  pendingBossDeath = null;
  pendingCards = null;
  cardRects = [null, null, null];
  bullets.length = 0;
  zombies.length = 0;
  coins.length = 0;
  particles.length = 0;
  guns.length = 0;
  crates.length = 0;
  pickups.length = 0;
  slicks.length = 0;
  chests.length = 0;
  floaters.length = 0;
  slashes.length = 0;
  sparks.length = 0;
  decoys.length = 0;
  buildings.length = 0;
  buildMode = false;
  bladeCrates.length = 0;
  summons.length = 0;
  healFields.length = 0;
  decals.length = 0;
  storage.length = 0;
  storedMoney = 0;
  pets.length = 0;
  ownedPets.clear();
  zombieBullets.length = 0;
  healPulses.length = 0;
  hazards.length = 0;
  pendingEvent = null;
  activeEvent = null;
  chaosTimer = 0;
  chaosNextSub = 0;
  chaosBanner = 0;
  trader = null;
  traderCooldown = 0;
  foodTrader = null;
  foodTraderCooldown = 0;
  shopTab = 'upgrades';
  shakeAmt = 0; flashRed = 0; nearbyGun = null;
  player.weapon = 'pistol';
  player.secondary = 'katana';
  player.lastSecondary = -10;
  kills = 0; deaths = 0; bestKills = 0; bestWave = 0;
  gameTime = 0;
  wave = 0; isBossWave = false; waveZombiesToSpawn = 0;
  waveSpawnTimer = 0; intermission = 3;
  // Banners + shop-camp shame — zero out so a fresh run starts clean
  bossRushBanner = 0;
  shameBannerLife = 0;
  shopCampTimer = 0;
  shameFiredThisWave = false;
  shameFiredThisSession = false;
  wasInShopLastFrame = false;
  // Cheats — lock back down on a fresh run. The Training menu option
  // immediately re-unlocks them via cheatsUnlocked = true after this
  // hardReset returns, so training still gets cheats; a regular "Play"
  // run starts locked and requires the 1-2-3-4 code again.
  cheatsUnlocked = false;
  cheatsOpen = false;
  // restore upgrade costs
  const base = [25, 35, 45, 55, 90, 18, 28, 32, 70];
  upgrades.forEach((u, i) => u.cost = base[i]);
}

// ---------- Render ----------
function render() {
  // Defensive canvas reset — if a prior render threw mid-frame it could
  // leave dangling ctx.save() / translate state behind, causing later
  // frames to draw with the wrong transform (one classic "everything
  // disappears" cause). setTransform(1,0,0,1,0,0) wipes any leftover
  // transform + globalAlpha state.
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.globalAlpha = 1;
  ctx.clearRect(0, 0, W, H);

  // screen shake offsets the world layer
  const sx = shakeAmt > 0 ? (Math.random() - 0.5) * shakeAmt : 0;
  const sy = shakeAmt > 0 ? (Math.random() - 0.5) * shakeAmt : 0;
  ctx.save();
  ctx.translate(sx, sy);

  // floor — riveted metal sheets, rendered once into an offscreen cache so
  // the per-frame cost is just a single drawImage blit
  ctx.drawImage(floorCache, 0, 0);

  // blood decals (between grid and entities so zombies walk over them)
  for (const d of decals) {
    const a = Math.max(0, Math.min(1, d.life / (d.max || 12)));
    ctx.globalAlpha = a;
    ctx.fillStyle = d.color;
    ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // healing-field pads — drawn on the floor under entities
  for (const f of healFields) {
    const t = f.life / f.max;
    const pulse = 1 + Math.sin(gameTime * 5) * 0.06;
    ctx.save();
    ctx.globalAlpha = 0.55 * t;
    const grad = ctx.createRadialGradient(f.x, f.y, 4, f.x, f.y, f.r * pulse);
    grad.addColorStop(0, f.color);
    grad.addColorStop(1, f.color + '00');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(f.x, f.y, f.r * pulse, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = t;
    ctx.strokeStyle = f.color;
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = f.color;
    ctx.fillRect(f.x - 2, f.y - 8, 4, 16);
    ctx.fillRect(f.x - 8, f.y - 2, 16, 4);
    ctx.restore();
  }

  // banana slicks
  for (const s of slicks) {
    const a = Math.min(1, s.life / 2);
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.ang);
    ctx.globalAlpha = a * 0.85;
    // banana peel — slippery sheen + peel shape + dark stem
    ctx.fillStyle = '#ffe98a';
    ctx.beginPath(); ctx.ellipse(0, 0, s.r * 0.95, s.r * 0.55, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffd942';
    ctx.beginPath();
    ctx.moveTo(-s.r * 0.9, 2);
    ctx.quadraticCurveTo(-s.r * 0.4, -s.r * 0.55, s.r * 0.5, -s.r * 0.3);
    ctx.quadraticCurveTo(s.r * 0.95, 0, s.r * 0.45, s.r * 0.4);
    ctx.quadraticCurveTo(-s.r * 0.4, s.r * 0.55, -s.r * 0.9, 2);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#a07e1c';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = '#6a4a0a';
    ctx.fillRect(s.r * 0.55, -3, 4, 3);
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  // Damaging hazards (Lawnmower clippings + Spaghetti Beam sauce splats) —
  // drawn above the slicks but below the shop zone / zombies. Pulsing alpha
  // keeps them readable without dominating the field.
  for (const h of hazards) {
    const a = Math.max(0, Math.min(1, h.life / h.max));
    const pulse = 0.6 + 0.4 * Math.sin(gameTime * 8 + h.x * 0.05);
    ctx.globalAlpha = a * 0.7;
    if (h.kind === 'sauce') {
      // dark red sauce puddle with a few brighter chunks
      ctx.fillStyle = '#a82020';
      ctx.beginPath(); ctx.arc(h.x, h.y, h.r, 0, Math.PI*2); ctx.fill();
      // bright tomato highlight
      ctx.fillStyle = '#d63030';
      ctx.beginPath(); ctx.arc(h.x - h.r * 0.2, h.y - h.r * 0.15, h.r * 0.55, 0, Math.PI*2); ctx.fill();
      // pasta flecks / meatball chunks
      ctx.fillStyle = '#ffd166';
      for (let k = 0; k < 5; k++) {
        const ang = (k / 5) * Math.PI * 2 + h.x * 0.01;
        const rr = h.r * (0.35 + ((k * 23) % 40) / 100);
        ctx.beginPath();
        ctx.arc(h.x + Math.cos(ang) * rr, h.y + Math.sin(ang) * rr, 1.8 * pulse, 0, Math.PI*2);
        ctx.fill();
      }
      // outer outline
      ctx.strokeStyle = '#7a1818';
      ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.arc(h.x, h.y, h.r, 0, Math.PI*2); ctx.stroke();
    } else {
      // grass clipping field (Lawnmower)
      ctx.fillStyle = '#3a8a4a';
      ctx.beginPath(); ctx.arc(h.x, h.y, h.r, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#5cd86b';
      for (let k = 0; k < 7; k++) {
        const ang = (k / 7) * Math.PI * 2 + h.x * 0.01;
        const rr = h.r * (0.4 + ((k * 17) % 50) / 100);
        ctx.beginPath();
        ctx.arc(h.x + Math.cos(ang) * rr, h.y + Math.sin(ang) * rr, 2 * pulse, 0, Math.PI*2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  }

  // shop zone
  ctx.fillStyle = 'rgba(96, 140, 220, 0.10)';
  ctx.fillRect(shop.x, shop.y, shop.w, shop.h);
  ctx.strokeStyle = '#5a87c4';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 6]);
  ctx.strokeRect(shop.x, shop.y, shop.w, shop.h);
  ctx.setLineDash([]);
  ctx.fillStyle = '#88aadd';
  ctx.font = 'bold 14px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('SHOP', shop.x + shop.w / 2, shop.y - 8);

  // storage chest in the bottom-left corner of the shop rect
  // Trader NPC — drawn inside the shop when present. A simple humanoid with
  // a purple cloak; floats a "TRADER" label above so the player can see it
  // from across the arena.
  if (trader) {
    const tx = shop.x + shop.w - 32;
    const ty = shop.y + 56;
    const bob = Math.sin(gameTime * 2.4) * 1.6;
    // purple aura
    const aura = ctx.createRadialGradient(tx, ty, 4, tx, ty, 28);
    aura.addColorStop(0, 'rgba(196, 126, 255, 0.35)');
    aura.addColorStop(1, 'rgba(196, 126, 255, 0)');
    ctx.fillStyle = aura;
    ctx.beginPath(); ctx.arc(tx, ty, 28, 0, Math.PI * 2); ctx.fill();
    // Painted sprite overrides the procedural NPC entirely (label + countdown
    // still draw underneath so the player can read which trader this is).
    if (hasCustomSprite('traderRegular')) {
      drawCustomSprite('traderRegular', tx, ty + bob, 44);
      ctx.fillStyle = '#c47eff';
      ctx.font = 'bold 9px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText('TRADER', tx, ty - 24);
      ctx.fillStyle = '#9aa0ab';
      ctx.font = '8px system-ui';
      ctx.fillText(`${trader.wavesLeft}w left`, tx, ty + 24);
      ctx.textAlign = 'left';
    } else {
    // cloak
    ctx.fillStyle = '#5a3a8a';
    ctx.beginPath();
    ctx.moveTo(tx - 11, ty + 12 + bob);
    ctx.lineTo(tx + 11, ty + 12 + bob);
    ctx.lineTo(tx + 8, ty - 6 + bob);
    ctx.lineTo(tx - 8, ty - 6 + bob);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#0a0a14';
    ctx.lineWidth = 1; ctx.stroke();
    // head
    ctx.fillStyle = '#e8d5b0';
    ctx.beginPath(); ctx.arc(tx, ty - 10 + bob, 5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    // pointed hood / hat
    ctx.fillStyle = '#3a1a5a';
    ctx.beginPath();
    ctx.moveTo(tx - 6, ty - 8 + bob); ctx.lineTo(tx + 6, ty - 8 + bob);
    ctx.lineTo(tx, ty - 20 + bob); ctx.closePath(); ctx.fill();
    // money-pouch on the cloak
    ctx.fillStyle = '#ffd166';
    ctx.beginPath(); ctx.arc(tx + 7, ty + 6 + bob, 3, 0, Math.PI * 2); ctx.fill();
    // label
    ctx.fillStyle = '#c47eff';
    ctx.font = 'bold 9px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('TRADER', tx, ty - 24);
    ctx.fillStyle = '#9aa0ab';
    ctx.font = '8px system-ui';
    ctx.fillText(`${trader.wavesLeft}w left`, tx, ty + 24);
    ctx.textAlign = 'left';
    }
  }
  // Food Trader — drawn on the opposite (left) edge of the shop so the two
  // NPCs don't overlap when both are present. Apron + chef hat read as
  // "cook" at a glance.
  if (foodTrader) {
    const tx = shop.x + 30;
    const ty = shop.y + 56;
    const bob = Math.sin(gameTime * 2.6 + 0.5) * 1.6;
    // pink aura
    const aura = ctx.createRadialGradient(tx, ty, 4, tx, ty, 28);
    aura.addColorStop(0, 'rgba(255, 155, 209, 0.38)');
    aura.addColorStop(1, 'rgba(255, 155, 209, 0)');
    ctx.fillStyle = aura;
    ctx.beginPath(); ctx.arc(tx, ty, 28, 0, Math.PI * 2); ctx.fill();
    if (hasCustomSprite('traderFood')) {
      drawCustomSprite('traderFood', tx, ty + bob, 44);
      ctx.fillStyle = '#ff9bd1';
      ctx.font = 'bold 9px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText('FOOD TRADER', tx, ty - 26);
      ctx.fillStyle = '#9aa0ab';
      ctx.font = '8px system-ui';
      ctx.fillText(`${foodTrader.wavesLeft}w left`, tx, ty + 24);
      ctx.textAlign = 'left';
    } else {
    // apron body
    ctx.fillStyle = '#e8e8ec';
    ctx.beginPath();
    ctx.moveTo(tx - 11, ty + 12 + bob);
    ctx.lineTo(tx + 11, ty + 12 + bob);
    ctx.lineTo(tx + 8, ty - 6 + bob);
    ctx.lineTo(tx - 8, ty - 6 + bob);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#0a0a14';
    ctx.lineWidth = 1; ctx.stroke();
    // apron stripe
    ctx.fillStyle = '#ff9bd1';
    ctx.fillRect(tx - 1.6, ty - 5 + bob, 3.2, 17);
    // head
    ctx.fillStyle = '#e8d5b0';
    ctx.beginPath(); ctx.arc(tx, ty - 10 + bob, 5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    // chef hat — wide puffy top, narrow band
    ctx.fillStyle = '#fbfbff';
    ctx.beginPath();
    ctx.ellipse(tx, ty - 19 + bob, 7, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#0a0a14';
    ctx.stroke();
    ctx.fillStyle = '#fbfbff';
    ctx.fillRect(tx - 6, ty - 16 + bob, 12, 3);
    ctx.strokeRect(tx - 6 + 0.5, ty - 16 + bob + 0.5, 11, 2);
    // spoon prop
    ctx.strokeStyle = '#a06a3a';
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(tx + 9, ty + 4 + bob); ctx.lineTo(tx + 13, ty - 4 + bob);
    ctx.stroke();
    ctx.fillStyle = '#d8c498';
    ctx.beginPath();
    ctx.ellipse(tx + 13, ty - 5 + bob, 2.2, 1.4, -0.4, 0, Math.PI * 2);
    ctx.fill();
    // label
    ctx.fillStyle = '#ff9bd1';
    ctx.font = 'bold 9px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('FOOD TRADER', tx, ty - 26);
    ctx.fillStyle = '#9aa0ab';
    ctx.font = '8px system-ui';
    ctx.fillText(`${foodTrader.wavesLeft}w left`, tx, ty + 24);
    ctx.textAlign = 'left';
    }
  }

  storageChest.x = shop.x + 6;
  storageChest.y = shop.y + shop.h - storageChest.h - 6;
  const sc = storageChest;
  ctx.fillStyle = '#3a2a18';
  ctx.fillRect(sc.x, sc.y, sc.w, sc.h);
  ctx.strokeStyle = '#7a5a32';
  ctx.lineWidth = 2;
  ctx.strokeRect(sc.x + 0.5, sc.y + 0.5, sc.w - 1, sc.h - 1);
  // metal band across the middle
  ctx.fillStyle = '#7a5a32';
  ctx.fillRect(sc.x, sc.y + sc.h / 2 - 2, sc.w, 4);
  // padlock dot
  ctx.fillStyle = '#ffd166';
  ctx.beginPath();
  ctx.arc(sc.x + sc.w / 2, sc.y + sc.h / 2, 2.5, 0, Math.PI * 2);
  ctx.fill();
  // count badge if any stored
  if (storage.length > 0) {
    ctx.fillStyle = '#d63030';
    ctx.beginPath();
    ctx.arc(sc.x + sc.w - 4, sc.y + 4, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(String(storage.length), sc.x + sc.w - 4, sc.y + 8);
  }
  ctx.textAlign = 'left';

  // coins
  for (const k of coins) {
    const a = Math.min(1, k.life / 2);
    const bob = Math.sin(gameTime * 5 + k.x * 0.17) * 0.9;
    const cy = k.y + bob;
    ctx.globalAlpha = a;
    // soft outer glow
    const glow = ctx.createRadialGradient(k.x, cy, 1, k.x, cy, 11);
    glow.addColorStop(0, 'rgba(255, 224, 110, 0.55)');
    glow.addColorStop(1, 'rgba(255, 206, 68, 0)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(k.x, cy, 11, 0, Math.PI*2); ctx.fill();
    // body gradient (top light → bottom dark gives a metallic feel)
    const body = ctx.createRadialGradient(k.x - 1.5, cy - 2, 0.5, k.x, cy, 5);
    body.addColorStop(0, '#fff2a8');
    body.addColorStop(0.6, '#ffce44');
    body.addColorStop(1, '#c69a1a');
    ctx.fillStyle = body;
    ctx.beginPath(); ctx.arc(k.x, cy, 5, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#8a6c12';
    ctx.lineWidth = 1;
    ctx.stroke();
    // $ engraving
    ctx.fillStyle = '#5c4408';
    ctx.font = 'bold 7px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('$', k.x, cy + 2.5);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }

  // particles
  for (const p of particles) {
    const a = Math.max(0, Math.min(1, p.life * 2));
    ctx.fillStyle = p.color;
    ctx.globalAlpha = a;
    ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // buildings — walls, turrets, spike traps (drawn under zombies so a swarm
  // can visually overlap them when bashing)
  for (const b of buildings) {
    drawBuilding(b);
  }

  // decoys — colored dummy figure with HP bar above
  for (const dc of decoys) {
    const pulse = 1 + Math.sin(gameTime * 6 + dc.x * 0.1) * 0.1;
    // aura
    const aura = ctx.createRadialGradient(dc.x, dc.y, 4, dc.x, dc.y, 30 * pulse);
    aura.addColorStop(0, 'rgba(255, 206, 68, 0.5)');
    aura.addColorStop(1, 'rgba(255, 206, 68, 0)');
    ctx.fillStyle = aura;
    ctx.beginPath(); ctx.arc(dc.x, dc.y, 30 * pulse, 0, Math.PI*2); ctx.fill();
    // body
    ctx.fillStyle = '#ffce44';
    ctx.beginPath(); ctx.arc(dc.x, dc.y, 11, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 2;
    ctx.stroke();
    // exclamation mark indicating "look at me"
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(dc.x - 1.5, dc.y - 5, 3, 7);
    ctx.fillRect(dc.x - 1.5, dc.y + 4, 3, 3);
    // HP bar
    if (dc.hp < dc.hpMax) {
      ctx.fillStyle = '#222';
      ctx.fillRect(dc.x - 14, dc.y - 22, 28, 4);
      ctx.fillStyle = '#5cd86b';
      ctx.fillRect(dc.x - 14, dc.y - 22, 28 * Math.max(0, dc.hp / dc.hpMax), 4);
    }
    // life timer ring (small gold tick at top)
    const lifeT = dc.life / 9;
    ctx.strokeStyle = '#a07e1c';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(dc.x, dc.y, 13, -Math.PI/2, -Math.PI/2 + Math.PI * 2 * lifeT);
    ctx.stroke();
  }

  // zombies
  // Healer pulse rings — drawn under zombies so they read as an aura
  for (const h of healPulses) {
    const a = Math.max(0, Math.min(1, h.life / h.maxLife));
    ctx.strokeStyle = `rgba(122, 240, 168, ${0.55 * a})`;
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(h.x, h.y, h.r, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = `rgba(122, 240, 168, ${0.10 * a})`;
    ctx.beginPath(); ctx.arc(h.x, h.y, h.r, 0, Math.PI * 2); ctx.fill();
  }

  for (const z of zombies) {
    if (z.isDummy) {
      // wooden bullseye target on a stand — friendlier than a zombie
      ctx.fillStyle = '#f4e4b5';
      ctx.beginPath(); ctx.arc(z.x, z.y, z.r, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#3a2810';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.strokeStyle = '#d63030';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(z.x, z.y, z.r * 0.65, 0, Math.PI*2); ctx.stroke();
      ctx.fillStyle = '#d63030';
      ctx.beginPath(); ctx.arc(z.x, z.y, z.r * 0.28, 0, Math.PI*2); ctx.fill();
      // little stand below
      ctx.fillStyle = '#3a2810';
      ctx.fillRect(z.x - 2, z.y + z.r, 4, 10);
      ctx.fillRect(z.x - 8, z.y + z.r + 10, 16, 3);
      continue;
    }
    // Map zombie type → sprite slot for the custom sprite system. Mini-boss
    // and boss get their own slots; the per-type table covers the rest.
    const spriteId = z.isMiniBoss ? 'zombieMiniBoss'
      : z.isBoss ? 'zombieBoss'
      : (ZOMBIE_SPRITE_BY_TYPE[z.type] || 'zombieNormal');
    if (z.isMiniBoss) {
      // Smaller version of the boss aura
      const pulse = 1 + Math.sin(gameTime * 5) * 0.06;
      const grad = ctx.createRadialGradient(z.x, z.y, z.r * 0.5, z.x, z.y, z.r * 1.7 * pulse);
      grad.addColorStop(0, 'rgba(255, 160, 64, 0.30)');
      grad.addColorStop(1, 'rgba(255, 160, 64, 0)');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(z.x, z.y, z.r * 1.7 * pulse, 0, Math.PI*2); ctx.fill();
      if (hasCustomSprite('zombieMiniBoss')) {
        drawCustomSprite('zombieMiniBoss', z.x, z.y, z.r * 2.2);
      } else {
        // Body
        ctx.fillStyle = z.color;
        ctx.beginPath(); ctx.arc(z.x, z.y, z.r, 0, Math.PI*2); ctx.fill();
        // Plated armor stripes
        ctx.strokeStyle = '#6a7a8a';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(z.x, z.y, z.r - 4, 0, Math.PI * 2); ctx.stroke();
        // Glowing orange eyes
        ctx.fillStyle = '#ffa040';
        const meo = z.r * 0.32;
        ctx.beginPath(); ctx.arc(z.x - meo, z.y - meo * 0.3, 3, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(z.x + meo, z.y - meo * 0.3, 3, 0, Math.PI*2); ctx.fill();
      }
      // HP bar — always shown
      const mbw = z.r * 2.4;
      ctx.fillStyle = '#222';
      ctx.fillRect(z.x - mbw/2, z.y - z.r - 10, mbw, 4);
      ctx.fillStyle = '#ffa040';
      ctx.fillRect(z.x - mbw/2, z.y - z.r - 10, mbw * (z.hp / z.hpMax), 4);
      continue;
    }
    if (z.isBoss) {
      // Aura tint from the boss's defined color so each archetype reads
      // distinctly at a glance.
      const aura = z.bossAura || '255, 60, 60';
      const pulse = 1 + Math.sin(gameTime * 4) * 0.08;
      const grad = ctx.createRadialGradient(z.x, z.y, z.r * 0.6, z.x, z.y, z.r * 2.2 * pulse);
      grad.addColorStop(0, `rgba(${aura}, 0.35)`);
      grad.addColorStop(1, `rgba(${aura}, 0)`);
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(z.x, z.y, z.r * 2.2 * pulse, 0, Math.PI*2); ctx.fill();
      if (hasCustomSprite(spriteId)) {
        drawCustomSprite(spriteId, z.x, z.y, z.r * 2.2);
      } else {
        // body
        ctx.fillStyle = z.color;
        ctx.beginPath(); ctx.arc(z.x, z.y, z.r, 0, Math.PI*2); ctx.fill();
        // dark core
        ctx.fillStyle = '#3a0f0f';
        ctx.beginPath(); ctx.arc(z.x, z.y, z.r * 0.55, 0, Math.PI*2); ctx.fill();
        // glowing eyes
        ctx.fillStyle = '#ff5050';
        const eo = z.r * 0.35;
        ctx.beginPath(); ctx.arc(z.x - eo, z.y - eo*0.3, 4, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(z.x + eo, z.y - eo*0.3, 4, 0, Math.PI*2); ctx.fill();
        // Per-archetype flourish painted on top of the body
        if (z.bossType === 'necromancer') {
          // Floating skull glyph in white
          ctx.fillStyle = '#fff';
          ctx.beginPath(); ctx.arc(z.x, z.y, z.r * 0.32, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = '#1a1a22';
          ctx.beginPath();
          ctx.arc(z.x - z.r * 0.12, z.y - z.r * 0.05, z.r * 0.06, 0, Math.PI*2);
          ctx.arc(z.x + z.r * 0.12, z.y - z.r * 0.05, z.r * 0.06, 0, Math.PI*2); ctx.fill();
        } else if (z.bossType === 'charger') {
          // Horns / spikes pointing forward
          const ang = Math.atan2(player.y - z.y, player.x - z.x);
          ctx.fillStyle = '#fff5b8';
          for (const s of [-0.45, 0, 0.45]) {
            const a = ang + s;
            ctx.beginPath();
            ctx.moveTo(z.x + Math.cos(a) * z.r, z.y + Math.sin(a) * z.r);
            ctx.lineTo(z.x + Math.cos(a) * z.r * 1.55, z.y + Math.sin(a) * z.r * 1.55);
            ctx.lineTo(z.x + Math.cos(a + 0.12) * z.r * 1.05, z.y + Math.sin(a + 0.12) * z.r * 1.05);
            ctx.closePath(); ctx.fill();
          }
        } else if (z.bossType === 'hexmage') {
          // Three small glowing orbs orbit the body
          for (let k = 0; k < 3; k++) {
            const a = gameTime * 1.6 + (k / 3) * Math.PI * 2;
            const ox = z.x + Math.cos(a) * (z.r * 1.35);
            const oy = z.y + Math.sin(a) * (z.r * 1.35);
            ctx.fillStyle = 'rgba(160, 200, 232, 0.55)';
            ctx.beginPath(); ctx.arc(ox, oy, 5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(ox, oy, 1.8, 0, Math.PI*2); ctx.fill();
          }
        } else if (z.bossType === 'berserker') {
          // Red rage cracks across the body at high rage
          const rage = 1 - z.hp / z.hpMax;
          if (rage > 0.3) {
            ctx.strokeStyle = `rgba(255, 64, 64, ${rage})`;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(z.x - z.r * 0.5, z.y - z.r * 0.2);
            ctx.lineTo(z.x - z.r * 0.1, z.y + z.r * 0.05);
            ctx.lineTo(z.x + z.r * 0.3, z.y - z.r * 0.25);
            ctx.lineTo(z.x + z.r * 0.55, z.y + z.r * 0.1);
            ctx.stroke();
          }
        }
      }
    } else {
      if (hasCustomSprite(spriteId)) {
        drawCustomSprite(spriteId, z.x, z.y, z.r * 2.4);
      } else {
        // Body
        ctx.fillStyle = z.color;
        ctx.beginPath(); ctx.arc(z.x, z.y, z.r, 0, Math.PI*2); ctx.fill();
        // Per-type visual flourishes
        if (z.type === 'exploder') {
          // Pulsing dark core hints at the bomb inside.
          const pulse = 0.5 + 0.5 * Math.sin(gameTime * 9 + (z.fuse || 0));
          ctx.fillStyle = `rgba(255, 220, 80, ${0.25 + 0.35 * pulse})`;
          ctx.beginPath(); ctx.arc(z.x, z.y, z.r * 0.6, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = '#5a0a00';
          ctx.beginPath(); ctx.arc(z.x, z.y, z.r * 0.35, 0, Math.PI*2); ctx.fill();
        } else if (z.type === 'healer') {
          ctx.fillStyle = '#fff';
          ctx.fillRect(z.x - 1.5, z.y - 6, 3, 12);
          ctx.fillRect(z.x - 6, z.y - 1.5, 12, 3);
        } else if (z.type === 'spitter') {
          // dark drool mouth + bulge
          ctx.fillStyle = '#3a1a4a';
          ctx.beginPath(); ctx.arc(z.x, z.y + z.r * 0.45, z.r * 0.32, 0, Math.PI*2); ctx.fill();
        } else if (z.type === 'shielded') {
          // Shield arc on the front (facing the player)
          const ang = Math.atan2(player.y - z.y, player.x - z.x);
          ctx.save();
          ctx.translate(z.x, z.y);
          ctx.rotate(ang);
          ctx.strokeStyle = '#c0d8e8';
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(0, 0, z.r + 3, -0.7, 0.7);
          ctx.stroke();
          // metal studs
          ctx.fillStyle = '#9bb4c8';
          for (let k = -1; k <= 1; k++) {
            const a = k * 0.45;
            ctx.beginPath(); ctx.arc(Math.cos(a) * (z.r + 3), Math.sin(a) * (z.r + 3), 1.6, 0, Math.PI*2); ctx.fill();
          }
          ctx.restore();
        } else if (z.type === 'spawner') {
          // Egg sacs on the back hint at the upcoming spawn
          ctx.fillStyle = '#a07060';
          for (let k = 0; k < 3; k++) {
            const a = (k - 1) * 0.5 + Math.PI;
            ctx.beginPath();
            ctx.arc(z.x + Math.cos(a) * z.r * 0.6, z.y + Math.sin(a) * z.r * 0.6, 3, 0, Math.PI*2);
            ctx.fill();
          }
        } else if (z.type === 'spawn-minion') {
          // little hatchling — single dark dot eye
          ctx.fillStyle = '#fff';
          ctx.beginPath(); ctx.arc(z.x, z.y - 1, 1.2, 0, Math.PI*2); ctx.fill();
        }
        // Eyes (drawn last so they sit on top of the body decorations)
        ctx.fillStyle = '#1a1a1a';
        const eo = z.r * 0.3;
        ctx.beginPath(); ctx.arc(z.x - eo, z.y - eo*0.3, 1.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(z.x + eo, z.y - eo*0.3, 1.5, 0, Math.PI*2); ctx.fill();
      }
      if (z.hp < z.hpMax) {
        const bw = z.r * 2;
        ctx.fillStyle = '#222';
        ctx.fillRect(z.x - bw/2, z.y - z.r - 7, bw, 3);
        ctx.fillStyle = '#d24';
        ctx.fillRect(z.x - bw/2, z.y - z.r - 7, bw * (z.hp / z.hpMax), 3);
      }
    }
  }

  // bullets
  for (const b of bullets) {
    drawBullet(b);
  }

  // Zombie projectiles (spitter goo) — drawn above the player bullets so they
  // stand out against the splatter, but below the zombies so they read as
  // coming "out" of the enemy.
  for (const zb of zombieBullets) {
    ctx.fillStyle = zb.color;
    ctx.beginPath(); ctx.arc(zb.x, zb.y, zb.r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#3a1a4a';
    ctx.lineWidth = 1;
    ctx.stroke();
    // wobble glob — small flecks of the same color trailing
    ctx.fillStyle = zb.color;
    ctx.globalAlpha = 0.55;
    ctx.beginPath();
    ctx.arc(zb.x - zb.vx * 0.012, zb.y - zb.vy * 0.012, zb.r * 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // chicken summons (drawn above bullets so they're easy to track)
  for (const s of summons) {
    if (s.kind === 'chicken') {
      const ang = Math.atan2(s.vy, s.vx);
      ctx.save();
      ctx.translate(s.x, s.y);
      ctx.rotate(ang);
      // body
      ctx.fillStyle = '#fff5b8';
      ctx.beginPath(); ctx.ellipse(0, 0, 7, 5.5, 0, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#15151a';
      ctx.lineWidth = 1;
      ctx.stroke();
      // comb
      ctx.fillStyle = '#d63030';
      ctx.beginPath(); ctx.arc(-1, -5, 1.5, 0, Math.PI*2);
      ctx.arc(1, -5, 1.5, 0, Math.PI*2); ctx.fill();
      // beak
      ctx.fillStyle = '#ff9d3a';
      ctx.beginPath();
      ctx.moveTo(6, -1); ctx.lineTo(11, 0); ctx.lineTo(6, 2); ctx.closePath();
      ctx.fill();
      // eye
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath(); ctx.arc(3, -1, 0.9, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      // life ring
      if (s.life < 4) {
        ctx.strokeStyle = '#ffe066';
        ctx.lineWidth = 1.5;
        ctx.globalAlpha = 0.4;
        ctx.beginPath(); ctx.arc(s.x, s.y, 10, 0, Math.PI*2); ctx.stroke();
        ctx.globalAlpha = 1;
      }
    } else if (s.kind === 'bat') {
      const ang = Math.atan2(s.vy, s.vx);
      const wingFlap = Math.sin(gameTime * 22) * 4;
      ctx.save();
      ctx.translate(s.x, s.y);
      ctx.rotate(ang);
      // wings — flapping ellipses on top + bottom
      ctx.fillStyle = '#3a1850';
      ctx.beginPath(); ctx.ellipse(-1, -5 - wingFlap, 8, 4, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(-1,  5 + wingFlap, 8, 4, 0, 0, Math.PI*2); ctx.fill();
      // body
      ctx.fillStyle = '#1a0a22';
      ctx.beginPath(); ctx.ellipse(0, 0, 5, 4, 0, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#15151a';
      ctx.lineWidth = 1;
      ctx.stroke();
      // tiny ears
      ctx.fillStyle = '#1a0a22';
      ctx.beginPath();
      ctx.moveTo(2, -3); ctx.lineTo(5, -6); ctx.lineTo(4, -2); ctx.closePath();
      ctx.fill();
      // glowing red eyes
      ctx.fillStyle = '#ff5050';
      ctx.beginPath(); ctx.arc(2, -1, 0.9, 0, Math.PI*2);
      ctx.arc(2,  1, 0.9, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      if (s.life < 3) {
        ctx.strokeStyle = '#8a4ac0';
        ctx.lineWidth = 1.5;
        ctx.globalAlpha = 0.4;
        ctx.beginPath(); ctx.arc(s.x, s.y, 10, 0, Math.PI*2); ctx.stroke();
        ctx.globalAlpha = 1;
      }
    } else if (s.kind === 'wolf') {
      const ang = Math.atan2(s.vy, s.vx);
      ctx.save();
      ctx.translate(s.x, s.y);
      ctx.rotate(ang);
      // body — larger oval
      ctx.fillStyle = '#7a5030';
      ctx.beginPath(); ctx.ellipse(0, 0, 11, 7, 0, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#1a0e04';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // back stripe
      ctx.fillStyle = '#5a3a20';
      ctx.fillRect(-7, -2, 14, 4);
      // tail
      ctx.fillStyle = '#7a5030';
      ctx.beginPath();
      ctx.moveTo(-10, 0); ctx.lineTo(-15, -3); ctx.lineTo(-13, 2); ctx.closePath();
      ctx.fill();
      // ears
      ctx.fillStyle = '#5a3a20';
      ctx.beginPath();
      ctx.moveTo(6, -4); ctx.lineTo(9, -8); ctx.lineTo(8, -3); ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(6, 4); ctx.lineTo(9, 8); ctx.lineTo(8, 3); ctx.closePath(); ctx.fill();
      // snout
      ctx.fillStyle = '#3a2410';
      ctx.fillRect(8, -2, 4, 4);
      // eyes
      ctx.fillStyle = '#ffce44';
      ctx.beginPath(); ctx.arc(5, -2, 1, 0, Math.PI*2);
      ctx.arc(5,  2, 1, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      if (s.life < 4) {
        ctx.strokeStyle = '#7a5030';
        ctx.lineWidth = 1.5;
        ctx.globalAlpha = 0.4;
        ctx.beginPath(); ctx.arc(s.x, s.y, 14, 0, Math.PI*2); ctx.stroke();
        ctx.globalAlpha = 1;
      }
    } else if (s.kind === 'spider') {
      const ang = Math.atan2(s.vy, s.vx);
      const leg = Math.sin(gameTime * 40 + s.x * 0.3) * 1.5;
      ctx.save();
      ctx.translate(s.x, s.y);
      ctx.rotate(ang);
      // tiny black body
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.stroke();
      // 8 legs as tiny lines, oscillating
      ctx.strokeStyle = '#5a3030';
      ctx.lineWidth = 1;
      for (let k = 0; k < 4; k++) {
        const a = (k - 1.5) * 0.45;
        const lx = Math.cos(a) * (5 + leg), ly = Math.sin(a) * (5 + leg);
        ctx.beginPath();
        ctx.moveTo(0, 0);  ctx.lineTo( lx,  ly);
        ctx.moveTo(0, 0);  ctx.lineTo(-lx,  ly);
        ctx.stroke();
      }
      // glowing red eyes
      ctx.fillStyle = '#ff5050';
      ctx.beginPath(); ctx.arc(2, -1, 0.8, 0, Math.PI*2);
      ctx.arc(2, 1, 0.8, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      if (s.life < 2) {
        ctx.strokeStyle = '#5a3030';
        ctx.lineWidth = 1;
        ctx.globalAlpha = 0.4;
        ctx.beginPath(); ctx.arc(s.x, s.y, 7, 0, Math.PI*2); ctx.stroke();
        ctx.globalAlpha = 1;
      }
    } else if (s.kind === 'spirit') {
      // ethereal glowing orb with a wisp tail
      const pulse = 1 + Math.sin(gameTime * 6 + s.x) * 0.15;
      ctx.save();
      // outer glow
      const glow = ctx.createRadialGradient(s.x, s.y, 1, s.x, s.y, 16 * pulse);
      glow.addColorStop(0, '#fff');
      glow.addColorStop(0.4, '#9bf0ff');
      glow.addColorStop(1, '#9bf0ff00');
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(s.x, s.y, 16 * pulse, 0, Math.PI*2); ctx.fill();
      // core
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(s.x, s.y, 3.5, 0, Math.PI*2); ctx.fill();
      // tail — points backward along velocity
      const ang = Math.atan2(s.vy, s.vx);
      ctx.strokeStyle = '#9bf0ff';
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.55;
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(s.x - Math.cos(ang) * 12, s.y - Math.sin(ang) * 12);
      ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.restore();
      if (s.life < 2.5) {
        ctx.strokeStyle = '#9bf0ff';
        ctx.lineWidth = 1.5;
        ctx.globalAlpha = 0.4;
        ctx.beginPath(); ctx.arc(s.x, s.y, 12, 0, Math.PI*2); ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }
  }

  // tesla chain sparks — jagged white-on-blue lines, drawn briefly
  for (const sp of sparks) {
    const a = sp.life / sp.max;
    const dx = sp.x2 - sp.x1, dy = sp.y2 - sp.y1;
    const dist = Math.hypot(dx, dy) || 1;
    const nx = -dy / dist, ny = dx / dist; // perpendicular for jitter
    // outer glow
    ctx.globalAlpha = a * 0.5;
    ctx.strokeStyle = '#7ec8ff';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(sp.x1, sp.y1);
    ctx.lineTo(sp.x2, sp.y2);
    ctx.stroke();
    // jagged core
    ctx.globalAlpha = a;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sp.x1, sp.y1);
    const segs = 4;
    for (let k = 1; k < segs; k++) {
      const t = k / segs;
      const jx = sp.x1 + dx * t + nx * (Math.random() - 0.5) * 12;
      const jy = sp.y1 + dy * t + ny * (Math.random() - 0.5) * 12;
      ctx.lineTo(jx, jy);
    }
    ctx.lineTo(sp.x2, sp.y2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // melee swing visuals — drawn over bullets. Two shapes:
  //   arc:    a fading wedge in front of the player (katana)
  //   circle: an expanding shockwave ring planted in front (warhammer)
  for (const s of slashes) {
    const t = s.life / s.max;       // 1 → 0
    const trail = 1 - t;            // 0 → 1, grows as the effect fades
    if (s.hitShape === 'circle') {
      // expanding ring shockwave for the warhammer smash
      const cx = s.x + Math.cos(s.ang) * s.range;
      const cy = s.y + Math.sin(s.ang) * s.range;
      const r = s.circleR * (0.55 + trail * 0.55); // starts small, expands
      ctx.save();
      // soft inner glow
      ctx.globalAlpha = Math.min(1, t * 1.6);
      const grad = ctx.createRadialGradient(cx, cy, r * 0.2, cx, cy, r);
      grad.addColorStop(0, s.color + 'cc');
      grad.addColorStop(1, s.color + '00');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
      // bright outer ring
      ctx.globalAlpha = t;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 4;
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
      // secondary ring lagging slightly behind for thickness
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(cx, cy, r * 0.85, 0, Math.PI*2); ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.restore();
    } else {
      // sweeping wedge for the katana slash
      ctx.save();
      ctx.translate(s.x, s.y);
      ctx.rotate(s.ang);
      ctx.globalAlpha = Math.min(1, t * 1.6);
      const grad = ctx.createRadialGradient(0, 0, s.range * 0.35, 0, 0, s.range);
      grad.addColorStop(0, 'rgba(255,255,255,0)');
      grad.addColorStop(0.7, s.color + 'aa');
      grad.addColorStop(1, s.color + '00');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, s.range, -s.arc / 2 + trail * 0.1, s.arc / 2 - trail * 0.1);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = t;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(0, 0, s.range, -s.arc / 2 + trail * 0.15, s.arc / 2 - trail * 0.15);
      ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.restore();
    }
  }

  // money crates
  for (const cr of crates) {
    const bob = Math.sin(gameTime * 3 + cr.x) * 2;
    const cy = cr.y + bob;
    // aura
    const aura = ctx.createRadialGradient(cr.x, cy, 4, cr.x, cy, 30);
    aura.addColorStop(0, 'rgba(255, 206, 68, 0.55)');
    aura.addColorStop(1, 'rgba(255, 206, 68, 0)');
    ctx.fillStyle = aura;
    ctx.beginPath(); ctx.arc(cr.x, cy, 30, 0, Math.PI*2); ctx.fill();
    // wooden frame
    ctx.fillStyle = '#5a3a14';
    ctx.fillRect(cr.x - 14, cy - 12, 28, 24);
    ctx.strokeStyle = '#2a1808';
    ctx.lineWidth = 1;
    ctx.strokeRect(cr.x - 14, cy - 12, 28, 24);
    // gold face with subtle vertical gradient
    const face = ctx.createLinearGradient(cr.x, cy - 10, cr.x, cy + 10);
    face.addColorStop(0, '#ffe98a');
    face.addColorStop(1, '#d6a020');
    ctx.fillStyle = face;
    ctx.fillRect(cr.x - 12, cy - 10, 24, 20);
    ctx.strokeStyle = '#a07e1c';
    ctx.strokeRect(cr.x - 12, cy - 10, 24, 20);
    // coin stack icon on top of crate
    for (let i = 0; i < 3; i++) {
      const sy = cy - 14 - i * 2;
      ctx.fillStyle = '#ffce44';
      ctx.beginPath(); ctx.ellipse(cr.x, sy, 5, 1.6, 0, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#8a6c12';
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }
    // $ engraving on face
    ctx.fillStyle = '#3a2810';
    ctx.font = 'bold 14px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('$', cr.x, cy + 5);
    ctx.textAlign = 'left';
  }

  // boss-defeat chests
  for (const c of chests) {
    const bob = Math.sin(gameTime * 2.4 + c.x * 0.07) * 1.6;
    const pulse = 1 + Math.sin(gameTime * 5) * 0.12;
    const cy = c.y + bob;
    // strong aura — this is a big reward
    const aura = ctx.createRadialGradient(c.x, cy, 4, c.x, cy, 44 * pulse);
    aura.addColorStop(0, 'rgba(255, 220, 110, 0.6)');
    aura.addColorStop(1, 'rgba(255, 220, 110, 0)');
    ctx.fillStyle = aura;
    ctx.beginPath(); ctx.arc(c.x, cy, 44 * pulse, 0, Math.PI*2); ctx.fill();
    // wooden chest base
    ctx.fillStyle = '#5a3a14';
    ctx.fillRect(c.x - 18, cy - 6, 36, 18);
    ctx.strokeStyle = '#2a1808';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(c.x - 18, cy - 6, 36, 18);
    // lid (rounded)
    ctx.fillStyle = '#7a4e1c';
    ctx.beginPath();
    ctx.moveTo(c.x - 18, cy - 4);
    ctx.quadraticCurveTo(c.x, cy - 16, c.x + 18, cy - 4);
    ctx.lineTo(c.x + 18, cy);
    ctx.lineTo(c.x - 18, cy);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // gold bands
    ctx.fillStyle = '#ffce44';
    ctx.fillRect(c.x - 18, cy - 1, 36, 2);
    ctx.fillRect(c.x - 18, cy + 9, 36, 2);
    // gold lock
    ctx.fillStyle = '#ffe066';
    ctx.fillRect(c.x - 4, cy + 2, 8, 6);
    ctx.strokeStyle = '#8a6c12';
    ctx.lineWidth = 1;
    ctx.strokeRect(c.x - 4, cy + 2, 8, 6);
    // keyhole
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.arc(c.x, cy + 4.5, 1, 0, Math.PI*2); ctx.fill();
    // little sparkle on the lid
    ctx.fillStyle = '#fff5b8';
    const sx = c.x - 6 + Math.sin(gameTime * 2) * 2;
    const sy2 = cy - 8 + Math.cos(gameTime * 2) * 1;
    ctx.beginPath(); ctx.arc(sx, sy2, 1.6, 0, Math.PI*2); ctx.fill();
  }

  // gun pickups
  for (const g of guns) {
    const w = WEAPONS[g.weapon];
    const flash = g.life < 5 && Math.floor(g.life * 6) % 2 === 0;
    const bob = Math.sin(gameTime * 3 + g.x) * 2;
    const highlighted = g === nearbyGun;
    const cy = g.y + bob;
    // aura
    const auraR = highlighted ? 36 : 28;
    const aura = ctx.createRadialGradient(g.x, cy, 4, g.x, cy, auraR);
    aura.addColorStop(0, w.color + 'cc');
    aura.addColorStop(1, w.color + '00');
    ctx.fillStyle = aura;
    ctx.beginPath(); ctx.arc(g.x, cy, auraR, 0, Math.PI*2); ctx.fill();
    // crate-style box
    const bw = 30, bh = 28;
    ctx.fillStyle = flash ? '#fff' : w.color;
    ctx.fillRect(g.x - bw/2, cy - bh/2, bw, bh);
    ctx.strokeStyle = highlighted ? '#fff' : '#1a1a1a';
    ctx.lineWidth = highlighted ? 3 : 2;
    ctx.strokeRect(g.x - bw/2, cy - bh/2, bw, bh);
    // inner darker rim for depth
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth = 1;
    ctx.strokeRect(g.x - bw/2 + 3, cy - bh/2 + 3, bw - 6, bh - 6);
    // gun silhouette (drawn horizontally, slightly left of center so it fits)
    ctx.save();
    ctx.translate(g.x - 8, cy);
    drawGun(g.weapon, 7);
    ctx.restore();
    // small tag chip in the bottom-right corner
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(g.x + bw/2 - 10, cy + bh/2 - 9, 9, 8);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 8px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(w.tag, g.x + bw/2 - 5.5, cy + bh/2 - 2);
    ctx.textAlign = 'left';
  }

  // blade crates — hover to inspect, F or click to equip
  for (const c of bladeCrates) {
    const def = SECONDARIES[c.secondary];
    // Defensive: skip crates whose secondary id is unknown, or whose color
    // isn't a clean 7-char hex (anything else makes the alpha concatenation
    // below blow up inside addColorStop).
    if (!def || !isHexColor(def.color)) continue;
    const flash = c.life < 5 && Math.floor(c.life * 6) % 2 === 0;
    const bob = Math.sin(gameTime * 3 + c.x * 0.07) * 2;
    const cy = c.y + bob;
    const highlighted = c === nearbyBladeCrate;
    // aura — stronger when nearby
    const auraR = highlighted ? 36 : 28;
    const aura = ctx.createRadialGradient(c.x, cy, 4, c.x, cy, auraR);
    aura.addColorStop(0, def.color + 'cc');
    aura.addColorStop(1, def.color + '00');
    ctx.fillStyle = aura;
    ctx.beginPath(); ctx.arc(c.x, cy, auraR, 0, Math.PI*2); ctx.fill();
    // crate shape — wooden box with a colored ribbon across
    const bw = 28, bh = 22;
    ctx.fillStyle = '#3a2410';
    ctx.fillRect(c.x - bw/2, cy - bh/2, bw, bh);
    ctx.strokeStyle = highlighted ? '#fff' : '#1a0e04';
    ctx.lineWidth = highlighted ? 3 : 1.5;
    ctx.strokeRect(c.x - bw/2, cy - bh/2, bw, bh);
    // ribbon
    ctx.fillStyle = flash ? '#fff' : def.color;
    ctx.fillRect(c.x - bw/2, cy - 4, bw, 8);
    ctx.strokeStyle = '#0a0a0a';
    ctx.lineWidth = 1;
    ctx.strokeRect(c.x - bw/2, cy - 4, bw, 8);
    // tag letter (so the player can read what's inside)
    ctx.fillStyle = '#1a1a1a';
    ctx.font = 'bold 11px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(def.tag, c.x, cy + 4);
    ctx.textAlign = 'left';
  }

  // ability books — open grimoires the player walks over to unlock abilities
  for (const b of abilityBooks) {
    const def = ABILITIES[b.abilityId];
    const flash = b.life < 8 && Math.floor(b.life * 6) % 2 === 0;
    const bob = Math.sin(gameTime * 3 + b.x * 0.07) * 2;
    const cy = b.y + bob;
    // pulsing aura
    const pulse = 1 + Math.sin(gameTime * 4 + b.x) * 0.1;
    const auraR = 30 * pulse;
    const aura = ctx.createRadialGradient(b.x, cy, 4, b.x, cy, auraR);
    aura.addColorStop(0, def.color + 'cc');
    aura.addColorStop(1, def.color + '00');
    ctx.fillStyle = aura;
    ctx.beginPath(); ctx.arc(b.x, cy, auraR, 0, Math.PI*2); ctx.fill();
    // open-book base — two parchment pages with a spine in the middle
    const bw = 36, bh = 28;
    ctx.fillStyle = '#3a2410';
    ctx.fillRect(b.x - bw/2, cy - bh/2, bw, bh);
    ctx.strokeStyle = '#1a0e04';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(b.x - bw/2, cy - bh/2, bw, bh);
    // left page
    ctx.fillStyle = flash ? '#fff' : '#f4e4b5';
    ctx.fillRect(b.x - bw/2 + 3, cy - bh/2 + 3, bw/2 - 4, bh - 6);
    // right page
    ctx.fillRect(b.x + 1, cy - bh/2 + 3, bw/2 - 4, bh - 6);
    // spine
    ctx.fillStyle = '#8a5a2a';
    ctx.fillRect(b.x - 1, cy - bh/2 + 2, 2, bh - 4);
    // page lines (subtle)
    ctx.strokeStyle = '#8a5a2a';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < 3; i++) {
      const ly = cy - 4 + i * 4;
      ctx.beginPath();
      ctx.moveTo(b.x - bw/2 + 6, ly); ctx.lineTo(b.x - 3, ly);
      ctx.moveTo(b.x + 3, ly); ctx.lineTo(b.x + bw/2 - 6, ly);
      ctx.stroke();
    }
    // ability symbol drawn across the open pages
    drawAbilityIcon(b.abilityId, b.x, cy - 1, 10, def.color);
  }

  // random pickups
  for (const p of pickups) {
    const def = PICKUP_TYPES[p.type];
    const flash = p.life < 5 && Math.floor(p.life * 6) % 2 === 0;
    const bob = Math.sin(gameTime * 3.4 + p.x * 0.13) * 2.5;
    const pulse = 1 + Math.sin(gameTime * 4 + p.x) * 0.08;
    const cy = p.y + bob;
    // aura
    const auraR = 24 * pulse;
    const aura = ctx.createRadialGradient(p.x, cy, 3, p.x, cy, auraR);
    aura.addColorStop(0, def.color + 'cc');
    aura.addColorStop(1, def.color + '00');
    ctx.fillStyle = aura;
    ctx.beginPath(); ctx.arc(p.x, cy, auraR, 0, Math.PI*2); ctx.fill();
    // base disc
    ctx.fillStyle = flash ? '#fff' : def.color;
    ctx.beginPath(); ctx.arc(p.x, cy, 12, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 2;
    ctx.stroke();
    // inner highlight crescent (top-left) for a glassy/coin look
    ctx.save();
    ctx.beginPath(); ctx.arc(p.x, cy, 12, 0, Math.PI*2); ctx.clip();
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(p.x - 4, cy - 4, 7, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    // type-specific icon on top
    drawPickupIcon(p.type, p.x, cy, 9);
  }

  // pets (drawn under the player so the player silhouette stays primary)
  drawPets();

  // Bow charge bar — above the player while the bow is drawn. Color shifts
  // from blue → yellow as charge increases so the player can read max-draw
  // at a glance.
  if (player.bowHeld) {
    const bdef = SECONDARIES[player.secondary];
    if (bdef && bdef.kind === 'charge') {
      const t = Math.max(0, Math.min(1, player.bowCharge / bdef.chargeTime));
      const bw = 36, bh = 4;
      const bx = player.x - bw / 2;
      const by = player.y - player.r - 14;
      // backdrop
      ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
      ctx.fillRect(bx - 1, by - 1, bw + 2, bh + 2);
      // empty track
      ctx.fillStyle = '#22252e';
      ctx.fillRect(bx, by, bw, bh);
      // fill (color lerps blue → cyan → yellow)
      let fillColor;
      if (t < 0.5)      fillColor = '#5a87c4';
      else if (t < 0.9) fillColor = '#9bc8e8';
      else              fillColor = '#ffd166';
      ctx.fillStyle = fillColor;
      ctx.fillRect(bx, by, bw * t, bh);
      // "FULL DRAW" indicator + flash at max
      if (t >= 1) {
        const pulse = 0.5 + 0.5 * Math.sin(gameTime * 16);
        ctx.fillStyle = `rgba(255, 209, 102, ${pulse})`;
        ctx.fillRect(bx, by, bw, bh);
      }
    }
  }

  // player — always rendered. During invuln the alpha pulses between
  // "ghosted" (0.35) and "almost solid" (0.85) so i-frames read clearly
  // without ever making the player vanish from view (the old skip-frame
  // flicker could disappear for hundreds of ms on long invuln windows).
  {
    ctx.save();
    if (player.invuln > 0) {
      const dim = Math.floor(player.invuln * 12) % 2 === 0;
      ctx.globalAlpha = dim ? 0.35 : 0.85;
    }
    const dx = mouse.x - player.x, dy = mouse.y - player.y;
    const m = Math.hypot(dx, dy) || 1;
    const cosA = dx / m, sinA = dy / m;
    const facing = Math.atan2(dy, dx);

    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.32)';
    ctx.beginPath();
    ctx.ellipse(player.x, player.y + player.r * 0.55, player.r * 0.78, player.r * 0.28, 0, 0, Math.PI*2);
    ctx.fill();

    // shield ring
    if (player.buffs.shield > 0) {
      ctx.strokeStyle = '#7ec8ff';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(player.x, player.y, player.r + 6, 0, Math.PI*2); ctx.stroke();
    }

    if (hasCustomSprite('player')) {
      // user's pixel art replaces the procedural body; gun still draws on top
      drawCustomSprite('player', player.x, player.y, player.r * 2.4);
    } else {
      // body
      ctx.fillStyle = '#ebebef';
      ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#2c2c34';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // eyes facing mouse
      const eyeOff = player.r * 0.36;
      const eyeFwd = player.r * 0.4;
      const ex = player.x + cosA * eyeFwd;
      const ey = player.y + sinA * eyeFwd;
      const epx = -sinA * eyeOff, epy = cosA * eyeOff;
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath(); ctx.arc(ex + epx, ey + epy, 1.8, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex - epx, ey - epy, 1.8, 0, Math.PI*2); ctx.fill();
    }

    // gun held out front — model varies per weapon
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(facing);
    drawGun(player.weapon, player.r);
    ctx.restore();

    // Bow held alongside when the secondary is the Charged Bow. String bends
    // back and an arrow nocks itself as the player draws.
    if (player.secondary === 'bow') {
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.rotate(facing);
      const bdef = SECONDARIES.bow;
      const t = player.bowHeld ? Math.max(0, Math.min(1, player.bowCharge / bdef.chargeTime)) : 0;
      drawBow(player.r, t);
      ctx.restore();
    }

    ctx.restore(); // close the invuln-alpha block
  }

  // ---- P2 (local co-op) ----
  if (coopEnabled) {
    ctx.save();
    if (player2.invuln > 0) {
      const dim = Math.floor(player2.invuln * 12) % 2 === 0;
      ctx.globalAlpha = dim ? 0.35 : 0.85;
    }
    // Aim toward nearest zombie for facing direction (matches its auto-fire)
    let nx = player2.x + 1, ny = player2.y;
    let bd2 = Infinity;
    for (const z of zombies) {
      if (z.isDummy) continue;
      const zdx = z.x - player2.x, zdy = z.y - player2.y;
      const d2 = zdx*zdx + zdy*zdy;
      if (d2 < bd2) { bd2 = d2; nx = z.x; ny = z.y; }
    }
    const facing2 = Math.atan2(ny - player2.y, nx - player2.x);
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.32)';
    ctx.beginPath();
    ctx.ellipse(player2.x, player2.y + player2.r * 0.55, player2.r * 0.78, player2.r * 0.28, 0, 0, Math.PI*2);
    ctx.fill();
    if (player2.buffs.shield > 0) {
      ctx.strokeStyle = '#9bf07a';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(player2.x, player2.y, player2.r + 6, 0, Math.PI*2); ctx.stroke();
    }
    // body — green tint to differentiate from P1
    ctx.fillStyle = '#bff0bf';
    ctx.beginPath(); ctx.arc(player2.x, player2.y, player2.r, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#2c5a2c';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // little "2" marker
    ctx.fillStyle = '#1a3a1a';
    ctx.font = 'bold 9px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('2', player2.x, player2.y + 3);
    ctx.textAlign = 'left';
    // gun facing nearest zombie
    ctx.save();
    ctx.translate(player2.x, player2.y);
    ctx.rotate(facing2);
    drawGun(player.weapon, player2.r);
    ctx.restore();
    // HP bar above P2
    if (player2.hp < player2.maxHp) {
      const bw = player2.r * 2.4;
      ctx.fillStyle = '#222';
      ctx.fillRect(player2.x - bw/2, player2.y - player2.r - 9, bw, 3);
      ctx.fillStyle = '#9bf07a';
      ctx.fillRect(player2.x - bw/2, player2.y - player2.r - 9, bw * (player2.hp / player2.maxHp), 3);
    }
    ctx.restore(); // close the P2 invuln-alpha block
  }

  // build-mode ghost preview at the cursor (in world coords)
  drawBuildMode();

  // floating reward text (above everything in the world)
  for (const f of floaters) {
    const a = Math.max(0, Math.min(1, f.life / 1.2));
    ctx.font = 'bold 13px system-ui';
    ctx.textAlign = 'center';
    ctx.fillStyle = `rgba(0,0,0,${0.7 * a})`;
    ctx.fillText(f.text, f.x + 1, f.y + 1);
    ctx.fillStyle = f.color;
    ctx.globalAlpha = a;
    ctx.fillText(f.text, f.x, f.y);
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';
  }

  // end world (shake) layer
  ctx.restore();

  // vignette — drawn over world, under HUD
  const vg = ctx.createRadialGradient(W/2, H/2, Math.min(W, H) * 0.42, W/2, H/2, Math.max(W, H) * 0.72);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.45)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);

  // Blackout event — vision shrinks to a small lit circle around the player.
  // Fades in for the first second, fades out for the last second so the
  // transition isn't jarring.
  if (activeEvent && activeEvent.type === 'blackout') {
    const t = activeEvent.timer;
    let intensity = 1;
    if (t < 1) intensity = t;             // fading out
    else if (t > 9) intensity = 10 - t;   // fading in (timer starts at 10)
    intensity = Math.max(0, Math.min(1, intensity));
    const r = 160;
    const bg = ctx.createRadialGradient(player.x, player.y, r * 0.5, player.x, player.y, r * 1.6);
    bg.addColorStop(0, 'rgba(0,0,0,0)');
    bg.addColorStop(1, `rgba(0,0,0,${0.92 * intensity})`);
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);
  }

  // red damage flash
  if (flashRed > 0) {
    ctx.fillStyle = `rgba(220, 24, 24, ${flashRed * 0.6})`;
    ctx.fillRect(0, 0, W, H);
  }

  // HUD
  drawHud();
  drawStats();
  drawWaveBanner();
  drawBossRushBanner();
  drawShameBanner();
  drawChaosBanner();
  drawGuidedTutorialBanner();
  drawPauseButton();
  drawCheats();
  if (nearbyGun && nearbyGun.weapon !== player.weapon) drawSwapPrompt();
  if (nearbyBladeCrate && nearbyBladeCrate.secondary !== player.secondary) drawBladeSwapPrompt();
  if (inShop()) drawShop();
  drawBuildToolbar();
  drawTooltips();
  drawCardPicker(); // sits on top of everything when active
}

// ----- Building visuals -----
function drawBuilding(b) {
  const x = b.x - b.w / 2, y = b.y - b.h / 2;
  if (b.type === 'wall') {
    // metal-grey base + colored trim
    ctx.fillStyle = '#1d2230';
    ctx.fillRect(x, y, b.w, b.h);
    ctx.strokeStyle = '#0a0a0a';
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, b.w, b.h);
    ctx.fillStyle = b.color;
    ctx.fillRect(x + 3, y + 3, b.w - 6, 5);
    ctx.fillRect(x + 3, y + b.h - 8, b.w - 6, 5);
    // bolts
    ctx.fillStyle = '#5a5d66';
    ctx.beginPath(); ctx.arc(x + 6, y + 6, 1.6, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + b.w - 6, y + 6, 1.6, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 6, y + b.h - 6, 1.6, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + b.w - 6, y + b.h - 6, 1.6, 0, Math.PI*2); ctx.fill();
  } else if (b.type === 'turret') {
    // base
    ctx.fillStyle = '#22252e';
    ctx.fillRect(x, y, b.w, b.h);
    ctx.strokeStyle = '#0a0a0a';
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, b.w, b.h);
    // rotating head
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.aimAng);
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#15151a';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // barrel
    ctx.fillStyle = '#15151a';
    ctx.fillRect(6, -2, 14, 4);
    ctx.fillStyle = b.color;
    ctx.fillRect(18, -2.5, 4, 5);
    ctx.restore();
  } else if (b.type === 'mortar') {
    // dark base + thick angled barrel that sweeps to track its target
    ctx.fillStyle = '#22252e';
    ctx.fillRect(x, y, b.w, b.h);
    ctx.strokeStyle = '#0a0a0a';
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, b.w, b.h);
    // armored ring
    ctx.strokeStyle = '#5a3030';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(b.x, b.y, 12, 0, Math.PI*2); ctx.stroke();
    // angled barrel — pitches up so it reads as a mortar/lobber
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.aimAng);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, -4, 20, 8);
    ctx.fillStyle = b.color;
    ctx.fillRect(18, -5, 6, 10);  // muzzle ring
    ctx.restore();
    // shell-loaded indicator
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.arc(b.x, b.y, 3, 0, Math.PI*2); ctx.fill();
  } else if (b.type === 'heal') {
    // green crystal-like orb on a stand; pulses gently
    const pulse = 1 + Math.sin(gameTime * 4 + b.x * 0.07) * 0.08;
    // base
    ctx.fillStyle = '#2a3a30';
    ctx.fillRect(x, y + b.h - 8, b.w, 8);
    ctx.strokeStyle = '#0a0a0a';
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y + b.h - 8, b.w, 8);
    // pad ring on the floor (showing radius)
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.radius * pulse, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    // crystal — diamond shape
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.moveTo(b.x,         y + 2);
    ctx.lineTo(b.x + 11,    b.y);
    ctx.lineTo(b.x,         y + b.h - 6);
    ctx.lineTo(b.x - 11,    b.y);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#1a3018';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // bright sparkle in the center
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(b.x, b.y, 2, 0, Math.PI*2); ctx.fill();
  } else if (b.type === 'spike') {
    // plate + zigzag spikes
    ctx.fillStyle = '#3a3d44';
    ctx.fillRect(x, y, b.w, b.h);
    ctx.strokeStyle = '#0a0a0a';
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, b.w, b.h);
    ctx.fillStyle = b.color;
    ctx.beginPath();
    for (let k = 0; k < 5; k++) {
      const sx = x + 3 + k * 7;
      ctx.moveTo(sx, y + b.h - 4);
      ctx.lineTo(sx + 3, y + 4);
      ctx.lineTo(sx + 6, y + b.h - 4);
      ctx.closePath();
    }
    ctx.fill();
    ctx.strokeStyle = '#15151a';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  // HP bar (only when wounded)
  if (b.hpMax && b.hp < b.hpMax) {
    const f = Math.max(0, b.hp / b.hpMax);
    ctx.fillStyle = '#222';
    ctx.fillRect(b.x - b.w/2, b.y - b.h/2 - 7, b.w, 3);
    ctx.fillStyle = f > 0.5 ? '#5cb85c' : f > 0.25 ? '#e0a233' : '#d33';
    ctx.fillRect(b.x - b.w/2, b.y - b.h/2 - 7, b.w * f, 3);
  }
}

function drawBuildMode() {
  if (!buildMode) return;
  // Resolve buildSelected to a parts-list. Single buildings: 1 part at (0,0).
  // Templates: their parts array. Saved: the player's stored layout (or null
  // if nothing's saved → render nothing).
  let parts = null;
  if (buildSelected === 'saved') {
    parts = loadSavedBaseLayout();
  } else if (typeof buildSelected === 'string' && buildSelected.startsWith('template:')) {
    const t = BASE_TEMPLATES.find(t => t.id === buildSelected.slice('template:'.length));
    if (t) parts = t.parts;
  } else if (BUILDINGS[buildSelected]) {
    parts = [{ type: buildSelected, dx: 0, dy: 0 }];
  }
  if (!parts || parts.length === 0) return;

  const baseX = Math.round(mouse.x / 40) * 40;
  const baseY = Math.round(mouse.y / 40) * 40;
  // Pre-validate ALL parts so the whole template glows red when blocked
  // (instead of mixing green + red per piece — confusing on placement intent).
  let totalCost = 0;
  let allOk = true;
  const partRects = [];
  for (const p of parts) {
    const def = BUILDINGS[p.type];
    if (!def) continue;
    const px = baseX + p.dx;
    const py = baseY + p.dy;
    let selfOverlap = false;
    for (const r of partRects) {
      if (Math.abs(px - r.x) < (def.w + BUILDINGS[r.type].w) / 2 &&
          Math.abs(py - r.y) < (def.h + BUILDINGS[r.type].h) / 2) {
        selfOverlap = true; break;
      }
    }
    const placeable = !selfOverlap && canPlaceBuilding(px, py, def);
    if (!placeable) allOk = false;
    totalCost += def.cost;
    partRects.push({ type: p.type, x: px, y: py, ok: placeable });
  }
  if (player.money < totalCost) allOk = false;

  ctx.save();
  ctx.setLineDash([4, 4]);
  ctx.lineWidth = 2;
  for (const r of partRects) {
    const def = BUILDINGS[r.type];
    const okHere = allOk && r.ok;
    ctx.globalAlpha = 0.55;
    ctx.fillStyle = okHere ? def.color : '#d33';
    ctx.fillRect(r.x - def.w / 2, r.y - def.h / 2, def.w, def.h);
    ctx.strokeStyle = okHere ? '#ffffff' : '#d33';
    ctx.strokeRect(r.x - def.w / 2, r.y - def.h / 2, def.w, def.h);
    // Turret / mortar range hint — but only if there's just one (multi-part
    // templates would clutter the screen with overlapping range rings).
    if (def.range && partRects.length === 1) {
      ctx.globalAlpha = 0.18;
      ctx.beginPath(); ctx.arc(r.x, r.y, def.range, 0, Math.PI * 2); ctx.stroke();
    }
  }
  ctx.setLineDash([]);
  ctx.restore();
}

function drawBuildToolbar() {
  if (!buildMode) { buildToolbarRects = null; return; }
  // Two-row toolbar: building types on top, prebuilt templates + Save +
  // Load below. Each rect carries a `select` callback so the mousedown
  // handler can dispatch without special-casing by kind.
  const sw1 = 130, sh1 = 64, gap1 = 10;
  const row1Total = BUILDING_KEYS.length * sw1 + (BUILDING_KEYS.length - 1) * gap1;
  const sw2 = 110, sh2 = 60, gap2 = 8;
  const row2Slots = BASE_TEMPLATES.length + 2; // templates + Save + Load
  const row2Total = row2Slots * sw2 + (row2Slots - 1) * gap2;
  const panelW = Math.max(row1Total, row2Total);
  const startX = (W - panelW) / 2;
  const y1 = 44;
  const y2 = y1 + sh1 + 10;
  const panelH = sh1 + 10 + sh2 + 28;
  buildToolbarRects = [];
  // Backdrop covers both rows
  ctx.fillStyle = 'rgba(10, 12, 18, 0.94)';
  ctx.fillRect(startX - 14, y1 - 22, panelW + 28, panelH);
  ctx.strokeStyle = '#5a87c4';
  ctx.lineWidth = 1;
