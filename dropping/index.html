<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<title>DROPPING</title>
<style>
  html, body {
    margin: 0; height: 100%; width: 100%;
    background: #07080c; color: #eee;
    font-family: -apple-system, system-ui, sans-serif;
    overflow: hidden;
    user-select: none; -webkit-user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
    touch-action: none;
  }
  #game { position: fixed; inset: 0; display: block; }

  /* HUD */
  .hud {
    position: fixed; left: 0; right: 0; top: 0;
    padding: 10px 14px;
    display: flex; justify-content: space-between; align-items: center;
    pointer-events: none;
    font-size: 13px; letter-spacing: 2px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    z-index: 10;
  }
  .hud .right { text-align: right; opacity: 0.8; }

  /* Center overlays (menu, win, dead) */
  .overlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px;
    background: rgba(6,7,12,0.65);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 20;
    pointer-events: auto;
  }
  .overlay.hidden { display: none; }
  .overlay h1 { margin: 0; font-size: 36px; letter-spacing: 8px; }
  .overlay h2 { margin: 0; font-size: 22px; letter-spacing: 5px; }
  .overlay .sub { font-size: 12px; opacity: 0.7; letter-spacing: 2px; }
  .btn {
    background: #1a1d28; color: #eee;
    border: 1px solid #3a3f55; border-radius: 4px;
    padding: 12px 22px; font: inherit; letter-spacing: 3px;
    cursor: pointer; min-width: 220px;
  }
  .btn:hover, .btn:active { background: #262b3b; border-color: #6b7290; }
  .btn.primary { background: #2c4870; border-color: #5d8bbd; }
  .btn.primary:hover, .btn.primary:active { background: #355988; }
  .level-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; max-width: 360px; }

  /* Restart button (always-on small button top-right when playing) */
  #restartBtn {
    position: fixed; top: 8px; right: 8px;
    background: rgba(20,22,32,0.7); color: #eee;
    border: 1px solid #3a3f55; border-radius: 4px;
    padding: 8px 12px; font: 12px -apple-system, system-ui, sans-serif; letter-spacing: 2px;
    cursor: pointer; z-index: 15;
  }
  #restartBtn.hidden { display: none; }

  /* Crosshair (desktop only) */
  #crosshair {
    position: fixed; left: 50%; top: 50%;
    width: 6px; height: 6px; margin: -3px 0 0 -3px;
    background: rgba(255,255,255,0.8);
    border: 1px solid rgba(0,0,0,0.6);
    border-radius: 50%;
    pointer-events: none; z-index: 5;
  }
  body.touch #crosshair { display: none; }

  /* Touch joystick */
  #vstick {
    position: fixed; pointer-events: none; z-index: 50;
    width: 140px; height: 140px;
    border: 2px solid rgba(126, 200, 255, 0.55);
    border-radius: 50%;
    background: rgba(10, 14, 22, 0.45);
    display: none;
  }
  #vstick .knob {
    position: absolute; left: 50%; top: 50%;
    width: 60px; height: 60px; margin: -30px 0 0 -30px;
    border-radius: 50%;
    background: rgba(126, 200, 255, 0.65);
    border: 2px solid #fff;
  }
  body.touch #vstick.active { display: block; }

  /* Red flash on death */
  #flash {
    position: fixed; inset: 0; pointer-events: none;
    background: #c33; opacity: 0; z-index: 8;
    transition: opacity 0.3s;
  }
  #flash.on { opacity: 0.45; transition: none; }

  /* Error overlay */
  #errors {
    position: fixed; top: 8px; left: 8px;
    max-width: 360px; max-height: 50vh; overflow: auto;
    background: rgba(80,10,10,0.92); color: #ffd;
    border: 1px solid #c44; border-radius: 4px;
    padding: 8px 10px; font: 11px ui-monospace, monospace;
    z-index: 100; display: none;
    white-space: pre-wrap; word-break: break-word;
  }
  #errors.show { display: block; }
  #errors .copy {
    display: inline-block; margin-top: 6px;
    background: #222; color: #eee; border: 1px solid #555;
    padding: 3px 8px; border-radius: 3px; cursor: pointer;
    font: 11px -apple-system, system-ui, sans-serif;
  }
  #errors textarea {
    width: 100%; height: 140px; margin-top: 6px;
    background: #111; color: #eee; border: 1px solid #555;
    font: 11px ui-monospace, monospace;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div class="hud" id="hud">
  <div class="left" id="hudLevel">DROPPING</div>
  <div class="right" id="hudDepth"></div>
</div>

<button id="restartBtn" class="hidden">RESTART</button>

<div id="crosshair"></div>
<div id="vstick"><div class="knob"></div></div>
<div id="flash"></div>

<div class="overlay" id="menu">
  <h1>DROPPING</h1>
  <div class="sub">FALL · DODGE · LAND IN WATER</div>
  <div class="level-row" id="levelButtons"></div>
  <div class="sub" id="menuHelp"></div>
</div>

<div class="overlay hidden" id="won">
  <h2>YOU LANDED</h2>
  <div class="sub" id="wonSub"></div>
  <button class="btn primary" id="nextBtn">NEXT LEVEL</button>
  <button class="btn" id="wonMenuBtn">MENU</button>
</div>

<div class="overlay hidden" id="dead">
  <h2>SPLAT</h2>
  <div class="sub">YOU HIT A BLOCK</div>
  <button class="btn primary" id="retryBtn">TRY AGAIN</button>
  <button class="btn" id="deadMenuBtn">MENU</button>
</div>

<div id="errors"></div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
'use strict';

// ---------- Error capture (iOS has no DevTools) ----------
const recentErrors = [];
function logError(label, err) {
  const msg = (err && err.stack) ? err.stack : String(err);
  recentErrors.push('[' + label + '] ' + msg);
  if (recentErrors.length > 8) recentErrors.shift();
  renderErrorOverlay();
}
window.addEventListener('error', e => logError('error', e.error || e.message));
window.addEventListener('unhandledrejection', e => logError('promise', e.reason));
function renderErrorOverlay() {
  const el = document.getElementById('errors');
  if (!recentErrors.length) { el.classList.remove('show'); return; }
  el.classList.add('show');
  el.innerHTML = '';
  const pre = document.createElement('div');
  pre.textContent = recentErrors.join('\n\n');
  el.appendChild(pre);
  const btn = document.createElement('button');
  btn.className = 'copy';
  btn.textContent = 'COPY';
  btn.onclick = () => {
    const ta = document.createElement('textarea');
    ta.value = recentErrors.join('\n\n');
    el.appendChild(ta);
    ta.focus(); ta.select();
  };
  el.appendChild(btn);
}

// ---------- Touch detection ----------
const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
if (isTouch) document.body.classList.add('touch');

// ---------- Renderer / scene / camera ----------
const canvas = document.getElementById('game');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setClearColor(0x0a0d14);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x0a0d14, 8, 36);

const camera = new THREE.PerspectiveCamera(90, window.innerWidth / window.innerHeight, 0.05, 200);

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', resize);

// Lights
const ambient = new THREE.AmbientLight(0xffffff, 0.55);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xffffff, 0.7);
sun.position.set(5, 10, 4);
scene.add(sun);

// Webgl context loss → reload (v1 acceptable per plan)
canvas.addEventListener('webglcontextlost', e => { e.preventDefault(); location.reload(); });

// ---------- Procedural block textures ----------
function makeTexture(drawFn, size = 16) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const cx = c.getContext('2d');
  drawFn(cx, size);
  const tex = new THREE.CanvasTexture(c);
  tex.magFilter = THREE.NearestFilter;
  tex.minFilter = THREE.NearestMipMapNearestFilter;
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}
function noisyFill(cx, s, base, vary) {
  for (let y = 0; y < s; y++) for (let x = 0; x < s; x++) {
    const n = (Math.random() - 0.5) * vary;
    const r = Math.max(0, Math.min(255, base[0] + n));
    const g = Math.max(0, Math.min(255, base[1] + n));
    const b = Math.max(0, Math.min(255, base[2] + n));
    cx.fillStyle = 'rgb(' + (r|0) + ',' + (g|0) + ',' + (b|0) + ')';
    cx.fillRect(x, y, 1, 1);
  }
}

const TEX = {
  stone: makeTexture((cx, s) => { noisyFill(cx, s, [120,120,128], 40); }),
  dirt:  makeTexture((cx, s) => { noisyFill(cx, s, [110, 75, 50], 30); }),
  grass: makeTexture((cx, s) => {
    noisyFill(cx, s, [110, 75, 50], 30);
    for (let x = 0; x < s; x++) for (let y = 0; y < 4; y++) {
      const n = (Math.random() - 0.5) * 30;
      cx.fillStyle = 'rgb(' + ((70 + n)|0) + ',' + ((150 + n)|0) + ',' + ((60 + n)|0) + ')';
      cx.fillRect(x, y, 1, 1);
    }
  }),
  lava:  makeTexture((cx, s) => {
    for (let y = 0; y < s; y++) for (let x = 0; x < s; x++) {
      const n = Math.random();
      const r = 220 + (Math.random() * 35) | 0;
      const g = 60 + (n * 110) | 0;
      const b = 20 + (Math.random() * 20) | 0;
      cx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
      cx.fillRect(x, y, 1, 1);
    }
  }),
  water: makeTexture((cx, s) => {
    for (let y = 0; y < s; y++) for (let x = 0; x < s; x++) {
      const n = (Math.random() - 0.5) * 35;
      cx.fillStyle = 'rgb(' + ((30 + n)|0) + ',' + ((110 + n)|0) + ',' + ((200 + n)|0) + ')';
      cx.fillRect(x, y, 1, 1);
    }
  }),
  neon:  makeTexture((cx, s) => {
    noisyFill(cx, s, [20, 20, 30], 15);
    cx.fillStyle = '#3df';
    cx.fillRect(0, 0, s, 1);
    cx.fillRect(0, s - 1, s, 1);
    cx.fillRect(0, 0, 1, s);
    cx.fillRect(s - 1, 0, 1, s);
  }),
  neonPink: makeTexture((cx, s) => {
    noisyFill(cx, s, [25, 15, 35], 15);
    cx.fillStyle = '#f3d';
    cx.fillRect(0, 0, s, 1);
    cx.fillRect(0, s - 1, s, 1);
    cx.fillRect(0, 0, 1, s);
    cx.fillRect(s - 1, 0, 1, s);
  }),
};

// Shared geometry + materials per type (cheap, no per-block dispose)
const cubeGeom = new THREE.BoxGeometry(1, 1, 1);
const MAT = {
  stone:    new THREE.MeshLambertMaterial({ map: TEX.stone }),
  dirt:     new THREE.MeshLambertMaterial({ map: TEX.dirt }),
  grass:    new THREE.MeshLambertMaterial({ map: TEX.grass }),
  lava:     new THREE.MeshBasicMaterial({ map: TEX.lava }),
  water:    new THREE.MeshBasicMaterial({ map: TEX.water, transparent: true, opacity: 0.7 }),
  neon:     new THREE.MeshBasicMaterial({ map: TEX.neon }),
  neonPink: new THREE.MeshBasicMaterial({ map: TEX.neonPink }),
};

// ---------- Level data ----------
// Each level has a stack of horizontal slices at depths `y` (negative = down).
// Rows are read top-down in z (row 0 = -size/2 z) and chars left-right in x.
// '.' = empty, 'F' = full water floor row marker (synthesized below).
const LEVELS = [
  {
    name: 'CAVES',
    size: 9,
    startY: 2.11,
    waterY: -120,
    fog: { color: 0x0a0d14, near: 8, far: 36 },
    sky: 0x0a0d14,
    palette: { '.': null, 'S': 'stone', 'D': 'dirt', 'G': 'grass', 'L': 'lava', 'W': 'water' },
    slices: [
      { y: -6,  rows: ['.........','.........','...SSS...','..SSSSS..','..SS.SS..','..SSSSS..','...SSS...','.........','.........'] },
      { y: -16, rows: ['SS.....SS','S.......S','.........','....S....','...S.S...','....S....','.........','S.......S','SS.....SS'] },
      { y: -28, rows: ['.........','..DD.DD..','..D...D..','.........','....L....','.........','..D...D..','..DD.DD..','.........'] },
      { y: -40, rows: ['SSSSS....','S....S...','S....S...','S....S...','SSSSSS...','.........','.........','......SSS','......S.S'] },
      { y: -54, rows: ['.........','..SSSSS..','..S...S..','..S...S..','..S.L.S..','..S...S..','..S...S..','..SSSSS..','.........'] },
      { y: -68, rows: ['DDD...DDD','D.......D','D.......D','.........','....D....','.........','D.......D','D.......D','DDD...DDD'] },
      { y: -82, rows: ['.........','.SSSSSSS.','.S.....S.','.S.....S.','.S..L..S.','.S.....S.','.S.....S.','.SSSSSSS.','.........'] },
      { y: -96, rows: ['..S...S..','.S.....S.','S.......S','.........','.........','.........','S.......S','.S.....S.','..S...S..'] },
      { y: -108,rows: ['SS.....SS','S.D.D.D.S','..D...D..','..D...D..','.........','..D...D..','..D...D..','S.D.D.D.S','SS.....SS'] },
    ],
  },
  {
    name: 'LAVA TOWER',
    size: 9,
    startY: 2.11,
    waterY: -130,
    fog: { color: 0x180806, near: 6, far: 28 },
    sky: 0x180806,
    palette: { '.': null, 'S': 'stone', 'L': 'lava', 'W': 'water' },
    slices: [
      { y: -6,  rows: ['LL.....LL','L.......L','.........','...SSS...','...S.S...','...SSS...','.........','L.......L','LL.....LL'] },
      { y: -14, rows: ['L.......L','.SSSSSSS.','.S.....S.','.S.....S.','.S..L..S.','.S.....S.','.S.....S.','.SSSSSSS.','L.......L'] },
      { y: -22, rows: ['..LLLLL..','.L.....L.','L.......L','L.......L','L...S...L','L.......L','L.......L','.L.....L.','..LLLLL..'] },
      { y: -32, rows: ['SS.....SS','S.LLLLL.S','S.L...L.S','S.L...L.S','S.L.S.L.S','S.L...L.S','S.L...L.S','S.LLLLL.S','SS.....SS'] },
      { y: -42, rows: ['LLL...LLL','L.......L','L.SSSSS.L','L.S...S.L','L.S.L.S.L','L.S...S.L','L.SSSSS.L','L.......L','LLL...LLL'] },
      { y: -54, rows: ['.........','.LLLLLLL.','.L.....L.','.L.....L.','.L..S..L.','.L.....L.','.L.....L.','.LLLLLLL.','.........'] },
      { y: -66, rows: ['SSSS.SSSS','S.......S','S.LLLLL.S','S.L...L.S','S.L.L.L.S','S.L...L.S','S.LLLLL.S','S.......S','SSSS.SSSS'] },
      { y: -78, rows: ['L.L.L.L.L','.L.L.L.L.','L.L...L.L','.L.....L.','L.......L','.L.....L.','L.L...L.L','.L.L.L.L.','L.L.L.L.L'] },
      { y: -92, rows: ['..SSSSS..','.S.....S.','S.LLLLL.S','S.L...L.S','S.L...L.S','S.L...L.S','S.LLLLL.S','.S.....S.','..SSSSS..'] },
      { y: -108,rows: ['SS.....SS','S.LLLLL.S','S.L...L.S','S.L...L.S','S.L...L.S','S.L...L.S','S.L...L.S','S.LLLLL.S','SS.....SS'] },
      { y: -120,rows: ['LLLLLLLLL','L.......L','L.......L','L.......L','L.......L','L.......L','L.......L','L.......L','LLLLLLLLL'] },
    ],
  },
  {
    name: 'NEON',
    size: 9,
    startY: 2.11,
    waterY: -130,
    fog: { color: 0x05020a, near: 5, far: 22 },
    sky: 0x05020a,
    palette: { '.': null, 'N': 'neon', 'P': 'neonPink', 'W': 'water' },
    slices: [
      { y: -6,  rows: ['.........','...NNN...','...N.N...','..N...N..','..N...N..','..N...N..','...N.N...','...NNN...','.........'] },
      { y: -16, rows: ['P.......P','.P.....P.','..P...P..','...P.P...','....P....','...P.P...','..P...P..','.P.....P.','P.......P'] },
      { y: -26, rows: ['.........','.NNNNNNN.','.N.....N.','.N.....N.','.N..P..N.','.N.....N.','.N.....N.','.NNNNNNN.','.........'] },
      { y: -36, rows: ['PP.....PP','P.......P','.........','...NNN...','...N.N...','...NNN...','.........','P.......P','PP.....PP'] },
      { y: -48, rows: ['..N...N..','.N.....N.','N.......N','.........','....P....','.........','N.......N','.N.....N.','..N...N..'] },
      { y: -60, rows: ['PPP...PPP','P.......P','P.......P','.........','....N....','.........','P.......P','P.......P','PPP...PPP'] },
      { y: -74, rows: ['..NNNNN..','.N.....N.','N.......N','N.......N','N.......N','N.......N','N.......N','.N.....N.','..NNNNN..'] },
      { y: -88, rows: ['P.......P','.P.....P.','..PNNNP..','..P...P..','..P...P..','..P...P..','..PNNNP..','.P.....P.','P.......P'] },
      { y: -100,rows: ['NN.....NN','N.PPPPP.N','N.P...P.N','N.P...P.N','N.P.N.P.N','N.P...P.N','N.P...P.N','N.PPPPP.N','NN.....NN'] },
      { y: -118,rows: ['PPP...PPP','P.NNNNN.P','P.N...N.P','P.N...N.P','P.N...N.P','P.N...N.P','P.N...N.P','P.NNNNN.P','PPP...PPP'] },
    ],
  },
];

// ---------- Level loader ----------
let currentLevel = null;
let blocks = [];              // [{ x, y, z, type, mesh }]
let blockMap = new Map();     // "x|y|z" → block
let levelGroup = null;        // THREE.Group for easy disposal

function keyXYZ(x, y, z) { return x + '|' + y + '|' + z; }

function clearLevel() {
  if (levelGroup) {
    scene.remove(levelGroup);
    // Geometry + materials are shared (MAT/cubeGeom) so don't dispose them here.
    levelGroup = null;
  }
  blocks = [];
  blockMap = new Map();
}

function loadLevel(level) {
  clearLevel();
  currentLevel = level;
  scene.fog = new THREE.Fog(level.fog.color, level.fog.near, level.fog.far);
  renderer.setClearColor(level.sky);

  levelGroup = new THREE.Group();
  scene.add(levelGroup);

  const half = (level.size - 1) / 2;
  for (const slice of level.slices) {
    for (let zi = 0; zi < slice.rows.length; zi++) {
      const row = slice.rows[zi];
      for (let xi = 0; xi < row.length; xi++) {
        const ch = row[xi];
        const type = level.palette[ch];
        if (!type) continue;
        const x = xi - half;
        const z = zi - half;
        addBlock(x, slice.y, z, type);
      }
    }
  }

  // Water floor: fill (size+4) x (size+4) at waterY — generous catch zone.
  const w = level.size + 4;
  for (let zi = 0; zi < w; zi++) for (let xi = 0; xi < w; xi++) {
    addBlock(xi - (w - 1) / 2, level.waterY, zi - (w - 1) / 2, 'water');
  }

  // Spawn platform — 3x3 grass under the player so they can look around
  // and then step off the edge to start the drop. 'grass' is the only
  // block type that is safe to land on top of.
  for (let dx = -1; dx <= 1; dx++) for (let dz = -1; dz <= 1; dz++) {
    addBlock(dx, 0, dz, 'grass');
  }
}

function addBlock(x, y, z, type) {
  const k = keyXYZ(x, y, z);
  if (blockMap.has(k)) return;
  const mat = MAT[type];
  if (!mat) return;
  const mesh = new THREE.Mesh(cubeGeom, mat);
  mesh.position.set(x, y, z);
  levelGroup.add(mesh);
  const block = { x, y, z, type, mesh };
  blocks.push(block);
  blockMap.set(k, block);
}

// ---------- Player ----------
const player = {
  x: 0, y: 0, z: 0,
  vx: 0, vy: 0, vz: 0,
  yaw: 0, pitch: -0.3,
  r: 0.3, h: 1.6, // AABB half-width, full height
  alive: true,
};

function resetPlayer() {
  player.x = 0; player.z = 0;
  player.y = currentLevel.startY;
  player.vx = player.vy = player.vz = 0;
  player.yaw = 0;
  player.pitch = -0.3;
  player.alive = true;
}

// ---------- Input ----------
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === 'r' || e.key === 'R') {
    if (gameState === 'playing' || gameState === 'dead' || gameState === 'won') retryLevel();
  }
  if (e.key === 'Escape') {
    if (gameState === 'playing') { exitPointerLock(); showMenu(); }
  }
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// Mouse look (desktop): hold any mouse button and drag to rotate the camera.
// No pointer lock — keeps behavior consistent across browsers and avoids
// the click-then-click-again UX trap.
let mouseDragging = false;
const MOUSE_LOOK_SENS = 0.0035;
canvas.addEventListener('mousedown', (e) => {
  if (gameState !== 'playing') return;
  mouseDragging = true;
  e.preventDefault();
});
canvas.addEventListener('contextmenu', (e) => e.preventDefault());
window.addEventListener('mouseup',   () => { mouseDragging = false; });
window.addEventListener('mouseleave',() => { mouseDragging = false; });
window.addEventListener('mousemove', (e) => {
  if (!mouseDragging) return;
  player.yaw -= e.movementX * MOUSE_LOOK_SENS;
  player.pitch -= e.movementY * MOUSE_LOOK_SENS;
  const lim = Math.PI / 2 - 0.05;
  if (player.pitch > lim) player.pitch = lim;
  if (player.pitch < -lim) player.pitch = -lim;
});
// Stubs so existing call sites still work without rewriting them.
function exitPointerLock() {}
function requestPointerLock() {}
function updateLockHint() {}

// Touch input — Minecraft-style split:
//   left half  → virtual joystick (movement)
//   right half → drag to look (yaw + pitch)
// Both can be active at once (one finger per side).
const vstick = document.getElementById('vstick');
const vknob = vstick.querySelector('.knob');
const touchState = { active: false, id: -1, cx: 0, cy: 0, dx: 0, dy: 0 };
const lookState  = { active: false, id: -1, lastX: 0, lastY: 0 };
const STICK_R = 60;
const TOUCH_LOOK_SENS = 0.005;

function onTouchStart(e) {
  if (!isTouch) return;
  for (const t of e.changedTouches) {
    const onLeft = t.clientX <= window.innerWidth / 2;
    if (onLeft && !touchState.active) {
      touchState.active = true;
      touchState.id = t.identifier;
      touchState.cx = t.clientX;
      touchState.cy = t.clientY;
      touchState.dx = 0; touchState.dy = 0;
      vstick.classList.add('active');
      vstick.style.left = (t.clientX - 70) + 'px';
      vstick.style.top  = (t.clientY - 70) + 'px';
      vknob.style.transform = 'translate(0,0)';
    } else if (!onLeft && !lookState.active) {
      lookState.active = true;
      lookState.id = t.identifier;
      lookState.lastX = t.clientX;
      lookState.lastY = t.clientY;
    }
  }
}
function onTouchMove(e) {
  for (const t of e.changedTouches) {
    if (touchState.active && t.identifier === touchState.id) {
      let dx = t.clientX - touchState.cx;
      let dy = t.clientY - touchState.cy;
      const len = Math.hypot(dx, dy);
      if (len > STICK_R) { dx = dx / len * STICK_R; dy = dy / len * STICK_R; }
      touchState.dx = dx / STICK_R;
      touchState.dy = dy / STICK_R;
      vknob.style.transform = 'translate(' + dx + 'px,' + dy + 'px)';
    } else if (lookState.active && t.identifier === lookState.id) {
      const dx = t.clientX - lookState.lastX;
      const dy = t.clientY - lookState.lastY;
      lookState.lastX = t.clientX;
      lookState.lastY = t.clientY;
      player.yaw -= dx * TOUCH_LOOK_SENS;
      player.pitch -= dy * TOUCH_LOOK_SENS;
      const lim = Math.PI / 2 - 0.05;
      if (player.pitch > lim) player.pitch = lim;
      if (player.pitch < -lim) player.pitch = -lim;
    }
  }
}
function onTouchEnd(e) {
  for (const t of e.changedTouches) {
    if (touchState.active && t.identifier === touchState.id) {
      touchState.active = false;
      touchState.id = -1;
      touchState.dx = 0; touchState.dy = 0;
      vstick.classList.remove('active');
    } else if (lookState.active && t.identifier === lookState.id) {
      lookState.active = false;
      lookState.id = -1;
    }
  }
}
canvas.addEventListener('touchstart', onTouchStart, { passive: true });
canvas.addEventListener('touchmove',  onTouchMove,  { passive: true });
canvas.addEventListener('touchend',   onTouchEnd,   { passive: true });
canvas.addEventListener('touchcancel',onTouchEnd,   { passive: true });

// ---------- Physics + collision ----------
const GRAVITY = 22;        // u/s^2
const MAX_FALL = 35;
const H_ACCEL = 30;        // horizontal acceleration
const H_DAMP = 6;          // friction-ish damping
const H_MAX = 6;           // max horizontal speed

function intent() {
  // Returns desired horizontal direction in world space (camera-yaw frame).
  let forward = 0, strafe = 0;
  if (!isTouch) {
    if (keys['w'] || keys['arrowup'])    forward += 1;
    if (keys['s'] || keys['arrowdown'])  forward -= 1;
    if (keys['a'] || keys['arrowleft'])  strafe  -= 1;
    if (keys['d'] || keys['arrowright']) strafe  += 1;
  } else if (touchState.active) {
    forward = -touchState.dy;
    strafe  =  touchState.dx;
  }
  // Three.js default camera looks down -Z; yaw rotates about Y.
  const fx = -Math.sin(player.yaw), fz = -Math.cos(player.yaw);
  const rx =  Math.cos(player.yaw), rz = -Math.sin(player.yaw);
  return { x: fx * forward + rx * strafe, z: fz * forward + rz * strafe };
}

function playerAABB(px, py, pz) {
  return {
    minX: px - player.r, maxX: px + player.r,
    minY: py - player.h, maxY: py,           // py = head/eye height
    minZ: pz - player.r, maxZ: pz + player.r,
  };
}

function blockOverlaps(box, bx, by, bz) {
  return (box.maxX > bx - 0.5 && box.minX < bx + 0.5 &&
          box.maxY > by - 0.5 && box.minY < by + 0.5 &&
          box.maxZ > bz - 0.5 && box.minZ < bz + 0.5);
}

function nearbyBlocks(px, py, pz) {
  const result = [];
  const ix = Math.round(px), iy = Math.round(py), iz = Math.round(pz);
  // Probe a 3x5x3 region (taller in Y because player is 1.6 tall)
  for (let dx = -1; dx <= 1; dx++)
  for (let dz = -1; dz <= 1; dz++)
  for (let dy = -3; dy <= 1; dy++) {
    const b = blockMap.get(keyXYZ(ix + dx, iy + dy, iz + dz));
    if (b) result.push(b);
  }
  return result;
}

function moveAxis(axis, delta) {
  if (!player.alive) return;
  if (axis === 'x') player.x += delta;
  else if (axis === 'y') player.y += delta;
  else player.z += delta;

  const box = playerAABB(player.x, player.y, player.z);
  const near = nearbyBlocks(player.x, player.y, player.z);
  for (const b of near) {
    if (!blockOverlaps(box, b.x, b.y, b.z)) continue;
    if (b.type === 'water') { win(); return; }
    if (b.type === 'lava')  { die(); return; }
    // Resolve along axis
    if (axis === 'x') {
      if (delta > 0) player.x = b.x - 0.5 - player.r - 1e-4;
      else           player.x = b.x + 0.5 + player.r + 1e-4;
      player.vx = 0;
    } else if (axis === 'z') {
      if (delta > 0) player.z = b.z - 0.5 - player.r - 1e-4;
      else           player.z = b.z + 0.5 + player.r + 1e-4;
      player.vz = 0;
    } else { // y
      if (b.type === 'grass') {
        // Safe landing — feet rest on the platform top, no death.
        if (delta < 0) player.y = b.y + 0.5 + player.h + 1e-4;
        else           player.y = b.y - 0.5 - 1e-4;
        player.vy = 0;
      } else {
        die();
        return;
      }
    }
  }
}

function step(dt) {
  if (!player.alive) return;

  const dir = intent();
  // Horizontal accel + damping
  player.vx += dir.x * H_ACCEL * dt;
  player.vz += dir.z * H_ACCEL * dt;
  player.vx -= player.vx * Math.min(1, H_DAMP * dt);
  player.vz -= player.vz * Math.min(1, H_DAMP * dt);
  const hs = Math.hypot(player.vx, player.vz);
  if (hs > H_MAX) { player.vx = player.vx / hs * H_MAX; player.vz = player.vz / hs * H_MAX; }

  // Gravity
  player.vy -= GRAVITY * dt;
  if (player.vy < -MAX_FALL) player.vy = -MAX_FALL;

  // Move in axis order x, z, y (y last so falling resolves cleanly)
  moveAxis('x', player.vx * dt);
  if (!player.alive) return;
  moveAxis('z', player.vz * dt);
  if (!player.alive) return;
  moveAxis('y', player.vy * dt);

  // Soft shaft clamp — keeps the player inside the column where slices have gaps.
  const lim = (currentLevel.size - 1) / 2 - 0.5 - player.r;
  if (player.x >  lim) { player.x =  lim; player.vx = 0; }
  if (player.x < -lim) { player.x = -lim; player.vx = 0; }
  if (player.z >  lim) { player.z =  lim; player.vz = 0; }
  if (player.z < -lim) { player.z = -lim; player.vz = 0; }

}

// ---------- Game state ----------
let gameState = 'menu'; // 'menu' | 'playing' | 'won' | 'dead'
let currentLevelIndex = 0;
let maxDepthSeen = 0;

const menuEl = document.getElementById('menu');
const wonEl = document.getElementById('won');
const deadEl = document.getElementById('dead');
const wonSub = document.getElementById('wonSub');
const restartBtn = document.getElementById('restartBtn');
const hudLevel = document.getElementById('hudLevel');
const hudDepth = document.getElementById('hudDepth');
const menuHelp = document.getElementById('menuHelp');
const flashEl = document.getElementById('flash');

menuHelp.textContent = isTouch
  ? 'LEFT · MOVE   RIGHT · LOOK   STEP OFF EDGE TO DROP'
  : 'WASD MOVE · HOLD MOUSE + DRAG TO LOOK · STEP OFF THE PLATFORM';

function showMenu() {
  gameState = 'menu';
  menuEl.classList.remove('hidden');
  wonEl.classList.add('hidden');
  deadEl.classList.add('hidden');
  restartBtn.classList.add('hidden');
  renderLevelButtons();
  updateLockHint();
}

function renderLevelButtons() {
  const wrap = document.getElementById('levelButtons');
  wrap.innerHTML = '';
  LEVELS.forEach((lv, i) => {
    const b = document.createElement('button');
    b.className = 'btn primary';
    b.textContent = (i + 1) + ' · ' + lv.name;
    b.onclick = () => { startLevel(i); requestPointerLock(); };
    wrap.appendChild(b);
  });
}

function startLevel(i) {
  currentLevelIndex = i;
  loadLevel(LEVELS[i]);
  resetPlayer();
  maxDepthSeen = 0;
  gameState = 'playing';
  menuEl.classList.add('hidden');
  wonEl.classList.add('hidden');
  deadEl.classList.add('hidden');
  restartBtn.classList.remove('hidden');
  hudLevel.textContent = LEVELS[i].name;
  updateLockHint();
}

function retryLevel() {
  startLevel(currentLevelIndex);
}

function win() {
  if (gameState !== 'playing') return;
  gameState = 'won';
  player.alive = false;
  updateLockHint();
  wonSub.textContent = 'LEVEL ' + (currentLevelIndex + 1) + ' · ' + LEVELS[currentLevelIndex].name;
  wonEl.classList.remove('hidden');
  restartBtn.classList.add('hidden');
  const nextBtn = document.getElementById('nextBtn');
  if (currentLevelIndex >= LEVELS.length - 1) {
    nextBtn.textContent = 'PLAY AGAIN';
    nextBtn.onclick = () => { startLevel(0); requestPointerLock(); };
  } else {
    nextBtn.textContent = 'NEXT LEVEL';
    nextBtn.onclick = () => { startLevel(currentLevelIndex + 1); requestPointerLock(); };
  }
  exitPointerLock();
}

function die() {
  if (gameState !== 'playing') return;
  gameState = 'dead';
  player.alive = false;
  updateLockHint();
  flashEl.classList.add('on');
  setTimeout(() => flashEl.classList.remove('on'), 80);
  deadEl.classList.remove('hidden');
  restartBtn.classList.add('hidden');
  exitPointerLock();
}

// UI buttons
restartBtn.onclick = () => { retryLevel(); requestPointerLock(); };
document.getElementById('retryBtn').onclick = () => { retryLevel(); requestPointerLock(); };
document.getElementById('deadMenuBtn').onclick = () => showMenu();
document.getElementById('wonMenuBtn').onclick = () => showMenu();

// ---------- Tick + render ----------
let last = performance.now();
function tick() {
  requestAnimationFrame(tick);
  try { tickBody(); } catch (e) { logError('tick', e); }
}
function tickBody() {
  const now = performance.now();
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;

  if (gameState === 'playing') {
    step(dt);
  }

  // Camera follows player (eye at top of AABB). Skip while in menu so the
  // backdrop view doesn't sit inside the spawn platform.
  if (gameState !== 'menu') {
    camera.position.set(player.x, player.y, player.z);
    camera.rotation.order = 'YXZ';
    camera.rotation.y = player.yaw;
    camera.rotation.x = player.pitch;
  }

  // HUD
  if (gameState === 'playing') {
    const depth = Math.max(0, currentLevel.startY - player.y) | 0;
    if (depth > maxDepthSeen) maxDepthSeen = depth;
    hudDepth.textContent = depth + 'm';
  }

  renderer.render(scene, camera);
}

// First render so something shows behind the menu
showMenu();
loadLevel(LEVELS[0]); // pre-load level 1 so menu has a backdrop
camera.position.set(5, 5, 5);
camera.rotation.order = 'YXZ';
camera.rotation.y = Math.PI / 4;   // look toward origin
camera.rotation.x = -0.5;
renderer.render(scene, camera);

tick();
</script>
</body>
