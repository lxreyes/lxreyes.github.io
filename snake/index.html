<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SNAKE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: #06060a; color: #e8e6e3;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
    overflow: hidden; user-select: none; -webkit-user-select: none; }
  body { background: radial-gradient(circle at 50% -10%, rgba(88, 199, 89, 0.18), transparent 60%),
    radial-gradient(ellipse at center, #14141a, #06060a 75%); touch-action: none; }
  canvas { display: block; background: transparent; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
  .hud { position: fixed; top: 18px; left: 0; right: 0; text-align: center; pointer-events: none;
    font-family: "Space Grotesk", system-ui, sans-serif; z-index: 5; }
  .hud .score { font-size: 38px; font-weight: 700; letter-spacing: 0.06em; color: rgba(232,230,227,0.92);
    text-shadow: 0 2px 12px rgba(0,0,0,0.6); font-variant-numeric: tabular-nums; }
  .hud .meta { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(232,230,227,0.42); margin-top: 4px; }
  .back { position: fixed; top: 16px; left: 16px; font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(232,230,227,0.5);
    text-decoration: none; z-index: 10; }
  .back:hover { color: rgba(232,230,227,0.95); }
  .mute { position: fixed; top: 16px; right: 16px; font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: 14px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    color: rgba(232,230,227,0.6); background: rgba(6,6,10,0.4); border: 1px solid rgba(232,230,227,0.18);
    border-radius: 50%; cursor: pointer; z-index: 11; padding: 0; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
  .mute.is-muted { opacity: 0.4; }
  .overlay { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 20px; background: rgba(6,6,10,0.7); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); z-index: 20; }
  .overlay.is-hidden { display: none; }
  h1 { font-family: "Space Grotesk", system-ui, sans-serif; font-size: clamp(36px, 8vw, 64px);
    font-weight: 700; letter-spacing: 0.04em; margin: 0 0 16px; color: #58c759;
    text-shadow: 0 0 28px rgba(88,199,89,0.55); }
  p { color: rgba(232,230,227,0.72); font-size: 15px; margin: 0 0 28px; max-width: 34ch; line-height: 1.55; }
  button { font-family: "Space Grotesk", system-ui, sans-serif; font-weight: 700; font-size: 13px;
    letter-spacing: 0.2em; text-transform: uppercase; color: #0a0a0e; background: #58c759; border: none;
    border-radius: 999px; padding: 13px 26px; cursor: pointer; box-shadow: 0 8px 22px rgba(88,199,89,0.45); }
  button:hover { background: #6fd56f; }
  .hint { color: rgba(232,230,227,0.42); font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; margin-top: 18px; }
  .hint b { color: rgba(232,230,227,0.72); font-weight: 700; }
  .pad { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    display: grid; grid-template-columns: 60px 60px 60px; grid-template-rows: 60px 60px;
    gap: 6px; z-index: 5; }
  .pad button { padding: 0; background: rgba(88,199,89,0.10); border: 1px solid rgba(88,199,89,0.32); color: rgba(232,230,227,0.85); font-size: 18px; box-shadow: none; border-radius: 12px; cursor: pointer; }
  .pad button:active { background: rgba(88,199,89,0.28); }
  .pad .up { grid-column: 2; grid-row: 1; }
  .pad .left { grid-column: 1; grid-row: 2; }
  .pad .down { grid-column: 2; grid-row: 2; }
  .pad .right { grid-column: 3; grid-row: 2; }
  @media (hover: hover) and (pointer: fine) { .pad { display: none; } }
</style>
<script src="../music.js" defer></script>
</head>
<body>
<a href="../index.html" class="back">&larr; back</a>
<button class="mute" id="mute" type="button" aria-label="Toggle music">♪</button>
<canvas id="c"></canvas>
<div class="hud">
  <div class="score" id="score">0</div>
  <div class="meta" id="meta">length 3 &middot; best 0</div>
</div>
<div class="pad" aria-hidden="true">
  <button class="up" data-dir="up">▲</button>
  <button class="left" data-dir="left">◀</button>
  <button class="down" data-dir="down">▼</button>
  <button class="right" data-dir="right">▶</button>
</div>
<div class="overlay" id="start">
  <h1>SNAKE</h1>
  <p>Eat apples. Don&rsquo;t hit yourself. Don&rsquo;t hit the wall. The longer you get, the harder it is.</p>
  <button id="start-btn">Start</button>
  <div class="hint"><b>arrow keys</b> or <b>WASD</b> &middot; on-screen pad on mobile</div>
</div>
<div class="overlay is-hidden" id="over">
  <h1 id="over-title">Game Over</h1>
  <p id="over-score">Length 0 &middot; Best 0</p>
  <button id="retry-btn">Retry</button>
</div>
<script>
(function () {
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var scoreEl = document.getElementById('score');
  var metaEl = document.getElementById('meta');
  var startOverlay = document.getElementById('start');
  var overOverlay = document.getElementById('over');
  var overScoreEl = document.getElementById('over-score');
  var overTitleEl = document.getElementById('over-title');
  var startBtn = document.getElementById('start-btn');
  var retryBtn = document.getElementById('retry-btn');
  var muteBtn = document.getElementById('mute');

  var COLS = 24, ROWS = 24;
  var W = 0, H = 0, cell = 0, gx = 0, gy = 0;
  var snake = [];
  var dir = { x: 1, y: 0 };
  var queued = null;
  var apple = null;
  var tick = 0;
  var speed = 8;
  var state = 'idle';
  var score = 0;
  var best = 0;
  try { best = parseInt(localStorage.getItem('snake-best') || '0', 10) || 0; } catch (_) {}

  function resize() {
    W = canvas.clientWidth || window.innerWidth;
    H = canvas.clientHeight || window.innerHeight;
    canvas.width = W; canvas.height = H;
    var maxW = W - 32, maxH = H - 180;
    var size = Math.min(maxW, maxH);
    cell = Math.floor(size / Math.max(COLS, ROWS));
    gx = Math.floor((W - cell * COLS) / 2);
    gy = Math.max(80, Math.floor((H - cell * ROWS) / 2));
  }
  window.addEventListener('resize', resize);
  resize();

  function reset() {
    snake = [{ x: 12, y: 12 }, { x: 11, y: 12 }, { x: 10, y: 12 }];
    dir = { x: 1, y: 0 }; queued = null;
    spawnApple();
    score = 0; tick = 0; speed = 8;
    scoreEl.textContent = '0';
    metaEl.textContent = 'length ' + snake.length + ' · best ' + best;
  }
  function spawnApple() {
    while (true) {
      var x = Math.floor(Math.random() * COLS), y = Math.floor(Math.random() * ROWS);
      var hit = false;
      for (var i = 0; i < snake.length; i++) if (snake[i].x === x && snake[i].y === y) { hit = true; break; }
      if (!hit) { apple = { x: x, y: y }; return; }
    }
  }
  function start() {
    if (window.Music) Music.start('snake');
    reset(); state = 'play';
    startOverlay.classList.add('is-hidden');
    overOverlay.classList.add('is-hidden');
  }
  function gameOver() {
    state = 'over';
    if (score > best) { best = score; try { localStorage.setItem('snake-best', String(best)); } catch (_) {} }
    overTitleEl.textContent = 'Game Over';
    overScoreEl.textContent = 'Length ' + snake.length + ' · Best ' + best;
    metaEl.textContent = 'length ' + snake.length + ' · best ' + best;
    overOverlay.classList.remove('is-hidden');
  }
  startBtn.addEventListener('click', start);
  retryBtn.addEventListener('click', start);

  function turn(nx, ny) {
    // Reject reverse on the active dir
    if (dir.x === -nx && dir.y === -ny) return;
    queued = { x: nx, y: ny };
  }
  var KEY_MAP = {
    'ArrowUp': [0,-1], 'KeyW': [0,-1],
    'ArrowDown': [0,1], 'KeyS': [0,1],
    'ArrowLeft': [-1,0], 'KeyA': [-1,0],
    'ArrowRight': [1,0], 'KeyD': [1,0]
  };
  window.addEventListener('keydown', function (e) {
    if ((e.code === 'Space' || e.code === 'Enter') && (state === 'idle' || state === 'over')) { e.preventDefault(); start(); return; }
    if (KEY_MAP[e.code]) { e.preventDefault(); turn(KEY_MAP[e.code][0], KEY_MAP[e.code][1]); }
  });
  document.querySelectorAll('.pad button').forEach(function (btn) {
    btn.addEventListener('pointerdown', function (e) {
      e.preventDefault();
      var d = btn.getAttribute('data-dir');
      if (d === 'up') turn(0,-1);
      else if (d === 'down') turn(0,1);
      else if (d === 'left') turn(-1,0);
      else if (d === 'right') turn(1,0);
    });
  });
  if (muteBtn) {
    if (window.Music && Music.isMuted()) muteBtn.classList.add('is-muted');
    muteBtn.addEventListener('click', function () { if (window.Music) Music.toggle(); muteBtn.classList.toggle('is-muted'); });
  }

  function step() {
    if (queued) { dir = queued; queued = null; }
    var head = snake[0];
    var nx = head.x + dir.x, ny = head.y + dir.y;
    if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) { gameOver(); return; }
    for (var i = 0; i < snake.length; i++) if (snake[i].x === nx && snake[i].y === ny) { gameOver(); return; }
    snake.unshift({ x: nx, y: ny });
    if (apple && nx === apple.x && ny === apple.y) {
      score++;
      scoreEl.textContent = score;
      speed = Math.min(20, 8 + Math.floor(score / 4));
      metaEl.textContent = 'length ' + snake.length + ' · best ' + best;
      spawnApple();
    } else {
      snake.pop();
    }
  }

  function loop() {
    if (state === 'play') {
      tick++;
      if (tick >= Math.max(2, Math.floor(60 / speed))) { tick = 0; step(); }
    }
    render();
    requestAnimationFrame(loop);
  }

  function render() {
    ctx.fillStyle = '#06060a'; ctx.fillRect(0, 0, W, H);
    // board
    ctx.fillStyle = '#0d1614'; ctx.fillRect(gx, gy, cell*COLS, cell*ROWS);
    ctx.strokeStyle = '#58c759'; ctx.lineWidth = 2; ctx.strokeRect(gx+1, gy+1, cell*COLS-2, cell*ROWS-2);
    // grid hint
    ctx.fillStyle = 'rgba(88,199,89,0.04)';
    for (var r = 0; r < ROWS; r++) for (var c = 0; c < COLS; c++) if ((r+c)%2===0) ctx.fillRect(gx+c*cell, gy+r*cell, cell, cell);
    // apple
    if (apple) {
      ctx.fillStyle = '#ff5566';
      var ax = gx + apple.x*cell + cell/2, ay = gy + apple.y*cell + cell/2;
      ctx.beginPath(); ctx.arc(ax, ay, cell*0.38, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#54e08a'; ctx.fillRect(ax-1, ay-cell*0.42, 2, 5);
    }
    // snake
    for (var i = snake.length - 1; i >= 0; i--) {
      var s = snake[i];
      var t = 1 - i / Math.max(1, snake.length);
      var R = Math.round(88 + t * 80), G = Math.round(199 + t * 30), B = Math.round(89 + t * 40);
      ctx.fillStyle = 'rgb(' + R + ',' + Math.min(255, G) + ',' + B + ')';
      ctx.fillRect(gx + s.x*cell + 1, gy + s.y*cell + 1, cell - 2, cell - 2);
    }
    // eyes on head
    if (snake.length) {
      var h = snake[0];
      var ex = gx + h.x*cell + cell/2, ey = gy + h.y*cell + cell/2;
      ctx.fillStyle = '#06060a';
      var dx = dir.x * cell*0.18, dy = dir.y * cell*0.18;
      var px = -dir.y * cell*0.18, py = dir.x * cell*0.18;
      ctx.beginPath(); ctx.arc(ex + dx + px, ey + dy + py, cell*0.10, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex + dx - px, ey + dy - py, cell*0.10, 0, Math.PI*2); ctx.fill();
    }
  }

  loop();
})();
</script>
</body>
</html>
